name: Self-Hosted Tests

# Host-only integration/e2e suites that can ONLY run on the Jetson self-hosted
# runner (they import local service modules, start the FastAPI lifespan, and hit
# the live brain/DB — see tests/AGENTS.md). deploy.yml runs on the same runner
# but only curls health endpoints; it never runs pytest. This job is a SEPARATE,
# REPORTING-ONLY signal: it runs post-merge on main so those suites actually get
# exercised on real hardware.
#
# It does NOT gate or roll back deploys — deploy.yml owns deploy and runs
# independently. Every pytest step here is `continue-on-error: true`, so a red
# suite surfaces in the run summary without failing the workflow or blocking
# anything downstream.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live_memory:
        description: "Also run the samantha_live memory suite (ZOE_LIVE_TESTS=1; needs live Gemma)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  # Serialize with itself so overlapping post-merge runs don't fight over the
  # shared checkout / live services on the single Jetson runner. Keep it separate
  # from deploy.yml's `production` group so it never blocks a deploy.
  group: self-hosted-tests
  cancel-in-progress: false

jobs:
  host-tests:
    # Same self-hosted Jetson runner as deploy.yml.
    runs-on: self-hosted
    # Hard cap so a hung/stalled test can never hold the shared Jetson runner (and
    # queue deploys behind it) for the 6h GitHub default. `continue-on-error` only
    # fires when a step EXITS; it does nothing for a process that stalls — this
    # timeout is what bounds that case.
    timeout-minutes: 20

    env:
      # Mirror the PYTHONPATH the validate.yml / repo pytest.ini use so local
      # service imports (routers, zoe_agent, mcp_server) resolve.
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/services/zoe-data
      # Keep these suites off any real identity / live memory unless explicitly
      # opted in via the workflow_dispatch input below.
      ZOE_MEMORY_STARTUP_STRICT: "false"

    steps:
      # MEMORY-HEADROOM GATE (self-hosted only — this job shares the Jetson with
      # the LIVE llama-server brain). Verified 2026-07-19: a CI burst pushed
      # MemAvailable low enough that the running brain hit CUDA/NvMap allocation
      # failure and crash-looped — unified memory, so cgroup guards do NOT cover
      # GPU allocations. Wait for headroom before running anything heavy.
      # Threshold 1800MB: the brain died when transients pushed availMB below
      # ~1-1.5GB, and this workflow's own peak transient (full pytest suites
      # importing torch/MemPalace) is on the order of a few hundred MB — 1800MB
      # keeps availMB above the observed ~1.5GB kill zone with margin, without
      # stalling on the box's normal idle state (typically several GB free), so
      # the common case is a single instant check.
      - name: Wait for memory headroom (protect the live brain)
        timeout-minutes: 10
        run: |
          THRESHOLD_MB=1800
          for attempt in $(seq 1 36); do
            AVAIL_MB="$(free -m | awk '/Mem:/{print $7}')"
            if [ "${AVAIL_MB}" -ge "${THRESHOLD_MB}" ]; then
              echo "Memory headroom OK: ${AVAIL_MB}MB available (>= ${THRESHOLD_MB}MB)."
              exit 0
            fi
            echo "Waiting for memory headroom: ${AVAIL_MB}MB available (< ${THRESHOLD_MB}MB); retry in 15s (${attempt}/36)."
            sleep 15
          done
          echo "::error::Jetson is memory-starved: ${AVAIL_MB}MB available after ~9min, need >= ${THRESHOLD_MB}MB. Refusing to run heavy CI next to the live brain (unified memory — a CI burst here has crash-looped llama-server before). Operator: free memory on the box (check the brain's RSS, stray pytest/chromium, VmSwap of the :8000 pid), then re-run."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      # The self-hosted runner is NOT a fresh box: it's the Jetson that already
      # runs the live stack, so the Jetson-specific Python deps (torch, onnx,
      # whisper, MemPalace, etc.) are already installed for the user that owns
      # the runner. We intentionally do NOT pip-install the heavy requirements
      # here (that's ~3 GB and would fight the live services). Record the
      # interpreter for the run log so drift is visible.
      - name: Show Python environment
        run: |
          python3 --version
          python3 -c "import sys; print('executable:', sys.executable)"

      # Host-only integration + e2e suites. Reporting-only: allowed to fail so a
      # red suite is visible in the summary without failing the workflow or
      # touching deploy. Uses the repo pytest.ini (asyncio_mode=auto) and the
      # PYTHONPATH set at job level.
      - name: Integration + e2e tests (reporting-only)
        id: host_suites
        continue-on-error: true
        run: |
          cd "${{ github.workspace }}"
          python3 -m pytest tests/integration tests/e2e -q

      # These suites exercise the LIVE service (POST /api/chat/ etc.) and leave
      # real rows behind — 'Dentist Appointment' calendar spam on the panel
      # (operator bug report 2026-07-13). Always sweep the orphaned guest/test
      # rows afterwards; reversible soft-delete, scoped to guest + test-sec-b
      # owners only (never a real household user's data).
      # NOT continue-on-error: if this sweep fails, junk stays on the live
      # panel — the workflow must go red so it gets fixed, not ignored.
      - name: Clean up live test artifacts
        if: always()
        run: |
          cd "${{ github.workspace }}"
          python3 scripts/maintenance/purge_orphaned_test_data.py --execute --yes \
            --expect-db zoe --expect-host localhost:5432

      # Full service-local zoe-data suite — the catch-all safety net that closes
      # the recurring silent-skip: validate.yml only runs the `-m ci_safe` subset
      # on the slim GitHub runner, so a NEW services/zoe-data/tests/*.py that is
      # NOT (yet) marked ci_safe would otherwise run NOWHERE. The Jetson HAS
      # MemPalace + the live services, so it can run the whole directory. Picks up
      # every new test with ZERO enumeration. Reporting-only (continue-on-error),
      # so a red/host-flaky test surfaces in the summary without gating anything.
      # samantha_live self-skips (collects 0) unless ZOE_LIVE_TESTS=1 — see
      # services/zoe-data/tests/samantha_live/AGENTS.md — so it needs no --ignore.
      - name: Full zoe-data suite (reporting-only, catch-all)
        id: zoe_data_full
        continue-on-error: true
        run: |
          cd "${{ github.workspace }}"
          python3 -m pytest services/zoe-data/tests -q

      # Same catch-all for the repo-root tests/unit directory: validate.yml runs
      # only its `-m ci_safe` subset on the slim GitHub runner, so an UNMARKED
      # tests/unit file (live-service smokes, Jetson-dep tests, new files nobody
      # marked yet) would otherwise run NOWHERE. Zero enumeration, reporting-only.
      - name: Full tests/unit suite (reporting-only, catch-all)
        id: unit_full
        continue-on-error: true
        run: |
          cd "${{ github.workspace }}"
          python3 -m pytest tests/unit -q

      # Live Samantha memory proofs. Self-skips (collects 0 items) unless
      # ZOE_LIVE_TESTS=1 AND live Gemma is reachable — see
      # services/zoe-data/tests/samantha_live/AGENTS.md. Only armed on manual
      # dispatch with the run_live_memory input, since it writes to the live
      # memory store (demo users only) and needs the model server up. Still
      # reporting-only.
      - name: Samantha live memory suite (opt-in, reporting-only)
        id: live_suite
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_memory }}
        continue-on-error: true
        env:
          ZOE_LIVE_TESTS: "1"
        run: |
          cd "${{ github.workspace }}"
          python3 -m pytest services/zoe-data/tests/samantha_live -q

      # Make the reporting nature explicit in the run summary: surface whether
      # the host suites passed without ever failing the job.
      - name: Report result
        if: ${{ always() }}
        run: |
          echo "Integration + e2e outcome: ${{ steps.host_suites.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Full zoe-data suite (catch-all) outcome: ${{ steps.zoe_data_full.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Full tests/unit suite (catch-all) outcome: ${{ steps.unit_full.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Samantha live memory outcome: ${{ steps.live_suite.outcome || 'not run' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow is reporting-only and does not gate or roll back deploys." >> "$GITHUB_STEP_SUMMARY"
