name: Validate

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      CI_DB_PASSWORD: ${{ secrets.POSTGRES_CI_PASSWORD || 'ci-postgres-pw' }}

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: zoe
          POSTGRES_USER: zoe
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_CI_PASSWORD || 'ci-postgres-pw' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zoe"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Slim install — avoids Jetson-specific packages (torch/onnx/whisper stacks)
      # that would timeout or fail on x86_64 GitHub runners.
      - name: Install slim CI deps
        run: |
          pip install --quiet \
            aiosqlite asyncpg psycopg2-binary alembic \
            fastapi "httpx>=0.27.0,<0.28" "apscheduler==3.10.4" "tzlocal>=2,<3" "sqlalchemy>=2.0,<3.0" \
            pydantic pywebpush py-vapid cryptography \
            "ag-ui-protocol==0.1.14" websockets python-jose passlib \
            python-multipart uvicorn prometheus-client "python-json-logger>=4.1.0"

      - name: Validate project structure
        run: python3 tools/audit/validate_structure.py

      - name: Validate critical files
        run: python3 tools/audit/validate_critical_files.py

      - name: Validate offline memory policy
        run: python3 tools/audit/validate_offline_memory.py

      - name: Run Alembic migrations on CI PostgreSQL
        run: |
          cd services/zoe-data
          POSTGRES_URL=postgresql://zoe:${CI_DB_PASSWORD}@localhost:5432/zoe \
            python3 -c "
          import os
          os.environ['POSTGRES_URL'] = f'postgresql://zoe:{os.environ[\"CI_DB_PASSWORD\"]}@localhost:5432/zoe'
          from alembic.config import Config
          from alembic import command as alembic_cmd
          cfg = Config('alembic.ini')
          cfg.set_main_option('sqlalchemy.url', f'postgresql+psycopg2://zoe:{os.environ[\"CI_DB_PASSWORD\"]}@localhost:5432/zoe')
          cfg.set_main_option('script_location', 'alembic')
          alembic_cmd.upgrade(cfg, 'head')
          print('Alembic migrations OK')
          "
        env:
          POSTGRES_URL: postgresql://zoe:${{ env.CI_DB_PASSWORD }}@localhost:5432/zoe

      - name: Python syntax check (all zoe-data modules)
        run: |
          find services/zoe-data -name "*.py" \
            -not -path "*/__pycache__/*" \
            -not -path "*/.pytest_cache/*" \
            | sort | xargs python3 -m py_compile
          echo "All Python files: syntax OK"

      # Run pure unit tests plus zoe-auth contract tests that use lightweight DB fakes.
      # Heavy tests requiring Jetson-specific packages (whisper, torch, MemPalace)
      # still run on the Jetson or during focused local validation.
      - name: Unit tests (pure logic and auth contracts)
        run: |
          pip install --quiet -r services/zoe-auth/requirements.txt
          pytest \
            services/zoe-data/tests/test_canonical_invariants.py \
            services/zoe-data/tests/test_voice_smoke_ci.py \
            services/zoe-data/tests/test_voice_tool_filler.py \
            services/zoe-data/tests/test_guest_policy.py \
            services/zoe-data/tests/test_voice_scope.py \
            services/zoe-data/tests/test_chat_session_title.py \
            services/zoe-data/tests/test_chat_stream_lifecycle.py \
            services/zoe-data/tests/test_ui_orchestrator_types.py \
            services/zoe-data/tests/test_skybridge_static.py \
            services/zoe-data/tests/test_zoe_core_client.py \
            services/zoe-data/tests/test_async_subprocess.py \
            services/zoe-data/tests/test_greptile_client.py \
            services/zoe-data/tests/test_db_pool_release_race.py \
            services/zoe-data/tests/test_greploop_guard.py \
            services/zoe-data/tests/test_pipeline_store.py \
            services/zoe-data/tests/test_pipeline_evidence.py \
            services/zoe-data/tests/test_multica_poll_dispatch.py \
            services/zoe-data/tests/test_main_multica_poll.py \
            services/zoe-data/tests/test_zoe_agent_self_url.py \
            services/zoe-data/tests/test_agent_safety.py \
            services/zoe-data/tests/test_openclaw_skill_name_safety.py \
            services/zoe-data/tests/test_kanban_phase_budget.py \
            services/zoe-data/tests/test_scheduling_workers_review_fixes.py \
            services/zoe-data/tests/test_memory_emotional_recall.py \
            services/zoe-data/tests/test_telegram_account_linking.py \
            services/zoe-data/tests/test_morning_brief.py \
            services/zoe-data/tests/test_temporal_relationships.py \
            services/homeassistant-mcp-bridge/tests/test_ha_bridge.py \
            -x -q \
            --override-ini="asyncio_mode=auto"
          PYTHONPATH="${{ github.workspace }}:${{ github.workspace }}/services/zoe-data" pytest \
            tests/unit/test_remediate_ownerless_memories.py \
            tests/unit/test_memory_service_fixes.py \
            -x -q \
            --override-ini="asyncio_mode=auto"
          PYTHONPATH="${{ github.workspace }}/services/zoe-auth:${{ github.workspace }}/services/zoe-auth/tests" pytest \
            services/zoe-auth/tests/test_auth.py \
            services/zoe-auth/tests/test_smoke.py \
            services/zoe-auth/tests/test_oidc_jwt.py \
            services/zoe-auth/tests/test_request_logging.py \
            -x -q
        env:
          PYTHONPATH: ${{ github.workspace }}/services/zoe-data
          POSTGRES_URL: postgresql://zoe:${{ env.CI_DB_PASSWORD }}@localhost:5432/zoe
          ZOE_DATA_DB: ":memory:"
          ZOE_MEMORY_STARTUP_STRICT: "false"

      - name: People MemPalace integration cleanup
        run: |
          PYTHONPATH="${{ github.workspace }}/services/zoe-data" pytest \
            tests/integration/test_people_mempalace_sync.py \
            -x -q \
            --override-ini="asyncio_mode=auto"
        env:
          POSTGRES_URL: postgresql://zoe:${{ env.CI_DB_PASSWORD }}@localhost:5432/zoe
