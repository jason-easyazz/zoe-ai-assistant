name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    # Runs on the self-hosted runner installed on the Jetson.
    # No SSH, no public IP, no tunnel needed — the runner connects outbound to GitHub.
    runs-on: self-hosted
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Pull latest main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd /home/zoe/assistant
          git remote set-url origin https://github.com/jason-easyazz/zoe-ai-assistant.git
          python3 - <<'PY'
          import re
          import subprocess
          raw = subprocess.check_output(["git", "--version"], text=True).strip()
          match = re.search(r"\bversion\s+([0-9]+(?:\.[0-9]+){1,2})", raw)
          if not match:
              raise SystemExit(f"could not parse git version from: {raw}")
          version = match.group(1)
          parts = tuple(int(part) for part in version.split("."))
          parts = parts + (0,) * (3 - len(parts))
          if parts < (2, 31, 0):
              raise SystemExit(f"git {version} is too old for GIT_CONFIG_COUNT; need git >= 2.31.0")
          PY
          AUTH_HEADER="$(python3 - <<'PY'
          import base64
          import os
          print(base64.b64encode(f"x-access-token:{os.environ['GITHUB_TOKEN']}".encode()).decode())
          PY
          )"
          GIT_CONFIG_COUNT=1 \
          GIT_CONFIG_KEY_0=http.https://github.com/.extraheader \
          GIT_CONFIG_VALUE_0="AUTHORIZATION: basic ${AUTH_HEADER}" \
            git fetch origin main
          unset AUTH_HEADER GITHUB_TOKEN
          git reset --hard FETCH_HEAD

      - name: Install / refresh Python deps
        run: |
          pip3 install --quiet --user \
            "apscheduler==3.10.4" "sqlalchemy>=2.0,<3.0" \
            alembic asyncpg psycopg2-binary pywebpush py-vapid

      - name: Apply database migrations
        run: |
          cd /home/zoe/assistant
          bash scripts/deploy/migrate.sh

      - name: Rebuild / restart zoe-auth
        run: |
          cd /home/zoe/assistant
          docker compose up -d --build zoe-auth
          for attempt in {1..12}; do
            curl -sf http://localhost:8002/health > /dev/null && exit 0
            sleep 5
          done
          docker compose logs --tail=80 zoe-auth
          echo "zoe-auth failed health check after restart"
          exit 1

      # zoe-data is a user service — no sudo needed.
      # XDG_RUNTIME_DIR is required so systemctl --user can reach the user session bus.
      - name: Restart zoe-data (user service)
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          systemctl --user restart zoe-data.service

      - name: Health check
        run: |
          sleep 6
          # Verify VAPID key endpoint (push subsystem healthy)
          curl -sf http://localhost:8000/api/push/vapid-public-key > /dev/null
          # Verify proactive router is registered (auth returns guest, expects 200 or 401)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/api/proactive/schedule)
          ( [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] ) \
            && echo "Deploy OK at $(date)" \
            || (echo "Unexpected status $STATUS from /api/proactive/schedule"; exit 1)
