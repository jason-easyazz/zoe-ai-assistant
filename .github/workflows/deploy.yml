name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    # Runs on the self-hosted runner installed on the Jetson.
    # No SSH, no public IP, no tunnel needed — the runner connects outbound to GitHub.
    runs-on: self-hosted
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Pull latest main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd /home/zoe/assistant
          # Serialize the tree mutation (fetch + reset --hard) against a concurrent
          # manual `scripts/maintenance/deploy_live.sh`, which fetch+advances main on
          # this SAME shared .git/worktree. Without a shared lock the two race on the
          # ref-lock and the manual path aborts. deploy_live.sh takes the same lock.
          # (The `production` concurrency group only serializes runner-vs-runner.)
          exec 9>/tmp/zoe-deploy.lock
          flock -w 300 9 || { echo "could not acquire /tmp/zoe-deploy.lock within 300s"; exit 1; }
          git remote set-url origin https://github.com/jason-easyazz/zoe-ai-assistant.git
          python3 - <<'PY'
          import re
          import subprocess
          raw = subprocess.check_output(["git", "--version"], text=True).strip()
          match = re.search(r"\bversion\s+([0-9]+(?:\.[0-9]+){1,2})", raw)
          if not match:
              raise SystemExit(f"could not parse git version from: {raw}")
          version = match.group(1)
          parts = tuple(int(part) for part in version.split("."))
          parts = parts + (0,) * (3 - len(parts))
          if parts < (2, 31, 0):
              raise SystemExit(f"git {version} is too old for GIT_CONFIG_COUNT; need git >= 2.31.0")
          PY
          AUTH_HEADER="$(python3 - <<'PY'
          import base64
          import os
          print(base64.b64encode(f"x-access-token:{os.environ['GITHUB_TOKEN']}".encode()).decode())
          PY
          )" || exit 1
          echo "::add-mask::${AUTH_HEADER}"
          # Record the currently-deployed SHA so later steps can detect what changed.
          echo "OLD_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          # Retry the fetch: this checkout's .git is shared with other tooling, so a
          # concurrent `git fetch` can lose the ref-lock race on refs/remotes/origin/main
          # ("cannot lock ref ... is at X but expected Y") and fail the whole deploy.
          # A few retries make the deploy robust to that transient collision.
          for attempt in 1 2 3 4 5; do
            if GIT_CONFIG_COUNT=1 \
               GIT_CONFIG_KEY_0=http.https://github.com/.extraheader \
               GIT_CONFIG_VALUE_0="AUTHORIZATION: basic ${AUTH_HEADER}" \
                 git fetch origin main; then
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "git fetch failed after 5 attempts"; exit 1
            fi
            echo "git fetch attempt ${attempt} failed (likely a concurrent ref-lock); retrying in 5s..."
            sleep 5
          done
          unset AUTH_HEADER GITHUB_TOKEN
          git reset --hard FETCH_HEAD

      - name: Install / refresh Python deps
        run: |
          pip3 install --quiet --user \
            "apscheduler==3.10.4" "tzlocal>=2,<3" "sqlalchemy>=2.0,<3.0" \
            alembic asyncpg psycopg2-binary pywebpush py-vapid \
            segno

      - name: Apply database migrations
        run: |
          cd /home/zoe/assistant
          bash scripts/deploy/migrate.sh

      - name: Rebuild / restart zoe-auth
        run: |
          cd /home/zoe/assistant
          docker compose up -d --build zoe-auth
          for attempt in {1..12}; do
            curl -sf http://localhost:8002/health > /dev/null && exit 0
            sleep 5
          done
          docker compose logs --tail=80 zoe-auth
          echo "zoe-auth failed health check after restart"
          exit 1

      # zoe-data is a user service — no sudo needed.
      # XDG_RUNTIME_DIR is required so systemctl --user can reach the user session bus.
      - name: Restart zoe-data (user service)
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          systemctl --user restart zoe-data.service

      # The Flue brain sidecar is the production brain when ZOE_BRAIN_BACKEND=flue.
      # It runs a pre-built dist/ and `flue build` externalizes deps, so a change to
      # labs/flue-zoe-brain/ on main does NOT reach the running brain until dist is
      # rebuilt and the service restarted. Do that here — but ONLY when the sidecar
      # source actually changed (a build is ~1-2 min), and only if the service is
      # installed (skips cleanly when the seam isn't in use on this host).
      - name: Rebuild / restart Flue brain sidecar (if changed)
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          # Guard on the unit ACTUALLY appearing in the listing — `list-unit-files`
          # exits 0 with empty output on some systemd versions when the unit is
          # absent, so an exit-code-only check would fall through and then fail on
          # restart. Match the unit name in the output instead.
          if ! systemctl --user list-unit-files flue-zoe-brain.service 2>/dev/null \
               | grep -q '^flue-zoe-brain\.service'; then
            echo "flue-zoe-brain.service not installed on this host — skipping."
            exit 0
          fi
          cd /home/zoe/assistant
          if [ -n "${OLD_SHA:-}" ] \
             && git diff --quiet "${OLD_SHA}" HEAD -- labs/flue-zoe-brain/ \
             && [ -f labs/flue-zoe-brain/dist/server.mjs ]; then
            echo "sidecar source unchanged since ${OLD_SHA} and dist present — no rebuild needed."
            exit 0
          fi
          echo "sidecar changed (or dist missing) — rebuilding and restarting."
          # The self-hosted runner uses a non-login shell that does not source
          # nvm, so `npm` is not on PATH (the systemd unit hard-codes
          # ~/.nvm/current/bin/node for the same reason). Put nvm's active-version
          # bin on PATH so `npm ci` / `npm run build` resolve — otherwise this
          # step fails with "npm: command not found" (exit 127) the first time a
          # commit actually touches labs/flue-zoe-brain/ and triggers the rebuild.
          export PATH="$HOME/.nvm/current/bin:$PATH"
          command -v npm >/dev/null || { echo "npm still not found on PATH: $PATH"; exit 1; }
          cd labs/flue-zoe-brain
          # npm ci = reproducible install from the committed lockfile, so the
          # deployed dist matches what was tested (npm install could pull newer
          # transitive deps between merge and deploy). Fall back to npm install
          # only if the lockfile is somehow absent.
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
          npm run build
          systemctl --user restart flue-zoe-brain.service
          for attempt in $(seq 1 12); do
            curl -sf http://127.0.0.1:3578/health > /dev/null 2>&1 \
              && { echo "flue-zoe-brain healthy after ${attempt} attempt(s)"; exit 0; }
            sleep 5
          done
          echo "flue-zoe-brain failed health check after restart"
          exit 1

      # The Telegram bot (flue-zoe-telegram) is a front-door channel that also runs
      # a pre-built dist/, so a change to labs/flue-zoe-telegram/ on main does NOT
      # reach the running bot until dist is rebuilt and the service restarted.
      # Rebuild it here on the same terms as the brain sidecar — ONLY when its
      # source changed, and only if the unit is installed (skips cleanly on hosts
      # not running the bot). Without this, bot code silently drifts from main.
      - name: Rebuild / restart Flue Telegram bot (if changed)
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          if ! systemctl --user list-unit-files flue-zoe-telegram.service 2>/dev/null \
               | grep -q '^flue-zoe-telegram\.service'; then
            echo "flue-zoe-telegram.service not installed on this host — skipping."
            exit 0
          fi
          cd /home/zoe/assistant
          if [ -n "${OLD_SHA:-}" ] \
             && git diff --quiet "${OLD_SHA}" HEAD -- labs/flue-zoe-telegram/ \
             && [ -f labs/flue-zoe-telegram/dist/server.mjs ]; then
            echo "bot source unchanged since ${OLD_SHA} and dist present — no rebuild needed."
            exit 0
          fi
          echo "bot changed (or dist missing) — rebuilding and restarting."
          # Same non-login-shell PATH fix as the brain step: nvm isn't sourced, so
          # put its active-version bin on PATH for npm.
          export PATH="$HOME/.nvm/current/bin:$PATH"
          command -v npm >/dev/null || { echo "npm still not found on PATH: $PATH"; exit 1; }
          cd labs/flue-zoe-telegram
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
          npm run build
          systemctl --user restart flue-zoe-telegram.service
          # /health returns 200 {"polling":true} once the bot has taken the token
          # over and is long-polling; 503 while polling is still down. Retry over a
          # warmup window — takeover (deleteWebhook + getMe + register-bot) takes a
          # few seconds. A sustained 503 is a real fault (e.g. another consumer
          # holds the token → 409), so fail loudly rather than ship a dead bot.
          for attempt in $(seq 1 12); do
            curl -sf http://127.0.0.1:3582/health > /dev/null 2>&1 \
              && { echo "flue-zoe-telegram healthy after ${attempt} attempt(s)"; exit 0; }
            sleep 5
          done
          echo "flue-zoe-telegram failed health check after restart"
          exit 1

      - name: Health check
        run: |
          # zoe-data cold-starts slowly (model warmup), so a single early curl
          # races the boot and false-fails (connection refused). Retry over a
          # warmup window instead — mirrors the zoe-auth health loop above.
          # Liveness = public /health (200). Then confirm the proactive AND push
          # routers are REGISTERED: auth-enforced endpoints answer 200/401/403 (not
          # 404/refused). 403 ("authentication required") is a healthy "up + auth
          # enforced" signal, so it must be accepted — the old 200/401-only check
          # false-failed once these endpoints began requiring auth.
          ok() { case "$1" in 200|401|403) return 0;; *) return 1;; esac; }
          for attempt in $(seq 1 24); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              PROACTIVE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/proactive/schedule)
              VAPID=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/push/vapid-public-key)
              if ok "$PROACTIVE" && ok "$VAPID"; then
                echo "Deploy OK at $(date) (healthy after ${attempt} attempt(s); proactive=$PROACTIVE vapid=$VAPID)"
                exit 0
              fi
            fi
            sleep 5
          done
          echo "zoe-data failed health check after warmup window (~120s)"
          exit 1
