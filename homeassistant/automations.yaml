- id: zoe_satellite_wake_event_bridge
  alias: Zoe Satellite Wake Event Bridge
  description: Bridge external wake events into Zoe listening state.
  mode: parallel
  triggers:
    - trigger: event
      event_type: zoe_satellite_wake
  actions:
    - action: script.zoe_satellite_wake
      data:
        panel_id: "{{ trigger.event.data.panel_id | default('zoe-touch-pi') }}"

- id: zoe_satellite_turn_event_bridge
  alias: Zoe Satellite Turn Event Bridge
  description: Bridge external transcript events into Zoe/Hermes voice turn.
  mode: queued
  max: 10
  triggers:
    - trigger: event
      event_type: zoe_satellite_turn
  conditions:
    - condition: template
      value_template: "{{ (trigger.event.data.transcript | default('') | trim) != '' }}"
  actions:
    - action: script.zoe_satellite_turn
      data:
        panel_id: "{{ trigger.event.data.panel_id | default('zoe-touch-pi') }}"
        session_id: "{{ trigger.event.data.session_id | default('') }}"
        transcript: "{{ trigger.event.data.transcript }}"