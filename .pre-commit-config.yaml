# Pre-commit hooks for the Zoe repo.
# Mirrors the repo's own mandated checks so cloned checkouts are protected the
# same way the local .git/hooks/pre-commit protects this host.
# Install with:  pre-commit install
minimum_pre_commit_version: "2.20.0"

repos:
  # Standard hygiene hooks.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=5120"]

  # Zoe's own mandated structure validator (repo: local so it runs against the
  # checkout, no network fetch, no version pinning). NOTE: validate_critical_files
  # is intentionally NOT wired here — it hard-codes services/zoe-ui/dist/ artifact
  # paths that may be absent on a fresh clone / failed UI build, which would block
  # every local commit. It still runs in CI (validate.yml) where the full tree is
  # present.
  - repo: local
    hooks:
      - id: zoe-validate-structure
        name: Zoe project structure validation
        entry: python3 tools/audit/validate_structure.py
        language: system
        pass_filenames: false
        always_run: true
