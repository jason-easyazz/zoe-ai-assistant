# =============================================================================
# Zoe Assistant - Supplemental Docker Compose
# =============================================================================
# Optional services that are active on the Zoe host but are not required for the
# base web/auth/HA stack. Keep local-only ignored modules out of this tracked file.
# =============================================================================

services:
  music-assistant:
    image: ghcr.io/music-assistant/server:stable
    container_name: zoe-music-assistant
    network_mode: host
    volumes:
    - ./data/music-assistant:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8095/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── YT Music PO-Token generator (companion for MA's ytmusic provider) ───────
  # Music Assistant's YouTube Music provider requires a proof-of-origin token
  # server it pings at `po_token_server_url` (MA default: http://127.0.0.1:4416).
  # This is the widely-used bgutil provider (yt-dlp's recommended POT provider).
  # music-assistant runs network_mode:host, so it reaches this via the published
  # localhost port 4416. Additive: a new, separate container — it does not touch
  # the live zoe-music-assistant/zoe-data services. The image ships no wget/curl,
  # so the healthcheck uses the bundled node runtime to hit /ping (http.get form
  # works on Node 10+, unlike global fetch which needs Node 18+).
  #
  # BOUND TO LOOPBACK ONLY. A bare "4416:4416" publishes on 0.0.0.0 (+ [::]), which
  # exposed this unauthenticated token generator to every host on the LAN — anyone
  # on the network could mint YouTube PO tokens against Zoe's session. Every real
  # consumer is host-local, so there is nothing to lose by restricting it:
  #   - music-assistant is network_mode:host and pings po_token_server_url, which
  #     zoe-data fills in server-side as http://localhost:4416
  #     (ZOE_YTMUSIC_POTOKEN_URL, see services/zoe-data/music_service.py).
  #   - the healthcheck below runs INSIDE the container against its own 127.0.0.1,
  #     so it does not depend on the published port at all.
  # 127.0.0.1 (not ::1) is the correct family here: `localhost` on the Jetson
  # resolves only to 127.0.0.1 (/etc/hosts maps ::1 to ip6-localhost, NOT to
  # localhost), so an IPv4 loopback publish is what `http://localhost:4416` hits.
  ytmusic-potoken:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
    container_name: zoe-ytmusic-potoken
    init: true
    ports:
    - "127.0.0.1:4416:4416"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4416/ping',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Multica — A2A board visibility (opt-in: ZOE_MULTICA=true) ───────────────
  # Uses the base zoe-database container's separate 'multica' database.
  multica-backend:
    image: ghcr.io/multica-ai/multica-backend:latest
    container_name: zoe-multica-backend
    ports:
    - "8080:8080"
    environment:
      DATABASE_URL: "postgresql://zoe:${POSTGRES_PASSWORD}@host.docker.internal:5432/multica?sslmode=disable"
      PORT: "8080"
      # development required — dev verification code is silently ignored when APP_ENV=production
      APP_ENV: development
      JWT_SECRET: "${MULTICA_JWT_SECRET}"
      MULTICA_DEV_VERIFICATION_CODE: "${MULTICA_DEV_CODE}"
      FRONTEND_ORIGIN: "http://zoe.local:3000"
      # Multica backend v0.3.1 reads CORS_ALLOWED_ORIGINS for HTTP CORS and
      # ALLOWED_ORIGINS for realtime WebSocket origin checks. Keep localhost
      # dev origins explicit alongside Zoe's LAN origin.
      CORS_ALLOWED_ORIGINS: "http://zoe.local,http://zoe.local:3000,http://localhost:3000,http://127.0.0.1:3000"
      ALLOWED_ORIGINS: "http://zoe.local,http://zoe.local:3000,http://localhost:3000,http://127.0.0.1:3000"
      MULTICA_APP_URL: "http://zoe.local:3000"
      ALLOW_SIGNUP: "true"
      # Email verification (ZOE-48): set RESEND_API_KEY or SMTP_HOST/SMTP_PORT/SMTP_USER/SMTP_PASS
      # RESEND_API_KEY: "${RESEND_API_KEY:-}"
      LOCAL_UPLOAD_DIR: "/data/uploads"
      LOCAL_UPLOAD_BASE_URL: "http://localhost:8080"
      OAUTH_CLIENT_ID: ${MULTICA_OIDC_CLIENT_ID:-multica}
      OAUTH_CLIENT_SECRET: ${MULTICA_OIDC_CLIENT_SECRET:-}
      OAUTH_DISCOVERY_URL: http://zoe.local/.well-known/openid-configuration
      # Push issue.assigned / issue.status_changed to Zoe (requires local multica build with zoe_webhook_listener.go)
      HERMES_MULTICA_AGENT_ID: "${HERMES_MULTICA_AGENT_ID:-019ae0a7-62f1-47fe-9d46-75fd0ae5d570}"
      ZOE_BOARD_WEBHOOK_URL: "${ZOE_BOARD_WEBHOOK_URL:-http://host.docker.internal:8000/api/agent/board/webhook}"
      ZOE_BOARD_WEBHOOK_SECRET: "${MULTICA_WEBHOOK_SECRET:-}"
    volumes:
    - multica-uploads:/data/uploads
    extra_hosts:
    - "host.docker.internal:host-gateway"
    networks:
      zoe-network:
        aliases:
        - backend
    restart: unless-stopped
    profiles:
    - multica
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  multica-web:
    image: ghcr.io/multica-ai/multica-web:latest
    container_name: zoe-multica-web
    ports:
    - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://zoe.local/multica-api"
      NEXT_PUBLIC_WS_URL: "ws://zoe.local/multica-api"
    networks:
    - zoe-network
    restart: unless-stopped
    profiles:
    - multica
    depends_on:
    - multica-backend

networks:
  zoe-network:
    name: zoe-network

volumes:
  multica-uploads: {}
