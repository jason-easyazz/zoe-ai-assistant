# =============================================================================
# Zoe Assistant - Docker Compose (Updated 2026-03-21)
# =============================================================================
# Active architecture:
#   - zoe-data: host-native uvicorn on :8000 (NOT in Docker)
#   - OpenClaw gateway: systemd user service on :18789 (NOT in Docker)
#   - llama-server: host-native binary on :11434 (NOT in Docker)
#   - Docker services below: UI, auth, HA, bridges, cloudflared
# =============================================================================

services:

  # ── UI ─────────────────────────────────────────────────────────────────────
  zoe-ui:
    image: nginx:alpine  # pinned: nginx@sha256:b3c656d55d7ad751196f21b7fd2e8d4da9cb430e32f646adcf92441b72f82b14
    container_name: zoe-ui
    ports:
    - 80:80
    - 443:443
    - 18790:18790
    volumes:
    - ./services/zoe-ui/dist:/usr/share/nginx/html
    - ./services/zoe-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    - ./ssl:/etc/nginx/ssl:ro
    extra_hosts:
    - "host.docker.internal:host-gateway"
    networks:
    - zoe-network
    restart: unless-stopped

  # ── Auth ───────────────────────────────────────────────────────────────────
  zoe-auth:
    build: ./services/zoe-auth
    container_name: zoe-auth
    ports:
    - 8002:8002
    volumes:
    - ./data:/app/data
    networks:
    - zoe-network
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    - DATABASE_PATH=/app/data/zoe.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Home Assistant ─────────────────────────────────────────────────────────
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable  # pinned: sha256:449140e073d8d7814098cd62dfdbb326ad043f51a3c4d4721889369f46751d52
    container_name: homeassistant
    restart: unless-stopped
    ports:
    - 8123:8123
    volumes:
    - ./homeassistant:/config
    environment:
    - TZ=Australia/Perth
    networks:
    - zoe-network

  homeassistant-mcp-bridge:
    build: ./services/homeassistant-mcp-bridge
    container_name: homeassistant-mcp-bridge
    restart: unless-stopped
    ports:
    - 8007:8007
    volumes:
    - ./services/homeassistant-mcp-bridge:/app
    environment:
    - PYTHONUNBUFFERED=1
    - HA_BASE_URL=${HA_BASE_URL:-http://homeassistant:8123}
    - HA_ACCESS_TOKEN=${HA_ACCESS_TOKEN:-}
    - ZOE_HA_VOICE_INGRESS_URL=${ZOE_HA_VOICE_INGRESS_URL:-http://host.docker.internal:8000}
    - ZOE_HA_VOICE_TOKEN=${ZOE_HA_VOICE_TOKEN:-}
    networks:
    - zoe-network
    extra_hosts:
    - "host.docker.internal:host-gateway"
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8007/
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
    - .env

  # ── Wyoming Voice Services (HA Assist integration only) ───────────────────
  #
  # ARCHITECTURE NOTE (2026-04):
  # Zoe now runs TWO parallel voice stacks:
  #
  # 1. NATIVE STACK (primary, active for Zoe touch panel):
  #    - Wake word:   openWakeWord ONNX model on Pi daemon (zoe_voice_daemon.py)
  #    - STT:         whisper.cpp CLI on Jetson (/api/voice/transcribe)
  #    - TTS:         Kokoro ONNX → Edge TTS → espeak-ng waterfall (/api/voice/synthesize)
  #    - Barge-in:    Silero VAD on Pi during TTS playback
  #    - Speaker ID:  resemblyzer 256-dim embeddings on Pi
  #    This stack is NOT in Docker — the Pi daemon runs as a systemd service.
  #
  # 2. WYOMING STACK (these services below — for HA Voice Assist only):
  #    - wyoming-piper:       TTS for HA Assist satellite mode (port 10200)
  #    - wyoming-whisper:     STT for HA Assist satellite mode (port 10300)
  #    - wyoming-openwakeword: Wake word for HA Assist satellite mode (port 10400)
  #    If you DO NOT use Home Assistant Voice Assist (voice pipeline in HA settings),
  #    you can safely stop these services to reclaim ~2GB RAM and ~30% CPU:
  #      docker compose stop wyoming-piper wyoming-whisper wyoming-openwakeword
  #    To permanently disable, comment out the service definitions below.
  #
  wyoming-piper:
    image: rhasspy/wyoming-piper:latest
    container_name: wyoming-piper
    restart: unless-stopped
    command: --voice en_US-lessac-medium --uri tcp://0.0.0.0:10200
    volumes:
    - ./data/wyoming/piper:/data
    networks:
    - zoe-network

  wyoming-whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: wyoming-whisper
    restart: unless-stopped
    command: --model tiny-int8 --language en --uri tcp://0.0.0.0:10300
    volumes:
    - ./data/wyoming/whisper:/data
    networks:
    - zoe-network

  wyoming-openwakeword:
    image: rhasspy/wyoming-openwakeword:latest
    container_name: wyoming-openwakeword
    restart: unless-stopped
    command: --preload-model ok_nabu --threshold 0.08 --trigger-level 0 --uri tcp://0.0.0.0:10400 --debug --debug-probability
    ports:
    - 10400:10400
    volumes:
    - ./data/wyoming/openwakeword:/data
    networks:
    - zoe-network

  # ── Keeper.sh Calendar Sync ────────────────────────────────────────────────
  keeper:
    image: ghcr.io/ridafkih/keeper.sh:latest
    container_name: zoe-keeper
    restart: unless-stopped
    ports:
    - 8787:8787
    environment:
    - KEEPER_HOST=0.0.0.0
    - KEEPER_PORT=8787
    - KEEPER_BASE_URL=${KEEPER_BASE_URL:-http://zoe-keeper:8787}
    - KEEPER_AUTH_TOKEN=${KEEPER_AUTH_TOKEN:-}
    - KEEPER_DATA_DIR=/data
    volumes:
    - ./data/keeper:/data
    networks:
    - zoe-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    env_file:
    - .env

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest  # pinned: sha256:21f3607baf2384c54d592b0efe76dd5f548c0dbc083e62fa22c7fac3923d077f
    container_name: zoe-cloudflared
    command: --config /etc/cloudflared/config.yml --no-autoupdate tunnel run
    restart: unless-stopped
    profiles:
    - cloudflare
    volumes:
    - ./config/cloudflared-config.yml:/etc/cloudflared/config.yml:ro
    - ./config/d417c04a-babc-48e4-85e6-a9badc20a7a6.json:/etc/cloudflared/d417c04a-babc-48e4-85e6-a9badc20a7a6.json:ro
    - ./config/cert.pem:/etc/cloudflared/cert.pem:ro
    networks:
    - zoe-network
    extra_hosts:
    - "host.docker.internal:host-gateway"

  # ═══════════════════════════════════════════════════════════════════════════
  # RETIRED SERVICES (kept commented for reference)
  # These were replaced by host-native services + OpenClaw (March 2026)
  # ═══════════════════════════════════════════════════════════════════════════

  # zoe-core: RETIRED - Replaced by zoe-data (host uvicorn :8000) + OpenClaw gateway
  # zoe-litellm: RETIRED - OpenClaw handles model routing (GPT-4o-mini / Gemini Flash / local Hermes)
  # zoe-llamacpp: RETIRED - Native llama-server on host :11434 (Hermes-3-8B, better GPU perf)
  # zoe-mcp-server: RETIRED - OpenClaw native tool system
  # zoe-mem-agent: RETIRED - OpenClaw memory-memu plugin
  # zoe-code-execution: RETIRED - OpenClaw exec tool
  # zoe-whisper: RETIRED - Voice pipeline not active
  # zoe-tts: RETIRED - Voice pipeline not active
  # zoe-voice-agent: RETIRED - Voice pipeline not active
  # livekit: RETIRED - Voice pipeline not active
  # zoe-tensorrt: RETIRED - Not needed with GGUF models
  # vLLM: RETIRED - Blocked by PyTorch CUDA allocator bug
  # people-service: RETIRED - Merged into zoe-data
  # collections-service: RETIRED - Merged into zoe-data
  # matrix-mcp-server: RETIRED - Never activated
  # zoe-redis: RETIRED - No active consumers (March 2026)
  # zoe-n8n + n8n-mcp-bridge: RETIRED - OpenClaw cron/skills/exec covers all automation (March 2026)

networks:
  zoe-network:
    name: zoe-network
    driver: bridge

volumes: {}
