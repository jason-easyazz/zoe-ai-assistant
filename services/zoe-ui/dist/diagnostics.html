<!DOCTYPE html>
<html>
<head>
    <title>AI Diagnostics & Repair</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: -apple-system, Arial, sans-serif;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
        }
        button {
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .issue {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
        .critical { border-left: 5px solid #ff4444; }
        .warning { border-left: 5px solid #ffaa00; }
        .info { border-left: 5px solid #00aaff; }
        .fixed { opacity: 0.6; text-decoration: line-through; }
        #results {
            margin-top: 30px;
        }
        pre {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
    <script src="/js/auth.js"></script>
        <!-- Zoe Orb Styles -->
        <style>
        .zoe-orb {
            position: fixed; bottom: 24px; right: 24px; width: 70px; height: 70px;
            border-radius: 50%; cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1200; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            animation: orb-liquid-swirl 12s ease-in-out infinite, orb-breathe 4s ease-in-out infinite;
            background: linear-gradient(135deg, #7B61FF 0%, #8B5CF6 50%, #A855F7 100%);
            background-size: 200% 200%;
            box-shadow: 0 6px 20px rgba(123, 97, 255, 0.4), 0 0 40px rgba(123, 97, 255, 0.2);
        }
        .zoe-orb::before {
            content: ""; position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            border-radius: 50%; transform: translate(-50%, -50%);
            animation: orb-inner-glow 2s ease-in-out infinite alternate;
        }
        .zoe-orb:hover {
            transform: scale(1.12);
            box-shadow: 0 8px 25px rgba(123, 97, 255, 0.5), 0 0 50px rgba(123, 97, 255, 0.3);
            animation-duration: 8s, 3s;
        }
        .zoe-orb:active { transform: scale(0.95); }
        .zoe-orb.connecting {
            background: linear-gradient(135deg, #7B61FF 0%, #6366F1 50%, #8B5CF6 100%);
            background-size: 200% 200%;
            box-shadow: 0 6px 20px rgba(123, 97, 255, 0.4), 0 0 40px rgba(123, 97, 255, 0.2);
        }
        .zoe-orb.connected {
            background: linear-gradient(135deg, #7B61FF 0%, #10B981 50%, #34D399 100%);
            background-size: 200% 200%;
            box-shadow: 0 6px 20px rgba(123, 97, 255, 0.4), 0 0 40px rgba(16, 185, 129, 0.2);
        }
        .zoe-orb.thinking {
            background: linear-gradient(135deg, #7B61FF 0%, #F59E0B 50%, #FBBF24 100%);
            background-size: 200% 200%;
            box-shadow: 0 6px 20px rgba(123, 97, 255, 0.4), 0 0 40px rgba(245, 158, 11, 0.2);
            animation: orb-thinking-gentle 3s ease-in-out infinite, orb-liquid-swirl 10s ease-in-out infinite;
        }
        .zoe-orb.proactive {
            background: linear-gradient(135deg, #7B61FF 0%, #EC4899 50%, #F472B6 100%);
            background-size: 200% 200%;
            box-shadow: 0 6px 20px rgba(123, 97, 255, 0.4), 0 0 40px rgba(236, 72, 153, 0.2);
            animation: orb-proactive-gentle 4s ease-in-out infinite, orb-liquid-swirl 10s ease-in-out infinite;
        }
        .zoe-orb.error {
            background: linear-gradient(135deg, #7B61FF 0%, #EF4444 50%, #F87171 100%);
            background-size: 200% 200%;
            box-shadow: 0 6px 20px rgba(123, 97, 255, 0.4), 0 0 40px rgba(239, 68, 68, 0.2);
            animation: orb-error-shake 0.5s ease-in-out infinite, orb-liquid-swirl 3s ease-in-out infinite;
        }
        .zoe-orb.chatting {
            background: linear-gradient(135deg, #7B61FF 0%, #5AE0E0 50%, #06B6D4 100%);
            background-size: 200% 200%;
            box-shadow: 0 8px 25px rgba(123, 97, 255, 0.6), 0 0 60px rgba(123, 97, 255, 0.4);
            animation: orb-liquid-swirl 12s ease-in-out infinite, orb-breathe 4s ease-in-out infinite;
        }
        .zoe-orb.badge::after {
            content: ""; position: absolute; top: 8px; right: 8px; width: 12px; height: 12px;
            background: #F59E0B; border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.8);
            animation: badge-pulse 2s ease-in-out infinite;
        }
        @keyframes orb-liquid-swirl {
            0%, 100% { background-position: 0% 50%; border-radius: 50% 45% 55% 50%; }
            25% { background-position: 100% 50%; border-radius: 55% 50% 45% 55%; }
            50% { background-position: 100% 100%; border-radius: 45% 55% 50% 45%; }
            75% { background-position: 0% 100%; border-radius: 50% 45% 55% 50%; }
        }
        @keyframes orb-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes orb-inner-glow {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }
        @keyframes orb-thinking-gentle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }
        @keyframes orb-proactive-gentle {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        @keyframes orb-error-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }
        @keyframes badge-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }
        </style>
</head>
<body>
    <div class="container">
        <h1>🔬 AI System Diagnostics & Repair</h1>
        <p>AI will diagnose issues and fix them (with your approval for dangerous operations)</p>
        
        <div>
            <button onclick="runDiagnostics(false)">🔍 Diagnose Only</button>
            <button onclick="runDiagnostics(true)">🔧 Diagnose & Auto-Fix Safe Issues</button>
            <button onclick="smartFix()">🤖 Smart Complete Fix</button>
        </div>
        
        <div id="results"></div>
    </div>
    
    <script>
        const API = 'http://192.168.1.60:8000/api/diagnostics';
        
        async function runDiagnostics(autoFix) {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>🔍 Running diagnostics...</h2>';
            
            try {
                const response = await fetch(`${API}/diagnose`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        symptoms: 'Complete system check',
                        auto_fix: autoFix
                    })
                });
                
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                results.innerHTML = `<div class="issue critical">Error: ${error.message}</div>`;
            }
        }
        
        async function smartFix() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>🤖 Running smart autonomous fix...</h2>';
            
            try {
                const response = await fetch(`${API}/smart_fix`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({symptoms: 'Fix everything possible'})
                });
                
                const data = await response.json();
                displaySmartFixResults(data);
            } catch (error) {
                results.innerHTML = `<div class="issue critical">Error: ${error.message}</div>`;
            }
        }
        
        function displayResults(data) {
            const results = document.getElementById('results');
            let html = '<h2>📊 Diagnostic Results</h2>';
            
            // Summary
            const sum = data.summary;
            if (sum.healthy) {
                html += '<div class="issue info">✅ System is healthy!</div>';
            } else {
                html += `<div class="issue ${sum.critical_issues > 0 ? 'critical' : 'warning'}">`;
                html += `Found ${sum.total_issues} issues (${sum.critical_issues} critical, ${sum.warnings} warnings)</div>`;
            }
            
            // Issues
            if (data.issues_found.length > 0) {
                html += '<h3>Issues Detected:</h3>';
                data.issues_found.forEach(issue => {
                    const autoFixed = data.auto_fixed.includes(issue.id);
                    html += `<div class="issue ${issue.severity} ${autoFixed ? 'fixed' : ''}">`;
                    html += `<strong>${issue.component}:</strong> ${issue.description}<br>`;
                    if (autoFixed) {
                        html += `<em>✅ Auto-fixed</em>`;
                    } else if (!issue.safe_to_auto_fix && issue.fix_available) {
                        html += `<button onclick="approveFix('${issue.id}')">Approve Fix</button>`;
                    }
                    html += '</div>';
                });
            }
            
            // Recommendation
            html += `<div style="margin-top:20px"><h3>Recommendation:</h3>${data.recommendation}</div>`;
            
            results.innerHTML = html;
        }
        
        function displaySmartFixResults(data) {
            const results = document.getElementById('results');
            let html = '<h2>🤖 Smart Fix Results</h2>';
            
            if (data.status === 'healthy') {
                html += '<div class="issue info">✅ ' + data.message + '</div>';
            } else {
                html += `<div class="issue info">`;
                html += `✅ Auto-fixed ${data.auto_fixed} safe issues<br>`;
                html += `⚠️ ${data.requires_approval.length} issues need approval</div>`;
                
                if (data.requires_approval.length > 0) {
                    html += '<h3>Requires Your Approval:</h3>';
                    data.requires_approval.forEach(issue => {
                        html += `<div class="issue warning">`;
                        html += `<strong>${issue.description}</strong><br>`;
                        html += `<code>${issue.command}</code><br>`;
                        html += `<button onclick="approveFix('${issue.id}')">Approve & Execute</button>`;
                        html += '</div>';
                    });
                }
            }
            
            results.innerHTML = html;
        }
        
        async function approveFix(issueId) {
            try {
                const response = await fetch(`${API}/approve_fix`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        issue_id: issueId,
                        approved: true
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Fix applied successfully!');
                    runDiagnostics(false);  // Re-run diagnostics
                } else {
                    alert('⚠️ Fix applied but issue may persist: ' + data.message);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    </script>
        
        <!-- Load Zoe Orb Component -->
    <script>
        // Load the JavaScript first
        const orbScript = document.createElement('script');
        orbScript.src = '/js/zoe-orb.js';
        orbScript.onload = function() {
            // Then load the HTML component
            fetch('/components/zoe-orb-complete.html')
                .then(r => r.text())
                .then(html => {
                    const div = document.createElement('div');
                    div.innerHTML = html;
                    // Remove the script tag from the HTML (we already loaded it)
                    const scripts = div.querySelectorAll('script');
                    scripts.forEach(s => s.remove());
                    // Append all elements
                    while (div.firstChild) {
                        document.body.appendChild(div.firstChild);
                    }
                    // Initialize
                    if (typeof initOrbChat === 'function') {
                        initOrbChat();
                    }
                })
                .catch(err => console.error('Failed to load Zoe orb:', err));
        };
        document.head.appendChild(orbScript);
    </script>
</body>
</html>
