<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Zoe Voice</title>
<link rel="icon" href="/favicon.ico">
<!-- LiveKit client — loaded in <head> so it's available before inline script runs -->
<script src="/lib/livekit/livekit-client.umd.min.js" onerror="console.warn('LiveKit client not loaded - livekit mode will fallback to local')"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ── Orb canvas ─────────────────────────────────────────────── */
  #orbCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
  }

  /* ── Status label ───────────────────────────────────────────── */
  #statusLabel {
    position: fixed;
    bottom: max(60px, env(safe-area-inset-bottom, 60px));
    left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 15px; letter-spacing: 0.04em;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  /* ── Tap-to-start overlay (iOS audio gate) ─────────────────── */
  #tapOverlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,15,0.92);
    z-index: 100;
    cursor: pointer;
  }
  #tapOverlay h1 {
    color: #fff; font-size: 28px; font-weight: 300;
    letter-spacing: 0.05em; margin-bottom: 12px;
  }
  #tapOverlay p {
    color: rgba(255,255,255,0.5); font-size: 14px;
  }
  #tapOverlay .pulse-ring {
    width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid rgba(108,99,255,0.6);
    margin-bottom: 24px;
    animation: tapPulse 2s ease-in-out infinite;
  }
  @keyframes tapPulse {
    0%,100% { transform: scale(1); opacity: 0.6; }
    50%      { transform: scale(1.15); opacity: 1; }
  }

  /* ── AG-UI overlay layer ────────────────────────────────────── */
  #aguiOverlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: max(100px, env(safe-area-inset-bottom, 100px));
    pointer-events: none;
    z-index: 50;
  }
  .agui-card {
    background: rgba(20,20,30,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 16px;
    padding: 16px 20px;
    max-width: min(380px, 90vw);
    width: 100%;
    margin-bottom: 12px;
    pointer-events: all;
    animation: cardIn 0.3s ease-out;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .agui-card h3 {
    color: #fff; font-size: 15px; font-weight: 500; margin-bottom: 8px;
  }
  .agui-card p {
    color: rgba(255,255,255,0.7); font-size: 13px; line-height: 1.5;
  }
  .agui-card .card-actions {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .agui-card .btn-confirm {
    flex: 1; padding: 10px; background: #6c63ff; color: #fff;
    border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
  }
  .agui-card .btn-cancel {
    flex: 1; padding: 10px; background: rgba(255,255,255,0.1); color: #fff;
    border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
  }

  /* ── Transcript panel (hidden by default) ───────────────────── */
  #transcriptPanel {
    position: fixed; top: 0; left: 0; right: 0;
    max-height: 40vh;
    overflow-y: auto;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(10px);
    padding: 16px;
    z-index: 40;
    display: none;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .transcript-line {
    font-size: 13px; line-height: 1.6; margin-bottom: 4px;
    color: rgba(255,255,255,0.6);
  }
  .transcript-line.user  { color: rgba(255,255,255,0.9); }
  .transcript-line.zoe   { color: #a78fff; }

  /* ── Top-bar controls ───────────────────────────────────────── */
  #topBar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: max(16px, env(safe-area-inset-top, 16px)) 20px 12px;
    z-index: 60;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.08);
    border: none; border-radius: 50%;
    width: 36px; height: 36px;
    color: rgba(255,255,255,0.6);
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.15); }
  #modeLabel {
    color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Push-to-talk button ─────────────────────────────────────── */
  #pttBtn {
    position: fixed;
    bottom: max(100px, env(safe-area-inset-bottom, 100px));
    left: 50%; transform: translateX(-50%);
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(108,99,255,0.25);
    border: 2px solid rgba(108,99,255,0.6);
    color: rgba(255,255,255,0.8);
    font-size: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.15s;
    z-index: 55;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #pttBtn.recording {
    background: rgba(255,60,60,0.35);
    border-color: rgba(255,80,80,0.8);
    transform: translateX(-50%) scale(1.12);
  }
  #pttBtn:active { transform: translateX(-50%) scale(0.95); }

  /* ── Conversation mode indicator ────────────────────────────── */
  #convBadge {
    position: fixed;
    top: max(64px, calc(env(safe-area-inset-top, 0px) + 64px));
    left: 50%; transform: translateX(-50%);
    background: rgba(108,99,255,0.2);
    border: 1px solid rgba(108,99,255,0.4);
    border-radius: 20px; padding: 4px 14px;
    color: rgba(255,255,255,0.6); font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase;
    display: none; z-index: 60;
  }
  #convBadge.active { display: block; }

  /* ── Mobile responsive ───────────────────────────────────────── */
  @media (max-width: 430px) {
    #topBar { padding-top: max(20px, env(safe-area-inset-top, 20px)); }
    #statusLabel { font-size: 13px; bottom: max(180px, env(safe-area-inset-bottom, 180px)); }
    .agui-card { max-width: 95vw; padding: 14px 16px; }
    #pttBtn { width: 80px; height: 80px; font-size: 32px; bottom: max(110px, env(safe-area-inset-bottom, 110px)); }
  }
  @media (max-width: 390px) {
    #transcriptPanel { max-height: 35vh; }
  }
  @media (orientation: landscape) and (max-height: 500px) {
    #pttBtn { bottom: max(20px, env(safe-area-inset-bottom, 20px)); width: 56px; height: 56px; font-size: 22px; }
    #statusLabel { bottom: max(90px, env(safe-area-inset-bottom, 90px)); font-size: 12px; }
  }
</style>
</head>
<body>

<!-- Canvas for animated orb -->
<canvas id="orbCanvas"></canvas>

<!-- Top controls -->
<div id="topBar">
  <button class="ctrl-btn" onclick="window.location.href='/'" title="Home">←</button>
  <span id="modeLabel">voice</span>
  <button class="ctrl-btn" onclick="toggleTranscript()" title="Transcript">≡</button>
</div>

<!-- Transcript panel -->
<div id="transcriptPanel"></div>

<!-- Status label -->
<div id="statusLabel">Tap to start</div>

<!-- Conversation mode badge -->
<div id="convBadge">● Conversation</div>

<!-- Push-to-talk button (shown after session starts) -->
<button id="pttBtn" style="display:none" title="Hold to speak">🎤</button>

<!-- AG-UI card overlay -->
<div id="aguiOverlay"></div>

<!-- iOS audio gate tap overlay -->
<div id="tapOverlay" onclick="startVoice()">
  <div class="pulse-ring"></div>
  <h1>Zoe</h1>
  <p>Tap anywhere to start</p>
</div>

<script>
// ── Mode detection ─────────────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const isLocal  = location.hostname === 'localhost'
              || location.hostname === '127.0.0.1'
              || location.hostname.startsWith('192.168.')
              || location.hostname.startsWith('10.')
              || /^172\.(1[6-9]|2\d|3[01])\./.test(location.hostname);
const modePref = params.get('mode') || 'local';
const MODE     = modePref;
document.getElementById('modeLabel').textContent = 'voice · ' + MODE;

// ── Orb canvas animation ──────────────────────────────────────────────────
const canvas = document.getElementById('orbCanvas');
const ctx    = canvas.getContext('2d');
let orbState = 'ambient';  // ambient | listening | thinking | responding
let animFrame;
let phase = 0;

const ORB_COLORS = {
  ambient:    { inner: '#4a3f8f', outer: '#6c63ff', glow: 0.15 },
  listening:  { inner: '#1a6ba0', outer: '#4fc3f7', glow: 0.35 },
  thinking:   { inner: '#2d6a4f', outer: '#52b788', glow: 0.25 },
  responding: { inner: '#7b2d8b', outer: '#c77dff', glow: 0.45 },
};

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function lerp(a, b, t) { return a + (b - a) * t; }

let currentInner = '#4a3f8f', currentOuter = '#6c63ff', currentGlow = 0.15;
let targetInner  = '#4a3f8f', targetOuter  = '#6c63ff', targetGlow  = 0.15;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
}
function lerpColor(a,b,t) {
  const ra = hexToRgb(a), rb = hexToRgb(b);
  return rgbToHex(lerp(ra[0],rb[0],t), lerp(ra[1],rb[1],t), lerp(ra[2],rb[2],t));
}

function drawOrb(ts) {
  animFrame = requestAnimationFrame(drawOrb);
  phase += 0.012;

  const t = 0.06;
  currentInner = lerpColor(currentInner, targetInner, t);
  currentOuter = lerpColor(currentOuter, targetOuter, t);
  currentGlow  = lerp(currentGlow, targetGlow, t);

  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const baseR = Math.min(W, H) * 0.22;
  const pulse  = orbState === 'ambient'    ? 1 + 0.02 * Math.sin(phase) :
                 orbState === 'listening'  ? 1 + 0.06 * Math.sin(phase * 1.8) :
                 orbState === 'thinking'   ? 1 + 0.04 * Math.sin(phase * 3) :
                                            1 + 0.08 * Math.sin(phase * 1.2);
  const R = baseR * pulse;

  // Outer glow
  const glowR = R * (1 + 2.5 * currentGlow);
  const gGlow = ctx.createRadialGradient(cx, cy, R * 0.5, cx, cy, glowR);
  gGlow.addColorStop(0, currentOuter + Math.round(currentGlow * 255).toString(16).padStart(2,'0'));
  gGlow.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
  ctx.fillStyle = gGlow;
  ctx.fill();

  // Main orb gradient
  const gOrb = ctx.createRadialGradient(cx - R*0.2, cy - R*0.3, R*0.05, cx, cy, R);
  gOrb.addColorStop(0, currentOuter);
  gOrb.addColorStop(0.6, currentInner);
  gOrb.addColorStop(1, '#08080f');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = gOrb;
  ctx.fill();

  // Subtle inner highlight
  const gHL = ctx.createRadialGradient(cx - R*0.25, cy - R*0.3, 0, cx - R*0.1, cy - R*0.15, R * 0.5);
  gHL.addColorStop(0, 'rgba(255,255,255,0.12)');
  gHL.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = gHL;
  ctx.fill();
}

function setOrbState(state) {
  orbState = state;
  const c = ORB_COLORS[state] || ORB_COLORS.ambient;
  targetInner = c.inner;
  targetOuter = c.outer;
  targetGlow  = c.glow;

  const labels = {
    ambient:    'Listening for "Hey Zoe"',
    listening:  'Listening…',
    thinking:   'Thinking…',
    responding: 'Speaking…',
  };
  setStatus(labels[state] || '');
}

animFrame = requestAnimationFrame(drawOrb);

// ── Status + transcript helpers ───────────────────────────────────────────
function setStatus(text) {
  document.getElementById('statusLabel').textContent = text;
}

let transcriptVisible = false;
function toggleTranscript() {
  transcriptVisible = !transcriptVisible;
  document.getElementById('transcriptPanel').style.display = transcriptVisible ? 'block' : 'none';
}

function addTranscriptLine(role, text) {
  const panel = document.getElementById('transcriptPanel');
  const el = document.createElement('div');
  el.className = 'transcript-line ' + role;
  el.textContent = (role === 'user' ? 'You: ' : 'Zoe: ') + text;
  panel.appendChild(el);
  panel.scrollTop = panel.scrollHeight;
}

// ── AG-UI card rendering ──────────────────────────────────────────────────
function showAguiCard(card) {
  const overlay = document.getElementById('aguiOverlay');
  const el = document.createElement('div');
  el.className = 'agui-card';

  if (card.type === 'confirmation' || card.type === 'confirm') {
    el.innerHTML = `<h3>${card.title || 'Confirm'}</h3><p>${card.message || card.body || ''}</p>
      <div class="card-actions">
        <button class="btn-confirm" onclick="confirmAguiAction(this,'confirm','${card.action_id||''}')">Confirm</button>
        <button class="btn-cancel" onclick="this.closest('.agui-card').remove()">Cancel</button>
      </div>`;
  } else if (card.type === 'status' || card.type === 'info') {
    el.innerHTML = `<h3>${card.title || 'Zoe'}</h3><p>${card.message || card.body || ''}</p>`;
    setTimeout(() => el.remove(), 5000);
  } else if (card.type === 'qr_code') {
    el.innerHTML = `<h3>${card.title || 'Scan QR Code'}</h3>
      <p style="margin-bottom:12px;">${card.message || ''}</p>
      <div id="qr-${card.id||'x'}" style="background:#fff;padding:8px;border-radius:8px;display:inline-block;"></div>
      <p style="margin-top:8px;font-size:11px;word-break:break-all;color:#666;">${card.url || ''}</p>`;
    setTimeout(() => {
      const qrEl = el.querySelector('[id^="qr-"]');
      if (qrEl && card.url) {
        // Simple QR-like placeholder using text (full QR library can be added later)
        qrEl.innerHTML = `<a href="${card.url}" target="_blank" style="display:block;padding:8px;color:#333;font-size:11px;text-decoration:none;">Open Link →</a>`;
      }
    }, 0);
  } else {
    el.innerHTML = `<h3>${card.title || 'Zoe'}</h3><p>${card.message || card.body || JSON.stringify(card)}</p>`;
    setTimeout(() => el.remove(), 8000);
  }

  overlay.appendChild(el);
}

async function confirmAguiAction(btn, decision, actionId) {
  btn.closest('.agui-card').remove();
  try {
    await fetch('/api/chat/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Session-ID': getSessionId() },
      body: JSON.stringify({ action_id: actionId, decision })
    });
  } catch(e) { /* non-fatal */ }
}

// ── Session helpers ───────────────────────────────────────────────────────
function getSessionId() {
    try {
        const s = JSON.parse(localStorage.getItem('zoe_session'));
        return (s && s.session_id) || '';
    } catch(e) { return ''; }
}

// ── LOCAL WebSocket voice session ─────────────────────────────────────────
let localWS = null;
let wsReconnectTimer = null;
let wsReady = false;

// ── LiveKit WebRTC session ────────────────────────────────────────────────
let liveKitRoom = null;
let localMicTrack = null;
const _lkEncoder = new TextEncoder();
const _lkDecoder = new TextDecoder();

// ── Mic + recording state ─────────────────────────────────────────────────
let micStream = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let audioCtx = null;
let analyser = null;
let silenceTimer = null;
let silenceThreshold = 0.01;
let silenceMs = 1800;      // stop after 1.8s of silence
let maxRecordedRms = 0;    // peak RMS during current recording (silence filter)
let convMode = false;      // continued conversation mode
let speaking = false;      // true while Zoe TTS is playing
let serverBusy = false;    // true while server is processing a turn
let _silentCycles = 0;     // consecutive silent-discarded recordings

// ── WebSocket connection ──────────────────────────────────────────────────
function connectLocalVoice() {
  if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl  = `${proto}://${location.host}/ws/voice/?session_id=${getSessionId()}`;
  localWS = new WebSocket(wsUrl);
  localWS.binaryType = 'arraybuffer';

  localWS.onopen = () => {
    wsReady = true;
    setOrbState('ambient');
    showPttButton();
  };

  localWS.onclose = () => {
    wsReady = false;
    serverBusy = false;    // safety: unblock in case server was mid-response
    setOrbState('ambient');
    setStatus('Reconnecting…');
    wsReconnectTimer = setTimeout(connectLocalVoice, 3000);
  };

  localWS.onmessage = (ev) => {
    try {
      const msg = typeof ev.data === 'string' ? JSON.parse(ev.data) : null;
      if (msg) handleVoiceEvent(msg);
    } catch(e) {}
  };

  localWS.onerror = () => { wsReady = false; };
}

function handleVoiceEvent(msg) {
  const type = msg.type || msg.event;
  if (type === 'state') {
    const s = msg.state;
    if (s === 'wake' || s === 'listening') setOrbState('listening');
    else if (s === 'processing' || s === 'thinking') setOrbState('thinking');
    else if (s === 'responding' || s === 'speaking') setOrbState('responding');
    // In livekit mode the server owns the listen cycle — don't scheduleAutoListen
    else { setOrbState('ambient'); if (MODE !== 'livekit' && convMode && !speaking) scheduleAutoListen(); }
  } else if (type === 'transcript') {
    if (msg.text) _silentCycles = 0;  // real speech detected — reset back-off
    addTranscriptLine(msg.role || 'zoe', msg.text || '');
  } else if (type === 'audio') {
    if (typeof msg.seq === 'number') {
      // P-W1.3 sentence-streamed TTS: server sends one message per sentence
      // (seq/final). Queue and play sequentially; end-of-reply logic runs only
      // after the FINAL sentence finishes. Messages without seq (old server)
      // keep the legacy single-shot path below, unchanged.
      enqueueSeqAudio(msg);
    } else
    playAudioBase64(msg.audio_base64, msg.content_type || 'audio/wav', () => {
      if (MODE === 'livekit' && liveKitRoom) {
        // Signal the server agent that audio has finished playing so it
        // re-enables VAD listening for the next user utterance
        try {
          liveKitRoom.localParticipant.publishData(
            _lkEncoder.encode(JSON.stringify({ type: 'playback_done' })), { reliable: true }
          );
        } catch(_e) {}
      } else if (convMode) {
        scheduleAutoListen();
      }
    });
  } else if (type === 'stop_playback') {
    // Barge-in: server detected the user talking over Zoe — stop TTS now.
    // No playback_done is sent (the server already moved to LISTENING).
    stopCurrentPlayback();
    setOrbState('listening');
  } else if (type === 'text') {
    // Fallback if no TTS audio is returned
    setOrbState('ambient');
  } else if (type === 'agui' || type === 'ui_component') {
    showAguiCard(msg.data || msg);
  } else if (type === 'done') {
    serverBusy = false;
    if (!convMode) setOrbState('ambient');
  }
}

// ── Audio playback ────────────────────────────────────────────────────────
// P-W1.3 sentence-streamed replies: audio messages carrying seq play through
// this ordered queue (reliable data channel preserves arrival order).
let seqAudioQueue = [];
let seqAudioPlaying = false;
// After a barge-in (stop_playback) the server restarts seq at 0 for the next
// reply; a late in-flight sentence from the CANCELLED turn (seq > 0, no turn
// id on the wire) must be dropped, not played into the new turn.
let seqAwaitRestart = false;
function enqueueSeqAudio(msg) {
  if (seqAwaitRestart) {
    if (msg.seq !== 0) return;   // stale sentence from the interrupted turn
    seqAwaitRestart = false;     // seq 0 = a fresh reply begins
  }
  seqAudioQueue.push(msg);
  if (!seqAudioPlaying) drainSeqAudio();
}
function drainSeqAudio() {
  const next = seqAudioQueue.shift();
  if (!next) { seqAudioPlaying = false; return; }
  seqAudioPlaying = true;
  const onSegmentDone = () => {
    if (seqAudioQueue.length) { drainSeqAudio(); return; }
    seqAudioPlaying = false;
    if (next.final !== true) return;  // more sentences still in flight
    // Same end-of-reply logic as the legacy single-message path.
    if (MODE === 'livekit' && liveKitRoom) {
      try {
        liveKitRoom.localParticipant.publishData(
          _lkEncoder.encode(JSON.stringify({ type: 'playback_done' })), { reliable: true }
        );
      } catch(_e) {}
    } else if (convMode) {
      scheduleAutoListen();
    }
  };
  // An empty audio_base64 is the server's mid-stream-failure terminal marker
  // (final:true, nothing to play) — reconcile the turn without playback.
  if (!next.audio_base64) { onSegmentDone(); return; }
  playAudioBase64(next.audio_base64, next.content_type || 'audio/wav', onSegmentDone);
}
let currentPlaybackAudio = null;   // handle for barge-in stop_playback
function stopCurrentPlayback() {
  // Barge-in must also drop any queued streamed sentences (P-W1.3), and any
  // late-arriving sentence of the cancelled turn until a fresh seq 0 shows up.
  seqAudioQueue = [];
  seqAudioPlaying = false;
  seqAwaitRestart = true;
  if (currentPlaybackAudio) {
    try { currentPlaybackAudio.pause(); } catch(_e) {}
    if (currentPlaybackAudio._zoeUrl) {
      try { URL.revokeObjectURL(currentPlaybackAudio._zoeUrl); } catch(_e) {}
    }
    currentPlaybackAudio = null;
  }
  speaking = false;
}
function playAudioBase64(b64, mimeType, onDone) {
  try {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const blob = new Blob([bytes], { type: mimeType });
    const url  = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio._zoeUrl = url;
    currentPlaybackAudio = audio;
    speaking = true;
    setOrbState('responding');
    audio.onended = () => {
      speaking = false;
      if (currentPlaybackAudio === audio) currentPlaybackAudio = null;
      URL.revokeObjectURL(url);
      if (onDone) onDone();
    };
    audio.onerror = () => {
      speaking = false;
      if (currentPlaybackAudio === audio) currentPlaybackAudio = null;
      URL.revokeObjectURL(url);
      if (onDone) onDone();
    };
    audio.play().catch(() => {
      speaking = false;
      if (currentPlaybackAudio === audio) currentPlaybackAudio = null;
      if (onDone) onDone();
    });
  } catch(e) {
    speaking = false;
    if (onDone) onDone();
  }
}

// ── Mic capture & silence detection ──────────────────────────────────────
async function startRecording() {
  if (isRecording || speaking || serverBusy) return;

  // ── LiveKit mode: browser-side VAD + HTTP audio upload ───────────────────
  // The server-side WebRTC agent subscribes to the track when available; the
  // HTTP upload path (POST /api/voice/livekit-audio) is the current fallback.
  if (MODE === 'livekit' && liveKitRoom) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Build analyser once; skip on subsequent calls to avoid AudioContext node buildup
      if (!analyser && micStream) {
        const source = audioCtx.createMediaStreamSource(micStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        source.connect(analyser);
      }
      // Track is always-on (unmuted on connect); ensure it's not accidentally muted
      if (localMicTrack && localMicTrack.isMuted) localMicTrack.unmute().catch(() => {});
      // Start MediaRecorder to capture audio for HTTP upload
      audioChunks = [];
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus' : 'audio/webm';
      mediaRecorder = new MediaRecorder(micStream, { mimeType });
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start(100);
      isRecording = true;
      setOrbState('listening');
      if (analyser) startSilenceDetection();
    } catch(e) {
      setStatus('Mic error: ' + e.message);
      console.error('LiveKit mic error:', e);
    }
    return;
  }

  // ── Local WebSocket mode ───────────────────────────────────────────────
  try {
    if (!micStream) {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);

    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder = new MediaRecorder(micStream, { mimeType });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = sendRecordingToServer;
    mediaRecorder.start(100);
    isRecording = true;

    const pttBtn = document.getElementById('pttBtn');
    pttBtn.classList.add('recording');
    pttBtn.textContent = '●';
    setOrbState('listening');

    startSilenceDetection();
  } catch(e) {
    setStatus('Mic error: ' + e.message);
    console.error('Mic error:', e);
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  clearTimeout(silenceTimer);
  silenceTimer = null;
  const pttBtn = document.getElementById('pttBtn');
  pttBtn.classList.remove('recording');
  pttBtn.textContent = '🎤';

  // ── LiveKit mode: stop recording and upload via HTTP ─────────────────────
  if (MODE === 'livekit' && liveKitRoom) {
    // Keep track unmuted (always-on); just stop the MediaRecorder and upload
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.onstop = sendLiveKitAudioToServer;
      mediaRecorder.stop();
    } else {
      // No recording was captured; go back to listening
      setTimeout(() => scheduleAutoListen(), 300);
    }
    setOrbState('thinking');
    return;
  }

  // ── Local WebSocket mode ───────────────────────────────────────────────
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  setOrbState('thinking');
}

function startSilenceDetection() {
  maxRecordedRms = 0;  // reset peak for this recording session
  const buf = new Float32Array(analyser.fftSize);
  function check() {
    if (!isRecording) return;
    analyser.getFloatTimeDomainData(buf);
    let rms = 0;
    for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
    rms = Math.sqrt(rms / buf.length);
    maxRecordedRms = Math.max(maxRecordedRms, rms);  // track peak
    if (rms < silenceThreshold) {
      if (!silenceTimer) {
        silenceTimer = setTimeout(() => {
          if (isRecording) stopRecording();
        }, silenceMs);
      }
    } else {
      clearTimeout(silenceTimer);
      silenceTimer = null;
    }
    if (isRecording) requestAnimationFrame(check);
  }
  requestAnimationFrame(check);
}

async function sendRecordingToServer() {
  if (audioChunks.length === 0 || !wsReady) return;

  // Silence filter: discard ambient noise / accidental mic triggers.
  if (maxRecordedRms < 0.008) {
    audioChunks = [];
    _silentCycles++;
    setOrbState('ambient');
    if (convMode) {
      const delay = _silentCycles >= 3 ? 10000 : 600;
      clearTimeout(autoListenTimer);
      autoListenTimer = setTimeout(() => {
        if (!speaking && !isRecording && !serverBusy) startRecording();
      }, delay);
    }
    return;
  }
  _silentCycles = 0;

  setOrbState('thinking');
  serverBusy = true;
  try {
    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
    const arrayBuf = await blob.arrayBuffer();
    localWS.send(arrayBuf);
  } catch(e) {
    console.error('Failed to send audio:', e);
    serverBusy = false;
    setOrbState('ambient');
  }
  audioChunks = [];
}

// ── LiveKit HTTP audio upload ─────────────────────────────────────────────
// Called by stopRecording() in LiveKit mode when MediaRecorder stops.
// Sends audio to /api/voice/livekit-audio, plays back TTS, then re-enables VAD.
async function sendLiveKitAudioToServer() {
  if (!audioChunks || audioChunks.length === 0) {
    setOrbState('ambient');
    scheduleAutoListen();
    return;
  }
  const mimeType = (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm';
  const blob = new Blob(audioChunks, { type: mimeType });
  audioChunks = [];
  const formData = new FormData();
  formData.append('audio', blob, 'audio.webm');
  formData.append('session_id', getSessionId());
  try {
    const resp = await fetch('/api/voice/livekit-audio', {
      method: 'POST',
      headers: { 'X-Session-ID': getSessionId() },
      body: formData,
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (!data.ok || data.cancelled) {
      setOrbState('ambient');
      scheduleAutoListen();
      return;
    }
    if (data.transcript) addTranscriptLine('user', data.transcript);
    if (data.response_text) addTranscriptLine('zoe', data.response_text);
    if (data.audio_base64) {
      playAudioBase64(data.audio_base64, data.content_type || 'audio/wav', () => {
        setOrbState('ambient');
        scheduleAutoListen();
      });
    } else {
      setOrbState('ambient');
      scheduleAutoListen();
    }
  } catch(e) {
    console.error('LiveKit audio upload failed:', e);
    setOrbState('ambient');
    setTimeout(() => scheduleAutoListen(), 1000);
  }
}

// ── Continued conversation mode ───────────────────────────────────────────
let autoListenTimer = null;
function scheduleAutoListen() {
  // In livekit mode: always auto-listen after a response (always-on VAD, no convMode gate)
  // In local mode: only auto-listen if convMode is on
  if (MODE !== 'livekit' && !convMode) return;
  if (speaking || serverBusy) return;
  clearTimeout(autoListenTimer);
  autoListenTimer = setTimeout(() => {
    if (!speaking && !isRecording && !serverBusy) startRecording();
  }, 600);
}

function toggleConvMode() {
  convMode = !convMode;
  const badge = document.getElementById('convBadge');
  badge.classList.toggle('active', convMode);
  if (convMode) {
    setStatus('Conversation mode — speak, Zoe replies, mic reopens');
    scheduleAutoListen();
  } else {
    clearTimeout(autoListenTimer);
    setStatus('');
    setOrbState('ambient');
  }
}

// ── PTT button wiring ─────────────────────────────────────────────────────
function showPttButton() {
  const btn = document.getElementById('pttBtn');
  btn.style.display = 'flex';
  // Guard: attach listeners only once — showPttButton() is called on every WS reconnect
  // and without this guard each reconnect stacks duplicate listeners causing double recordings.
  if (btn._pttListenersAttached) return;
  btn._pttListenersAttached = true;

  // Touch events for mobile hold-to-talk
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); }, { passive: false });
  btn.addEventListener('touchend',   (e) => { e.preventDefault(); if (isRecording) stopRecording(); }, { passive: false });
  // Mouse events for desktop
  btn.addEventListener('mousedown', (e) => { e.preventDefault(); startRecording(); });
  btn.addEventListener('mouseup',   (e) => { e.preventDefault(); if (isRecording) stopRecording(); });
  btn.addEventListener('mouseleave',(e) => { if (isRecording) stopRecording(); });
  // Long-press (1s) to toggle conversation mode
  let longPressTimer = null;
  btn.addEventListener('touchstart', () => {
    longPressTimer = setTimeout(() => { toggleConvMode(); }, 1000);
  }, { passive: true });
  btn.addEventListener('touchend', () => clearTimeout(longPressTimer), { passive: true });
}

// ── LiveKit WebRTC voice session ──────────────────────────────────────────
async function connectLiveKitVoice() {
  if (typeof LivekitClient === 'undefined') {
    console.warn('LiveKit client library unavailable, falling back to local WS');
    connectLocalVoice();
    return;
  }
  try {
    setStatus('Connecting…');
    const resp = await fetch('/api/voice/livekit-token', {
      headers: { 'X-Session-ID': getSessionId() },
    });
    if (!resp.ok) throw new Error(`Token fetch: ${resp.status}`);
    const { token, url } = await resp.json();

    const room = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });

    // Incoming audio from zoe-agent participant → play immediately
    room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, _pub, participant) => {
      if (track.kind !== LivekitClient.Track.Kind.Audio) return;
      const audioEl = track.attach();
      audioEl.autoplay = true;
      document.body.appendChild(audioEl);
      speaking = true;
      setOrbState('responding');
      audioEl.addEventListener('ended', () => {
        speaking = false;
        track.detach(audioEl);
        audioEl.remove();
        setOrbState('ambient');
        if (convMode) scheduleAutoListen();
      });
      audioEl.addEventListener('error', () => {
        speaking = false;
        setOrbState('ambient');
      });
    });

    room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
      track.detach();
    });

    // Data messages from server-side agent (state, transcript, agui cards)
    room.on(LivekitClient.RoomEvent.DataReceived, (data, _participant) => {
      try { handleVoiceEvent(JSON.parse(_lkDecoder.decode(data))); } catch(e) {}
    });

    room.on(LivekitClient.RoomEvent.ActiveSpeakersChanged, (speakers) => {
      if (speakers.some(s => s.identity === 'zoe-agent')) setOrbState('responding');
    });

    room.on(LivekitClient.RoomEvent.Disconnected, () => {
      wsReady = false;
      liveKitRoom = null;
      localMicTrack = null;
      setStatus('Reconnecting…');
      setTimeout(connectLiveKitVoice, 3000);
    });

    await room.connect(url, token);

    // Publish mic track — always-on (VAD handles end-of-speech server-side)
    localMicTrack = await LivekitClient.createLocalAudioTrack({
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true,
    });
    // Do NOT mute — server-side VAD needs the live audio stream immediately
    await room.localParticipant.publishTrack(localMicTrack);

    // Send identity so the agent knows which user is speaking
    try {
      room.localParticipant.publishData(
        _lkEncoder.encode(JSON.stringify({
          type: 'identify',
          user_id: (window._ZOE_USER_ID || ''),
          session_id: getSessionId(),
        })), { reliable: true }
      );
    } catch(_e) {}

    // Expose the underlying MediaStream for silence detection analyser
    micStream = new MediaStream([localMicTrack.mediaStreamTrack]);

    liveKitRoom = room;
    wsReady = true;
    setOrbState('ambient');
    setStatus('');
    // In livekit mode: hide PTT button (VAD is always-on, no button needed)
    // In local WS mode: showPttButton() is called by connectLocalVoice
    if (MODE !== 'livekit') showPttButton();
    else document.getElementById('pttBtn').style.display = 'none';
    // Auto-start recording immediately in livekit mode (always-on VAD)
    if (MODE === 'livekit') setTimeout(() => startRecording(), 500);
  } catch(e) {
    console.warn('LiveKit connect failed, falling back to local WS:', e);
    setStatus('Falling back to local mode…');
    setTimeout(connectLocalVoice, 1000);
  }
}

// ── Start voice session ───────────────────────────────────────────────────
function startVoice() {
  document.getElementById('tapOverlay').style.display = 'none';
  if (MODE === 'livekit') {
    connectLiveKitVoice();
  } else {
    connectLocalVoice();
  }
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.repeat) {
    const overlay = document.getElementById('tapOverlay');
    if (overlay.style.display !== 'none') { startVoice(); return; }
    startRecording();
  }
  if (e.code === 'KeyC' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); toggleConvMode(); }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space') { if (isRecording) stopRecording(); }
});

// Auto-start on non-iOS (iOS requires a tap for AudioContext unlock)
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
if (!isIOS) { startVoice(); }

// ── Handle server-pushed auto-start (e.g. from "let's chat" wake word) ────
window.handleStartConversation = function(delayMs) {
  const delay = typeof delayMs === 'number' ? delayMs : 2500;
  setTimeout(() => {
    if (convMode && !isRecording && !serverBusy && !speaking) {
      _silentCycles = 0;
      startRecording();
    }
  }, delay);
};

// ── Broadcast channel: voice events + start_conversation signals ──────────
try {
  const bc = new BroadcastChannel('zoe-voice');
  bc.onmessage = (ev) => {
    const d = ev.data || {};
    if (d.type === 'voice:start_conversation') {
      window.handleStartConversation(d.delay_ms);
    } else {
      handleVoiceEvent(d);
    }
  };
} catch(e) {}
</script>
