<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Zoe Voice</title>
<link rel="icon" href="/favicon.ico">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ── Orb canvas ─────────────────────────────────────────────── */
  #orbCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
  }

  /* ── Status label ───────────────────────────────────────────── */
  #statusLabel {
    position: fixed;
    bottom: max(60px, env(safe-area-inset-bottom, 60px));
    left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 15px; letter-spacing: 0.04em;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  /* ── Tap-to-start overlay (iOS audio gate) ─────────────────── */
  #tapOverlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,15,0.92);
    z-index: 100;
    cursor: pointer;
  }
  #tapOverlay h1 {
    color: #fff; font-size: 28px; font-weight: 300;
    letter-spacing: 0.05em; margin-bottom: 12px;
  }
  #tapOverlay p {
    color: rgba(255,255,255,0.5); font-size: 14px;
  }
  #tapOverlay .pulse-ring {
    width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid rgba(108,99,255,0.6);
    margin-bottom: 24px;
    animation: tapPulse 2s ease-in-out infinite;
  }
  @keyframes tapPulse {
    0%,100% { transform: scale(1); opacity: 0.6; }
    50%      { transform: scale(1.15); opacity: 1; }
  }

  /* ── AG-UI overlay layer ────────────────────────────────────── */
  #aguiOverlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: max(100px, env(safe-area-inset-bottom, 100px));
    pointer-events: none;
    z-index: 50;
  }
  .agui-card {
    background: rgba(20,20,30,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: 16px;
    padding: 16px 20px;
    max-width: min(380px, 90vw);
    width: 100%;
    margin-bottom: 12px;
    pointer-events: all;
    animation: cardIn 0.3s ease-out;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .agui-card h3 {
    color: #fff; font-size: 15px; font-weight: 500; margin-bottom: 8px;
  }
  .agui-card p {
    color: rgba(255,255,255,0.7); font-size: 13px; line-height: 1.5;
  }
  .agui-card .card-actions {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .agui-card .btn-confirm {
    flex: 1; padding: 10px; background: #6c63ff; color: #fff;
    border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
  }
  .agui-card .btn-cancel {
    flex: 1; padding: 10px; background: rgba(255,255,255,0.1); color: #fff;
    border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
  }

  /* ── Transcript panel (hidden by default) ───────────────────── */
  #transcriptPanel {
    position: fixed; top: 0; left: 0; right: 0;
    max-height: 40vh;
    overflow-y: auto;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(10px);
    padding: 16px;
    z-index: 40;
    display: none;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .transcript-line {
    font-size: 13px; line-height: 1.6; margin-bottom: 4px;
    color: rgba(255,255,255,0.6);
  }
  .transcript-line.user  { color: rgba(255,255,255,0.9); }
  .transcript-line.zoe   { color: #a78fff; }

  /* ── Top-bar controls ───────────────────────────────────────── */
  #topBar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: max(16px, env(safe-area-inset-top, 16px)) 20px 12px;
    z-index: 60;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.08);
    border: none; border-radius: 50%;
    width: 36px; height: 36px;
    color: rgba(255,255,255,0.6);
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.15); }
  #modeLabel {
    color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- Canvas for animated orb -->
<canvas id="orbCanvas"></canvas>

<!-- Top controls -->
<div id="topBar">
  <button class="ctrl-btn" onclick="window.location.href='/'" title="Home">←</button>
  <span id="modeLabel">voice</span>
  <button class="ctrl-btn" onclick="toggleTranscript()" title="Transcript">≡</button>
</div>

<!-- Transcript panel -->
<div id="transcriptPanel"></div>

<!-- Status label -->
<div id="statusLabel">Tap to start</div>

<!-- AG-UI card overlay -->
<div id="aguiOverlay"></div>

<!-- iOS audio gate tap overlay -->
<div id="tapOverlay" onclick="startVoice()">
  <div class="pulse-ring"></div>
  <h1>Zoe</h1>
  <p>Tap anywhere to start</p>
</div>

<script>
// ── Mode detection ─────────────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const isLocal  = location.hostname === 'localhost'
              || location.hostname === '127.0.0.1'
              || location.hostname.startsWith('192.168.')
              || location.hostname.startsWith('10.')
              || /^172\.(1[6-9]|2\d|3[01])\./.test(location.hostname);
const modePref = params.get('mode');
const MODE     = modePref || (isLocal ? 'local' : 'livekit');
document.getElementById('modeLabel').textContent = 'voice · ' + MODE;

// ── Orb canvas animation ──────────────────────────────────────────────────
const canvas = document.getElementById('orbCanvas');
const ctx    = canvas.getContext('2d');
let orbState = 'ambient';  // ambient | listening | thinking | responding
let animFrame;
let phase = 0;

const ORB_COLORS = {
  ambient:    { inner: '#4a3f8f', outer: '#6c63ff', glow: 0.15 },
  listening:  { inner: '#1a6ba0', outer: '#4fc3f7', glow: 0.35 },
  thinking:   { inner: '#2d6a4f', outer: '#52b788', glow: 0.25 },
  responding: { inner: '#7b2d8b', outer: '#c77dff', glow: 0.45 },
};

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function lerp(a, b, t) { return a + (b - a) * t; }

let currentInner = '#4a3f8f', currentOuter = '#6c63ff', currentGlow = 0.15;
let targetInner  = '#4a3f8f', targetOuter  = '#6c63ff', targetGlow  = 0.15;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
}
function lerpColor(a,b,t) {
  const ra = hexToRgb(a), rb = hexToRgb(b);
  return rgbToHex(lerp(ra[0],rb[0],t), lerp(ra[1],rb[1],t), lerp(ra[2],rb[2],t));
}

function drawOrb(ts) {
  animFrame = requestAnimationFrame(drawOrb);
  phase += 0.012;

  const t = 0.06;
  currentInner = lerpColor(currentInner, targetInner, t);
  currentOuter = lerpColor(currentOuter, targetOuter, t);
  currentGlow  = lerp(currentGlow, targetGlow, t);

  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  const baseR = Math.min(W, H) * 0.22;
  const pulse  = orbState === 'ambient'    ? 1 + 0.02 * Math.sin(phase) :
                 orbState === 'listening'  ? 1 + 0.06 * Math.sin(phase * 1.8) :
                 orbState === 'thinking'   ? 1 + 0.04 * Math.sin(phase * 3) :
                                            1 + 0.08 * Math.sin(phase * 1.2);
  const R = baseR * pulse;

  // Outer glow
  const glowR = R * (1 + 2.5 * currentGlow);
  const gGlow = ctx.createRadialGradient(cx, cy, R * 0.5, cx, cy, glowR);
  gGlow.addColorStop(0, currentOuter + Math.round(currentGlow * 255).toString(16).padStart(2,'0'));
  gGlow.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
  ctx.fillStyle = gGlow;
  ctx.fill();

  // Main orb gradient
  const gOrb = ctx.createRadialGradient(cx - R*0.2, cy - R*0.3, R*0.05, cx, cy, R);
  gOrb.addColorStop(0, currentOuter);
  gOrb.addColorStop(0.6, currentInner);
  gOrb.addColorStop(1, '#08080f');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = gOrb;
  ctx.fill();

  // Subtle inner highlight
  const gHL = ctx.createRadialGradient(cx - R*0.25, cy - R*0.3, 0, cx - R*0.1, cy - R*0.15, R * 0.5);
  gHL.addColorStop(0, 'rgba(255,255,255,0.12)');
  gHL.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = gHL;
  ctx.fill();
}

function setOrbState(state) {
  orbState = state;
  const c = ORB_COLORS[state] || ORB_COLORS.ambient;
  targetInner = c.inner;
  targetOuter = c.outer;
  targetGlow  = c.glow;

  const labels = {
    ambient:    'Listening for "Hey Zoe"',
    listening:  'Listening…',
    thinking:   'Thinking…',
    responding: 'Speaking…',
  };
  setStatus(labels[state] || '');
}

animFrame = requestAnimationFrame(drawOrb);

// ── Status + transcript helpers ───────────────────────────────────────────
function setStatus(text) {
  document.getElementById('statusLabel').textContent = text;
}

let transcriptVisible = false;
function toggleTranscript() {
  transcriptVisible = !transcriptVisible;
  document.getElementById('transcriptPanel').style.display = transcriptVisible ? 'block' : 'none';
}

function addTranscriptLine(role, text) {
  const panel = document.getElementById('transcriptPanel');
  const el = document.createElement('div');
  el.className = 'transcript-line ' + role;
  el.textContent = (role === 'user' ? 'You: ' : 'Zoe: ') + text;
  panel.appendChild(el);
  panel.scrollTop = panel.scrollHeight;
}

// ── AG-UI card rendering ──────────────────────────────────────────────────
function showAguiCard(card) {
  const overlay = document.getElementById('aguiOverlay');
  const el = document.createElement('div');
  el.className = 'agui-card';

  if (card.type === 'confirmation' || card.type === 'confirm') {
    el.innerHTML = `<h3>${card.title || 'Confirm'}</h3><p>${card.message || card.body || ''}</p>
      <div class="card-actions">
        <button class="btn-confirm" onclick="confirmAguiAction(this,'confirm','${card.action_id||''}')">Confirm</button>
        <button class="btn-cancel" onclick="this.closest('.agui-card').remove()">Cancel</button>
      </div>`;
  } else if (card.type === 'status' || card.type === 'info') {
    el.innerHTML = `<h3>${card.title || 'Zoe'}</h3><p>${card.message || card.body || ''}</p>`;
    setTimeout(() => el.remove(), 5000);
  } else if (card.type === 'qr_code') {
    el.innerHTML = `<h3>${card.title || 'Scan QR Code'}</h3>
      <p style="margin-bottom:12px;">${card.message || ''}</p>
      <div id="qr-${card.id||'x'}" style="background:#fff;padding:8px;border-radius:8px;display:inline-block;"></div>
      <p style="margin-top:8px;font-size:11px;word-break:break-all;color:#666;">${card.url || ''}</p>`;
    setTimeout(() => {
      const qrEl = el.querySelector('[id^="qr-"]');
      if (qrEl && card.url) {
        // Simple QR-like placeholder using text (full QR library can be added later)
        qrEl.innerHTML = `<a href="${card.url}" target="_blank" style="display:block;padding:8px;color:#333;font-size:11px;text-decoration:none;">Open Link →</a>`;
      }
    }, 0);
  } else {
    el.innerHTML = `<h3>${card.title || 'Zoe'}</h3><p>${card.message || card.body || JSON.stringify(card)}</p>`;
    setTimeout(() => el.remove(), 8000);
  }

  overlay.appendChild(el);
}

async function confirmAguiAction(btn, decision, actionId) {
  btn.closest('.agui-card').remove();
  try {
    await fetch('/api/chat/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Session-ID': localStorage.getItem('session_id') || '' },
      body: JSON.stringify({ action_id: actionId, decision })
    });
  } catch(e) { /* non-fatal */ }
}

// ── Session helpers ───────────────────────────────────────────────────────
function getSessionId() { return localStorage.getItem('session_id') || ''; }

// ── LOCAL mode: WebSocket voice session ──────────────────────────────────
let localWS    = null;
let localActive = false;

function connectLocalVoice() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl  = `${proto}://${location.host}/ws/voice/?session_id=${getSessionId()}`;
  localWS = new WebSocket(wsUrl);

  localWS.onopen = () => {
    localActive = true;
    setOrbState('ambient');
  };

  localWS.onclose = () => {
    localActive = false;
    setStatus('Disconnected — reconnecting…');
    setTimeout(connectLocalVoice, 3000);
  };

  localWS.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      handleVoiceEvent(msg);
    } catch(e) {}
  };
}

function handleVoiceEvent(msg) {
  const type = msg.type || msg.event;
  if (type === 'state') {
    const s = msg.state;
    if (s === 'wake' || s === 'listening') setOrbState('listening');
    else if (s === 'processing' || s === 'thinking') setOrbState('thinking');
    else if (s === 'responding' || s === 'speaking') setOrbState('responding');
    else setOrbState('ambient');
  } else if (type === 'transcript') {
    addTranscriptLine(msg.role || 'zoe', msg.text || '');
  } else if (type === 'agui' || type === 'ui_component') {
    showAguiCard(msg.data || msg);
  } else if (type === 'done') {
    setOrbState('ambient');
  }
}

// ── LIVEKIT mode: WebRTC real-time voice ─────────────────────────────────
let livekitRoom = null;

async function connectLiveKit() {
  setStatus('Connecting…');
  try {
    // Fetch access token for this user from our backend
    const resp = await fetch('/api/voice/livekit-token', {
      headers: { 'X-Session-ID': getSessionId() }
    });
    if (!resp.ok) {
      setStatus('LiveKit not configured yet — using local mode');
      connectLocalVoice();
      return;
    }
    const { token, url } = await resp.json();

    if (typeof LivekitClient === 'undefined') {
      setStatus('LiveKit client not loaded');
      console.error('livekit-client.umd.min.js not loaded');
      return;
    }

    livekitRoom = new LivekitClient.Room({ adaptiveStream: true, dynacast: true });

    livekitRoom.on(LivekitClient.RoomEvent.ParticipantSpeaking, (participant, speaking) => {
      if (participant.isLocal) return;
      setOrbState(speaking ? 'responding' : 'ambient');
    });

    livekitRoom.on(LivekitClient.RoomEvent.DataReceived, (data) => {
      try {
        const msg = JSON.parse(new TextDecoder().decode(data));
        if (msg.type === 'agui') showAguiCard(msg.data);
        if (msg.type === 'transcript') addTranscriptLine(msg.role, msg.text);
      } catch(e) {}
    });

    livekitRoom.on(LivekitClient.RoomEvent.Disconnected, () => {
      setStatus('Disconnected');
      setOrbState('ambient');
      setTimeout(connectLiveKit, 5000);
    });

    await livekitRoom.connect(url, token);
    await livekitRoom.localParticipant.setMicrophoneEnabled(true);

    setOrbState('ambient');
    setStatus('Connected — speak to Zoe');
  } catch(e) {
    console.error('LiveKit connect error:', e);
    setStatus('LiveKit unavailable — switching to local mode');
    connectLocalVoice();
  }
}

// ── Start voice session ───────────────────────────────────────────────────
function startVoice() {
  document.getElementById('tapOverlay').style.display = 'none';
  if (MODE === 'livekit') {
    connectLiveKit();
  } else {
    connectLocalVoice();
  }
}

// ── Keyboard shortcut: Space to force wake ────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.repeat) {
    if (document.getElementById('tapOverlay').style.display !== 'none') {
      startVoice();
    }
  }
});

// Auto-start on non-iOS devices (iOS requires a tap for audio)
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
if (!isIOS) {
  startVoice();
}

// ── Broadcast channel: listen for voice events from service worker ────────
try {
  const bc = new BroadcastChannel('zoe-voice');
  bc.onmessage = (ev) => handleVoiceEvent(ev.data || {});
} catch(e) {}
</script>

<!-- LiveKit client (loaded last, only needed for livekit mode) -->
<script src="/lib/livekit/livekit-client.umd.min.js" onerror="console.warn('LiveKit client not loaded')"></script>

</body>
</html>
