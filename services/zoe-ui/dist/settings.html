<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  try {
    var s = localStorage.getItem('zoe_theme') || 'dark';
    var h = new Date().getHours();
    var dark = s === 'dark' || (s === 'auto' && (h < 7 || h >= 19));
    if (!dark) document.documentElement.classList.add('light-mode');
  } catch(e) {}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Zoe — Settings</title>
<style>
/* ── Design tokens ─────────────────────────────────────────── */
:root {
  --bg:        #0a0a0f;
  --bg2:       #111118;
  --surface:   rgba(255,255,255,0.05);
  --surface2:  rgba(255,255,255,0.08);
  --border:    rgba(255,255,255,0.10);
  --border2:   rgba(255,255,255,0.15);
  --accent:    #6c63ff;
  --accent2:   #8b85ff;
  --text:      #ffffff;
  --text2:     rgba(255,255,255,0.70);
  --text3:     rgba(255,255,255,0.40);
  --danger:    #ff4f5e;
  --success:   #22c55e;
  --warn:      #f59e0b;
  --radius:    12px;
  --font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --sidebar-w: 220px;
  --nav-h:     56px;
}
html.light-mode {
  --bg:       #f4f4f8;
  --bg2:      #ffffff;
  --surface:  rgba(0,0,0,0.04);
  --surface2: rgba(0,0,0,0.07);
  --border:   rgba(0,0,0,0.10);
  --border2:  rgba(0,0,0,0.15);
  --text:     #111118;
  --text2:    rgba(0,0,0,0.65);
  --text3:    rgba(0,0,0,0.38);
}

/* ── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
a { color: var(--accent); text-decoration: none; }

/* ── Top nav bar ───────────────────────────────────────────── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
  background: rgba(10,10,15,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; z-index: 200;
  padding-left: max(20px, env(safe-area-inset-left));
  padding-right: max(20px, env(safe-area-inset-right));
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.topbar-logo {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, #5ae0e0 100%);
  cursor: pointer; flex-shrink: 0;
}
.topbar-title { font-size: 17px; font-weight: 600; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-user {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 20px;
  background: var(--surface); border: 1px solid var(--border);
}
.topbar-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.topbar-username { font-size: 13px; font-weight: 500; color: var(--text2); }
.topbar-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); padding: 6px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 500; transition: background 0.2s;
}
.topbar-btn:hover { background: var(--surface2); color: var(--text); }
html.light-mode .topbar { background: rgba(244,244,248,0.90); }

/* ── Layout wrapper ────────────────────────────────────────── */
.page-wrap {
  display: flex;
  padding-top: var(--nav-h);
  min-height: 100vh;
}

/* ── Sidebar ───────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  position: sticky; top: var(--nav-h);
  height: calc(100vh - var(--nav-h));
  overflow-y: auto; overflow-x: hidden;
  padding: 20px 12px;
  border-right: 1px solid var(--border);
  background: var(--bg);
}
.sidebar-group { margin-bottom: 24px; }
.sidebar-group-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.10em;
  text-transform: uppercase; color: var(--text3);
  padding: 0 8px 6px; display: block;
}
.sidebar-item {
  display: flex; align-items: center; gap: 9px;
  width: 100%; padding: 8px 10px; border-radius: 8px;
  font-size: 14px; font-weight: 500; color: var(--text2);
  background: none; border: none; text-align: left;
  transition: background 0.15s, color 0.15s; cursor: pointer;
}
.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active { background: rgba(108,99,255,0.18); color: var(--accent2); }
.sidebar-icon { width: 18px; text-align: center; font-size: 15px; }

/* ── Main content ──────────────────────────────────────────── */
.main {
  flex: 1; min-width: 0;
  padding: 28px 24px 60px;
  padding-left: max(24px, env(safe-area-inset-left));
  padding-right: max(24px, env(safe-area-inset-right));
  max-width: 760px;
}

/* ── Section ───────────────────────────────────────────────── */
.section {
  display: none;
}
.section.active { display: block; }
.section-title {
  font-size: 20px; font-weight: 700; color: var(--text);
  margin-bottom: 6px;
}
.section-desc {
  font-size: 14px; color: var(--text3); margin-bottom: 22px;
}

/* ── Card ──────────────────────────────────────────────────── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 16px; overflow: hidden;
}
.card-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.07em;
}

/* ── Row ───────────────────────────────────────────────────── */
.row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.row:last-child { border-bottom: none; }
.row-info { flex: 1; min-width: 0; }
.row-label { font-size: 15px; font-weight: 500; color: var(--text); }
.row-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }
.row-action { flex-shrink: 0; }

/* ── Form controls ─────────────────────────────────────────── */
.field {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.field:last-child { border-bottom: none; }
.field label { display: block; font-size: 13px; color: var(--text3); margin-bottom: 6px; font-weight: 500; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text); padding: 9px 12px; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent);
}
.field input:disabled, .field select:disabled { opacity: 0.5; cursor: not-allowed; }
.field textarea { resize: vertical; min-height: 80px; }
.field-hint { font-size: 12px; color: var(--text3); margin-top: 5px; }

/* ── Toggle switch ─────────────────────────────────────────── */
.toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
  position: absolute; inset: 0;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 13px; transition: background 0.2s;
}
.toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
.toggle-track::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; transition: transform 0.2s;
}
.toggle input:checked + .toggle-track::after { transform: translateX(18px); }

/* ── Buttons ───────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 8px; font-size: 14px;
  font-weight: 600; border: none; transition: opacity 0.2s, background 0.2s;
  cursor: pointer; white-space: nowrap;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:not(:disabled):hover { background: var(--accent2); }
.btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:not(:disabled):hover { background: var(--surface2); color: var(--text); }
.btn-danger { background: rgba(255,79,94,0.15); border: 1px solid rgba(255,79,94,0.3); color: var(--danger); }
.btn-danger:not(:disabled):hover { background: rgba(255,79,94,0.25); }
.btn-sm { padding: 6px 12px; font-size: 13px; }

/* ── Pill badge ────────────────────────────────────────────── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
}
.badge-accent { background: rgba(108,99,255,0.2); color: var(--accent2); }
.badge-success { background: rgba(34,197,94,0.15); color: var(--success); }
.badge-warn { background: rgba(245,158,11,0.15); color: var(--warn); }
.badge-danger { background: rgba(255,79,94,0.15); color: var(--danger); }

/* ── Toast ─────────────────────────────────────────────────── */
#toast-wrap {
  position: fixed; bottom: 20px; right: 20px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
  padding-bottom: env(safe-area-inset-bottom);
}
.toast {
  padding: 12px 18px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  animation: toastIn 0.25s ease;
  pointer-events: auto;
}
.toast.success { border-color: rgba(34,197,94,0.4); }
.toast.error   { border-color: rgba(255,79,94,0.4); }
@keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

/* ── Profile avatar ────────────────────────────────────────── */
.profile-header {
  display: flex; align-items: center; gap: 16px;
  padding: 18px 18px 14px;
}
.profile-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 22px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.profile-name { font-size: 18px; font-weight: 700; color: var(--text); }
.profile-meta { font-size: 13px; color: var(--text3); margin-top: 2px; }

/* ── Session list ──────────────────────────────────────────── */
.session-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; border-bottom: 1px solid var(--border); gap: 10px;
}
.session-item:last-child { border-bottom: none; }
.session-device { font-size: 14px; font-weight: 500; color: var(--text); }
.session-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
.session-current { color: var(--accent2); font-size: 11px; font-weight: 600; }

/* ── User management table ─────────────────────────────────── */
.users-table { width: 100%; border-collapse: collapse; }
.users-table th {
  text-align: left; font-size: 11px; font-weight: 700;
  letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--text3); padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.users-table td {
  padding: 12px; font-size: 14px; color: var(--text);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.users-table tr:last-child td { border-bottom: none; }
.users-table tr:hover td { background: var(--surface2); }

/* ── Voice enroll ──────────────────────────────────────────── */
.enroll-status {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  font-size: 14px; color: var(--text2);
}
.record-btn {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--accent); border: none; color: #fff;
  font-size: 24px; cursor: pointer; transition: transform 0.15s, background 0.15s;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto;
}
.record-btn.recording { background: var(--danger); animation: pulse 1s ease infinite; }
.record-btn:hover:not(.recording) { background: var(--accent2); }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

/* ── Proactive schedule ────────────────────────────────────── */
.schedule-item {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 12px 18px; border-bottom: 1px solid var(--border); gap: 10px;
}
.schedule-item:last-child { border-bottom: none; }
.schedule-msg { font-size: 14px; color: var(--text); margin-bottom: 3px; }
.schedule-time { font-size: 12px; color: var(--text3); }

/* ── Empty state ───────────────────────────────────────────── */
.empty {
  text-align: center; padding: 32px 20px;
  color: var(--text3); font-size: 14px;
}
.empty-icon { font-size: 32px; margin-bottom: 8px; display: block; }

/* ── Mobile tabs (≤768px) ──────────────────────────────────── */
.mobile-tabs {
  display: none;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: var(--nav-h); z-index: 100;
  padding: 0 4px;
}
.mobile-tabs::-webkit-scrollbar { display: none; }
.mobile-tab {
  display: inline-block; padding: 10px 16px; font-size: 14px;
  font-weight: 500; color: var(--text3);
  white-space: nowrap; cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color 0.15s;
}
.mobile-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

/* ── Spinner ───────────────────────────────────────────────── */
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.6s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .mobile-tabs { display: flex; }
  .main { padding: 20px 16px 80px; }
  .section-title { font-size: 18px; }
  .topbar-username { display: none; }
}

/* ── Accent color select ───────────────────────────────────── */
.color-swatches { display: flex; gap: 10px; flex-wrap: wrap; padding: 14px 18px; }
.swatch {
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  border: 3px solid transparent; transition: border-color 0.15s, transform 0.15s;
}
.swatch:hover { transform: scale(1.15); }
.swatch.selected { border-color: var(--text); }

/* ── Theme cards ───────────────────────────────────────────── */
.theme-options { display: flex; gap: 12px; flex-wrap: wrap; padding: 14px 18px; }
.theme-card {
  flex: 1; min-width: 80px; max-width: 120px;
  border: 2px solid var(--border); border-radius: 10px;
  padding: 12px 8px; text-align: center; cursor: pointer;
  transition: border-color 0.15s; font-size: 13px; color: var(--text2);
}
.theme-card.selected { border-color: var(--accent); color: var(--accent2); }
.theme-card-icon { font-size: 22px; display: block; margin-bottom: 5px; }

/* ── Admin modal ───────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 500; display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; width: 100%;
  max-width: 440px; max-height: 90vh; overflow-y: auto;
}
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; color: var(--text); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* ── Inline form row ───────────────────────────────────────── */
.inline-form { display: flex; gap: 10px; flex-wrap: wrap; padding: 14px 18px; align-items: flex-end; }
.inline-form .field { padding: 0; flex: 1; min-width: 160px; border: none; }
</style>
</head>
<body>

<!-- Top nav -->
<nav class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo" onclick="location.href='/'"></div>
    <span class="topbar-title">Settings</span>
  </div>
  <div class="topbar-right">
    <div class="topbar-user" id="topbar-user">
      <div class="topbar-avatar" id="topbar-avatar">?</div>
      <span class="topbar-username" id="topbar-username">…</span>
    </div>
    <button class="topbar-btn" onclick="doLogout()">Sign out</button>
  </div>
</nav>

<!-- Mobile tab bar -->
<div class="mobile-tabs" id="mobile-tabs"></div>

<div class="page-wrap">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main -->
  <main class="main" id="main-content">
    <!-- sections injected by JS -->
  </main>
</div>

<!-- Toast container -->
<div id="toast-wrap"></div>

<!-- Admin: new-user modal -->
<div class="modal-overlay" id="modal-new-user">
  <div class="modal">
    <div class="modal-title">New User</div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="new-user-username" placeholder="e.g. jason">

    <div class="field">

      <input type="email" id="new-user-email" placeholder="user@example.com">
    </div>
    <div class="field">
      <label>Password (8+ chars)</label>
      <input type="password" id="new-user-password">
    </div>
    <div class="field">
      <label>Role</label>
      <select id="new-user-role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
        <option value="guest">Guest</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-new-user')">Cancel</button>
      <button class="btn btn-primary" onclick="createUser()">Create</button>
    </div>
  </div>

<!-- Admin: edit-user modal -->
<div class="modal-overlay" id="modal-edit-user">
  <div class="modal">
    <div class="modal-title">Edit User</div>
    <input type="hidden" id="edit-user-id">
    <div class="field">
      <label>Email</label>
      <input type="email" id="edit-user-email">
    </div>
    <div class="field">
      <label>Role</label>
      <select id="edit-user-role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
        <option value="guest">Guest</option>
      </select>

      <select id="edit-user-active">

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-edit-user')">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save</button>

  </div>
</div>

<!-- Admin: reset-password modal -->
<div class="modal-overlay" id="modal-reset-pw">
  <div class="modal">
    <div class="modal-title">Reset Password</div>
    <input type="hidden" id="reset-pw-user-id">
    <div class="field">
      <label>New Password (8+ chars)</label>
      <input type="password" id="reset-pw-new">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-reset-pw')">Cancel</button>
      <button class="btn btn-primary" onclick="doResetPassword()">Reset</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── Auth ─────────────────────────────────────────────────── */
let SESSION_ID = null;
let currentUser = null;

function getSessionId() {
  try {
    const raw = localStorage.getItem('zoe_session');
    if (!raw) return null;
    const obj = JSON.parse(raw);
    return obj.session_id || null;
  } catch { return null; }
}

async function apiCall(method, url, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'X-Session-ID': SESSION_ID || '' }
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) {
    let msg = `HTTP ${r.status}`;
    try { const j = await r.json(); msg = j.detail || j.message || msg; } catch {}
    throw new Error(msg);
  }
  const ct = r.headers.get('content-type') || '';
  if (ct.includes('application/json')) return r.json();
  return {};
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function doLogout() {
  apiCall('POST', '/api/auth/logout').catch(() => {});
  localStorage.removeItem('zoe_session');
  location.href = '/';
}

/* ── Navigation ───────────────────────────────────────────── */
const NAV = [
  { group: 'Account', items: [
    { id: 'profile',    icon: '👤', label: 'Profile' },
    { id: 'password',   icon: '🔑', label: 'Password' },
    { id: 'pin',        icon: '🔢', label: 'PIN / Passcode' },
    { id: 'sessions',   icon: '📱', label: 'Sessions' },
  ]},
  { group: 'Preferences', items: [
    { id: 'theme',      icon: '🎨', label: 'Theme' },
    { id: 'display',    icon: '🖥️', label: 'Display' },
  ]},
  { group: 'Voice', items: [
    { id: 'voice',      icon: '🎙️', label: 'Speaker Identity' },
  ]},
  { group: 'Notifications', items: [
    { id: 'push',       icon: '🔔', label: 'Push Notifications' },

let activeSection = 'profile';

function buildNav() {
  const sidebar = document.getElementById('sidebar');
  const tabs = document.getElementById('mobile-tabs');
  sidebar.innerHTML = '';
  tabs.innerHTML = '';

  for (const grp of NAV) {
    if (grp.admin && (!currentUser || currentUser.role !== 'admin')) continue;

    const div = document.createElement('div');
    div.className = 'sidebar-group';
    div.innerHTML = `<span class="sidebar-group-label">${grp.group}</span>`;

    for (const item of grp.items) {
      const btn = document.createElement('button');
      btn.className = 'sidebar-item' + (item.id === activeSection ? ' active' : '');
      btn.dataset.section = item.id;
      btn.innerHTML = `<span class="sidebar-icon">${item.icon}</span>${item.label}`;
      btn.addEventListener('click', () => navigate(item.id));
      div.appendChild(btn);

      // mobile tab
      const tab = document.createElement('span');
      tab.className = 'mobile-tab' + (item.id === activeSection ? ' active' : '');
      tab.dataset.section = item.id;
      tab.textContent = item.label;
      tab.addEventListener('click', () => navigate(item.id));
      tabs.appendChild(tab);
    }
    sidebar.appendChild(div);
  }
}

function navigate(id) {
  activeSection = id;
  document.querySelectorAll('.sidebar-item').forEach(b => {
    b.classList.toggle('active', b.dataset.section === id);
  });
  document.querySelectorAll('.mobile-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.section === id);
  });
  document.querySelectorAll('.section').forEach(s => {
    s.classList.toggle('active', s.id === 'sec-' + id);
  });
  // scroll mobile tab into view
  const activeTab = document.querySelector(`.mobile-tab[data-section="${id}"]`);
  if (activeTab) activeTab.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
  // load section data
  const loader = sectionLoaders[id];
  if (loader) loader();
}

/* ── Telegram linking ─────────────────────────────────────── */
let _tgPoll = null;
function stopTgPoll() { if (_tgPoll) { clearInterval(_tgPoll); _tgPoll = null; } }

function renderTgStatus(tid) {
  const statusEl = document.getElementById('tg-status');
  const connectBtn = document.getElementById('tg-connect-btn');
  const unlinkBtn = document.getElementById('tg-unlink-btn');
  if (tid) {
    statusEl.innerHTML = `<div class="row-info"><div class="row-label">✅ Connected</div><div class="row-sub">Telegram ID ${tid}</div></div>`;
    connectBtn.textContent = 'Reconnect';
    unlinkBtn.style.display = '';
  } else {
    statusEl.innerHTML = `<div class="row-info"><div class="row-label">Not connected</div><div class="row-sub">Messaging Zoe on Telegram is treated as a guest until you connect.</div></div>`;
    connectBtn.textContent = 'Connect Telegram';
    unlinkBtn.style.display = 'none';
  }
}

async function loadTelegram() {
  stopTgPoll();
  try {
    const r = await apiCall('GET', '/api/user/profile/telegram');
    renderTgStatus(r.telegram_id);
  } catch (e) {
    document.getElementById('tg-status').innerHTML =
      `<div class="row-info"><div class="row-label">Couldn't load status</div><div class="row-sub">${e.message}</div></div>`;
  }
}

async function startTelegramLink() {
  const area = document.getElementById('tg-link-area');
  const qr = document.getElementById('tg-qr');
  const deeplink = document.getElementById('tg-deeplink');
  const hint = document.getElementById('tg-link-hint');
  try {
    const r = await apiCall('POST', '/api/user/profile/telegram/link-token');
    if (r.bot_username) { const bn = document.getElementById('tg-botname'); if (bn) bn.textContent = r.bot_username; }
    if (r.qr_svg) { qr.innerHTML = r.qr_svg; qr.style.display = 'inline-block'; } else { qr.style.display = 'none'; }
    if (r.deep_link) {
      deeplink.href = r.deep_link; deeplink.style.display = ''; hint.textContent = '';
    } else {
      deeplink.style.display = 'none';
      hint.textContent = 'The Telegram bot is still starting up — use “Link manually” below for now.';
    }
    area.style.display = '';
    // Poll for the link to complete (bot redeems the token when the user sends /start).
    stopTgPoll();
    let tries = 0;
    _tgPoll = setInterval(async () => {
      if (++tries > 60) return stopTgPoll(); // ~5 minutes, then give up quietly
      try {
        const s = await apiCall('GET', '/api/user/profile/telegram');
        if (s.telegram_id) {
          stopTgPoll();
          area.style.display = 'none';
          renderTgStatus(s.telegram_id);
          toast('Telegram connected 🎉', 'success');
        }
      } catch {}
    }, 5000);
  } catch (e) {
    toast(e.message || 'Could not start linking', 'error');
  }
}

async function setTelegramManual() {
  const v = (document.getElementById('tg-manual-id').value || '').trim();
  if (!v) return;
  try {
    const r = await apiCall('PUT', '/api/user/profile/telegram', { telegram_id: v });
    stopTgPoll();
    document.getElementById('tg-link-area').style.display = 'none';
    renderTgStatus(r.telegram_id);
    toast('Telegram linked', 'success');
  } catch (e) { toast(e.message || 'Invalid Telegram ID', 'error'); }
}

async function unlinkTelegram() {
  try {
    await apiCall('PUT', '/api/user/profile/telegram', { telegram_id: null });
    stopTgPoll();
    document.getElementById('tg-link-area').style.display = 'none';
    renderTgStatus(null);
    toast('Telegram disconnected', 'info');
  } catch (e) { toast(e.message, 'error'); }
}

  try {
    const u = await apiCall('GET', '/api/auth/profile');
    currentUser = u;
    document.getElementById('profile-avatar').textContent = (u.username || '?')[0].toUpperCase();
    document.getElementById('profile-name').textContent = u.username;
    document.getElementById('profile-meta').textContent = u.email + ' · ' + u.role;
    document.getElementById('prof-username').value = u.username;
    document.getElementById('prof-email').value = u.email;
    document.getElementById('prof-role').value = u.role;
    document.getElementById('prof-created').value = u.created_at ? new Date(u.created_at).toLocaleDateString() : '—';
    updateTopbarUser(u);
  } catch (e) {
    toast('Failed to load profile: ' + e.message, 'error');
  }
}

function updateTopbarUser(u) {
  document.getElementById('topbar-avatar').textContent = (u.username || '?')[0].toUpperCase();
  document.getElementById('topbar-username').textContent = u.username;
}

/* ── Password ─────────────────────────────────────────────── */
async function changePassword() {
  const cur = document.getElementById('pw-current').value;
  const nw = document.getElementById('pw-new').value;
  const cf = document.getElementById('pw-confirm').value;
  if (!cur || !nw) return toast('Fill in all fields', 'error');
  if (nw !== cf) return toast('New passwords do not match', 'error');
  if (nw.length < 8) return toast('Password must be at least 8 characters', 'error');
  try {
    await apiCall('POST', '/api/auth/password/change', { current_password: cur, new_password: nw });
    toast('Password updated', 'success');
    document.getElementById('pw-current').value = '';
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ── PIN ──────────────────────────────────────────────────── */
async function loadPIN() {
  try {
    const info = await apiCall('GET', '/api/auth/passcode/status');
    const has = info.has_passcode;
    document.getElementById('pin-status-text').textContent = has ? 'PIN is enabled' : 'No PIN set';
    const action = document.getElementById('pin-action');
    if (has) {
      action.innerHTML = `
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="togglePINForm(true)">Change</button>
          <button class="btn btn-danger btn-sm" onclick="removePIN()">Remove</button>
        </div>`;
    } else {
      action.innerHTML = `<button class="btn btn-primary btn-sm" onclick="togglePINForm(true)">Set PIN</button>`;
    }
  } catch (e) {
    document.getElementById('pin-status-text').textContent = 'Could not load';
  }
}

function togglePINForm(show) {
  document.getElementById('pin-setup-form').style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('pin-new').value = '';
    document.getElementById('pin-confirm').value = '';
    document.getElementById('pin-new').focus();
  }
}

async function savePIN() {
  const pin = document.getElementById('pin-new').value;
  const cf = document.getElementById('pin-confirm').value;
  if (!pin) return toast('Enter a PIN', 'error');
  if (!/^\d{4,8}$/.test(pin)) return toast('PIN must be 4–8 digits', 'error');
  if (pin !== cf) return toast('PINs do not match', 'error');
  try {
    await apiCall('POST', '/api/auth/passcode/setup', { passcode: pin });
    toast('PIN saved', 'success');
    togglePINForm(false);
    loadPIN();
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function removePIN() {
  if (!confirm('Remove your PIN?')) return;
  try {
    await apiCall('DELETE', '/api/auth/passcode');
    toast('PIN removed', 'success');
    loadPIN();
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ── Sessions ─────────────────────────────────────────────── */
async function loadSessions() {
  const el = document.getElementById('sessions-list');
  try {
    const data = await apiCall('GET', '/api/auth/sessions');
    const sessions = data.sessions || [];
    if (!sessions.length) {
      el.innerHTML = '<div class="empty">No sessions found</div>';
      return;
    }
    el.innerHTML = sessions.map(s => {
      const ua = (s.device_info && s.device_info.user_agent) || s.auth_method || 'Unknown device';
      const t = s.last_activity ? new Date(s.last_activity).toLocaleString() : '—';
      const cur = s.is_current ? '<span class="session-current">Current session</span>' : '';
      return `<div class="session-item">
        <div>
          <div class="session-device">${escHtml(ua.substring(0, 60))}${ua.length > 60 ? '…' : ''}</div>
          <div class="session-meta">Last active: ${t} &nbsp; ${cur}</div>
        </div>
        ${s.is_current ? '' : `<button class="btn btn-danger btn-sm" onclick="revokeSession('${s.session_id}')">Revoke</button>`}
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty">Failed to load sessions</div>`;
  }
}

async function revokeSession(id) {
  try {
    await apiCall('DELETE', `/api/auth/sessions/${id}`);
    toast('Session revoked', 'success');
    loadSessions();
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function revokeAllSessions() {
  if (!confirm('Sign out all other sessions?')) return;
  try {
    await apiCall('POST', '/api/auth/logout/all');
    toast('All other sessions signed out', 'success');
    loadSessions();
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ── Theme ────────────────────────────────────────────────── */
function loadTheme() {
  const theme = localStorage.getItem('zoe_theme') || 'dark';
  document.querySelectorAll('.theme-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.theme === theme);
  });
  const accent = localStorage.getItem('zoe_accent') || '#6c63ff';
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === accent);
  });
}

function setTheme(t) {
  localStorage.setItem('zoe_theme', t);
  const h = new Date().getHours();
  const dark = t === 'dark' || (t === 'auto' && (h < 7 || h >= 19));
  document.documentElement.classList.toggle('light-mode', !dark);
  loadTheme();
  toast('Theme updated', 'success');
}

function setAccent(color) {
  localStorage.setItem('zoe_accent', color);
  document.documentElement.style.setProperty('--accent', color);
  loadTheme();
}

/* ── Voice ────────────────────────────────────────────────── */
/* The enroll endpoint (POST /api/voice/enroll) takes JSON
   {"audio_base64": <16-bit PCM WAV>, "consent": bool} — resemblyzer
   server-side needs real WAV, so we capture PCM via WebAudio and build
   the WAV in the browser instead of MediaRecorder's webm/opus. */
let enrollStream = null;
let enrollCtx = null;
let enrollProc = null;
let enrollBuffers = [];
let enrollSampleRate = 16000;
let isRecording = false;
let enrollSamples = 0;

function resampleLinear(float32Chunks, fromRate, toRate) {
  let length = 0;
  for (const c of float32Chunks) length += c.length;
  const src = new Float32Array(length);
  let off = 0;
  for (const c of float32Chunks) { src.set(c, off); off += c.length; }
  if (fromRate === toRate) return src;
  const outLen = Math.floor(src.length * toRate / fromRate);
  const out = new Float32Array(outLen);
  const ratio = fromRate / toRate;
  for (let i = 0; i < outLen; i++) {
    const pos = i * ratio;
    const i0 = Math.floor(pos);
    const i1 = Math.min(i0 + 1, src.length - 1);
    out[i] = src[i0] + (src[i1] - src[i0]) * (pos - i0);
  }
  return out;
}

function encodeWav(float32Chunks, sampleRate) {
  /* Downsample to 16 kHz before encoding: browsers capture at 44.1/48 kHz,
     which would push a 10s enrollment past nginx's 1 MB default body limit.
     Resemblyzer resamples to 16 kHz server-side anyway — no fidelity lost. */
  const targetRate = 16000;
  const mono = resampleLinear(float32Chunks, sampleRate, targetRate);
  sampleRate = targetRate;
  const pcm = new Int16Array(mono.length);
  for (let i = 0; i < mono.length; i++) {
    const s = Math.max(-1, Math.min(1, mono[i]));
    pcm[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }
  const buf = new ArrayBuffer(44 + pcm.length * 2);
  const v = new DataView(buf);
  const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF'); v.setUint32(4, 36 + pcm.length * 2, true); writeStr(8, 'WAVE');
  writeStr(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * 2, true);
  v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  writeStr(36, 'data'); v.setUint32(40, pcm.length * 2, true);
  new Int16Array(buf, 44).set(pcm);
  let bin = '';
  const bytes = new Uint8Array(buf);
  for (let i = 0; i < bytes.length; i += 0x8000) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  }
  return btoa(bin);
}

async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  if (!document.getElementById('enroll-consent').checked) {
    toast('Please tick the consent box first', 'error');
    document.getElementById('enroll-status').textContent = 'Consent is required to enroll';
    return;
  }
  try {
    enrollStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    enrollCtx = new (window.AudioContext || window.webkitAudioContext)();
    enrollSampleRate = enrollCtx.sampleRate;
    const source = enrollCtx.createMediaStreamSource(enrollStream);
    enrollBuffers = [];
    enrollProc = enrollCtx.createScriptProcessor(4096, 1, 1);
    enrollProc.onaudioprocess = e => {
      if (isRecording) enrollBuffers.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };
    source.connect(enrollProc);
    enrollProc.connect(enrollCtx.destination);
    isRecording = true;
    document.getElementById('record-btn').classList.add('recording');
    document.getElementById('record-btn').textContent = '⏹';
    document.getElementById('enroll-status').textContent = 'Recording… speak naturally for 5–10 seconds';
  } catch (e) {
    toast('Microphone access denied', 'error');
  }
}

function stopRecording() {
  isRecording = false;
  try {
    if (enrollProc) enrollProc.disconnect();
    if (enrollStream) enrollStream.getTracks().forEach(t => t.stop());
    if (enrollCtx) enrollCtx.close();
  } catch (e) { /* teardown is best-effort */ }
  document.getElementById('record-btn').classList.remove('recording');
  document.getElementById('record-btn').textContent = '🎙️';
  document.getElementById('enroll-status').textContent = 'Processing…';
  uploadEnrollment();
}

async function uploadEnrollment() {
  if (!enrollBuffers.length) {
    document.getElementById('enroll-status').textContent = 'No audio captured — please try again';
    return;
  }
  const audioBase64 = encodeWav(enrollBuffers, enrollSampleRate);
  enrollBuffers = [];
  enrollSamples++;
  try {
    const r = await fetch('/api/voice/enroll', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Session-ID': SESSION_ID || '' },
      body: JSON.stringify({
        audio_base64: audioBase64,
        consent: document.getElementById('enroll-consent').checked,
      }),
    });
    if (!r.ok) throw new Error('Enroll failed');
    const data = await r.json();
    document.getElementById('enroll-status').textContent =
      data.message || `Sample ${enrollSamples} enrolled. ${enrollSamples < 3 ? 'Record again for better accuracy.' : 'Done!'}`;
    if (data.complete || enrollSamples >= 3) {
      enrollSamples = 0;
      loadVoiceProfiles();
    }
    toast('Voice sample uploaded', 'success');
  } catch (e) {
    toast('Enrollment failed: ' + e.message, 'error');
    document.getElementById('enroll-status').textContent = 'Failed — please try again';
  }
}

/* ── Push notifications ───────────────────────────────────── */
let pushSubscription = null;

async function loadPush() {
  const supported = 'serviceWorker' in navigator && 'PushManager' in window;
  document.getElementById('push-browser-status').textContent =
    supported ? 'Browser supports push notifications' : 'Push not supported in this browser';

  if (!supported) {
    document.getElementById('push-toggle-btn').disabled = true;
    document.getElementById('push-status-text').textContent = 'Not supported';
    return;
  }

  try {
    const reg = await navigator.serviceWorker.ready;
    pushSubscription = await reg.pushManager.getSubscription();
    updatePushUI();
  } catch (e) {
    document.getElementById('push-status-text').textContent = 'Service worker not available';
    document.getElementById('push-toggle-btn').disabled = true;
  }
}

function updatePushUI() {
  const subscribed = !!pushSubscription;
  document.getElementById('push-status-text').textContent =
    subscribed ? 'Subscribed — notifications enabled' : 'Not subscribed';
  const btn = document.getElementById('push-toggle-btn');
  btn.textContent = subscribed ? 'Disable' : 'Enable';
  btn.className = subscribed ? 'btn btn-danger' : 'btn btn-primary';
}

async function togglePush() {
  if (pushSubscription) {
    await unsubscribePush();
  } else {
    await subscribePush();
  }
}

async function subscribePush() {
  try {
    const { public_key } = await apiCall('GET', '/api/push/vapid-public-key');
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(public_key),
    });
    pushSubscription = sub;
    await apiCall('POST', '/api/push/subscribe', { subscription: sub.toJSON() });
    updatePushUI();
    toast('Push notifications enabled', 'success');
  } catch (e) {
    toast('Could not enable push: ' + e.message, 'error');
  }
}

async function unsubscribePush() {
  try {
    const endpoint = pushSubscription.endpoint;
    await pushSubscription.unsubscribe();
    pushSubscription = null;
    await apiCall('DELETE', '/api/push/subscribe', { endpoint });
    updatePushUI();
    toast('Push notifications disabled', 'success');
  } catch (e) {
    toast('Could not disable push: ' + e.message, 'error');
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return new Uint8Array([...raw].map(c => c.charCodeAt(0)));
}

          <div class="schedule-time">${new Date(r.send_at).toLocaleString()}</div>

async function createUser() {
  const username = document.getElementById('new-user-username').value.trim();
  const email = document.getElementById('new-user-email').value.trim();
  const password = document.getElementById('new-user-password').value;
  const role = document.getElementById('new-user-role').value;
  if (!username || !email || !password) return toast('Fill in all fields', 'error');
  try {
    await apiCall('POST', '/api/admin/users', { username, email, password, role });
    toast('User created', 'success');
    closeModal('modal-new-user');
    loadUsers();
  } catch (e) {
    toast(e.message, 'error');
  }
}

function openEditUser(u) {
  document.getElementById('edit-user-id').value = u.user_id;
  document.getElementById('edit-user-email').value = u.email;
  document.getElementById('edit-user-role').value = u.role;
  document.getElementById('edit-user-active').value = u.is_active ? 'true' : 'false';
  openModal('modal-edit-user');
}

async function saveUser() {
  const id = document.getElementById('edit-user-id').value;
  try {
    await apiCall('PUT', `/api/admin/users/${id}`, {
      email: document.getElementById('edit-user-email').value,
      role: document.getElementById('edit-user-role').value,
      is_active: document.getElementById('edit-user-active').value === 'true',
    });
    toast('User updated', 'success');
    closeModal('modal-edit-user');
    loadUsers();
  } catch (e) {
    toast(e.message, 'error');
  }
}

function openResetPw(userId) {
  document.getElementById('reset-pw-user-id').value = userId;
  document.getElementById('reset-pw-new').value = '';
  openModal('modal-reset-pw');
}

async function doResetPassword() {
  const id = document.getElementById('reset-pw-user-id').value;
  const pw = document.getElementById('reset-pw-new').value;
  if (!pw || pw.length < 8) return toast('Password must be 8+ characters', 'error');
  try {
    await apiCall('POST', `/api/admin/users/${id}/reset-password`, { new_password: pw });
    toast('Password reset', 'success');
    closeModal('modal-reset-pw');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function deleteUser(id, name) {
  if (!confirm(`Permanently delete user "${name}"?`)) return;
  try {
    await apiCall('DELETE', `/api/admin/users/${id}`);
    toast('User deleted', 'success');
    loadUsers();
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ── Admin: System info ───────────────────────────────────── */
async function loadSystemInfo() {
  const card = document.getElementById('system-info-card');
  try {
    const [platform, status] = await Promise.all([
      apiCall('GET', '/api/system/platform').catch(() => null),
      apiCall('GET', '/api/system/status').catch(() => null),
    ]);
    const rows = [];
    if (platform) {
      rows.push(['Platform', platform.platform || '—']);
      rows.push(['Architecture', platform.arch || '—']);
      rows.push(['Python', platform.python_version || '—']);
    }
    if (status) {
      rows.push(['Uptime', status.uptime || '—']);
      rows.push(['LLM endpoint', status.llm_endpoint || '—']);
      rows.push(['LLM status', status.llm_status || '—']);
      if (status.memory_mb) rows.push(['Memory', Math.round(status.memory_mb) + ' MB']);
    }
    if (!rows.length) {
      card.innerHTML = '<div class="empty">No system info available</div>';
      return;
    }
    card.innerHTML = rows.map(([k, v]) => `
      <div class="row">
        <div class="row-info"><div class="row-label">${escHtml(k)}</div></div>
        <div style="color:var(--text2);font-size:14px;font-family:monospace;">${escHtml(String(v))}</div>
      </div>`).join('');
  } catch (e) {
    card.innerHTML = `<div class="empty">Failed to load: ${e.message}</div>`;
  }
}

/* ── Admin: AI Models ─────────────────────────────────────── */
let hermesProfiles = [];

function parseFallbacks(value) {
  return (value || '').split('\n').map(line => line.trim()).filter(Boolean).map(line => {
    const idx = line.indexOf(':');
    if (idx <= 0) throw new Error('Fallbacks must use provider:model, one per line');
    return { provider: line.slice(0, idx).trim(), model: line.slice(idx + 1).trim() };
  });
}

function collectHermesProfiles() {
  return hermesProfiles.map(p => ({
    name: p.name,
    provider: document.getElementById(`hm-provider-${p.name}`)?.value.trim() || '',
    model: document.getElementById(`hm-model-${p.name}`)?.value.trim() || '',
    context_length: p.context_length || undefined,
    fallbacks: parseFallbacks(document.getElementById(`hm-fallbacks-${p.name}`)?.value || ''),
  }));
}

function renderHermesProfiles(data) {
  hermesProfiles = data.profiles || [];
  const card = document.getElementById('ai-models-card');
  if (!hermesProfiles.length) {
    card.innerHTML = '<div class="empty">No Hermes profiles found</div>';
    return;
  }
  const running = data.running_workers || 0;
  card.innerHTML = `
    <div class="row">
      <div class="row-info">
        <div class="row-label">Hermes profile state</div>
        <div class="row-sub">${running} Kanban worker(s) running. Use Apply After Drain unless urgent.</div>
      </div>
    </div>
    ${hermesProfiles.map(p => `
      <div class="card-header">${escHtml(p.name)}</div>
      <div class="field">
        <label>Provider</label>
        <input id="hm-provider-${p.name}" value="${escHtml(p.provider)}" placeholder="openrouter">
      </div>
      <div class="field">
        <label>Model</label>
        <input id="hm-model-${p.name}" value="${escHtml(p.model)}" placeholder="provider/model">
      </div>
      <div class="field">
        <label>Fallbacks (provider:model, one per line)</label>
        <textarea id="hm-fallbacks-${p.name}" rows="4">${escHtml((p.fallbacks || []).map(f => `${f.provider}:${f.model}`).join('\n'))}</textarea>
        <div class="field-hint">Allowed providers: openai-codex, openrouter, local. API keys are not accepted here.</div>
      </div>
    `).join('')}
    <div style="padding:14px 18px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-ghost" onclick="validateHermesProfiles()">Validate</button>
      <button class="btn btn-primary" onclick="saveHermesProfileDraft()">Save Draft</button>
      <button class="btn btn-primary" onclick="applyHermesProfiles(false)">Apply After Drain</button>
      <button class="btn btn-danger" onclick="applyHermesProfiles(true)">Apply + Restart After Drain</button>
      <button class="btn btn-ghost" onclick="rollbackHermesProfiles()">Roll Back Latest</button>
    </div>
  `;
}

async function loadHermesModelProfiles() {
  const card = document.getElementById('ai-models-card');
  const diffEl = document.getElementById('ai-models-diff');
  if (diffEl) diffEl.textContent = '';
  try {
    const data = await apiCall('GET', '/api/system/hermes/model-profiles');
    renderHermesProfiles(data);
  } catch (e) {
    card.innerHTML = `<div class="empty">Failed to load Hermes profiles: ${escHtml(e.message)}</div>`;
  }
}

async function validateHermesProfiles() {
  try {
    const profiles = collectHermesProfiles();
    const confirm_paid_auto = profiles.some(p => [p.model, ...p.fallbacks.map(f => f.model)].includes('openrouter/auto'));
    const data = await apiCall('POST', '/api/system/hermes/model-profiles/validate', { profiles, confirm_paid_auto });
    document.getElementById('ai-models-diff').textContent = Object.values(data.diffs || {}).join('\n');
    toast('Hermes profiles validated', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function saveHermesProfileDraft() {
  try {
    const profiles = collectHermesProfiles();
    const confirm_paid_auto = profiles.some(p => [p.model, ...p.fallbacks.map(f => f.model)].includes('openrouter/auto'));
    const data = await apiCall('PUT', '/api/system/hermes/model-profiles/draft', { profiles, confirm_paid_auto });
    document.getElementById('ai-models-diff').textContent = Object.values(data.diffs || {}).join('\n');
    toast('Draft saved', 'success');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function applyHermesProfiles(forceRestart) {
  try {
    const profiles = collectHermesProfiles();
    const paidAuto = profiles.some(p => [p.model, ...p.fallbacks.map(f => f.model)].includes('openrouter/auto'));
    if (paidAuto && !confirm('OpenRouter Auto can spend real money. Continue?')) return;
    const restart = !!forceRestart;
    if (restart && !confirm('Restart Hermes after applying profiles? This will fail if Kanban workers are still running.')) return;
    const data = await apiCall('POST', '/api/system/hermes/model-profiles/apply', {
      profiles,
      confirm_paid_auto: paidAuto,
      restart,
      force_restart: false,
    });
    if (data.restart && data.restart.returncode !== 0) {
      toast('Profiles applied, but Hermes restart failed: ' + (data.restart.stderr || 'unknown error'), 'error');
    } else {
      toast(restart ? 'Hermes profiles applied and restart requested' : 'Hermes profiles applied', 'success');
    }
    loadHermesModelProfiles();
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function rollbackHermesProfiles() {
  if (!confirm('Roll back to latest Hermes profile backup?')) return;
  try {
    await apiCall('POST', '/api/system/hermes/model-profiles/rollback', {});
    toast('Rollback complete', 'success');
    loadHermesModelProfiles();
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ── Music ────────────────────────────────────────────────── */

  window.open(url, '_blank', 'width=900,height=700,noopener');
}

  const providersList = document.getElementById('music-providers-list');

  try {

        <span style="color:var(--text2);font-size:14px;">${escHtml(data.version)}</span>
      </div>` : ''}
      <div class="row">
        <div class="row-info"><div class="row-label">Players</div></div>
        <span style="color:var(--text2);font-size:14px;">${data.players ?? 0}</span>
      </div>
      <div class="row">
        <div class="row-info"><div class="row-label">Providers</div></div>

            <button class="btn btn-primary btn-sm" onclick="openMASetup()">Connect services</button>
          </div>
        </div>`;
    } else {
      providersList.innerHTML = providers.map(p => {
        const name = escHtml(p.name || p.domain || p.id || 'Unknown');

          <div class="row-info">
            <div class="row-label">${name}</div>
            ${domain ? `<div class="row-sub">${domain}</div>` : ''}

/* ── Evolution Proposals ─────────────────────────────────── */
async function loadEvolutionProposals() {
  const pendingEl = document.getElementById('evo-proposals-list');
  const allEl = document.getElementById('evo-all-proposals-list');

  const TYPE_LABELS = {
    intent_gap: 'Intent gap',
    agent_health: 'Agent health',
    user_frustration: 'User frustration',
    charter_gap: 'Charter gap',
  };
  const STATUS_COLORS = {
    pending: '#f59e0b',
    approved: '#3b82f6',
    deployed: '#8b5cf6',
    validated: '#22c55e',
    failed: '#ef4444',
    rejected: '#6b7280',
  };

  function renderProposalRow(p, actions = false) {
    const typeLabel = TYPE_LABELS[p.type] || p.type || '';
    const statusColor = STATUS_COLORS[p.status] || '#888';
    const title = escHtml((p.title || '').substring(0, 80));
    const desc = escHtml((p.description || '').substring(0, 120));
    const actionsHtml = actions ? `
      <div style="display:flex;gap:6px;margin-top:8px;">
        <button class="btn btn-primary btn-sm" onclick="evoApprove('${p.id}')">Approve</button>
        <button class="btn btn-ghost btn-sm" onclick="evoDeferProposal('${p.id}')">Defer</button>
        <button class="btn btn-ghost btn-sm" style="color:#ef4444;" onclick="evoReject('${p.id}')">Reject</button>
      </div>` : '';
    return `
      <div class="row" style="flex-direction:column;align-items:flex-start;gap:4px;padding:12px;">
        <div style="display:flex;align-items:center;gap:8px;width:100%;">
          <span style="font-size:13px;font-weight:600;flex:1;">${title}</span>
          <span style="font-size:11px;color:${statusColor};font-weight:600;">${escHtml(p.status || '')}</span>
        </div>
        ${desc ? `<div style="font-size:12px;color:var(--text2);">${desc}</div>` : ''}
        <div style="font-size:11px;color:#888;">${typeLabel}</div>
        ${actionsHtml}
      </div>`;
  }

  try {
    const data = await apiCall('GET', '/api/agent/evolution/proposals');
    const proposals = Array.isArray(data.proposals) ? data.proposals : (Array.isArray(data) ? data : []);

    const pending = proposals.filter(p => p.status === 'pending');
    const rest = proposals.filter(p => p.status !== 'pending').slice(0, 10);

    if (pendingEl) {
      pendingEl.innerHTML = pending.length
        ? pending.map(p => renderProposalRow(p, true)).join('')
        : '<div class="empty">No pending proposals — all caught up!</div>';
    }
    if (allEl) {
      allEl.innerHTML = rest.length
        ? rest.map(p => renderProposalRow(p, false)).join('')
        : '<div class="empty">No proposals yet.</div>';
    }
  } catch (e) {
    if (pendingEl) pendingEl.innerHTML = `<div class="empty">Failed to load: ${escHtml(e.message)}</div>`;
    if (allEl) allEl.innerHTML = '';
  }
}

async function evoApprove(proposalId) {
  try {
    await apiCall('POST', `/api/agent/evolution/proposals/${proposalId}/action`, { action: 'approve' });
    toast('Proposal approved — queued for implementation', 'success');
    loadEvolutionProposals();
  } catch (e) { toast('Failed to approve: ' + e.message, 'error'); }
}

async function evoDeferProposal(proposalId) {
  try {
    await apiCall('POST', `/api/agent/evolution/proposals/${proposalId}/action`, { action: 'defer' });
    toast('Proposal deferred 7 days', 'info');
    loadEvolutionProposals();
  } catch (e) { toast('Failed to defer: ' + e.message, 'error'); }
}

async function evoReject(proposalId) {
  try {
    await apiCall('POST', `/api/agent/evolution/proposals/${proposalId}/action`, { action: 'reject' });
    toast('Proposal rejected', 'info');
    loadEvolutionProposals();
  } catch (e) { toast('Failed to reject: ' + e.message, 'error'); }
}

/* ── Touch Panels ─────────────────────────────────────────── */
async function loadTouchPanels() {
  const listEl = document.getElementById('panels-list');
  if (!listEl) return;
  listEl.innerHTML = '<div class="empty"><span class="spinner"></span></div>';
  try {
    const data = await apiCall('GET', '/api/panels');
    const panels = data.panels || [];
    if (!panels.length) {
      listEl.innerHTML = '<div class="empty">No panels registered yet. Power on a new panel to start the first-boot setup.</div>';
      return;
    }
    listEl.innerHTML = panels.map(p => {
      const dot = p.is_active ? '🟢' : '🔴';
      const ip = escHtml(p.ip_address || 'unknown IP');
      const loc = p.location ? ` · ${escHtml(p.location)}` : '';
      const last = p.last_seen_at ? new Date(p.last_seen_at).toLocaleString() : 'never';
      return `<div class="row" style="flex-wrap:wrap;gap:8px;">
        <div class="row-info" style="flex:1;min-width:180px;">
          <div class="row-label">${dot} ${escHtml(p.name || p.panel_id)}</div>
          <div class="row-sub"><code>${escHtml(p.panel_id)}</code>${loc} · ${ip} · last seen ${last}</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          <button class="btn btn-ghost btn-sm" onclick="panelSSHTest('${escHtml(p.panel_id)}')">SSH Test</button>
          <button class="btn btn-ghost btn-sm" onclick="panelRestart('${escHtml(p.panel_id)}')">Restart Kiosk</button>
          <button class="btn btn-ghost btn-sm" onclick="panelLogs('${escHtml(p.panel_id)}')">Logs</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    listEl.innerHTML = `<div class="empty" style="color:#ef4444;">Failed to load panels: ${escHtml(e.message)}</div>`;
  }
}

async function panelSSHTest(panelId) {
  try {
    toast(`Testing SSH on ${panelId}…`, 'info');
    const data = await apiCall('GET', `/api/panels/${encodeURIComponent(panelId)}/status`);
    const ok = data.ssh_reachable;
    toast(`SSH to ${panelId}: ${ok ? '✅ reachable' : '❌ unreachable'}`, ok ? 'success' : 'error');
  } catch (e) { toast('SSH test failed: ' + e.message, 'error'); }
}

async function panelRestart(panelId) {
  if (!confirm(`Restart the kiosk service on ${panelId}?`)) return;
  try {
    toast(`Restarting kiosk on ${panelId}…`, 'info');
    await apiCall('POST', '/api/tools/call', { name: 'panel_ssh_exec', arguments: { panel_id: panelId, command: 'sudo systemctl restart zoe-kiosk' } });
    toast('Kiosk restarted', 'success');
  } catch (e) { toast('Restart failed: ' + e.message, 'error'); }
}

async function panelLogs(panelId) {
  try {
    toast(`Fetching logs from ${panelId}…`, 'info');
    const r = await apiCall('POST', '/api/tools/call', { name: 'panel_ssh_exec', arguments: { panel_id: panelId, command: 'journalctl -u zoe-kiosk -n 40 --no-pager' } });
    const logs = (r.result && r.result.stdout) || JSON.stringify(r);
    alert(`Logs from ${panelId}:\n\n${logs.substring(0, 3000)}`);
  } catch (e) { toast('Failed to fetch logs: ' + e.message, 'error'); }
}

async function confirmPanelCode() {
  const input = document.getElementById('panel-code-input');
  const msgEl = document.getElementById('panel-code-msg');
  const code = (input.value || '').trim().toUpperCase();
  if (code.length !== 6) { msgEl.textContent = 'Enter a 6-character code'; return; }
  msgEl.textContent = 'Looking up…';
  try {
    const pub = await apiCall('GET', `/api/panels/provision/${encodeURIComponent(code)}/public`);
    if (pub.status === 'expired') { msgEl.textContent = '⚠️ Code has expired — the panel will generate a new one.'; return; }
    if (pub.status === 'confirmed') { msgEl.textContent = '✅ Already confirmed!'; return; }
    window.open(`/touch/pair.html?code=${encodeURIComponent(code)}`, '_blank');
    msgEl.textContent = '✅ Pairing page opened — confirm in the new tab.';
  } catch (e) { msgEl.textContent = '❌ ' + e.message; }
}

/* ── Modal helpers ────────────────────────────────────────── */
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

/* ── Utility ──────────────────────────────────────────────── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Init ─────────────────────────────────────────────────── */
async function init() {
  SESSION_ID = getSessionId();
  if (!SESSION_ID) {
    location.href = '/';
    return;
  }

  // Load basic user info for nav rendering
  try {
    currentUser = await apiCall('GET', '/api/auth/user');
    updateTopbarUser(currentUser);
  } catch {
    location.href = '/';
    return;
  }

  buildNav();
  buildSections();

  // Re-attach modal close handlers (sections are newly rendered)
  document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });

  // Parse hash for deep-link
  const hash = location.hash.replace('#','');
  const validIds = NAV.flatMap(g => g.items.map(i => i.id));
  if (hash && validIds.includes(hash)) {
    navigate(hash);
  } else {
    navigate('profile');
  }
}

init();
</script>
