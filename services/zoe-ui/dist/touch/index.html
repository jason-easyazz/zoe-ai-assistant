<script>
(function(){
  const key="zoe_session";
  const getSession=()=>{
    const s=localStorage.getItem(key);
    if(!s)return "";
    try{const j=JSON.parse(s);return j.session_id||"";}catch(e){return "";}
  };
  const origFetch=window.fetch;
  window.fetch=function(u,o){o=o||{};o.headers=o.headers||{};const sid=getSession();if(sid){o.headers["X-Session-ID"]=sid;} if(typeof u==="string"){u=u.replace(/[?&]user_id=[^&]*/g,"");} return origFetch(u,o);};
})();
</script>

    <script>
        let userProfiles = [];
        // Per-panel context returned by /api/auth/profiles?panel_id=…
        // Defaults reproduce the pre-panel behaviour: all users + guest tile.
        let panelContext = {
            panel_id: null,
            panel_name: null,
            allow_guest: true,
            default_user_id: null,
        };

        function getPanelId() {
            try {
                const params = new URLSearchParams(window.location.search);
                const fromQuery = params.get('panel_id');
                if (fromQuery && fromQuery.trim()) {
                    const panelId = fromQuery.trim();
                    const generatedAlias = localStorage.getItem('zoe_touch_panel_alias_generated');
                    if (generatedAlias !== panelId) {
                        localStorage.setItem('zoe_panel_id', panelId);
                    }
                    localStorage.setItem('zoe_touch_panel_id', panelId);
                    return panelId;
                }
                return localStorage.getItem('zoe_panel_id')
                    || localStorage.getItem('zoe_touch_panel_id')
                    || null;
            } catch (_) {
                return null;
            }
        }

        async function showProfiles() {
            document.getElementById('profileSelection').classList.add('active');
            await loadUserProfiles();
            const pending = getPendingPanelChallenge();
            if (pending) {
                showAuthSuccess('Finish login to continue your voice request');
            }
        }

        async function loadUserProfiles() {
            const panelId = getPanelId();
            // Reset context each load; panel-aware response will overwrite fields.
            panelContext = { panel_id: panelId, panel_name: null, allow_guest: true, default_user_id: null };

            try {
                const url = panelId
                    ? `/api/auth/profiles?panel_id=${encodeURIComponent(panelId)}`
                    : '/api/auth/profiles';
                const response = await fetch(url);
                if (!response.ok) throw new Error('API returned error');
                const data = await response.json();

                // Two shapes:
                //   array                                   → legacy / unbound
                //   { profiles, default_user_id, allow_guest, panel_name } → panel-aware
                if (Array.isArray(data)) {
                    userProfiles = data;
                } else if (data && Array.isArray(data.profiles)) {
                    userProfiles = data.profiles;
                    panelContext = {
                        panel_id: data.panel_id || panelId,
                        panel_name: data.panel_name || null,
                        allow_guest: data.allow_guest !== false,
                        default_user_id: data.default_user_id || null,
                    };
                } else {
                    userProfiles = [];
                }
                // Cache only the profile list (safe for offline re-render).
                localStorage.setItem('zoe_user_profiles', JSON.stringify(userProfiles));
            } catch (error) {
                console.warn('Could not load profiles from API, using demo/cached profiles');

                const stored = localStorage.getItem('zoe_user_profiles');
                if (stored) {
                    userProfiles = JSON.parse(stored);
                } else {
                    // Fallback to demo profiles for development
                    userProfiles = [
                        { user_id: 'demo_admin', username: 'Admin', role: 'Administrator', avatar: 'A', demo: true },
                        { user_id: 'demo_user',  username: 'User',  role: 'User',          avatar: 'U', demo: true },
                    ];
                    console.info('Using demo profiles - start auth service for full functionality');
                }
            }

            renderProfiles();

            const params = new URLSearchParams(window.location.search);
            const routeUserId = params.get('user_id') || '';
            const pending = getPendingPanelChallenge();
            const preferredUserId = routeUserId
                || (pending && pending.selected_user_id ? pending.selected_user_id : '')
                || panelContext.default_user_id;
            if (preferredUserId) {
                const preferredProfile = userProfiles.find(p => p.user_id === preferredUserId);
                if (preferredProfile) {
                    const avatar = pending && pending.selected_avatar
                        ? pending.selected_avatar
                        : (preferredProfile.avatar || (preferredProfile.username ? preferredProfile.username.charAt(0).toUpperCase() : '?'));
                    selectProfile(preferredProfile.user_id, preferredProfile.username, avatar);
                }
            }
        }

        function renderProfiles() {
            const grid = document.getElementById('profileGrid');

            // Title reflects the panel identity when configured.
            const titleEl = document.getElementById('profileTitle');
            if (titleEl) {
                titleEl.textContent = panelContext.panel_name
                    ? `Who's using the ${panelContext.panel_name}?`
                    : "Who's using Zoe today?";
            }

            const allProfiles = [...userProfiles];
            if (panelContext.allow_guest) {
                allProfiles.push({ user_id: 'guest', username: 'Guest', role: 'guest', avatar: '👤' });
            }

            grid.innerHTML = allProfiles.map(profile => {
                const avatar = profile.avatar || (profile.username ? profile.username.charAt(0).toUpperCase() : '?');
                return `
                <div class="profile-card" onclick="selectProfile('${profile.user_id}', '${profile.username}', '${avatar}')">
                    <div class="profile-avatar">${avatar}</div>
                    <div class="profile-name">${profile.username}</div>
                </div>
                `;
            }).join('');
        }

        function hideProfiles() {
            document.getElementById('profileSelection').classList.remove('active');
            // Reset profile container when hiding
            const profileContainer = document.querySelector('.profile-container');
            profileContainer.classList.remove('auth-active');
            document.getElementById('profileGrid').classList.remove('expanded');
            // Hide auth header and panel
            document.getElementById('authHeader').style.display = 'none';
            document.getElementById('authPanel').classList.remove('show');
            setTimeout(() => {
                document.getElementById('authPanel').style.display = 'none';
            }, 300);
        }

        let selectedUserId = null;
        let selectedUsername = null;
        let currentPin = '';
        let shiftPressed = false;

        function getPendingPanelChallenge() {
            try {
                const raw = sessionStorage.getItem('zoe_panel_auth_challenge');
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                return parsed && (parsed.challenge_id || parsed.selected_user_id) ? parsed : null;
            } catch (_) {
                return null;
            }
        }

        async function resolvePendingPanelChallenge(pinValue) {
            const pending = getPendingPanelChallenge();
            if (!pending || !pending.challenge_id || !pinValue) return true;
            try {
                const payload = {
                    challenge_id: pending.challenge_id,
                    pin: pinValue,
                };
                if (selectedUserId && selectedUserId !== 'guest') {
                    payload.user_id = selectedUserId;
                }
                const r = await fetch('/api/panels/auth/pin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!r.ok) {
                    // Stale or already-processed challenges should not block login.
                    if (r.status === 404 || r.status === 409 || r.status === 410) {
                        sessionStorage.removeItem('zoe_panel_auth_challenge');
                        return true;
                    }
                    return false;
                }
                sessionStorage.removeItem('zoe_panel_auth_challenge');
                return true;
            } catch (_) {
                return false;
            }
        }

        function selectProfile(userId, username, avatar) {
            selectedUserId = userId;
            selectedUsername = username;
            
            // Update profile cards
            document.querySelectorAll('.profile-card').forEach(card => {
                card.classList.remove('selected', 'others-selected');
                if (card.onclick.toString().includes(userId)) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('others-selected'); // Remove others-selected for top layout
                }
            });

            // Animate grid to top layout
            document.getElementById('profileGrid').classList.add('expanded');
            
            // Show auth panel
            const authPanel = document.getElementById('authPanel');
            const selectedAvatar = document.getElementById('selectedUserAvatar');
            const selectedName = document.getElementById('selectedUserName');
            const selectedRole = document.getElementById('selectedUserRole');
            const profileContainer = document.querySelector('.profile-container');
            
            selectedAvatar.textContent = avatar;
            selectedName.textContent = username;
            selectedRole.textContent = userId === 'guest' ? 'Guest User' : 'Administrator';
            
            // Hide profile elements and show auth header and panel
            profileContainer.classList.add('auth-active');
            const authHeader = document.getElementById('authHeader');
            authHeader.style.display = 'flex';
            authPanel.style.display = 'flex';
            setTimeout(() => {
                authPanel.classList.add('show');
            }, 100);

            // Clear previous PIN and hide keyboard
            currentPin = '';
            updatePinDisplay();
            document.getElementById('touchKeyboard').style.display = 'none';
            
            // Show submit button
            document.getElementById('authSubmitBtn').style.display = 'block';
        }

        function switchAuthMode(mode) {
            // Update tabs
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(mode + 'Tab').classList.add('active');

            // Update modes
            document.querySelectorAll('.auth-mode').forEach(modeEl => {
                modeEl.classList.remove('active');
            });
            document.getElementById(mode + 'Mode').classList.add('active');

            // Show/hide password input and PIN display in header
            const passwordContainer = document.getElementById('passwordInputContainer');
            const pinContainer = document.getElementById('pinDisplayContainer');
            
            if (mode === 'password') {
                passwordContainer.style.display = 'flex';
                pinContainer.style.display = 'none';
                document.getElementById('passwordInput').focus();
            } else {
                passwordContainer.style.display = 'none';
                pinContainer.style.display = 'flex';
                // Clear PIN when switching modes
                currentPin = '';
                updatePinDisplay();
            }

            // Show/hide keyboard based on mode
            const keyboard = document.getElementById('touchKeyboard');
            if (mode === 'password') {
                keyboard.style.display = 'block';
            } else {
                keyboard.style.display = 'none';
            }
        }

        // Unified submit function
        function submitAuth() {
            const activeMode = document.querySelector('.auth-tab.active').id.replace('Tab', '');
            if (activeMode === 'passcode') {
                submitPin();
            } else {
                submitPassword();
            }
        }

        function addPin(digit) {
            if (currentPin.length < 6) {
                currentPin += digit;
                updatePinDisplay();
                
                // Auto-submit when PIN is 4-6 digits
                if (currentPin.length >= 4) {
                    setTimeout(() => {
                        if (currentPin.length >= 4) {
                            submitPin();
                        }
                    }, 500);
                }
            }
        }

        function removePin() {
            currentPin = currentPin.slice(0, -1);
            updatePinDisplay();
        }

        function updatePinDisplay() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        async function submitPin() {
            if (currentPin.length < 4 || !selectedUsername) return;

            try {
                if (selectedUserId === 'guest') {
                    // Guest login
                    const response = await fetch('/api/auth/guest', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ device_info: {} })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        handleSuccessfulAuth(data);
                    } else {
                        showAuthError('Guest access failed');
                    }
                } else {
                    // Use the zoe-auth passcode endpoint (Argon2-verified 4-8 digit PIN)
                    const response = await fetch('/api/touch-panel/auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: selectedUsername,
                            passcode: currentPin,
                            device_id: 'touch-panel'
                        })
                    });

                    if (response.ok) {
                        let data = await response.json();
                        // touch-panel/auth can return 200 with success=false.
                        // Fall back to direct passcode login for compatibility.
                        if (!data || !data.success || !data.session_id) {
                            const passFallback = await fetch('/api/auth/login/passcode', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    username: selectedUsername,
                                    user_id: selectedUserId,
                                    passcode: currentPin,
                                    device_info: { source: 'touch-login' }
                                })
                            });
                            if (passFallback.ok) {
                                const fb = await passFallback.json();
                                if (fb && fb.success && fb.session_id) {
                                    data = fb;
                                } else {
                                    showAuthError((fb && fb.error_message) || (data && data.error_message) || 'Invalid PIN');
                                    currentPin = '';
                                    updatePinDisplay();
                                    return;
                                }
                            } else {
                                showAuthError((data && data.error_message) || 'Invalid PIN');
                                currentPin = '';
                                updatePinDisplay();
                                return;
                            }
                        }
                        const challengeOk = await resolvePendingPanelChallenge(currentPin);
                        if (!challengeOk) {
                            // Keep login flow successful even if challenge handoff fails.
                            // Voice replay may be skipped, but the user should still enter.
                            showAuthError('Login worked, but the pending voice request could not be resumed.');
                        }
                        handleSuccessfulAuth(data);
                    } else if (response.status === 401) {
                        showAuthError('Incorrect PIN');
                        currentPin = '';
                        updatePinDisplay();
                    } else {
                        // Fallback: try password login in case passcode not set up yet
                        const fallback = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: selectedUsername,
                                password: currentPin,
                                device_info: {}
                            })
                        });
                        if (fallback.ok) {
                            const data = await fallback.json();
                            handleSuccessfulAuth(data);
                        } else {
                            showAuthError('Invalid PIN');
                            currentPin = '';
                            updatePinDisplay();
                        }
                    }
                }
            } catch (error) {
                showAuthError('Authentication service unavailable. Try again when Zoe auth is online.');
                currentPin = '';
                updatePinDisplay();
            }
        }

        async function submitPassword() {
            const password = document.getElementById('passwordInput').value;
            if (!password || !selectedUsername) return;
            if (getPendingPanelChallenge()) {
                showAuthError('This voice request needs PIN verification. Switch to PIN mode.');
                switchAuthMode('passcode');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: selectedUsername,
                        password: password,
                        device_info: {}
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    handleSuccessfulAuth(data);
                } else {
                    showAuthError('Invalid password');
                }
            } catch (error) {
                showAuthError('Authentication service unavailable. Try again when Zoe auth is online.');
            }
        }

        function handleSuccessfulAuth(data) {
            // Safety check - only store successful logins
            if (!data || !data.success || !data.session_id) {
                console.error('Attempted to store invalid session:', data);
                showAuthError(data?.error_message || 'Login failed - invalid session data');
                currentPin = '';
                return;
            }
            
            localStorage.setItem('zoe_session', JSON.stringify(data));
            
            // Show success and redirect
            const welcomeName =
                data.username
                || (data.user_info && (data.user_info.username || data.user_info.display_name))
                || selectedUsername
                || data.user_id
                || 'there';
            showAuthSuccess(`Welcome, ${welcomeName}!`);
            const params = new URLSearchParams(window.location.search);
            const panelId = params.get('panel_id');
            const withPanelId = (urlPath, pid) => {
                if (!pid) return urlPath;
                try {
                    const u = new URL(urlPath, window.location.origin);
                    if (!u.searchParams.get('panel_id')) {
                        u.searchParams.set('panel_id', pid);
                    }
                    return `${u.pathname}${u.search}${u.hash}`;
                } catch (_) {
                    const join = urlPath.includes('?') ? '&' : '?';
                    return `${urlPath}${join}panel_id=${encodeURIComponent(pid)}`;
                }
            };
            setTimeout(() => {
                // Use stored destination if we were redirected here from a touch page
                let dest = '/touch/home.html';   // new estate is the panel home
                try {
                    const stored = sessionStorage.getItem('zoe_redirect_after_login');
                    if (stored && stored.startsWith('/touch/')) {
                        sessionStorage.removeItem('zoe_redirect_after_login');
                        dest = stored;
                    }
                } catch(_) {}
                window.location.href = withPanelId(dest, panelId);
            }, 1500);
        }

        function showAuthError(message) {
            // Create temporary error message
            const errorEl = document.createElement('div');
            errorEl.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(231, 76, 60, 0.9);
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                z-index: 10000;
                font-weight: 500;
            `;
            errorEl.textContent = message;
            document.body.appendChild(errorEl);
            
            setTimeout(() => errorEl.remove(), 3000);
        }

        function showAuthSuccess(message) {
            const successEl = document.createElement('div');
            successEl.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(46, 204, 113, 0.9);
                color: white;
                padding: 15px 20px;
                border-radius: 8px;
                z-index: 10000;
                font-weight: 500;
            `;
            successEl.textContent = message;
            document.body.appendChild(successEl);
            
            setTimeout(() => successEl.remove(), 3000);
        }

        // Touch Keyboard Functions
        function showTouchKeyboard() {
            // Only show keyboard if we're in password mode
            const passwordMode = document.getElementById('passwordMode');
            if (passwordMode.classList.contains('active')) {
                document.getElementById('touchKeyboard').style.display = 'block';
            }
        }

        function addToPassword(char) {
            const input = document.getElementById('passwordInput');
            if (shiftPressed && char.length === 1) {
                char = char.toUpperCase();
                shiftPressed = false;
                updateShiftState();
            }
            input.value += char;
        }

        function removeFromPassword() {
            const input = document.getElementById('passwordInput');
            input.value = input.value.slice(0, -1);
        }

        function toggleShift() {
            shiftPressed = !shiftPressed;
            updateShiftState();
        }

        function updateShiftState() {
            const shiftBtn = document.querySelector('.key-btn.shift');
            if (shiftPressed) {
                shiftBtn.classList.add('active');
                // Update all letter keys to uppercase
                document.querySelectorAll('.key-btn').forEach(btn => {
                    const text = btn.textContent;
                    if (text.length === 1 && text.match(/[a-z]/)) {
                        btn.textContent = text.toUpperCase();
                    }
                });
            } else {
                shiftBtn.classList.remove('active');
                // Update all letter keys to lowercase
                document.querySelectorAll('.key-btn').forEach(btn => {
                    const text = btn.textContent;
                    if (text.length === 1 && text.match(/[A-Z]/)) {
                        btn.textContent = text.toLowerCase();
                    }
                });
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const autoGuest = params.get('autoguest') === '1';
            if (autoGuest) {
                fetch('/api/auth/guest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_info: { source: 'touch-kiosk-autoguest' } })
                }).then(async (res) => {
                    if (!res.ok) throw new Error('guest auth failed');
                    const data = await res.json();
                    handleSuccessfulAuth(data);
                }).catch(() => {
                    // Fall back to manual profile flow when auth service is unavailable.
                });
            }

            // Check for redirect loops
            const loopDetected = localStorage.getItem('redirect_loop_detected');
            if (loopDetected) {
                console.warn('Redirect loop detected, clearing session');
                localStorage.removeItem('zoe_session');
                localStorage.removeItem('redirect_loop_detected');
                return;
            }
            
            const pendingChallenge = getPendingPanelChallenge();
            if (pendingChallenge || params.get('auth') === 'skybridge' || params.get('user_id')) {
                // Force auth UI when resuming a voice/Skybridge auth handoff; do not auto-redirect.
                showProfiles();
                return;
            }

            // If there's already a session, validate it before redirecting
            const session = localStorage.getItem('zoe_session');
            if (session) {
                try {
                    const sessionData = JSON.parse(session);
                    if (sessionData.user_id && sessionData.expires_at) {
                        const expiresAt = new Date(sessionData.expires_at);
                        const now = new Date();
                        
                        if (now < expiresAt) {
                            // Mark potential loop and redirect
                            localStorage.setItem('redirect_loop_detected', 'true');
                            setTimeout(() => {
                                localStorage.removeItem('redirect_loop_detected');
                            }, 5000); // Clear flag after 5 seconds
                            
                            window.location.href = '/touch/home.html';
                            return;
                        } else {
                            // Session expired
                            localStorage.removeItem('zoe_session');
                        }
                    }
                } catch (error) {
                    localStorage.removeItem('zoe_session');
                }
            }
        });
    </script>
</body>
