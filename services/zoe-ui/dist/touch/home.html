<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zoe</title>
<meta name="theme-color" content="#05070d">
<script>
  /* Auth guard — the estate is the panel home; require a valid session or bounce
     to login. A malformed session counts as no session; carry the panel_id query
     through so the panel keeps its binding after signing in. */
  /* Kiosk bootstrap (was on skybridge.html): persist the kiosk flag so a fresh
     or cleared browser profile keeps kiosk behavior across navigations. */
  (function(){try{var p=new URLSearchParams(location.search);if(p.get('kiosk')==='1')localStorage.setItem('zoe_kiosk','1');
    // Persist the panel_id from the kiosk URL so command context (skybridge/resolve)
    // has it on a fresh profile — otherwise typed commands go out with an empty panel id.
    var pid=p.get('panel_id');if(pid)localStorage.setItem('zoe_panel_id',pid);}catch(e){}})();
  (function(){var ok=false,kiosk=false;try{var s=JSON.parse(localStorage.getItem('zoe_session')||'null');ok=!!(s&&s.session_id);}catch(e){ok=false;}
    try{kiosk=(new URLSearchParams(location.search)).get('kiosk')==='1'||localStorage.getItem('zoe_kiosk')==='1';}catch(e){}
    window.__kiosk=kiosk;
    // Kiosk boots as GUEST into the ambient home (like skybridge did); the
    // who+PIN card is summoned on demand when something personal needs auth.
    window.__needAuth=!ok&&!kiosk;
    // Fresh kiosk profile: provision the guest session the old surface created
    // (fire-and-forget — first loads run loopback-guest, later calls carry it).
    window.__guestBootSettled=!(kiosk&&!ok);   // suppress the kiosk auth card until guest provisioning settles
    if(kiosk&&!ok){try{fetch('/api/auth/guest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({device_info:{source:'estate-kiosk-bootstrap'}})}).then(function(r){return r.ok?r.json():null;}).then(function(d){
      window.__guestBootSettled=true;
      if(d&&d.session_id){try{localStorage.setItem('zoe_session',JSON.stringify(d));localStorage.setItem('zoe_guest_mode','active');
        // one-time reload so the first-paint loads that raced the bootstrap rerun WITH the session
        if(!sessionStorage.getItem('zoe_gb')){sessionStorage.setItem('zoe_gb','1');location.reload();}}catch(e){}}
    }).catch(function(){window.__guestBootSettled=true;});}catch(e){window.__guestBootSettled=true;}}
  })();
</script>
<style>
  :root{
    --ink:#F4F6FA; --ink-soft:rgba(244,246,250,.74); --ink-faint:rgba(244,246,250,.48);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
    --cat-health:#ff7a90; --cat-work:#6aa6ff; --cat-personal:#66d6a3; --cat-family:#f5b13c;
    --line:rgba(255,255,255,.09); --amber:#ffbf5e; --accent:#7b96ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--ink);background:#05070d;overflow:hidden;display:grid;place-items:center;-webkit-font-smoothing:antialiased}
  #stage{position:relative;width:1280px;height:720px;overflow:hidden;transform-origin:center;transition:background 1s ease}
  #pick{display:none!important}
  #cv{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity .6s}
  #cv.on{opacity:1}
  #glow{position:absolute;inset:0;opacity:0;transition:opacity .8s;pointer-events:none}
  #glow.on{opacity:1}
  .vignette{position:absolute;inset:0;background:radial-gradient(130% 110% at 50% 26%,transparent 54%,rgba(0,0,0,.36));pointer-events:none}

  #home{position:absolute;top:38px;left:44px;width:48px;height:48px;display:grid;place-items:center;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#fff;cursor:pointer;z-index:60;transition:opacity .4s}
  #home svg{width:26px;height:26px}
  #home.hide{opacity:0;pointer-events:none}
  #orb{position:absolute;left:44px;bottom:44px;width:68px;height:68px;border-radius:50%;background:radial-gradient(circle at 34% 30%,#a9d4ff,#5b74ff 58%,#7a53ff 100%);box-shadow:0 0 30px rgba(107,138,255,.5),inset 0 2px 8px rgba(255,255,255,.4);z-index:50;animation:breathe 5s ease-in-out infinite;cursor:pointer}
  #orb.hide{opacity:0;pointer-events:none;transition:opacity .4s}
  #orb.busy{animation:breathe 1.1s ease-in-out infinite;box-shadow:0 0 44px rgba(107,138,255,.85),inset 0 2px 8px rgba(255,255,255,.4)}
  #orb.listening{animation:breathe .9s ease-in-out infinite;box-shadow:0 0 64px rgba(123,150,255,.95),0 0 120px rgba(123,150,255,.4),inset 0 2px 8px rgba(255,255,255,.5)}
  /* ask-Zoe command bar (orb tap) */
  #cmdbar{position:absolute;left:50%;bottom:126px;transform:translateX(-50%) translateY(12px);width:620px;display:none;z-index:55;opacity:0;transition:.25s}
  #cmdbar.on{display:flex;opacity:1;transform:translateX(-50%)}
  #cmdbar input{flex:1;height:64px;border-radius:18px;border:1px solid rgba(255,255,255,.18);background:rgba(14,16,26,.72);backdrop-filter:blur(18px);color:var(--ink);font:inherit;font-size:23px;padding:0 24px;outline:none}
  #cmdbar input::placeholder{color:var(--ink-faint)}
  #cmdbar{gap:10px}
  #cmdbar button{width:64px;height:64px;flex:none;border-radius:18px;border:0;background:var(--accent);color:#fff;font-size:24px;cursor:pointer}
  #cmdbar button:active{transform:scale(.94)}
  #saytoast{position:absolute;left:50%;top:54px;transform:translateX(-50%);max-width:820px;background:rgba(14,16,26,.72);border:1px solid rgba(255,255,255,.14);border-radius:16px;backdrop-filter:blur(16px);padding:14px 26px;font-size:22px;z-index:56;opacity:0;pointer-events:none;transition:opacity .3s}
  #saytoast.on{opacity:1}
  /* the toast is pointer-transparent by default; an actionable one (Undo) has
     to take taps, so it opts in. */
  #saytoast.act{pointer-events:auto}
  #saytoast .ub{margin-left:16px;border:0;border-radius:10px;padding:7px 16px;font:inherit;font-size:19px;
    font-weight:600;background:rgba(167,139,250,.9);color:#12142b;cursor:pointer}
  /* Lists — full-screen multi-column */
  .lstf{position:absolute;inset:0;padding:104px 56px 150px;display:flex;gap:20px;overflow-x:auto;align-items:flex-start}
  .lcol{min-width:300px;max-width:350px;flex:1 0 300px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:22px;padding:20px 20px 16px}
  .lcol h3{font-size:22px;font-weight:600}
  .lcol .lct{font-size:14px;color:var(--ink-faint);margin:2px 0 12px}
  .lcol .lrow{display:flex;align-items:center;gap:12px;padding:10px 2px;border-top:1px solid rgba(255,255,255,.07);font-size:19px;cursor:pointer}
  .lcol .lrow .bx{width:22px;height:22px;border-radius:7px;border:2px solid rgba(255,255,255,.3);flex:none;display:grid;place-items:center;color:#08131c}
  .lcol .lrow.done .bx{background:var(--cat-personal);border-color:var(--cat-personal)}
  .lcol .lrow.done .tx2{color:var(--ink-faint);text-decoration:line-through}
  .lcol .ladd{display:flex;gap:8px;margin-top:12px}
  .lcol .ladd input{flex:1;min-width:0;height:44px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--ink);font:inherit;font-size:17px;padding:0 12px;outline:none}
  .lcol .ladd button{width:44px;height:44px;border-radius:12px;border:0;background:var(--accent);color:#fff;font-size:20px;cursor:pointer}
  .lcol.newl{background:transparent;border-style:dashed}
  .lcol.newl select{width:100%;height:44px;margin-top:8px;border-radius:12px;background:rgba(255,255,255,.06);color:var(--ink);border:1px solid rgba(255,255,255,.14);font:inherit;padding:0 8px}
  /* Day — full-screen: timeline + reminders (+ comms when a source exists) */
  .dayf{position:absolute;inset:0;padding:106px 70px 150px;display:flex;gap:48px}
  .dayf .dc1{flex:1.35;min-width:0}
  .dayf .dk{font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
  .dayf h1{font-size:46px;font-weight:600;letter-spacing:-.02em;margin:6px 0 18px}
  .dayf .dev{display:flex;align-items:center;gap:16px;padding:15px 0;border-top:1px solid rgba(255,255,255,.08)}
  .dayf .dev .t{width:96px;flex:none;font-size:21px;color:var(--ink-soft);white-space:nowrap;font-variant-numeric:tabular-nums}
  .dayf .dev .dot{width:12px;height:12px;border-radius:50%;background:var(--c);box-shadow:0 0 10px var(--c);flex:none}
  .dayf .dev .en{font-size:23px;font-weight:500}
  .dayf .dev .es{font-size:16px;color:var(--ink-faint);margin-top:1px}
  .dayf .dc2{width:380px;flex:none;display:flex;flex-direction:column;gap:26px}
  .dayf .dsec{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:22px;padding:20px 22px}
  .dayf .dsec h4{font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}
  .dayf .drem{display:flex;gap:12px;align-items:baseline;padding:9px 0;border-top:1px solid rgba(255,255,255,.07);font-size:19px}
  .dayf .drem:first-of-type{border-top:0}
  .dayf .drem .rt{color:var(--ink-faint);font-size:16px;min-width:96px;flex:none}
  .dayf .dev .dey{flex:1;min-width:0}
  .dayf .drem .rtx{flex:1;min-width:0}
  .dayf .dev .lact,.dayf .drem .lact{align-self:center}
  .dayf .drem .lact button,.dayf .dev .lact button{width:34px;height:34px}
  /* Lists v2 — tab selector + selected list in flowing columns */
  .lstf2{position:absolute;inset:0;padding:100px 64px 150px;display:flex;flex-direction:column}
  .ltabs{display:flex;gap:10px;flex-wrap:wrap}
  .ltab{font-size:19px;font-weight:500;color:var(--ink-soft);padding:9px 18px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);cursor:pointer;white-space:nowrap}
  .ltab.on{background:rgba(123,150,255,.22);border-color:rgba(123,150,255,.55);color:var(--ink);font-weight:600}
  /* List selector pills live in the chrome header row, pushed to the RIGHT next
     to the settings cog (count sits on the left where the title used to be). */
  .lhdr{position:absolute;top:38px;left:110px;right:118px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:16px;z-index:30}
  .lhdr .ltabs{flex:0 1 auto;min-width:0;flex-wrap:nowrap;overflow-x:auto;justify-content:flex-end}
  .lcount{font-size:17px;color:var(--ink-faint);flex:none;white-space:nowrap}
  .lcols{flex:1;overflow-y:auto}
  .lcols .lin{column-count:3;column-gap:28px}
  .lrow2{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid rgba(255,255,255,.07);font-size:20px;cursor:pointer;break-inside:avoid}
  .lrow2 .bx{width:24px;height:24px;border-radius:8px;border:2px solid rgba(255,255,255,.3);flex:none;display:grid;place-items:center;color:#08131c}
  .lrow2.done .bx{background:var(--cat-personal);border-color:var(--cat-personal)}
  .lrow2.done .tx2{color:var(--ink-faint);text-decoration:line-through}
  .laddbar{display:flex;gap:10px;margin-top:16px;max-width:520px}
  .laddbar input{flex:1;height:52px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--ink);font:inherit;font-size:19px;padding:0 16px;outline:none}
  .laddbar button{width:52px;height:52px;border-radius:14px;border:0;background:var(--accent);color:#fff;font-size:22px;cursor:pointer}
  .laddbar select{height:52px;border-radius:14px;background:rgba(255,255,255,.06);color:var(--ink);border:1px solid rgba(255,255,255,.14);font:inherit;padding:0 10px}
  /* Contacts — full-screen tile grid + detail */
  .ctf{position:absolute;inset:0;padding:92px 40px 150px;display:flex;flex-direction:column}
  .ctwrap{flex:1;display:flex;gap:10px;min-height:0}
  .ctgrid{flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:16px;align-content:start;overflow-y:auto;scroll-behavior:smooth}
  .ctaz{width:34px;flex:none;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1px}
  .ctaz span{font-size:13px;color:var(--ink-faint);padding:1px 8px;cursor:pointer;border-radius:8px}
  .ctaz span.has{color:var(--ink-soft);font-weight:600}
  .ctaz span:active{background:rgba(123,150,255,.3);color:#fff}
  .cttile{display:flex;flex-direction:column;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:22px 12px;cursor:pointer;transition:background .15s,transform .1s}
  .cttile:active{transform:scale(.96)}
  .cttile .pav{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-size:26px;font-weight:600;color:#0a0d14}
  .cttile .pn2{font-size:20px;font-weight:500;text-align:center}
  .cttile .pr2{font-size:14px;color:var(--ink-faint)}
  .ctdetail{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(7,10,22,.6);backdrop-filter:blur(14px)}
  .ctdetail.on{display:flex}
  .ctcard{width:640px;background:linear-gradient(180deg,rgba(255,255,255,.085),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.14);border-radius:30px;padding:36px 42px;box-shadow:0 30px 90px rgba(0,0,0,.5)}
  .ctcard .cthead{display:flex;align-items:center;gap:20px;margin-bottom:22px}
  .ctcard .pav{width:76px;height:76px;border-radius:50%;display:grid;place-items:center;font-size:30px;font-weight:600;color:#0a0d14}
  .ctcard h2{font-size:32px;font-weight:600}
  .ctcard .ctrel{font-size:17px;color:var(--ink-faint)}
  .ctcard .ctrow{display:flex;gap:14px;padding:12px 0;border-top:1px solid rgba(255,255,255,.08);font-size:20px}
  .ctcard .ctrow .cl{width:120px;color:var(--ink-faint);font-size:16px;flex:none;padding-top:2px}
  .ctcard .ctclose{margin-top:22px;width:100%;height:52px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:var(--ink);font:inherit;font-size:18px;cursor:pointer}
  /* Calendar — day / week / month */
  .calf{position:absolute;inset:0;padding:104px 36px 140px;display:flex;flex-direction:column}
  .calhead{position:absolute;top:38px;left:110px;right:110px;height:48px;display:flex;align-items:center;gap:16px}
  .calhead h1{font-size:28px;font-weight:600;flex:1;letter-spacing:-.01em}
  .calviews{display:flex;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:5px}
  .calviews button{font:inherit;font-size:16px;color:var(--ink-soft);background:transparent;border:0;border-radius:999px;padding:8px 18px;cursor:pointer}
  .calviews button.on{background:#fff;color:#0a0d14;font-weight:600}
  .calbody{flex:1;min-height:0;overflow-y:auto}
  .calmonth{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));grid-auto-rows:minmax(0,1fr);gap:6px;width:100%;height:100%;grid-template-rows:auto}
  .calmonth .cmh{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);text-align:center;padding:4px 0}
  .cmd{min-width:0;min-height:0;overflow:hidden;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.07);padding:7px 9px;font-size:15px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
  .cmd.dim{opacity:.3}
  .cmd.today{border-color:rgba(123,150,255,.65);background:linear-gradient(180deg,rgba(123,150,255,.18),rgba(123,150,255,.08));box-shadow:0 0 22px rgba(123,150,255,.18),inset 0 1px 0 rgba(255,255,255,.1)}
  .cmd.today .dn{color:#fff;font-weight:600}
  .cmd .dn{font-size:14px;color:var(--ink-soft)}
  .cmd .cev{font-size:12px;color:var(--ink);border-left:3px solid var(--c,var(--accent));background:color-mix(in srgb,var(--c,var(--accent)) 20%,transparent);border-radius:5px;padding:2px 7px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .calweek{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;width:100%}
  .cwc{min-width:0;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:12px 10px;min-height:300px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
  .cwc h5{font-size:14px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;text-align:center}
  .cwc.today{border-color:rgba(123,150,255,.6);background:linear-gradient(180deg,rgba(123,150,255,.15),rgba(123,150,255,.05));box-shadow:0 0 22px rgba(123,150,255,.15)}
  .cwe{font-size:14px;border-left:3px solid var(--c,var(--accent));background:color-mix(in srgb,var(--c,var(--accent)) 18%,transparent);border-radius:7px;padding:5px 9px;margin-bottom:6px}
  .cwe small{display:block;color:var(--ink-soft);opacity:.8;margin-top:1px;font-variant-numeric:tabular-nums}
  .caldaylist .dev{display:flex;align-items:center;gap:16px;padding:15px 0;border-top:1px solid rgba(255,255,255,.08)}
  /* Settings — expanding sections */
  .remf{position:absolute;inset:0;padding:110px 150px 158px;display:flex;flex-direction:column}
  .remf .remlist{overflow-y:auto;flex:1}
  .remrow{display:flex;gap:16px;align-items:baseline;padding:12px 4px;border-bottom:1px solid rgba(255,255,255,.08)}
  .remrow .rw{font-size:18px;color:var(--ink-faint);min-width:130px;flex:none;font-variant-numeric:tabular-nums}
  .remrow .rt2{font-size:21px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
  .setf{position:absolute;inset:0;padding:100px 200px 150px;display:flex;flex-direction:column;overflow-y:auto}
  .setsec{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:20px;margin-bottom:14px;overflow:hidden}
  .setsec .sh{display:flex;align-items:center;gap:14px;padding:20px 24px;cursor:pointer;font-size:22px;font-weight:500}
  .srow2 .sw{width:58px;height:34px;border-radius:999px;background:rgba(255,255,255,.16);position:relative;transition:.25s;flex:none;cursor:pointer}
  .srow2 .sw::after{content:'';position:absolute;top:4px;left:4px;width:26px;height:26px;border-radius:50%;background:#fff;transition:.25s}
  .srow2 .sw.on{background:var(--accent)}
  .srow2 .sw.on::after{left:28px}
  .srow2 input[type=range]{flex:1;max-width:280px;accent-color:var(--accent);height:34px}
  /* color-scheme:dark is load-bearing, not cosmetic: the OPEN dropdown is a NATIVE
     popup the browser paints on a light background by default, while `color` above
     is near-white (--ink) — so the option text rendered white-on-white and was
     unreadable. It tells the browser to paint its own UI dark; the explicit option
     rule below is the fallback for engines that don't honour color-scheme there. */
  .srow2 .sset{margin-left:auto;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);color:var(--ink);border-radius:12px;padding:10px 14px;font-size:19px;min-height:44px;cursor:pointer;color-scheme:dark}
  .srow2 .sset option{background:#131a2b;color:var(--ink)}
  .srow2 .sbtn{margin-left:auto;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);color:var(--ink);border-radius:12px;padding:10px 18px;font:inherit;font-size:18px;min-height:44px;cursor:pointer}
  .srow2 .sbtn:disabled{opacity:.5}
  .srow2 .sv{min-width:56px;text-align:right;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .srow2 .stat{width:12px;height:12px;border-radius:50%;flex:none}
  .srow2 .stat.ok{background:#66d6a3;box-shadow:0 0 10px rgba(102,214,163,.6)}
  .srow2 .stat.bad{background:var(--cat-health);box-shadow:0 0 10px rgba(255,122,144,.5)}
  .setsec .sh .caret{margin-left:auto;color:var(--ink-faint);transition:transform .25s}
  .setsec.open .sh .caret{transform:rotate(90deg)}
  .setsec .sbody{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .setsec.open .sbody{max-height:400px}
  .setsec .sbody .inner{padding:4px 24px 20px}
  .setsec .srow2{display:flex;align-items:center;gap:14px;padding:13px 2px;border-top:1px solid rgba(255,255,255,.07);font-size:19px;cursor:pointer}
  .setsec .srow2 .chev2{margin-left:auto;color:var(--ink-faint)}
  .setsec .sout{margin-top:14px;width:100%;height:50px;border-radius:13px;border:1px solid rgba(255,122,144,.4);background:rgba(255,122,144,.12);color:#ff9db0;font:inherit;font-size:18px;cursor:pointer}
  /* CRUD affordances */
  .lrow2{position:relative}
  /* Always visible — this is a touch panel, there is no hover to reveal on. */
  .lact{margin-left:auto;display:flex;gap:6px}
  .lact button{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--ink-soft);font-size:15px;cursor:pointer}

  /* ── music full: the card IS the queue ───────────────────────────────────
     Cover Flow — played covers recede LEFT, now-playing flat in the CENTRE,
     upcoming fan RIGHT. Geometry is the proven prototype scaled uniformly by
     CF_K (see layoutCF): card, x, z and perspective all scale together, so the
     projection — and the deliberate slight overlap that reads as a stack — is
     the prototype exactly, just sized to clear the dock (top 605) at 720px. */
  /* touch-action:none on the CONTAINER, not only on the covers: the browse
     gesture holds its pointer capture here, so this is the element whose
     touch-action decides whether the browser claims the gesture for itself.
     Without it a mostly-vertical drag is read as a scroll and the pointer is
     CANCELLED mid-gesture — which silently kills flick-up-to-remove. */
  .mfull .cf{position:absolute;top:74px;left:0;right:0;height:260px;touch-action:none;
             perspective:1214px;perspective-origin:50% 46%}
  .mfull .cf-track{position:absolute;inset:0;transform-style:preserve-3d}
  .mfull .cfc{position:absolute;top:0;left:50%;width:260px;height:260px;margin-left:-130px;
              border-radius:14px;overflow:hidden;transform-style:preserve-3d;cursor:pointer;
              box-shadow:0 26px 60px rgba(0,0,0,.62);
              transition:transform .42s cubic-bezier(.22,.75,.28,1),opacity .42s,filter .42s;
              will-change:transform;touch-action:none;
              /* A cover is a picture, so the browser offers to drag it away as an
                 image — which starts a native drag and CANCELS the pointer
                 mid-gesture, taking browse and flick-up-to-remove with it. Only
                 reachable with a mouse, which is why the touch panel never showed
                 it, but the harness drives a mouse and it is a real bug. */
              user-select:none;-webkit-user-drag:none}
  .mfull .cfc img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;
                  -webkit-user-drag:none}
  .mfull .cfc .ph{width:100%;height:100%;display:grid;place-items:center;font-size:60px;
                  background:linear-gradient(150deg,#c77bff,#8a53e8)}
  /* The shade that turns a flat cover into a receding one. Its strength rides
     --cfshade (0 at the centre, 1 from one slot out), set per-frame by cfLayout.
     It used to switch off via `.cfc.on::after{background:none}` — an on/off at
     the centre. That was invisible while focus could only be an integer, but a
     cover now passes THROUGH the centre under your finger, and a hard on/off
     mid-drag reads as a flicker. Identical at every integer slot, continuous
     between them. */
  .mfull .cfc::after{content:'';position:absolute;inset:0;pointer-events:none;opacity:var(--cfshade,1);
    background:linear-gradient(to right,rgba(5,7,15,.55),rgba(5,7,15,0) 60%)}
  .mfull .cfc.right::after{background:linear-gradient(to left,rgba(5,7,15,.55),rgba(5,7,15,0) 60%)}
  .mfull .cfc.on{box-shadow:0 34px 90px rgba(0,0,0,.72),0 0 0 1px rgba(255,255,255,.10)}
  /* While a gesture or the settle spring is driving the transform per-frame the
     CSS transition must be OFF, or it eases toward each frame's value and the
     flow lags a finger it is supposed to be pinned to. `.gone` keeps its
     transition: that's the removal animation, which is still a CSS ease. */
  .mfull .cf-track.cfanim .cfc:not(.gone){transition:none}
  /* lifted by a long-press: it's out of the flow and follows your finger */
  .mfull .cfc.lift{transition:none;box-shadow:0 44px 100px rgba(0,0,0,.8),0 0 0 2px rgba(167,139,250,.9)}
  .mfull .cfc.gone{opacity:0 !important;transform:translateY(-220px) scale(.7) !important}
  /* Queue-number badge — pinned to the card's OUTER edge (upcoming → right,
     played → left) so the centre card can never hide it, and to the BOTTOM
     because the top strip is .mtop's (speaker + browse, z60, right:120) and it
     sits straight over the right-hand fan. Outer+bottom is the only corner
     that clears both. */
  .mfull .cfc .qn{position:absolute;bottom:8px;left:8px;z-index:2;min-width:24px;height:24px;padding:0 7px;
      border-radius:8px;background:rgba(6,9,20,.74);backdrop-filter:blur(8px);

      font-variant-numeric:tabular-nums;pointer-events:none}
  .mfull .cfc.right .qn{left:auto;right:8px}

  /* the visible remove affordance — removal must not be gesture-only */
  .mfull .cfc .cfx{position:absolute;top:6px;z-index:3;width:34px;height:34px;border:0;border-radius:50%;
     background:rgba(6,9,20,.7);backdrop-filter:blur(8px);color:#fff;font-size:16px;line-height:1;

  // Played covers recede LEFT, now-playing flat in the CENTRE, upcoming fan
  // RIGHT. `cur` is what's actually playing; `focus` is what you've browsed to
  // — they're only the same until you flick. Browsing NEVER touches playback.
  var CF_K=0.867;        // uniform scale of the proven prototype geometry (card
                         // 300→260, perspective 1400→1214). x, z, the card and
                         // the perspective all scale together, so the projection
                         // — including the deliberate slight overlap that reads
                         // as a stack — is the prototype exactly, just sized to

  var CF_HOLD_MS=320;    // long-press to lift a cover for reorder

  // `focus` is FRACTIONAL. A drag writes it straight from the finger; a release

  // a CSS transition: an ease always starts from rest, so catching a moving
  // cover would stutter, and easing between two integer slots is a slideshow —
  // which is what this replaces.
  var CF_SLOT=238*CF_K;  // px of finger travel per queue position. This is the

  function wireCF(){
    var cf=document.getElementById('mCF');if(!cf||cf.dataset.wired)return;cf.dataset.wired='1';

      // (Capturing it in the timer is exactly the bug that shipped in #1332 and
      // armed the drag with a null origin every time.)
      var d={el:card,i:+card.getAttribute('data-i'),x0:e.clientX,y0:e.clientY,

      // about how fast you are moving NOW. The floor is 1, not 2: a `length>2`

  // ---- Reminders card (real reminders) ----
  // Format a reminder's "when" from its separate due_date (YYYY-MM-DD) and
  // due_time (bare "HH:MM"). Handles date+time, date-only, time-only, a full
  // ISO datetime in due_time, and '' for absent/unparseable values — guarding
  // against new Date(bad) whose .toLocaleString() renders "Invalid Date".
  // (Reinstated: the #1263 fix was clobbered by a parallel home.html merge.)
  function fmtRemWhen(r){
    var d=r&&r.due_date,t=r&&r.due_time;
    var m=String(t||'').trim().match(/^(\d{1,2}):(\d{2})/);
    var tt=m?(('0'+m[1]).slice(-2)+':'+m[2]):'';
    if(d){var dt=new Date(String(d)+'T'+(tt||'00:00'));
      if(!isNaN(dt.getTime()))return dt.toLocaleString(undefined,tt?{weekday:'short',hour:'numeric',minute:'2-digit'}:{weekday:'short',month:'short',day:'numeric'});}
    if(tt){var d2=new Date('1970-01-01T'+tt);if(!isNaN(d2.getTime()))return d2.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
    if(t){var d3=new Date(t);if(!isNaN(d3.getTime()))return d3.toLocaleString(undefined,{weekday:'short',hour:'numeric',minute:'2-digit'});}
    return '';
  }

  // Touch-friendly date+time stepper (native <input type=date> is a poor fit on
  // the kiosk — tiny native pickers). Big ▲/▼ steppers for day/mon/yr/hr/min.
  var _dt={y:2026,mo:0,d:1,h:9,mi:0};
  var _MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function _dtInit(dateStr,timeStr){var now=new Date();
    var y=now.getFullYear(),mo=now.getMonth(),d=now.getDate(),h=9,mi=0,hasTime=false;
    if(dateStr&&/^\d{4}-\d{2}-\d{2}/.test(dateStr)){var p=dateStr.split('-');y=+p[0];mo=(+p[1])-1;d=+p[2].slice(0,2);}
    if(timeStr&&/^\d{1,2}:\d{2}/.test(timeStr)){var q=timeStr.split(':');h=+q[0];mi=+q[1];hasTime=true;}
    _dt={y:y,mo:mo,d:d,h:h,mi:mi,hasTime:hasTime};}
  function _dtg(f,lab){return '<div class="dtg"><button type="button" data-s="'+f+',1">▲</button><span class="dtv" data-v="'+f+'"></span><button type="button" data-s="'+f+',-1">▼</button><span class="dtl">'+lab+'</span></div>';}
  function _dtHtml(){return '<div class="dtp">'+_dtg('d','day')+_dtg('mo','mon')+_dtg('y','yr')+'<span class="dtsep"></span>'+_dtg('h','hr')+_dtg('mi','min')+'</div>';}
  function _dtPaint(m){function set(f,v){var el=m.querySelector('.dtv[data-v="'+f+'"]');if(el)el.textContent=v;}
    set('d',two(_dt.d));set('mo',_MON[_dt.mo]);set('y',_dt.y);
    // No time set (e.g. a timeless reminder / all-day event) shows "--" — tap a
    // time stepper to add one; otherwise it stays time-less (never auto-09:00).
    set('h',_dt.hasTime?two(_dt.h):'--');set('mi',_dt.hasTime?two(_dt.mi):'--');}
  function _dtStep(f,dir){
    if((f==='h'||f==='mi')&&!_dt.hasTime){_dt.hasTime=true;return;}   // first time-tap just reveals 09:00
    if(f==='mo'||f==='y'){
      // Month/year steps must CLAMP the day to the target month (Jan 31 → Feb
      // stays Feb 28/29, not overflowing to March) — setMonth/setFullYear alone
      // silently roll the day forward.
      var y=_dt.y,mo=_dt.mo+(f==='mo'?dir:0);
      if(f==='y')y+=dir;
      y+=Math.floor(mo/12);mo=((mo%12)+12)%12;
      var dim=new Date(y,mo+1,0).getDate();
      _dt.y=y;_dt.mo=mo;_dt.d=Math.min(_dt.d,dim);return;
    }
    var dd=new Date(_dt.y,_dt.mo,_dt.d,_dt.h,_dt.mi);
    if(f==='d')dd.setDate(dd.getDate()+dir);
    else if(f==='h')dd.setHours(dd.getHours()+dir);
    else if(f==='mi')dd.setMinutes(dd.getMinutes()+dir*5);
    _dt.y=dd.getFullYear();_dt.mo=dd.getMonth();_dt.d=dd.getDate();_dt.h=dd.getHours();_dt.mi=dd.getMinutes();}
  function _dtWire(m){_dtPaint(m);m.querySelectorAll('.dtp button[data-s]').forEach(function(b){b.onclick=function(){var s=b.getAttribute('data-s').split(',');_dtStep(s[0],+s[1]);_dtPaint(m);};});}
  function _dtGet(){return {date:_dt.y+'-'+two(_dt.mo+1)+'-'+two(_dt.d),time:_dt.hasTime?(two(_dt.h)+':'+two(_dt.mi)):null};}

  function timerRemain(t){if(t.expires_at_ms!=null)return (t.expires_at_ms-Date.now())/1000;if(t.ends_at)return (new Date(t.ends_at).getTime()-Date.now())/1000;if(t.remaining_seconds!=null)return t.remaining_seconds;return t.duration_seconds||0;}

      // Detail card is a function so relationship chips can hop between people.
      function openContact(pn,idx){
        var rows=[['Relationship',pn.relationship],['Phone',pn.phone],['Email',pn.email],['Birthday',pn.birthday],['Notes',pn.notes]]
          .filter(function(r){return r[1];})
          .map(function(r){return '<div class="ctrow"><span class="cl">'+r[0]+'</span><span>'+esc(String(r[1]))+'</span></div>';}).join('')
          ||'<div class="ctrow"><span class="cl"></span><span style="color:var(--ink-faint)">No details yet — just a name.</span></div>';
        det.innerHTML='<div class="ctcard"><div class="cthead"><div class="pav" style="background:'+PAVC[(idx||0)%PAVC.length]+'">'+esc((pn.name||'?').charAt(0).toUpperCase())+'</div><div><h2>'+esc(pn.name||'')+'</h2>'+(pn.relationship?'<div class="ctrel">'+esc(pn.relationship)+'</div>':'')+'</div></div>'+rows
          +'<div class="ctfam"><div class="cl" style="margin:14px 0 8px">Family &amp; links</div><div class="ctchips" id="ctRels"><span style="color:var(--ink-faint);font-size:16px">Loading…</span></div></div>'
          +'<div class="ctacts"><button data-x="link">＋ Link person</button><button data-x="edit">Edit</button><button class="del" data-x="del">Delete</button><button data-x="close">Close</button></div></div>';
        det.classList.add('on');
        // Linked people: the person_relationships graph (spouse/parent/child/…).
        // A "sub-contact" (a friend's kid) is a partial contact created by name
        // and linked here — it's a real person row, so search finds it too.
        apiJson('GET','/api/people/'+encodeURIComponent(pn.id)+'/relationships').then(function(rd){
          var host=document.getElementById('ctRels');if(!host)return;
          // Response is grouped by circle: {love:[…],family:[…],friend:[…],work:[…]}
          var g=(rd&&rd.relationships)||{},rels=[];
          Object.keys(g).forEach(function(k){(g[k]||[]).forEach(function(rl){rels.push(rl);});});
          host.innerHTML=rels.map(function(rl){
            return '<span class="ctchip" data-oid="'+esc(String(rl.person_id||''))+'" data-rid="'+esc(String(rl.rel_id||''))+'">'+esc(rl.name||'?')+' <small>'+esc(rl.label||rl.rel_type||'')+'</small><b class="x" title="Unlink">×</b></span>';}).join('')
            ||'<span style="color:var(--ink-faint);font-size:16px">No links yet.</span>';
          host.onclick=function(ev){
            var chip=ev.target.closest('.ctchip');if(!chip)return;
            if(ev.target.closest('.x')){estConfirm('Remove this link?',function(){
              apiJson('DELETE','/api/people/'+encodeURIComponent(pn.id)+'/relationships/'+encodeURIComponent(chip.getAttribute('data-rid')))
                .then(function(){openContact(pn,idx);}).catch(function(){toast('Couldn’t unlink');});});return;}
            var oid=chip.getAttribute('data-oid');var other=ps.filter(function(x){return String(x.id)===oid;})[0];
            if(other)openContact(other,ps.indexOf(other));
            else apiJson('GET','/api/people/'+encodeURIComponent(oid)).then(function(pp){openContact(pp.person||pp,0);}).catch(function(){});
          };
        }).catch(function(){var host=document.getElementById('ctRels');if(host)host.innerHTML='<span style="color:var(--ink-faint);font-size:16px">Couldn’t load links.</span>';});
        det.onclick=function(ev){if(ev.target===det||ev.target.closest('[data-x="close"]'))det.classList.remove('on');
          if(ev.target.closest('[data-x="del"]')){det.classList.remove('on');estConfirm('Delete '+(pn.name||'this contact')+'?',function(){
            apiJson('DELETE','/api/people/'+encodeURIComponent(pn.id)).then(function(){wireContacts();}).catch(function(){toast('Couldn’t delete');});});}
          if(ev.target.closest('[data-x="edit"]')){editContact(pn);}
          if(ev.target.closest('[data-x="link"]')){linkPerson(pn,function(){openContact(pn,idx);});}};
      }
      grid.onclick=function(e){var t=e.target.closest('.cttile');if(!t)return;var i=+t.getAttribute('data-i');var pn=ps[i];if(pn)openContact(pn,i);};
      // "＋ Link person": link an existing contact OR create a new (sub-)contact
      // by name — create_partial makes the person row + the typed edge in one call.
      function linkPerson(pn,done){
        apiJson('GET','/api/people/relationship-types').then(function(tp){
          var flat=[];Object.keys((tp&&tp.types)||{}).forEach(function(g){(tp.types[g]||[]).forEach(function(t2){flat.push(t2);});});
          var opts=flat.map(function(t2){return '<option value="'+esc(t2.key)+'">'+esc(t2.label_b||t2.key)+' of '+esc(pn.name||'them')+'</option>';}).join('');
          var existing=ps.filter(function(x){return x.id!==pn.id;}).map(function(x){return '<option value="'+esc(String(x.id))+'">'+esc(x.name||'?')+'</option>';}).join('');
          estOpen('<h3>Link a person to '+esc(pn.name||'')+'</h3>'
            +'<label>Who</label><select data-f="oid"><option value="">— New person —</option>'+existing+'</select>'
            +'<label>New person’s name</label><input data-f="nname" placeholder="Only for a new person">'
            +'<label>They are the…</label><select data-f="rel">'+opts+'</select>'
            +'<div class="btns"><button data-x="cancel">Cancel</button><button class="save" data-x="save">Link</button></div>');
          var m=document.getElementById('estModal');
          m.querySelector('[data-x="cancel"]').onclick=estClose;
          m.querySelector('[data-x="save"]').onclick=function(){
            var oid=m.querySelector('[data-f="oid"]').value,nname=m.querySelector('[data-f="nname"]').value.trim(),rel=m.querySelector('[data-f="rel"]').value;
            var body={rel_type:rel};
            if(oid)body.other_person_id=oid;
            else if(nname){body.other_person_name=nname;body.create_partial=true;}
            else{toast('Pick a person or type a name');return;}
            apiJson('POST','/api/people/'+encodeURIComponent(pn.id)+'/relationships',body)
              .then(function(){estClose();wireContacts();if(done)done();})
              .catch(function(){toast('Couldn’t link');});};
        }).catch(function(){toast('Couldn’t load relationship types');});
      }
    }).catch(function(){if(grid)grid.innerHTML='<div style="color:var(--ink-faint);font-size:20px">Sign in to see your contacts.</div>';});
  }

  // ---- Settings: full-screen expanding sections ----
  var _setPrefs=null,_setPrefT=null;
  function _panelDevId(){return localStorage.getItem('zoe_panel_id')||localStorage.getItem('zoe_touch_panel_id')||'default';}
  function _savePrefs(patch){
    _setPrefs=Object.assign(_setPrefs||{},patch);
    if(_setPrefT)clearTimeout(_setPrefT);
    _setPrefT=setTimeout(function(){
      apiJson('PUT','/api/system/display/preferences',{device_id:_panelDevId(),preferences:_setPrefs})
        .catch(function(){toast('Couldn’t save display settings');});
    },500);   // debounce slider drags into one write
  }
  function wireSettings(){
    var host=document.getElementById('setSecs');if(!host)return;
    var u=null;try{u=JSON.parse(localStorage.getItem('zoe_session')||'null');}catch(e){}
    var who=(u&&(u.username||u.user_id))||'Guest';
    host.innerHTML=[
      {t:'Account',b:'<div class="srow2"><span>Signed in as <b>'+esc(who)+'</b></span></div><div class="srow2"><span>Log out when idle</span><select id="setIdleLogout" class="sset"><option value="">…</option></select></div><div class="srow2" data-act="switch"><span>Switch user</span><span class="chev2">›</span></div><button class="sout" id="setOut">Sign out</button>'},
      {t:'Display',b:'<div id="setDisp"><div class="srow2"><span style="color:var(--ink-faint)">Loading…</span></div></div>'},
      {t:'Voice',b:'<div id="setVoice"><div class="srow2"><span style="color:var(--ink-faint)">Loading…</span></div></div>'},
      {t:'System',b:'<div id="setSys"><div class="srow2"><span style="color:var(--ink-faint)">Checking…</span></div></div>'},
      {t:'Household',b:'<div class="srow2" data-act="contacts"><span>Contacts</span><span class="chev2">›</span></div><div class="srow2" data-act="rooms"><span>Rooms & devices</span><span class="chev2">›</span></div><div class="srow2" data-act="pair"><span>Link a device</span><span class="chev2">›</span></div>'}
    ].map(function(sec,i){return '<div class="setsec"><div class="sh">'+esc(sec.t)+'<span class="caret">›</span></div><div class="sbody"><div class="inner">'+sec.b+'</div></div></div>';}).join('');

    // Display: the panel's real brightness/night/idle prefs, live-wired.
    apiGet('/api/system/display/preferences?device_id='+encodeURIComponent(_panelDevId())).then(function(d){
      if(_cur!=='settings')return;var pr=(d&&d.preferences)||{};_setPrefs={};
      var el=document.getElementById('setDisp');if(!el)return;
      // 0 is a legitimate saved brightness — only fall back when the value is
      // genuinely absent, or a truthy-|| would render (and later re-save) the default.
      function nz(v,dflt){var n=+v;return (v==null||isNaN(n))?dflt:n;}
      var dayB=nz(pr.day_brightness,100),nightB=nz(pr.night_brightness,15);
      el.innerHTML=
        '<div class="srow2"><span>Brightness</span><input type="range" min="0" max="100" step="5" data-pref="day_brightness" value="'+dayB+'"><span class="sv">'+dayB+'%</span></div>'
        +'<div class="srow2"><span>Night mode <small style="color:var(--ink-faint)">'+esc(pr.night_start||'22:00')+'–'+esc(pr.night_end||'06:30')+'</small></span><span class="sw'+(pr.night_enabled?' on':'')+'" data-pref-t="night_enabled"></span></div>'
        +'<div class="srow2"><span>Night brightness</span><input type="range" min="0" max="60" step="5" data-pref="night_brightness" value="'+nightB+'"><span class="sv">'+nightB+'%</span></div>'
        +'<div class="srow2"><span>Dim when idle <small style="color:var(--ink-faint)">'+Math.round((+pr.idle_seconds||120)/60)+' min</small></span><span class="sw'+(pr.idle_enabled?' on':'')+'" data-pref-t="idle_enabled"></span></div>';
      el.querySelectorAll('input[type=range]').forEach(function(r){r.oninput=function(){
        var sv=r.parentElement.querySelector('.sv');if(sv)sv.textContent=r.value+'%';
        var patch={};patch[r.getAttribute('data-pref')]=+r.value;_savePrefs(patch);};});
      el.querySelectorAll('.sw[data-pref-t]').forEach(function(sw){sw.onclick=function(){
        var on=sw.classList.toggle('on');var patch={};patch[sw.getAttribute('data-pref-t')]=on;_savePrefs(patch);};});
    }).catch(function(){var el=document.getElementById('setDisp');if(el)el.innerHTML='<div class="srow2"><span style="color:var(--ink-faint)">Display settings unavailable</span></div>';});

    // System: live health of the pieces that matter + software version.
    apiGet('/api/system/status').then(function(st){
      if(_cur!=='settings')return;var el=document.getElementById('setSys');if(!el)return;
      function ok(v){return typeof v==='string'&&v.indexOf('ok')===0||v==='connected'||v==='healthy';}
      var rows=[['Zoe brain',st.llama_server],['Home Assistant',st.ha_bridge],['Database',st.database]];
      el.innerHTML=rows.map(function(r){return '<div class="srow2"><span>'+esc(r[0])+'</span><span style="display:flex;align-items:center;gap:10px"><span class="stat '+(ok(r[1])?'ok':'bad')+'"></span><span style="color:var(--ink-soft);font-size:17px">'+esc(String(r[1]||'unreachable'))+'</span></span></div>';}).join('')
        +'<div class="srow2" id="setVer"><span>Software</span><span class="sv" style="min-width:0">…</span></div>';
      fetch('/sw.js',{cache:'no-store'}).then(function(r){return r.text();}).then(function(t){
        var m=/SW_VERSION = '([^']+)'/.exec(t);var v=document.querySelector('#setVer .sv');if(v&&m)v.textContent='v'+m[1];}).catch(function(){});
    }).catch(function(){var el=document.getElementById('setSys');if(el)el.innerHTML='<div class="srow2"><span style="color:var(--ink-faint)">Status unavailable</span></div>';});

    // Voice: the voice Zoe speaks with (household-wide). Same endpoints as the
    // "change your voice" card — this just makes it reachable from Settings, which
    // is where people look for it.
    (function(){
      var vhost=document.getElementById('setVoice');if(!vhost)return;
      function unavailable(msg){vhost.innerHTML='<div class="srow2"><span style="color:var(--ink-faint)">'+esc(msg)+'</span></div>';}
      apiGet('/api/voice/voices').then(function(d){
        if(_cur!=='settings')return;
        var voices=(d&&d.voices)||[],cur=(d&&d.current)||'';
        if(!voices.length){unavailable('No voices available');return;}
        vhost.innerHTML=
          '<div class="srow2"><span>Zoe’s voice</span><select id="setVoiceSel" class="sset">'
          +voices.map(function(v){return '<option value="'+esc(v.id)+'"'+(v.id===cur?' selected':'')+'>'+esc(v.label||v.id)+'</option>';}).join('')
          +'</select></div>'
          +'<div class="srow2"><span style="color:var(--ink-faint);font-size:17px">Applies straight away · Preview plays a sample</span><button class="sbtn" id="setVoicePrev">Preview</button></div>';
        var sel=document.getElementById('setVoiceSel');
        sel.onchange=function(){
          apiJson('PUT','/api/voice/voice',{voice:sel.value})
            .then(function(){toast('Zoe’s voice set to '+sel.options[sel.selectedIndex].text);})
            .catch(function(){toast('Couldn’t save that voice');});
        };
        var pv=document.getElementById('setVoicePrev');
        pv.onclick=function(){
          pv.disabled=true;
          apiJson('POST','/api/voice/preview',{voice:sel.value}).then(function(r){
            if(!r||!r.audio_base64)return;
            // play() returns a PROMISE. We're inside a fetch .then(), not the click
            // handler's synchronous frame, so tablet/kiosk autoplay policy rejects it
            // async with NotAllowedError — a bare try/catch only sees constructor
            // errors and the preview would fail silently. Catch the rejection and say so.
            var a;
            try{a=new Audio('data:'+(r.content_type||'audio/wav')+';base64,'+r.audio_base64);}
            catch(e){toast('Couldn’t play preview');return;}
            var p=a.play();
            if(p&&typeof p.catch==='function')p.catch(function(){toast('Couldn’t play preview — tap Preview again');});
          }).catch(function(){toast('Preview unavailable');})
            .then(function(){pv.disabled=false;},function(){pv.disabled=false;});
        };
      }).catch(function(){unavailable('Voice settings unavailable');});
    })();

    // Idle-logout: how long with no voice/touch before the panel session lapses.
    (function(){
      var sel=document.getElementById('setIdleLogout');if(!sel)return;
      var OPTS=[[900,'15 min'],[1800,'30 min'],[3600,'1 hour'],[14400,'4 hours'],[43200,'12 hours']];
      apiGet('/api/system/panel/idle-logout').then(function(d){
        if(_cur!=='settings')return;var cur=+((d&&d.seconds));if(isNaN(cur))cur=1800;
        if(!OPTS.some(function(o){return o[0]===cur;})){OPTS.push([cur,Math.round(cur/60)+' min']);}
        OPTS.sort(function(a,b){return a[0]-b[0];});
        sel.innerHTML=OPTS.map(function(o){return '<option value="'+o[0]+'"'+(o[0]===cur?' selected':'')+'>'+o[1]+'</option>';}).join('');
        sel.onchange=function(){apiJson('PUT','/api/system/panel/idle-logout',{seconds:+sel.value})
          .then(function(){toast('Idle logout set to '+sel.options[sel.selectedIndex].text);})
          .catch(function(){toast('Couldn’t save that setting');});};
      }).catch(function(){sel.innerHTML='<option value="">unavailable</option>';});
    })();

    host.onclick=function(e){
      var sh=e.target.closest('.sh');
      if(sh){var sec=sh.parentElement;sec.classList.toggle('open');return;}
      var row=e.target.closest('.srow2[data-go]');
      if(row){location.href=row.getAttribute('data-go');return;}
      var act=e.target.closest('.srow2[data-act]');
      if(act){var a=act.getAttribute('data-act');if(a==='pair')show('pair');if(a==='contacts')show('person');if(a==='rooms')show('rooms');if(a==='switch'&&window.__showAuthCard)window.__showAuthCard();return;}
      if(e.target.closest('#setOut')){var out=e.target.closest('#setOut');out.disabled=true;
        function clearLocal(){try{localStorage.removeItem('zoe_session');localStorage.removeItem('zoe_guest_mode');}catch(e2){}try{sessionStorage.removeItem('zoe_gb');}catch(e2){}}
        fetch('/api/auth/logout',{method:'POST',headers:{'X-Session-ID':sid()},credentials:'include'})
          .then(function(r){if(!r.ok)throw new Error('http '+r.status);clearLocal();location.reload();})
          .catch(function(){clearLocal();toast('Signed out on this panel — the server couldn’t be reached, so the session will expire on its own.');setTimeout(function(){location.reload();},2600);});}
    };
  }

  function editContact(pn){
    function f(k,lab,val){return '<label>'+lab+'</label><input data-f="'+k+'" value="'+esc(val||'')+'">';}
    estOpen('<h3>Edit contact</h3>'+f('name','Name',pn.name)+f('relationship','Relationship',pn.relationship)+f('phone','Phone',pn.phone)+f('email','Email',pn.email)
      +'<div class="btns"><button data-x="cancel">Cancel</button><button class="save" data-x="save">Save</button></div>');

      if(!body.name){toast('Name is required');return;}

  // ---- Calendar: day / week / month on real events ----
  var _cal={view:'week',gen:0};var _calEvents={};
  function isoD(d){return d.getFullYear()+'-'+two(d.getMonth()+1)+'-'+two(d.getDate());}
  function wireCalendar(){
    var vs=document.getElementById('calViews');
    if(vs)vs.onclick=function(e){var b=e.target.closest('button');if(!b)return;_cal.view=b.getAttribute('data-v');
      vs.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b);});paintCal();};
    var body=document.getElementById('calBody');
    if(body)body.onclick=function(e){var chip=e.target.closest('[data-eid]');if(!chip)return;var ev=_calEvents[chip.getAttribute('data-eid')];if(ev)editEvent(ev);};
    paintCal();
  }
  function paintCal(){
    var body=document.getElementById('calBody'),ttl=document.getElementById('calTtl');if(!body)return;
    var gen=++_cal.gen;   // rapid view switches: only the newest request may paint
    var now=new Date(),start,end;
    if(_cal.view==='day'){start=new Date(now);end=new Date(now);}
    else if(_cal.view==='week'){start=new Date(now);start.setDate(now.getDate()-((now.getDay()+6)%7));end=new Date(start);end.setDate(start.getDate()+6);}
    else{start=new Date(now.getFullYear(),now.getMonth(),1);end=new Date(now.getFullYear(),now.getMonth()+1,0);}
    if(ttl)ttl.textContent=_cal.view==='month'?now.toLocaleDateString(undefined,{month:'long',year:'numeric'}):(_cal.view==='week'?'This week':now.toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'}));
    apiGet('/api/calendar/events?start_date='+isoD(start)+'&end_date='+isoD(end)).then(function(d){if(_cur!=='calendar'||gen!==_cal.gen)return;
      var evs=((d&&d.events)||[]).filter(function(e){return !e.deleted;});
      _calEvents={};evs.forEach(function(e){if(e.id!=null)_calEvents[e.id]=e;});
      var byDay={};evs.forEach(function(e){var k=e.start_date;(byDay[k]=byDay[k]||[]).push(e);});
      Object.keys(byDay).forEach(function(k){byDay[k].sort(function(a,b){return (a.start_time||'').localeCompare(b.start_time||'');});});
      if(_cal.view==='month'){
        var first=new Date(start),lead=(first.getDay()+6)%7,days=end.getDate();
        // six-week months have shorter cells — show one chip + counter so "+N more" never clips
        var weeks=Math.ceil((lead+days)/7),maxChips=weeks>5?1:2;
        var html='<div class="calmonth">'+['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(function(h){return '<div class="cmh">'+h+'</div>';}).join('');
        for(var i=0;i<lead;i++)html+='<div class="cmd dim"></div>';
        for(var dnum=1;dnum<=days;dnum++){var dd=new Date(now.getFullYear(),now.getMonth(),dnum),k=isoD(dd),es=byDay[k]||[];
          html+='<div class="cmd'+(k===isoD(now)?' today':'')+'"><div class="dn">'+dnum+'</div>'+(function(){
            // Rows never exceed maxChips: when overflowing, the counter TAKES the
            // last slot instead of adding a row (so nothing can clip).
            if(es.length<=maxChips)return es.map(function(e){var c=CAT[(e.category||'').toLowerCase()]||'var(--accent)';return '<div class="cev" data-eid="'+esc(String(e.id))+'" style="--c:'+c+'">'+esc(e.title||'')+'</div>';}).join('');
            var showN=maxChips-1;
            return es.slice(0,showN).map(function(e){var c=CAT[(e.category||'').toLowerCase()]||'var(--accent)';return '<div class="cev" data-eid="'+esc(String(e.id))+'" style="--c:'+c+'">'+esc(e.title||'')+'</div>';}).join('')
              +'<div class="cev" style="opacity:.6">'+(showN?('+'+(es.length-showN)+' more'):(es.length+' events'))+'</div>';
          })()+'</div>';}
        body.innerHTML=html+'</div>';
      } else if(_cal.view==='week'){
        var html2='<div class="calweek">';
        for(var i2=0;i2<7;i2++){var d2=new Date(start);d2.setDate(start.getDate()+i2);var k2=isoD(d2),es2=byDay[k2]||[];
          html2+='<div class="cwc'+(k2===isoD(now)?' today':'')+'"><h5>'+d2.toLocaleDateString(undefined,{weekday:'short'})+' '+d2.getDate()+'</h5>'+(es2.map(function(e){var c=CAT[(e.category||'').toLowerCase()]||'var(--accent)';return '<div class="cwe" data-eid="'+esc(String(e.id))+'" style="--c:'+c+'">'+esc(e.title||'')+'<small>'+(e.all_day?'All day':esc(fmt12(e.start_time)))+'</small></div>';}).join('')||'<div style="color:var(--ink-faint);font-size:13px;text-align:center;padding-top:12px">—</div>')+'</div>';}
        body.innerHTML=html2+'</div>';
      } else {
        var es3=byDay[isoD(now)]||[];
        body.innerHTML='<div class="caldaylist">'+(es3.map(function(e){var cat=CAT[(e.category||'').toLowerCase()]||'var(--accent)';return '<div class="dev" data-eid="'+esc(String(e.id))+'"><div class="t" style="width:96px;flex:none;font-size:21px;color:var(--ink-soft)">'+esc(e.all_day?'All day':fmt12(e.start_time))+'</div><span class="dot" style="--c:'+cat+';width:12px;height:12px;border-radius:50%;background:var(--c);box-shadow:0 0 10px var(--c);flex:none"></span><div><div class="en" style="font-size:23px;font-weight:500">'+esc(e.title||'Event')+'</div>'+(e.location?'<div class="es" style="font-size:16px;color:var(--ink-faint)">'+esc(e.location)+'</div>':'')+'</div></div>';}).join('')||'<div style="color:var(--ink-faint);font-size:20px;padding-top:20px">Nothing scheduled today.</div>')+'</div>';
      }

  // ---- Timer-finish alarm (panel-wide) ----
  // A timer can finish on ANY surface, so this watcher runs globally: it learns
  // active timers by polling, then a 1s ticker fires a chime + dismissible
  // alert the moment one crosses zero (the server drops an expired timer, so we
  // detect the crossing client-side). Cancelled timers (gone while still in the
  // future) are pruned so they never alarm.
  var _tAlarm={known:{},fired:{},chime:null};
  function _tAlarmRefresh(){apiGet('/api/skybridge/timers').then(function(d){

      if(!_tAlarm.fired[id])_tAlarm.known[id]={exp:exp,label:t.label||t.title||'Timer'};});
    Object.keys(_tAlarm.known).forEach(function(id){if(!seen[id]&&_tAlarm.known[id].exp>now+1500)delete _tAlarm.known[id];});
    // Bound `fired` on a long-lived kiosk: drop ids fired >6h ago (their timers
    // are long gone, so they can never re-appear and re-fire).
    Object.keys(_tAlarm.fired).forEach(function(id){if(_tAlarm.fired[id]<now-21600000)delete _tAlarm.fired[id];});

    var heard=sp.get('heard'),say=sp.get('say'),dom=sp.get('domain');
    if(!heard&&!say&&!dom)return;
    // Domain → screen map first; a literal surface name (?domain=calendar
    // for the full calendar) also works so server navigations can be precise.
    var dest=DOMAIN_SCREEN[dom||'']||(FULL[dom]?dom:'home');
    show(dest);
    // Chat answers land on the Ask surface; every other domain shows the
    // transcript then the spoken summary in the DOCK (never the old
    // top-of-screen toast) before the pinned controls return.
    if(say&&dest==='ask')askShowAnswer(heard,say);
    else if(heard||say)dockSaid(heard,say);
    _voiceScreen=true;armAutoHome();
    try{var keep=[];if(sp.get('panel_id'))keep.push('panel_id='+encodeURIComponent(sp.get('panel_id')));if(sp.get('kiosk'))keep.push('kiosk='+encodeURIComponent(sp.get('kiosk')));
      history.replaceState(null,'',location.pathname+(keep.length?('?'+keep.join('&')):''));}catch(e){}
    window.__voiceArrived=true;window.__voiceArrivedAt=Date.now();
  })();

  if(!window.__voiceArrived)show('home');
  // Tune the idle→sleep window from server display-prefs (falls back to the
  // hardcoded 3-min default if unreachable), so it's operator-adjustable like
  // idle_seconds/off_seconds without a redeploy.
  try{var _dev=(localStorage.getItem('zoe_panel_id')||'default');
    apiGet('/api/system/display/preferences?device_id='+encodeURIComponent(_dev)).then(function(d){var p=(d&&d.preferences)||{};
      if(p.sleep_enabled===false)_sleepEnabled=false;
      var s=+p.sleep_seconds; if(s>0)IDLE_SLEEP_MS=s*1000;
      armIdleSleep();
    }).catch(function(){});}catch(e){}
})();
</script>
