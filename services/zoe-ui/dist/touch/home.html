<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zoe</title>
<meta name="theme-color" content="#05070d">
<script>
  /* Auth guard — the estate is the panel home; require a valid session or bounce
     to login. A malformed session counts as no session; carry the panel_id query
     through so the panel keeps its binding after signing in. */
  /* Kiosk bootstrap (was on skybridge.html): persist the kiosk flag so a fresh
     or cleared browser profile keeps kiosk behavior across navigations. */
  (function(){try{var p=new URLSearchParams(location.search);if(p.get('kiosk')==='1')localStorage.setItem('zoe_kiosk','1');}catch(e){}})();
  (function(){var ok=false,kiosk=false;try{var s=JSON.parse(localStorage.getItem('zoe_session')||'null');ok=!!(s&&s.session_id);}catch(e){ok=false;}
    try{kiosk=(new URLSearchParams(location.search)).get('kiosk')==='1'||localStorage.getItem('zoe_kiosk')==='1';}catch(e){}
    window.__kiosk=kiosk;
    // Kiosk boots as GUEST into the ambient home (like skybridge did); the
    // who+PIN card is summoned on demand when something personal needs auth.
    window.__needAuth=!ok&&!kiosk;
    // Fresh kiosk profile: provision the guest session the old surface created
    // (fire-and-forget — first loads run loopback-guest, later calls carry it).
    window.__guestBootSettled=!(kiosk&&!ok);   // suppress the kiosk auth card until guest provisioning settles
    if(kiosk&&!ok){try{fetch('/api/auth/guest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({device_info:{source:'estate-kiosk-bootstrap'}})}).then(function(r){return r.ok?r.json():null;}).then(function(d){
      window.__guestBootSettled=true;
      if(d&&d.session_id){try{localStorage.setItem('zoe_session',JSON.stringify(d));localStorage.setItem('zoe_guest_mode','active');
        // one-time reload so the first-paint loads that raced the bootstrap rerun WITH the session
        if(!sessionStorage.getItem('zoe_gb')){sessionStorage.setItem('zoe_gb','1');location.reload();}}catch(e){}}
    }).catch(function(){window.__guestBootSettled=true;});}catch(e){window.__guestBootSettled=true;}}
  })();
</script>
<style>
  :root{
    --ink:#F4F6FA; --ink-soft:rgba(244,246,250,.74); --ink-faint:rgba(244,246,250,.48);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
    --cat-health:#ff7a90; --cat-work:#6aa6ff; --cat-personal:#66d6a3; --cat-family:#f5b13c;
    --line:rgba(255,255,255,.09); --amber:#ffbf5e; --accent:#7b96ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--ink);background:#05070d;overflow:hidden;display:grid;place-items:center;-webkit-font-smoothing:antialiased}
  #stage{position:relative;width:1280px;height:800px;overflow:hidden;transform-origin:center;transition:background 1s ease}
  #pick{display:none!important}
  #cv{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity .6s}
  #cv.on{opacity:1}
  #glow{position:absolute;inset:0;opacity:0;transition:opacity .8s;pointer-events:none}
  #glow.on{opacity:1}
  .vignette{position:absolute;inset:0;background:radial-gradient(130% 110% at 50% 26%,transparent 54%,rgba(0,0,0,.36));pointer-events:none}

  #home{position:absolute;top:38px;left:44px;width:48px;height:48px;display:grid;place-items:center;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#fff;cursor:pointer;z-index:60;transition:opacity .4s}
  #home svg{width:26px;height:26px}
  #home.hide{opacity:0;pointer-events:none}
  #orb{position:absolute;left:44px;bottom:44px;width:68px;height:68px;border-radius:50%;background:radial-gradient(circle at 34% 30%,#a9d4ff,#5b74ff 58%,#7a53ff 100%);box-shadow:0 0 30px rgba(107,138,255,.5),inset 0 2px 8px rgba(255,255,255,.4);z-index:50;animation:breathe 5s ease-in-out infinite;cursor:pointer}
  #orb.busy{animation:breathe 1.1s ease-in-out infinite;box-shadow:0 0 44px rgba(107,138,255,.85),inset 0 2px 8px rgba(255,255,255,.4)}
  /* ask-Zoe command bar (orb tap) */
  #cmdbar{position:absolute;left:50%;bottom:126px;transform:translateX(-50%) translateY(12px);width:620px;display:none;z-index:55;opacity:0;transition:.25s}
  #cmdbar.on{display:flex;opacity:1;transform:translateX(-50%)}
  #cmdbar input{flex:1;height:64px;border-radius:18px;border:1px solid rgba(255,255,255,.18);background:rgba(14,16,26,.72);backdrop-filter:blur(18px);color:var(--ink);font:inherit;font-size:23px;padding:0 24px;outline:none}
  #cmdbar input::placeholder{color:var(--ink-faint)}
  #cmdbar{gap:10px}
  #cmdbar button{width:64px;height:64px;flex:none;border-radius:18px;border:0;background:var(--accent);color:#fff;font-size:24px;cursor:pointer}
  #cmdbar button:active{transform:scale(.94)}
  #saytoast{position:absolute;left:50%;top:54px;transform:translateX(-50%);max-width:820px;background:rgba(14,16,26,.72);border:1px solid rgba(255,255,255,.14);border-radius:16px;backdrop-filter:blur(16px);padding:14px 26px;font-size:22px;z-index:56;opacity:0;pointer-events:none;transition:opacity .3s}
  #saytoast.on{opacity:1}
  /* Lists — full-screen multi-column */
  .lstf{position:absolute;inset:0;padding:104px 56px 150px;display:flex;gap:20px;overflow-x:auto;align-items:flex-start}
  .lcol{min-width:300px;max-width:350px;flex:1 0 300px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:22px;padding:20px 20px 16px}
  .lcol h3{font-size:22px;font-weight:600}
  .lcol .lct{font-size:14px;color:var(--ink-faint);margin:2px 0 12px}
  .lcol .lrow{display:flex;align-items:center;gap:12px;padding:10px 2px;border-top:1px solid rgba(255,255,255,.07);font-size:19px;cursor:pointer}
  .lcol .lrow .bx{width:22px;height:22px;border-radius:7px;border:2px solid rgba(255,255,255,.3);flex:none;display:grid;place-items:center;color:#08131c}
  .lcol .lrow.done .bx{background:var(--cat-personal);border-color:var(--cat-personal)}
  .lcol .lrow.done .tx2{color:var(--ink-faint);text-decoration:line-through}
  .lcol .ladd{display:flex;gap:8px;margin-top:12px}
  .lcol .ladd input{flex:1;min-width:0;height:44px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--ink);font:inherit;font-size:17px;padding:0 12px;outline:none}
  .lcol .ladd button{width:44px;height:44px;border-radius:12px;border:0;background:var(--accent);color:#fff;font-size:20px;cursor:pointer}
  .lcol.newl{background:transparent;border-style:dashed}
  .lcol.newl select{width:100%;height:44px;margin-top:8px;border-radius:12px;background:rgba(255,255,255,.06);color:var(--ink);border:1px solid rgba(255,255,255,.14);font:inherit;padding:0 8px}
  /* Day — full-screen: timeline + reminders (+ comms when a source exists) */
  .dayf{position:absolute;inset:0;padding:106px 70px 150px;display:flex;gap:48px}
  .dayf .dc1{flex:1.35;min-width:0}
  .dayf .dk{font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
  .dayf h1{font-size:46px;font-weight:600;letter-spacing:-.02em;margin:6px 0 18px}
  .dayf .dev{display:flex;align-items:center;gap:16px;padding:15px 0;border-top:1px solid rgba(255,255,255,.08)}
  .dayf .dev .t{width:96px;flex:none;font-size:21px;color:var(--ink-soft);white-space:nowrap;font-variant-numeric:tabular-nums}
  .dayf .dev .dot{width:12px;height:12px;border-radius:50%;background:var(--c);box-shadow:0 0 10px var(--c);flex:none}
  .dayf .dev .en{font-size:23px;font-weight:500}
  .dayf .dev .es{font-size:16px;color:var(--ink-faint);margin-top:1px}
  .dayf .dc2{width:380px;flex:none;display:flex;flex-direction:column;gap:26px}
  .dayf .dsec{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:22px;padding:20px 22px}
  .dayf .dsec h4{font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}
  .dayf .drem{display:flex;gap:12px;align-items:baseline;padding:9px 0;border-top:1px solid rgba(255,255,255,.07);font-size:19px}
  .dayf .drem:first-of-type{border-top:0}
  .dayf .drem .rt{color:var(--ink-faint);font-size:16px;min-width:96px}
  /* Lists v2 — tab selector + selected list in flowing columns */
  .lstf2{position:absolute;inset:0;padding:100px 64px 150px;display:flex;flex-direction:column}
  .ltabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .ltab{font-size:19px;font-weight:500;color:var(--ink-soft);padding:10px 20px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);cursor:pointer;white-space:nowrap}
  .ltab.on{background:rgba(123,150,255,.22);border-color:rgba(123,150,255,.55);color:var(--ink);font-weight:600}
  .lmeta{font-size:15px;color:var(--ink-faint);margin-bottom:14px}
  .lcols{flex:1;column-count:3;column-gap:28px;overflow-y:auto}
  .lrow2{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid rgba(255,255,255,.07);font-size:20px;cursor:pointer;break-inside:avoid}
  .lrow2 .bx{width:24px;height:24px;border-radius:8px;border:2px solid rgba(255,255,255,.3);flex:none;display:grid;place-items:center;color:#08131c}
  .lrow2.done .bx{background:var(--cat-personal);border-color:var(--cat-personal)}
  .lrow2.done .tx2{color:var(--ink-faint);text-decoration:line-through}
  .laddbar{display:flex;gap:10px;margin-top:16px;max-width:520px}
  .laddbar input{flex:1;height:52px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--ink);font:inherit;font-size:19px;padding:0 16px;outline:none}
  .laddbar button{width:52px;height:52px;border-radius:14px;border:0;background:var(--accent);color:#fff;font-size:22px;cursor:pointer}
  .laddbar select{height:52px;border-radius:14px;background:rgba(255,255,255,.06);color:var(--ink);border:1px solid rgba(255,255,255,.14);font:inherit;padding:0 10px}
  /* Contacts — full-screen tile grid + detail */
  .ctf{position:absolute;inset:0;padding:92px 40px 150px;display:flex;flex-direction:column}
  .ctwrap{flex:1;display:flex;gap:10px;min-height:0}
  .ctgrid{flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:16px;align-content:start;overflow-y:auto;scroll-behavior:smooth}
  .ctaz{width:34px;flex:none;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1px}
  .ctaz span{font-size:13px;color:var(--ink-faint);padding:1px 8px;cursor:pointer;border-radius:8px}
  .ctaz span.has{color:var(--ink-soft);font-weight:600}
  .ctaz span:active{background:rgba(123,150,255,.3);color:#fff}
  .cttile{display:flex;flex-direction:column;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:22px 12px;cursor:pointer;transition:background .15s,transform .1s}
  .cttile:active{transform:scale(.96)}
  .cttile .pav{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-size:26px;font-weight:600;color:#0a0d14}
  .cttile .pn2{font-size:20px;font-weight:500;text-align:center}
  .cttile .pr2{font-size:14px;color:var(--ink-faint)}
  .ctdetail{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(7,10,22,.6);backdrop-filter:blur(14px)}
  .ctdetail.on{display:flex}
  .ctcard{width:640px;background:linear-gradient(180deg,rgba(255,255,255,.085),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.14);border-radius:30px;padding:36px 42px;box-shadow:0 30px 90px rgba(0,0,0,.5)}
  .ctcard .cthead{display:flex;align-items:center;gap:20px;margin-bottom:22px}
  .ctcard .pav{width:76px;height:76px;border-radius:50%;display:grid;place-items:center;font-size:30px;font-weight:600;color:#0a0d14}
  .ctcard h2{font-size:32px;font-weight:600}
  .ctcard .ctrel{font-size:17px;color:var(--ink-faint)}
  .ctcard .ctrow{display:flex;gap:14px;padding:12px 0;border-top:1px solid rgba(255,255,255,.08);font-size:20px}
  .ctcard .ctrow .cl{width:120px;color:var(--ink-faint);font-size:16px;flex:none;padding-top:2px}
  .ctcard .ctclose{margin-top:22px;width:100%;height:52px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:var(--ink);font:inherit;font-size:18px;cursor:pointer}
  /* Calendar — day / week / month */
  .calf{position:absolute;inset:0;padding:100px 64px 150px;display:flex;flex-direction:column}
  .calhead{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .calhead h1{font-size:34px;font-weight:600;flex:1}
  .calviews{display:flex;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:5px}
  .calviews button{font:inherit;font-size:16px;color:var(--ink-soft);background:transparent;border:0;border-radius:999px;padding:8px 18px;cursor:pointer}
  .calviews button.on{background:#fff;color:#0a0d14;font-weight:600}
  .calbody{flex:1;overflow-y:auto}
  .calmonth{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .calmonth .cmh{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);text-align:center;padding:4px 0}
  .cmd{min-height:76px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.07);padding:7px 9px;font-size:15px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
  .cmd.dim{opacity:.3}
  .cmd.today{border-color:rgba(123,150,255,.65);background:linear-gradient(180deg,rgba(123,150,255,.18),rgba(123,150,255,.08));box-shadow:0 0 22px rgba(123,150,255,.18),inset 0 1px 0 rgba(255,255,255,.1)}
  .cmd.today .dn{color:#fff;font-weight:600}
  .cmd .dn{font-size:14px;color:var(--ink-soft)}
  .cmd .cev{font-size:12px;color:var(--ink);border-left:3px solid var(--c,var(--accent));background:color-mix(in srgb,var(--c,var(--accent)) 20%,transparent);border-radius:5px;padding:2px 7px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .calweek{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  .cwc{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:12px 10px;min-height:300px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
  .cwc h5{font-size:14px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;text-align:center}
  .cwc.today{border-color:rgba(123,150,255,.6);background:linear-gradient(180deg,rgba(123,150,255,.15),rgba(123,150,255,.05));box-shadow:0 0 22px rgba(123,150,255,.15)}
  .cwe{font-size:14px;border-left:3px solid var(--c,var(--accent));background:color-mix(in srgb,var(--c,var(--accent)) 18%,transparent);border-radius:7px;padding:5px 9px;margin-bottom:6px}
  .cwe small{display:block;color:var(--ink-soft);opacity:.8;margin-top:1px;font-variant-numeric:tabular-nums}
  .caldaylist .dev{display:flex;align-items:center;gap:16px;padding:15px 0;border-top:1px solid rgba(255,255,255,.08)}
  /* Settings — expanding sections */
  .setf{position:absolute;inset:0;padding:100px 200px 150px;display:flex;flex-direction:column}
  .setsec{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:20px;margin-bottom:14px;overflow:hidden}
  .setsec .sh{display:flex;align-items:center;gap:14px;padding:20px 24px;cursor:pointer;font-size:22px;font-weight:500}
  .setsec .sh .caret{margin-left:auto;color:var(--ink-faint);transition:transform .25s}
  .setsec.open .sh .caret{transform:rotate(90deg)}
  .setsec .sbody{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .setsec.open .sbody{max-height:400px}
  .setsec .sbody .inner{padding:4px 24px 20px}
  .setsec .srow2{display:flex;align-items:center;gap:14px;padding:13px 2px;border-top:1px solid rgba(255,255,255,.07);font-size:19px;cursor:pointer}
  .setsec .srow2 .chev2{margin-left:auto;color:var(--ink-faint)}
  .setsec .sout{margin-top:14px;width:100%;height:50px;border-radius:13px;border:1px solid rgba(255,122,144,.4);background:rgba(255,122,144,.12);color:#ff9db0;font:inherit;font-size:18px;cursor:pointer}
  /* Timers */
  .tmore{position:absolute;left:50%;bottom:150px;transform:translateX(-50%);display:flex;gap:14px}
  .tmr{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:12px 18px;font-size:20px}
  .tmr b{font-variant-numeric:tabular-nums;font-size:24px}
  .tmr .tx3{color:var(--ink-soft)}
  .tmr button{width:38px;height:38px;border-radius:50%;border:0;background:var(--cat-health);color:#2a0910;font-size:16px;cursor:pointer}
  /* People */
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px;max-height:380px;overflow-y:auto}
  .pcard{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:12px 16px}
  .pcard .pav{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-size:19px;font-weight:600;color:#0a0d14;flex:none}
  .pcard .pn2{font-size:20px;font-weight:500}
  .pcard .pr2{font-size:14px;color:var(--ink-faint)}
  /* Settings */
  .sgrid .srow2{display:flex;align-items:center;gap:14px;padding:14px 4px;border-top:1px solid rgba(255,255,255,.08);font-size:20px;cursor:pointer}
  .sgrid .srow2:first-child{border-top:0}
  .sgrid .srow2 .chev2{margin-left:auto;color:var(--ink-faint)}
  .sgrid .sout{margin-top:18px;width:100%;height:52px;border-radius:14px;border:1px solid rgba(255,122,144,.4);background:rgba(255,122,144,.12);color:#ff9db0;font:inherit;font-size:19px;cursor:pointer}
  /* who + PIN unlock card (estate-native login) */
  #authov{position:absolute;inset:0;z-index:80;display:none;align-items:center;justify-content:center;background:rgba(7,10,22,.66);backdrop-filter:blur(18px)}
  #authov.on{display:flex}
  .acard{width:880px;background:linear-gradient(180deg,rgba(255,255,255,.085),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.14);border-radius:34px;padding:38px 46px;display:flex;gap:44px;box-shadow:0 30px 90px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.14)}
  .acard .colL{width:330px;flex:none;align-self:center}
  .acard .colR{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-left:44px;border-left:1px solid rgba(255,255,255,.08)}
  .acard h2{font-size:25px;font-weight:600;margin-bottom:5px}
  .acard .sub{font-size:15px;color:var(--ink-faint);margin-bottom:22px}
  .au{display:flex;align-items:center;gap:16px;cursor:pointer;padding:9px 12px;border-radius:18px;border:1px solid transparent}
  .au .av{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;font-size:23px;font-weight:600;color:#0a0d14;flex:none}
  .au .nm2{font-size:22px;font-weight:500;color:var(--ink-soft)}
  .au.sel{background:rgba(123,150,255,.16);border-color:rgba(123,150,255,.5)}
  .au.sel .nm2{color:var(--ink);font-weight:600}
  .alead{font-size:28px;font-weight:600;text-align:center}
  .alead .n{color:var(--accent)}
  .adots{display:flex;gap:22px;height:22px;margin:24px 0}
  .adot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.34)}
  .adot.f{background:var(--accent);border-color:var(--accent);box-shadow:0 0 14px rgba(123,150,255,.6)}
  .apin{opacity:.3;pointer-events:none;transition:opacity .3s;display:flex;flex-direction:column;align-items:center}
  .apin.on{opacity:1;pointer-events:auto}
  .apin.err .adots{animation:ashake .4s}.apin.err .adot{border-color:#ff7a90}
  @keyframes ashake{0%,100%{transform:none}25%{transform:translateX(-9px)}55%{transform:translateX(8px)}80%{transform:translateX(-5px)}}
  .apad{display:grid;grid-template-columns:repeat(3,86px);gap:14px}
  .akey{height:72px;border-radius:19px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.055);color:var(--ink);font:inherit;font-size:29px;font-weight:500;cursor:pointer}
  .akey:active{transform:scale(.93);background:rgba(123,150,255,.3)}
  .akey.ghost{background:transparent;border-color:transparent;cursor:default}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

  /* ===== FULL-SCREEN (feel it) ===== */

  /* ===== CARD (act on it) ===== */

  function loadHA(cb){apiGet('/api/ha/entities').then(function(s){

      // virtual switches (Living Room Light, Ceiling Fan, TV, …).
      _ha.lights=arr.filter(function(e){return dom(e)==='light';}).concat(arr.filter(function(e){return dom(e)==='input_boolean';}));

      // ha_control envelope carrying its count field) — a malformed 200 from a
      // sick bridge must not read as "the house has no devices".

    }).catch(function(){_ha.loaded=true;_ha.ok=false;cb&&cb();});}

  // ---- Timers: live countdowns + cancel (server-authoritative) ----
  function fmtT(s){s=Math.max(0,Math.round(s));var m=Math.floor(s/60);return m+':'+two(s%60);}
  function wireTimer(){
    function paint(){apiJson('GET','/api/skybridge/timers').then(function(d){if(_cur!=='timer')return;
      var ts=(d.timers||[]);
      var timeEl=document.getElementById('tmTime'),lab=document.getElementById('tmLabel'),ctl=document.getElementById('tmCtl'),more=document.getElementById('tmMore'),arc=document.getElementById('tmArc');
      if(!ts.length){if(timeEl)timeEl.textContent='0:00';if(lab)lab.textContent='No timers — ask Zoe to set one';if(ctl)ctl.innerHTML='';if(more)more.innerHTML='';if(arc)arc.style.strokeDashoffset=1181;return;}
      function remainOf(t){if(t.expires_at_ms!=null)return (t.expires_at_ms-Date.now())/1000;if(t.ends_at)return (new Date(t.ends_at).getTime()-Date.now())/1000;if(t.remaining_seconds!=null)return t.remaining_seconds;return t.duration_seconds||0;}
      var first=ts[0];
      function tick(){if(_cur!=='timer')return;var rem=remainOf(first),dur=first.duration_seconds||Math.max(rem,1);
        if(timeEl)timeEl.textContent=fmtT(rem);
        if(arc)arc.style.strokeDashoffset=(1181*(1-Math.max(0,Math.min(1,rem/dur)))).toFixed(0);
        if(rem<=0)paint();}
      if(_homeTick){clearInterval(_homeTick);_homeTick=null;}   // repaints must not stack tickers
      tick();_homeTick=setInterval(tick,1000);
      if(lab)lab.textContent=first.label||first.title||'Timer';
      if(ctl)ctl.innerHTML='<button class="stop" data-tid="'+esc(first.timer_id||first.id)+'">■</button>';
      if(more)more.innerHTML=ts.slice(1,4).map(function(t){return '<div class="tmr"><b>'+fmtT(remainOf(t))+'</b><span class="tx3">'+esc(t.label||'Timer')+'</span><button data-tid="'+esc(t.timer_id||t.id)+'">✕</button></div>';}).join('');
      [ctl,more].forEach(function(el){if(!el)return;el.onclick=function(e){var b=e.target.closest('button[data-tid]');if(!b)return;
        apiJson('POST','/api/skybridge/timers/cancel',{timer_id:b.getAttribute('data-tid')}).then(function(){clearInterval(_homeTick);paint();}).catch(function(){});};});

  }

  function paintCal(){
    var body=document.getElementById('calBody'),ttl=document.getElementById('calTtl');if(!body)return;

    else if(_cal.view==='week'){start=new Date(now);start.setDate(now.getDate()-((now.getDay()+6)%7));end=new Date(start);end.setDate(start.getDate()+6);}
    else{start=new Date(now.getFullYear(),now.getMonth(),1);end=new Date(now.getFullYear(),now.getMonth()+1,0);}
    if(ttl)ttl.textContent=_cal.view==='month'?now.toLocaleDateString(undefined,{month:'long',year:'numeric'}):(_cal.view==='week'?'This week':now.toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'}));
    apiGet('/api/calendar/events?start_date='+isoD(start)+'&end_date='+isoD(end)).then(function(d){if(_cur!=='calendar'||gen!==_cal.gen)return;

          html+='<div class="cmd'+(k===isoD(now)?' today':'')+'"><div class="dn">'+dnum+'</div>'+es.slice(0,2).map(function(e){var c=CAT[(e.category||'').toLowerCase()]||'var(--accent)';return '<div class="cev" style="--c:'+c+'">'+esc(e.title||'')+'</div>';}).join('')+(es.length>2?'<div class="cev" style="opacity:.6">+'+(es.length-2)+' more</div>':'')+'</div>';}

        body.innerHTML=html2+'</div>';

        var es3=byDay[isoD(now)]||[];
        body.innerHTML='<div class="caldaylist">'+(es3.map(function(e){var cat=CAT[(e.category||'').toLowerCase()]||'var(--accent)';return '<div class="dev"><div class="t" style="width:96px;flex:none;font-size:21px;color:var(--ink-soft)">'+esc(e.all_day?'All day':fmt12(e.start_time))+'</div><span class="dot" style="--c:'+cat+';width:12px;height:12px;border-radius:50%;background:var(--c);box-shadow:0 0 10px var(--c);flex:none"></span><div><div class="en" style="font-size:23px;font-weight:500">'+esc(e.title||'Event')+'</div>'+(e.location?'<div class="es" style="font-size:16px;color:var(--ink-faint)">'+esc(e.location)+'</div>':'')+'</div></div>';}).join('')||'<div style="color:var(--ink-faint);font-size:20px;padding-top:20px">Nothing scheduled today.</div>')+'</div>';
      }
    }).catch(function(){if(_cur!=='calendar'||gen!==_cal.gen)return;body.innerHTML='<div style="color:var(--ink-faint);font-size:20px">Couldn’t load the calendar.</div>';});

  // ---- ask-Zoe command loop (orb tap → /api/skybridge/resolve → result) ----
  // Same resolver the voice pipeline uses, so typed and spoken commands behave
  // identically; voice-pushed server actions are handled by touch-ui-executor.js.
  var DOMAIN_SCREEN={smart_home:'rooms',calendar:'day',lists:'list',weather:'weather',music:'music',reminders:'reminder'};
  var cmdbar=document.getElementById('cmdbar'),cmdin=document.getElementById('cmdin'),orb=document.getElementById('orb'),toastEl=document.getElementById('saytoast'),_toastT=null;
  function toast(t){if(!t)return;toastEl.textContent=t;toastEl.classList.add('on');if(_toastT)clearTimeout(_toastT);_toastT=setTimeout(function(){toastEl.classList.remove('on');},6000);}
  var _heardT=null,_sending=false;
  function dockHeard(q){dock.classList.remove('hide');dbody.innerHTML='<div class="dheard">Heard: <b>'+esc(q)+'</b></div>';
    // heard is transient — bring the pinned controls back after a few seconds
    if(_heardT)clearTimeout(_heardT);
    _heardT=setTimeout(function(){if(dbody.querySelector('.dheard')&&_cur!=='sleep')renderDock();},8000);}
  function sendCmd(q){
    q=(q||'').trim();if(!q||_sending)return;   // in-flight guard: cleared when the resolve completes
    _sending=true;
    cmdbar.classList.remove('on');cmdin.value='';orb.classList.add('busy');
    fetch('/api/skybridge/resolve',{method:'POST',headers:{'Content-Type':'application/json','X-Session-ID':sid()},credentials:'include',body:JSON.stringify({message:q,context:{panel_id:(localStorage.getItem('zoe_panel_id')||localStorage.getItem('zoe_touch_panel_id')||'')}})})
      .then(function(r){if(!r.ok)throw new Error('http '+r.status);return r.json();})
      .then(function(d){orb.classList.remove('busy');_sending=false;
        if(!d||d.handled===false){askZoe(q);return;}   // questions fall through to the brain
        if(d.auth_required){dockHeard(q);toast(d.spoken_summary||d.message||'Please sign in on the panel first.');return;}
        var dest=DOMAIN_SCREEN[(d&&d.intent&&d.intent.domain)||''];
        _ha.loaded=false;              // the command may have changed device state
        if(dest)show(dest);
        setTimeout(refreshHA,800);     // re-pull so dock pills reflect the change
        dockHeard(q);toast(d.spoken_summary||'Done.');
      }).catch(function(){orb.classList.remove('busy');_sending=false;dockHeard(q);toast('Sorry — I couldn’t reach Zoe just then.');});
  }
  // Free-form questions → the brain (/api/chat/ AG-UI stream) → the Ask screen.
  var _askGen=0;
  function askZoe(q){
    var gen=++_askGen;_sending=true;   // stays true until THIS stream finishes
    FULL.ask.html='<div class="askf"><div class="aa" id="askOut">…</div></div>';
    show('ask');dockHeard(q);orb.classList.add('busy');
    fetch('/api/chat/',{method:'POST',headers:{'Content-Type':'application/json','X-Session-ID':sid()},credentials:'include',body:JSON.stringify({message:q})})
      .then(function(r){if(!r.ok||!r.body)throw new Error('http '+r.status);
        var rd=r.body.getReader(),dec=new TextDecoder(),buf='',txt='';
        function pump(){return rd.read().then(function(x){
          if(x.done){if(gen===_askGen){orb.classList.remove('busy');_sending=false;if(!txt){var o=document.getElementById('askOut');if(o)o.textContent='Sorry — no answer came back.';}}return;}
          if(gen!==_askGen)return;   // a newer ask superseded this stream
          buf+=dec.decode(x.value,{stream:true});
          var lines=buf.split('\n');buf=lines.pop();
          lines.forEach(function(ln){if(ln.lastIndexOf('data: ',0)!==0)return;
            try{var ev=JSON.parse(ln.slice(6));
              if((ev.type==='TEXT_MESSAGE_CHUNK'||ev.type==='TEXT_MESSAGE_CONTENT')&&ev.delta){txt+=ev.delta;var o=document.getElementById('askOut');if(o&&_cur==='ask')o.textContent=txt;}
            }catch(e){}});
          return pump();});}
        return pump();
      }).catch(function(){if(gen!==_askGen)return;orb.classList.remove('busy');_sending=false;var o=document.getElementById('askOut');if(o)o.textContent='Sorry — I couldn’t reach Zoe just then.';});
  }

  orb.addEventListener('click',function(){
    var on=cmdbar.classList.toggle('on');
    if(on){setTimeout(function(){cmdin.focus();},50);}
  });
  cmdin.addEventListener('keydown',function(e){if(e.key==='Enter')sendCmd(cmdin.value);if(e.key==='Escape')cmdbar.classList.remove('on');});
  document.getElementById('cmdgo').addEventListener('click',function(){sendCmd(cmdin.value);});

  // ---- estate-native who + PIN unlock (replaces the old login page) ----
  window.__showAuthCard=function(){var ov=document.getElementById("authov");if(ov&&!ov.classList.contains("on"))initAuthCard();};
  function initAuthCard(){(function(){
    var ov=document.getElementById('authov'),list=document.getElementById('auList'),lead=document.getElementById('auLead'),pin=document.getElementById('auPin'),dots=document.getElementById('auDots').children,pad=document.getElementById('auPad');
    var AVC=['#7b96ff','#66d6a3','#f5b13c','#ff7a90','#9aa6bd','#5ec8f0'];
    var sel=null,code='';ov.classList.add('on');
    function rdots(){for(var i=0;i<4;i++)dots[i].classList.toggle('f',i<code.length);}
    pad.innerHTML=['1','2','3','4','5','6','7','8','9','','0','⌫'].map(function(k){return k===''?'<button class="akey ghost"></button>':'<button class="akey" data-k="'+k+'">'+k+'</button>';}).join('');
    fetch('/api/auth/profiles').then(function(r){return r.json();}).then(function(ps){
      list.innerHTML=(ps||[]).slice(0,6).map(function(p,i){return '<div class="au" data-u="'+esc(p.user_id)+'" data-n="'+esc(p.username)+'"><div class="av" style="background:'+AVC[i%AVC.length]+'">'+esc((p.avatar||p.username||'?').charAt(0).toUpperCase())+'</div><div class="nm2">'+esc(p.username)+'</div></div>';}).join('');
      list.addEventListener('click',function(e){var u=e.target.closest('.au');if(!u)return;
        [].forEach.call(list.children,function(x){x.classList.toggle('sel',x===u);});
        sel={user_id:u.getAttribute('data-u'),username:u.getAttribute('data-n')};
        lead.innerHTML='Hi <span class="n">'+esc(sel.username)+'</span>';code='';rdots();pin.classList.add('on');});
    }).catch(function(){lead.textContent='Sign-in unavailable';});
    pad.addEventListener('click',function(e){var b=e.target.closest('.akey');if(!b||!sel||b.classList.contains('ghost'))return;
      var k=b.getAttribute('data-k');
      if(k==='⌫'){code=code.slice(0,-1);rdots();return;}
      if(code.length>=4)return;
      code+=k;rdots();
      if(code.length===4){var pc=code;
        fetch('/api/auth/login/passcode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:sel.username,user_id:sel.user_id,passcode:pc})})
          .then(function(r){return r.json().catch(function(){return {};}).then(function(d){return {ok:r.ok,d:d};});})
          .then(function(x){
            if(x.ok&&x.d&&x.d.success&&x.d.session_id){
              try{localStorage.setItem('zoe_session',JSON.stringify({session_id:x.d.session_id,user_id:x.d.user_id||sel.user_id,username:sel.username,role:x.d.role||'user'}));}catch(e){}
              location.reload();return;
            }
            pin.classList.add('err');setTimeout(function(){pin.classList.remove('err');code='';rdots();},450);
          }).catch(function(){pin.classList.add('err');setTimeout(function(){pin.classList.remove('err');code='';rdots();},450);});
      }});
  })();}
  if(window.__needAuth)initAuthCard();

  // Voice-pushed arrival: display-only params from the voice pipeline
  // (?heard=&say=&domain=) — show the transcript + summary and open the
  // matching screen WITHOUT re-executing the command.
  (function(){
    var sp=new URLSearchParams(location.search);
    var heard=sp.get('heard'),say=sp.get('say'),dom=sp.get('domain');
    if(!heard&&!say)return;
    show(DOMAIN_SCREEN[dom||'']||'home');
    if(heard)dockHeard(heard);
    if(say)toast(say);
    try{var keep=[];if(sp.get('panel_id'))keep.push('panel_id='+encodeURIComponent(sp.get('panel_id')));if(sp.get('kiosk'))keep.push('kiosk='+encodeURIComponent(sp.get('kiosk')));
      history.replaceState(null,'',location.pathname+(keep.length?('?'+keep.join('&')):''));}catch(e){}
    window.__voiceArrived=true;
  })();

  if(!window.__voiceArrived)show('home');
})();
</script>
