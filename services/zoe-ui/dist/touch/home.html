<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zoe</title>
<meta name="theme-color" content="#05070d">
<script>
  /* Auth guard — the estate is the panel home; require a valid session or bounce
     to login. A malformed session counts as no session; carry the panel_id query
     through so the panel keeps its binding after signing in. */
  (function(){var ok=false;try{var s=JSON.parse(localStorage.getItem('zoe_session')||'null');ok=!!(s&&s.session_id);}catch(e){ok=false;}
    if(!ok){var q=location.search||'';sessionStorage.setItem('zoe_redirect_after_login','/touch/home.html'+q);location.replace('/touch/index.html'+q);}
  })();
</script>
<style>
  :root{
    --ink:#F4F6FA; --ink-soft:rgba(244,246,250,.74); --ink-faint:rgba(244,246,250,.48);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
    --cat-health:#ff7a90; --cat-work:#6aa6ff; --cat-personal:#66d6a3; --cat-family:#f5b13c;
    --line:rgba(255,255,255,.09); --amber:#ffbf5e; --accent:#7b96ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--ink);background:#05070d;overflow:hidden;display:grid;place-items:center;-webkit-font-smoothing:antialiased}
  #stage{position:relative;width:1280px;height:800px;overflow:hidden;transform-origin:center;transition:background 1s ease}
  #pick{display:none!important}
  #cv{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity .6s}
  #cv.on{opacity:1}
  #glow{position:absolute;inset:0;opacity:0;transition:opacity .8s;pointer-events:none}
  #glow.on{opacity:1}
  .vignette{position:absolute;inset:0;background:radial-gradient(130% 110% at 50% 26%,transparent 54%,rgba(0,0,0,.36));pointer-events:none}

  #home{position:absolute;top:38px;left:44px;width:48px;height:48px;display:grid;place-items:center;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#fff;cursor:pointer;z-index:60;transition:opacity .4s}
  #home svg{width:26px;height:26px}
  #home.hide{opacity:0;pointer-events:none}
  #orb{position:absolute;left:44px;bottom:44px;width:68px;height:68px;border-radius:50%;background:radial-gradient(circle at 34% 30%,#a9d4ff,#5b74ff 58%,#7a53ff 100%);box-shadow:0 0 30px rgba(107,138,255,.5),inset 0 2px 8px rgba(255,255,255,.4);z-index:50;animation:breathe 5s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

  /* ===== FULL-SCREEN (feel it) ===== */
  #full{position:absolute;inset:0;z-index:20;opacity:0;pointer-events:none;transition:opacity .5s}
  #full.on{opacity:1;pointer-events:auto}

  .loc{position:absolute;top:46px;right:58px;font-size:22px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.85);text-shadow:0 2px 16px rgba(0,0,0,.4)}
  .wbig{position:absolute;left:70px;top:190px;text-shadow:0 6px 40px rgba(0,0,0,.4)}
  .wbig .t{font-size:230px;font-weight:200;letter-spacing:-.05em;line-height:.82;color:#fff}
  .wbig .c{font-size:33px;font-weight:400;margin-top:22px;color:rgba(255,255,255,.94)}
  .wbig .c small{color:rgba(255,255,255,.66);font-size:27px}
  .whours{position:absolute;left:210px;right:58px;bottom:160px;display:flex;justify-content:space-between}
  .whours .hh{display:flex;flex-direction:column;align-items:center;gap:12px;flex:1}
  .whours .hh .lab{font-size:19px;color:rgba(255,255,255,.78)}
  .whours .hh .ic svg{width:36px;height:36px;display:block;filter:drop-shadow(0 2px 8px rgba(0,0,0,.35))}
  .whours .hh .d{font-size:25px;font-weight:500;font-variant-numeric:tabular-nums}
  /* sunny/day sky → dark, legible text (icons keep their own colour) */
  #stage.wxlight .wloc{color:rgba(20,30,50,.72);text-shadow:none}
  #stage.wxlight .wbig .t{color:#1b2740}
  #stage.wxlight .wbig .c{color:rgba(27,39,64,.92)}
  #stage.wxlight .wbig .c small{color:rgba(27,39,64,.6)}
  #stage.wxlight .whours .hh .lab{color:rgba(27,39,64,.72)}
  #stage.wxlight .whours .hh .d{color:#1b2740}

  /* music full */
  .mfull .mart{position:absolute;left:90px;top:150px;width:300px;height:300px;border-radius:28px;display:grid;place-items:center;font-size:120px;background:linear-gradient(140deg,#8ea6ff,#b49bff);box-shadow:0 34px 80px rgba(0,0,0,.5)}
  .mfull .minfo{position:absolute;left:440px;top:214px;right:120px}
  .mfull .mkick{font-size:16px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.6)}
  .mfull .mtitle{font-size:66px;font-weight:700;letter-spacing:-.02em;margin-top:14px;line-height:1}
  .mfull .martist{font-size:30px;color:rgba(255,255,255,.78);margin-top:12px}
  .mfull .mscrub{position:absolute;left:90px;right:120px;bottom:270px}
  .mfull .mtrack{position:relative;height:7px;border-radius:999px;background:rgba(255,255,255,.22)}
  .mfull .mfill{position:absolute;left:0;top:0;bottom:0;width:38%;border-radius:999px;background:#fff}
  .mfull .mknob{position:absolute;top:50%;left:38%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.4)}
  .mfull .mtimes{display:flex;justify-content:space-between;margin-top:12px;font-size:18px;color:rgba(255,255,255,.6);font-variant-numeric:tabular-nums}
  .mfull .mtransport{position:absolute;left:0;right:0;bottom:172px;display:flex;justify-content:center;align-items:center;gap:56px}
  .mfull .mtransport button{width:68px;height:68px;border-radius:50%;border:0;background:rgba(255,255,255,.16);color:#fff;font-size:24px;cursor:pointer}
  .mfull .mtransport .pp{width:84px;height:84px;background:#fff;color:#10131c;font-size:28px}

  /* timer full */
  .tfull{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding-bottom:120px}
  .tfull .tkick{font-size:20px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:34px}
  .tfull .tring{position:relative;width:420px;height:420px}
  .tfull .tring svg{transform:rotate(-90deg)}
  .tfull .tring .ttime{position:absolute;inset:0;display:grid;place-items:center;font-size:110px;font-weight:200;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .tfull .tsub{font-size:26px;color:var(--ink-soft);margin-top:12px}
  .tfull .tctrls{display:flex;gap:20px;margin-top:38px}
  .tfull .tctrls button{width:74px;height:74px;border-radius:50%;border:0;cursor:pointer;font-size:24px;background:rgba(255,255,255,.12);color:#fff;display:grid;place-items:center}
  .tfull .tctrls .stop{background:var(--cat-health);color:#2a0910}

  /* HOME = the living weather ambient with your day on it (no shopping) */
  .hfull .htemp{position:absolute;top:38px;right:60px;text-align:right;text-shadow:0 2px 16px rgba(0,0,0,.4)}
  .hfull .htemp .n{font-size:58px;font-weight:250;letter-spacing:-.02em;line-height:1}
  .hfull .htemp .c{font-size:20px;color:rgba(255,255,255,.8);margin-top:4px}
  .hfull .hclock{position:absolute;left:74px;top:176px;text-shadow:0 4px 34px rgba(0,0,0,.4)}
  .hfull .hclock .ht{font-size:170px;font-weight:200;letter-spacing:-.045em;line-height:.88}
  .hfull .hclock .hd{font-size:30px;color:rgba(255,255,255,.84);margin-top:14px}
  .hfull .today{position:absolute;right:70px;bottom:176px;width:434px}
  .hfull .today .thk{font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.66);margin-bottom:12px;text-align:right}
  .hfull .today .tr{display:grid;grid-template-columns:13px 94px 1fr;gap:16px;align-items:center;padding:13px 0;border-top:1px solid rgba(255,255,255,.16)}
  .hfull .today .tr:first-of-type{border-top:0}
  .hfull .today .tr .dot{width:13px;height:13px;border-radius:50%;background:var(--c);box-shadow:0 0 10px var(--c)}
  .hfull .today .tr .tt{font-size:19px;color:rgba(255,255,255,.78);text-align:right;font-variant-numeric:tabular-nums}
  .hfull .today .tr .tn{font-size:22px;font-weight:500;text-shadow:0 2px 10px rgba(0,0,0,.4)}
  /* living dock — your pinned controls, on the orb's line */
  .hdock{position:absolute;left:50%;bottom:56px;transform:translateX(-50%);background:rgba(14,16,26,.5);border:1px solid rgba(255,255,255,.12);border-radius:22px;backdrop-filter:blur(18px);box-shadow:0 20px 48px rgba(0,0,0,.42);padding:9px 20px;display:flex;align-items:center;gap:12px}
  .hdock .hpc{width:54px;height:54px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.82)}
  .hdock .hpc svg{width:26px;height:26px}
  .hdock .hpc.on{background:radial-gradient(circle at 40% 30%,rgba(255,214,140,.92),rgba(255,180,90,.3));color:#3a2a10;border-color:rgba(255,205,125,.5);box-shadow:0 0 26px rgba(255,190,100,.5)}
  .hdock .hpc .tv{font-size:19px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  .hdock .hpc .tl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:2px}

  /* SLEEP — a dim night clock, orb, and big easy named controls to wake to */
  .slp .sclock{position:absolute;top:50%;left:50%;transform:translate(-50%,-64%);display:flex;gap:64px;color:rgba(255,255,255,.7);font-weight:200;font-size:230px;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 40px rgba(120,150,220,.15)}
  .slp .sdate{position:absolute;top:50%;left:50%;transform:translate(-50%,120px);color:rgba(255,255,255,.34);font-size:26px;letter-spacing:.04em}
  .slp .sdock{position:absolute;left:50%;bottom:52px;transform:translateX(-50%);display:flex;gap:16px}
  .slp .sc{display:flex;flex-direction:column;align-items:center;gap:11px;padding:20px 30px;border-radius:22px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.62);min-width:132px;cursor:pointer;transition:.3s}
  .slp .sc svg{width:38px;height:38px}
  .slp .sc .nm{font-size:20px;font-weight:500}
  .slp .sc .bt{font-size:32px;font-weight:600;line-height:1}
  .slp .sc.on{background:radial-gradient(circle at 40% 28%,rgba(255,214,140,.8),rgba(255,180,90,.22));color:#3a2a10;border-color:rgba(255,205,125,.4);box-shadow:0 0 34px rgba(255,190,100,.35)}

  /* ROOMS — a control panel for everything in a room */
  .rm .rchips{position:absolute;top:46px;right:56px;display:flex;gap:8px}
  .rm .rchip{font-size:22px;font-weight:500;color:rgba(255,255,255,.5);padding:10px 20px;border-radius:999px}
  .rm .rchip.on{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
  .rm .rhero{position:absolute;left:60px;top:150px;width:560px;bottom:150px;border-radius:28px;overflow:hidden;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:38px;display:flex;flex-direction:column;justify-content:center}
  .rm .rhero .cover{position:absolute;inset:0;background:linear-gradient(150deg,rgba(106,166,255,.3),rgba(155,140,255,.12) 55%,transparent 78%);pointer-events:none}
  .rm .rhead{position:relative;display:flex;align-items:center;gap:24px}
  .rm .rart{width:160px;height:160px;border-radius:22px;flex:0 0 auto;display:grid;place-items:center;font-size:64px;background:linear-gradient(135deg,#8ea6ff,#b49bff);box-shadow:0 22px 50px rgba(0,0,0,.45)}
  .rm .rk{font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.6)}
  .rm .rt{font-size:40px;font-weight:700;letter-spacing:-.01em;margin-top:10px}
  .rm .ra{font-size:22px;color:rgba(255,255,255,.72);margin-top:6px}
  .rm .rscrub{position:relative;height:6px;border-radius:999px;background:rgba(255,255,255,.2);margin-top:32px}
  .rm .rscrub .f{position:absolute;left:0;top:0;bottom:0;width:38%;border-radius:999px;background:#fff}
  .rm .rtp{position:relative;display:flex;align-items:center;justify-content:center;gap:44px;margin-top:22px}
  .rm .rtp button{width:58px;height:58px;border-radius:50%;border:0;background:rgba(255,255,255,.14);color:#fff;font-size:20px;cursor:pointer}
  .rm .rtp .pp{width:66px;height:66px;background:#fff;color:#10131c;font-size:23px}
  .rm .rlights{position:absolute;right:130px;top:150px;width:440px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .rm .rlt{height:104px;border-radius:20px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);padding:16px 18px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}
  .rm .rlt.on{background:radial-gradient(120% 120% at 30% 20%,rgba(255,190,100,.22),rgba(255,190,100,.05));border-color:rgba(255,190,100,.4)}
  .rm .rlt .ri{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.06);color:rgba(255,255,255,.55)}
  .rm .rlt .ri svg{width:24px;height:24px}
  .rm .rlt.on .ri{color:#ffce88;box-shadow:0 0 22px rgba(255,180,90,.5)}
  .rm .rlt .rn{font-size:21px;font-weight:500}
  .rm .rlt .rs{font-size:16px;color:rgba(255,255,255,.5)}
  .rm .rlt.on .rs{color:#ffcf8c}
  .rm .rvol{position:absolute;right:44px;top:150px;bottom:150px;width:54px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .rm .rvt{position:relative;width:14px;flex:1;border-radius:999px;background:rgba(255,255,255,.16)}
  .rm .rvf{position:absolute;left:0;right:0;bottom:0;height:34%;border-radius:999px;background:linear-gradient(180deg,#9b8cff,#6aa6ff)}
  .rm .rvk{position:absolute;left:50%;bottom:34%;transform:translate(-50%,50%);width:32px;height:32px;border-radius:50%;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.4)}
  .rm .rvi{color:rgba(255,255,255,.7);font-size:22px}
  .rm .renv{position:absolute;right:124px;bottom:150px;display:flex;gap:14px}
  .rm .rec{display:flex;align-items:center;gap:12px;padding:14px 20px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
  .rm .rec.on{border-color:color-mix(in srgb,var(--h) 42%,transparent);background:color-mix(in srgb,var(--h) 12%,transparent)}
  .rm .rec .ei{font-size:24px}
  .rm .rec .ev{font-size:22px;font-weight:600;min-width:58px}
  .rm .rec.on .ev{color:var(--h)}

  /* ASK ZOE — a card-less answer rendered in place */
  .askf{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 150px;text-align:center;gap:32px}
  .askf .ah{font-size:27px;color:var(--ink-faint)}.askf .ah b{color:var(--ink-soft);font-weight:500}
  .askf .aa{font-size:46px;line-height:1.4;font-weight:300;max-width:920px}
  .askf .aa em{font-style:normal;font-weight:500;color:#fff}

  /* full-screen weather: location moves left so the top-right is free for the cog */
  .wloc{position:absolute;left:74px;top:150px;font-size:20px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.82);text-shadow:0 2px 14px rgba(0,0,0,.4)}

  /* settings cog — per card, and per full-screen */
  .card .cog{position:absolute;top:22px;right:22px;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:var(--ink-soft);cursor:pointer;z-index:6}
  .card .cog svg{width:22px;height:22px}
  .fcog{position:absolute;top:38px;right:56px;width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;z-index:30}
  .fcog svg{width:24px;height:24px}
  .hfull .htemp{right:120px} /* clear the home cog */

  /* speaker / cast selection on music */
  .spk{position:absolute;top:40px;right:56px;display:flex;align-items:center;gap:11px;padding:13px 20px;border-radius:999px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);color:#fff;font:inherit;font-size:19px;font-weight:500;cursor:pointer;z-index:30}
  .spk svg{width:22px;height:22px}
  .spk .cx{color:rgba(255,255,255,.7);font-size:16px}

  /* ===== CARD (act on it) ===== */
  #cardwrap{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:150px;opacity:0;pointer-events:none;transition:opacity .5s}
  /* persistent dock — on every screen: your pinned controls, or what was heard */
  #dock{position:absolute;left:50%;bottom:41px;transform:translateX(-50%);background:rgba(14,16,26,.5);border:1px solid rgba(255,255,255,.12);border-radius:20px;backdrop-filter:blur(18px);box-shadow:0 20px 48px rgba(0,0,0,.42);padding:9px 14px;display:flex;align-items:center;gap:10px;z-index:46;transition:opacity .4s}
  #dock.hide{opacity:0;pointer-events:none}
  #dbody{display:flex;align-items:center;gap:10px;height:54px}
  #dock .pc{height:54px;border-radius:15px;display:flex;align-items:center;gap:11px;padding:0 22px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.82);cursor:pointer;transition:.25s}
  #dock .pc svg{width:25px;height:25px}
  #dock .pc .nm{font-size:20px;font-weight:500}
  #dock .pc.on{background:radial-gradient(circle at 30% 30%,rgba(255,214,140,.9),rgba(255,180,90,.28));color:#3a2a10;border-color:rgba(255,205,125,.5);box-shadow:0 0 26px rgba(255,190,100,.45)}
  #dock .pc.temp{position:relative;flex-direction:column;justify-content:center;gap:2px;padding:0 20px}
  #dock .pc.temp .tv{font-size:19px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  #dock .pc.temp .tl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);line-height:1}
  #dock .pc.temp .tpop{position:absolute;bottom:64px;left:50%;transform:translateX(-50%) translateY(10px);width:112px;height:200px;padding:16px 0 14px;border-radius:18px;background:rgba(18,16,30,.74);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(16px);box-shadow:0 20px 50px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.28s;display:flex;flex-direction:column;align-items:center;gap:12px;z-index:50}
  #dock .pc.temp.open .tpop{opacity:1;transform:translateX(-50%);pointer-events:auto}
  #dock .pc.temp .tpv{font-size:22px;font-weight:700;color:#ff9d6e;font-variant-numeric:tabular-nums}
  #dock .pc.temp .tpl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.6)}
  #dock .pc.temp .tsl{position:relative;width:15px;flex:1;border-radius:999px;background:rgba(255,255,255,.18);cursor:pointer;touch-action:none}
  #dock .pc.temp .tff{position:absolute;left:0;right:0;bottom:0;border-radius:999px;background:linear-gradient(180deg,#ffb07a,#ff8a5a)}
  #dock .pc.temp .tkn{position:absolute;left:50%;transform:translate(-50%,50%);width:30px;height:30px;border-radius:50%;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.4)}
  #dock .dheard{font-size:23px;color:rgba(255,255,255,.6);padding:6px 12px}
  #dock .dheard b{color:#fff;font-weight:500}

  /* launcher: grid button (permanent, first in dock) + full-screen overlay */
  #dock .pc.apps{width:54px;padding:0;justify-content:center}
  #dock .pc.apps .g{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  #dock .pc.apps .g i{width:9px;height:9px;border-radius:3px;background:currentColor;display:block}
  #dock .pc.apps.active{background:rgba(123,150,255,.9);border-color:rgba(123,150,255,.6);color:#fff;box-shadow:0 0 24px rgba(123,150,255,.5)}
  #dock .ddiv{width:1px;height:34px;background:rgba(255,255,255,.14);margin:0 2px;flex:none}
  #stage.lopen #full,#stage.lopen #cardwrap,#stage.lopen #cv,#stage.lopen #glow{filter:blur(24px) brightness(.62);opacity:.7 !important}
  .launch{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;padding:80px 90px 150px;opacity:0;pointer-events:none;transition:opacity .35s;background:rgba(7,10,22,.42);backdrop-filter:blur(3px)}
  #stage.lopen .launch{opacity:1;pointer-events:auto}
  .launch .lt{font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:34px}
  .lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:30px 38px;width:100%;max-width:960px}

    var f=FULL[id], c=CARD[id];
    _cur=id; clearScreenTimers();
    stage.classList.remove('wxlight');
    [].forEach.call(pick.querySelectorAll('button'),function(b){b.classList.toggle('sel',b.dataset.id===id);});
    if(f){
      cardwrap.classList.remove('on'); full.classList.add('on');
      stage.style.background=f.bg; wxOn=!!f.canvas; cv.classList.toggle('on',!!f.canvas);
      glow.style.background=f.glow||'none'; glow.classList.toggle('on',!!f.glow);
      home.classList.toggle('hide',f.home===false);
      full.innerHTML=f.html;
      if(id==='home')initHome();
      if(id==='weather')wireWeather();
      full.querySelectorAll('.sc[data-t], .rlt[data-l], .hdock .hpc.light').forEach(function(el){el.onclick=function(){el.classList.toggle('on');var rs=el.querySelector('.rs');if(rs)rs.textContent=el.classList.contains('on')?'On':'Off';};});
      full.querySelectorAll('.rchip').forEach(function(c){c.onclick=function(){full.querySelectorAll('.rchip').forEach(function(x){x.classList.remove('on')});c.classList.add('on');};});
      var pp=full.querySelector('.pp');if(pp)pp.onclick=function(){pp.textContent=pp.textContent==='❚❚'?'▶':'❚❚';};
    } else {
      full.classList.remove('on'); wxOn=false; cv.classList.remove('on'); glow.classList.remove('on');
      stage.style.background=GROUND; home.classList.remove('hide');
      cardwrap.classList.add('on');
      host.innerHTML=c.html; var card=host.querySelector('.card'); if(card&&c.wash)card.style.setProperty('--wash',c.wash);
      if(id==='day')wireDay();
      if(id==='list')wireList();
    }
    // persistent dock: hidden on sleep; shows what was heard for a direct answer, else your pinned controls
    if(id==='sleep'){ dock.classList.add('hide'); }
    else {
      dock.classList.remove('hide');
      var hd=c?c.heard:(id==='ask'?'“What is the meaning of life?”':'');
      if(hd){ dbody.innerHTML='<div class="dheard">Heard: <b>'+hd+'</b></div>'; }
      else { renderDock(); }
    }
  }

  // ---- dock: real Home Assistant pinned controls (lights + thermostat) ----
  var _ha={loaded:false,lights:[],climate:null};
  function haControl(body){return fetch('/api/ha/control',{method:'POST',headers:{'Content-Type':'application/json','X-Session-ID':sid()},credentials:'include',body:JSON.stringify(body)});}
  function loadHA(cb){apiGet('/api/ha/states').then(function(s){
      var arr=Array.isArray(s)?s:((s&&s.states)||(s&&s.entities)||[]);
      _ha.lights=arr.filter(function(e){return String(e.entity_id||'').lastIndexOf('light.',0)===0;});
      _ha.climate=arr.filter(function(e){return String(e.entity_id||'').lastIndexOf('climate.',0)===0;})[0]||null;
      _ha.loaded=true;cb&&cb();
    }).catch(function(){_ha.loaded=true;cb&&cb();});}
  function renderDock(){
    if(!_ha.loaded){dbody.innerHTML='<div class="pc light">'+BULB+'<span class="nm">…</span></div>';loadHA(function(){if(dbody.querySelector('.dheard'))return;renderDock();});return;}
    var lights=_ha.lights.slice(0,2),cl=_ha.climate,html='';
    html+=lights.map(function(e){var on=String(e.state).toLowerCase()==='on';var nm=(e.attributes&&e.attributes.friendly_name)||e.entity_id;return '<div class="pc light'+(on?' on':'')+'" data-eid="'+esc(e.entity_id)+'">'+BULB+'<span class="nm">'+esc(nm)+'</span></div>';}).join('');
    if(!lights.length)html+='<div class="pc light"><span class="nm" style="opacity:.6">No lights</span></div>';
    if(cl){var a=cl.attributes||{};var cur=(a.current_temperature!=null?a.current_temperature:a.temperature);var tgt=(a.temperature!=null?a.temperature:cur);if(tgt==null)tgt=21;
      html+='<div class="pc temp" data-eid="'+esc(cl.entity_id)+'" data-tgt="'+esc(String(Math.round(tgt)))+'"><div class="tv">'+(cur!=null?Math.round(cur):'—')+'°</div><div class="tl">Temp</div><div class="tpop"><div class="tpv">'+Math.round(tgt)+'°</div><div class="tsl"><div class="tff"></div><div class="tkn"></div></div><div class="tpl">Thermostat</div></div></div>';}
    dbody.innerHTML=html;
    dbody.querySelectorAll('.pc.light[data-eid]').forEach(function(el){el.onclick=function(){var on=el.classList.toggle('on');haControl({entity_id:el.getAttribute('data-eid'),action:on?'turn_on':'turn_off'}).catch(function(){el.classList.toggle('on');});};});
    (function(){var tb=dbody.querySelector('.pc.temp');if(!tb)return;var eid=tb.getAttribute('data-eid'),tsl=tb.querySelector('.tsl'),tff=tb.querySelector('.tff'),tkn=tb.querySelector('.tkn'),tpv=tb.querySelector('.tpv'),tv=parseInt(tb.getAttribute('data-tgt'),10)||21;
      function pt(){var p=Math.max(0,Math.min(100,(tv-15)/13*100));tff.style.height=p+'%';tkn.style.bottom=p+'%';tpv.textContent=tv+'°';}pt();
      tb.onclick=function(e){if(e.target.closest('.tpop'))return;tb.classList.toggle('open');};
      var d=false;function at(y){var r=tsl.getBoundingClientRect();tv=Math.round(15+Math.max(0,Math.min(1,1-(y-r.top)/r.height))*13);pt();}
      tsl.addEventListener('pointerdown',function(e){d=true;tsl.setPointerCapture(e.pointerId);at(e.clientY);});
      tsl.addEventListener('pointermove',function(e){if(d)at(e.clientY);});
      tsl.addEventListener('pointerup',function(){d=false;haControl({entity_id:eid,action:'set_temperature',value:{temperature:tv}}).catch(function(){});});
    })();
  }

  // ---- launcher overlay (opened from the dock grid button) ----
  var LIC={
    home:'<path d="M3 11.4 12 4l9 7.4"/><path d="M5.6 9.8V20h12.8V9.8"/>',
    rooms:'<rect x="3" y="3" width="8" height="8" rx="1.6"/><rect x="13" y="3" width="8" height="8" rx="1.6"/><rect x="3" y="13" width="8" height="8" rx="1.6"/><rect x="13" y="13" width="8" height="8" rx="1.6"/>',
    music:'<circle cx="7" cy="18" r="2.6"/><circle cx="18" cy="16" r="2.6"/><path d="M9.6 18V6l10.8-2.2V16"/>',
    weather:'<circle cx="9" cy="9" r="3.4"/><path d="M9 2.6v1.6M9 13.8v1.6M2.6 9h1.6M13.8 9h1.6M4.4 4.4l1.1 1.1M12.5 12.5l1.1 1.1M4.4 13.6l1.1-1.1M12.5 5.5l1.1-1.1"/><path d="M11 19h7a3 3 0 0 0 .3-6A4 4 0 0 0 11 12.6"/>',
    day:'<rect x="3" y="4.5" width="18" height="16" rx="2.2"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/>',
    lists:'<path d="M9 6h11M9 12h11M9 18h11"/><path d="M4 5.6l1.2 1.2L7.4 4.4M4 11.6l1.2 1.2L7.4 10.4M4 17.6l1.2 1.2L7.4 16.4"/>',
    reminders:'<path d="M12 3a6 6 0 0 0-6 6c0 5-2.2 6.5-2.2 6.5h16.4S18 14 18 9a6 6 0 0 0-6-6z"/><path d="M10 19a2 2 0 0 0 4 0"/>',
    people:'<circle cx="12" cy="8" r="3.6"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/>',
    timer:'<circle cx="12" cy="13" r="8"/><path d="M12 13V8.5M9.5 2.5h5"/>',
    sleep:'<path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/>',
    ask:'<path d="M4 5.5h16a1.5 1.5 0 0 1 1.5 1.5v8a1.5 1.5 0 0 1-1.5 1.5H9l-4 3.5V16.5H4A1.5 1.5 0 0 1 2.5 15V7A1.5 1.5 0 0 1 4 5.5z"/><circle cx="8.5" cy="11" r="1"/><circle cx="12" cy="11" r="1"/><circle cx="15.5" cy="11" r="1"/>',
    settings:'<circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v2.6M12 18.9v2.6M4.9 4.9l1.9 1.9M17.2 17.2l1.9 1.9M2.5 12h2.6M18.9 12h2.6M4.9 19.1l1.9-1.9M17.2 6.8l1.9-1.9"/>'
  };
  // Home is the estate's own screen (real data). The deeper functions link to the
  // existing real pages until each is ported into the estate — so nothing shows
  // placeholder data on the live panel. (u = navigate to page; id = in-estate.)
  var DESTS=[
    {id:'home',n:'Home',ic:'home',c:'linear-gradient(150deg,#8aa0ff,#5b74ff)'},
    {id:'weather',n:'Weather',ic:'weather',c:'linear-gradient(150deg,#5ec8f0,#3f9bd8)'},
    {id:'day',n:'Day',ic:'day',c:'linear-gradient(150deg,#6aa6ff,#4a7de0)'},
    {id:'list',n:'Lists',ic:'lists',c:'linear-gradient(150deg,#66d6a3,#3fb98a)'},
    {u:'/touch/music.html',n:'Music',ic:'music',c:'linear-gradient(150deg,#c77bff,#8a53e8)'},
    {u:'/touch/smart-home.html',n:'Rooms',ic:'rooms',c:'linear-gradient(150deg,#63b8ff,#3f7bd8)'},
    {u:'/touch/people.html',n:'People',ic:'people',c:'linear-gradient(150deg,#ff7a90,#e85a78)'},
    {u:'/touch/timers.html',n:'Timers',ic:'timer',c:'linear-gradient(150deg,#ffbf5e,#f0961e)'},
    {u:'/touch/chat.html',n:'Chat',ic:'ask',c:'linear-gradient(150deg,#9a8cff,#6a53e8)'},
    {u:'/touch/settings.html',n:'Settings',ic:'settings',c:'linear-gradient(150deg,#9aa6bd,#6f7c96)'}
  ];
  var lgrid=document.getElementById('lgrid'),apps=document.getElementById('apps'),launch=document.getElementById('launch');
  lgrid.innerHTML=DESTS.map(function(d,i){var attr=d.u?('data-u="'+d.u+'"'):('data-id="'+d.id+'"');return '<div class="ltile" '+attr+' style="--i:'+i+'"><div class="lti" style="background:'+d.c+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+LIC[d.ic]+'</svg></div><div class="lcap">'+d.n+'</div></div>';}).join('');
  function lclose(){stage.classList.remove('lopen');apps.classList.remove('active');}
  function lopen(){stage.classList.add('lopen');apps.classList.add('active');}
  apps.onclick=function(e){e.stopPropagation();stage.classList.contains('lopen')?lclose():lopen();};
  launch.onclick=function(e){if(e.target===launch)lclose();};
  lgrid.addEventListener('click',function(e){var t=e.target.closest('.ltile');if(!t)return;lclose();var u=t.getAttribute('data-u');if(u){location.href=u;}else{show(t.dataset.id);}});
  addEventListener('keydown',function(e){if(e.key==='Escape')lclose();});

  // ---- live home data: real clock + weather + today's agenda (no placeholder data) ----
  var CAT={social:'var(--cat-personal)',health:'var(--cat-health)',work:'var(--cat-work)',family:'var(--cat-family)',personal:'var(--cat-personal)'};
  var _cur=null,_homeTick=null,_wxTick=null;
  function clearScreenTimers(){if(_homeTick){clearInterval(_homeTick);_homeTick=null;}if(_wxTick){clearInterval(_wxTick);_wxTick=null;}}
  function two(n){return (n<10?'0':'')+n;}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function fmt12(hhmm){var m=/^(\d{1,2}):(\d{2})/.exec(hhmm||'');if(!m)return esc(hhmm||'');var h=+m[1],ap=h<12?'am':'pm',hr=h%12;if(hr===0)hr=12;return hr+':'+m[2]+' '+ap;}
  function sid(){try{return (JSON.parse(localStorage.getItem('zoe_session')||'{}').session_id)||'';}catch(_){return '';}}
  var _authBounced=false;
  function apiGet(url){return fetch(url,{headers:{'X-Session-ID':sid()},credentials:'include'}).then(function(r){
    // Server is authoritative on session validity: an expired/invalid session
    // 401/403s here — clear it and return to login (the presence guard alone
    // can't detect server-side expiry).
    if(r.status===401||r.status===403){if(!_authBounced){_authBounced=true;try{localStorage.removeItem('zoe_session');}catch(e){}location.replace('/touch/index.html'+location.search);}throw new Error('auth');}
    if(!r.ok)throw new Error('http '+r.status);return r.json();});}
  function tickClock(){var c=document.getElementById('hClock');if(!c)return;var d=new Date(),h=d.getHours()%12;if(h===0)h=12;c.textContent=h+':'+two(d.getMinutes());var dt=document.getElementById('hDate');if(dt)dt.textContent=d.toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'});}
  function loadWeather(){apiGet('/api/weather/current').then(function(w){if(_cur!=='home')return;var el=document.getElementById('hTemp');if(!el||!w)return;var t=(w.temp!=null?w.temp:w.temperature);el.querySelector('.n').textContent=(t!=null?Math.round(t):'—')+'°';var c=(w.description||w.condition||'');el.querySelector('.c').textContent=c?c.charAt(0).toUpperCase()+c.slice(1):'';}).catch(function(){});}
  function loadToday(){var host=document.getElementById('hToday');if(!host)return;var d=new Date(),ds=d.getFullYear()+'-'+two(d.getMonth()+1)+'-'+two(d.getDate());
    apiGet('/api/calendar/events?start_date='+ds+'&end_date='+ds).then(function(data){
      if(_cur!=='home')return;
      var evs=((data&&data.events)||[]).filter(function(e){return !e.deleted;}).sort(function(a,b){return (a.start_time||'').localeCompare(b.start_time||'');});
      if(!evs.length){host.innerHTML='<div class="tr" style="opacity:.55"><span class="dot" style="--c:var(--accent)"></span><span class="tt"></span><span class="tn">Nothing scheduled today</span></div>';return;}
      host.innerHTML=evs.slice(0,4).map(function(e){var cat=CAT[(e.category||'').toLowerCase()]||'var(--accent)';var when=e.all_day?'All day':fmt12(e.start_time);return '<div class="tr"><span class="dot" style="--c:'+cat+'"></span><span class="tt">'+esc(when)+'</span><span class="tn">'+esc(e.title||'Event')+'</span></div>';}).join('');
    }).catch(function(){host.innerHTML='<div class="tr" style="opacity:.55"><span class="dot" style="--c:var(--cat-health)"></span><span class="tt"></span><span class="tn">Couldn’t load your day</span></div>';});}
  function initHome(){tickClock();_homeTick=setInterval(tickClock,15000);loadWeather();loadToday();
    _wxTick=setInterval(function(){if(_cur==='home'){loadWeather();loadToday();}},600000);}

  // ---- weather screen (real current + hourly forecast, condition-adaptive) ----
  var OWM_ICON={'01':'sun','02':'cloud','03':'cloud','04':'cloud','09':'rain','10':'rain','11':'rain','13':'cloud','50':'cloud'};
  var WXBG={day:'linear-gradient(180deg,#3f7bd8,#6ea6ec 42%,#a9cef4 80%,#d8ebfb)',night:'linear-gradient(180deg,#05060f,#0b1030 45%,#141a44)',cloud:'linear-gradient(180deg,#2a3138,#39434c 45%,#4b555e)',rain:'linear-gradient(180deg,#242c3a,#333d52 45%,#414d63)',dusk:DUSK};
  function owmIcon(code){var base=(code||'').slice(0,2),m=OWM_ICON[base]||'cloud';return (m==='sun'&&/n$/.test(code||''))?'moon':m;}
  function wxScene(code){var base=(code||'').slice(0,2);if(base==='01')return /n$/.test(code||'')?'night':'day';if(base==='09'||base==='10'||base==='11'||base==='13')return 'rain';if(base==='02'||base==='03'||base==='04'||base==='50')return 'cloud';return 'dusk';}
  function fmtHour(iso){var m=/T(\d{2}):/.exec(iso||'');if(!m)return '';var h=+m[1],ap=h<12?'am':'pm',hr=h%12;if(hr===0)hr=12;return hr+' '+ap;}
  function loadWxScreen(){
    apiGet('/api/weather/current').then(function(w){if(_cur!=='weather'||!w)return;  // ignore if the user navigated away
      var loc=document.getElementById('wxLoc');if(loc)loc.textContent=w.city||'';
      var t=document.getElementById('wxTemp');if(t&&w.temp!=null)t.textContent=Math.round(w.temp)+'°';
      var cond=(w.description||'');cond=cond?cond.charAt(0).toUpperCase()+cond.slice(1):'';
      var cd=document.getElementById('wxCond');if(cd)cd.innerHTML=esc(cond)+(w.feels_like!=null?' &nbsp;<small>feels like '+Math.round(w.feels_like)+'°</small>':'');
      var scene=wxScene(w.icon);stage.style.background=WXBG[scene]||DUSK;stage.classList.toggle('wxlight',scene==='day');
    }).catch(function(){});
    apiGet('/api/weather/forecast').then(function(f){if(_cur!=='weather'||!f||!f.hourly)return;
      var host=document.getElementById('wxHours');if(!host)return;
      host.innerHTML=hrs(f.hourly.slice(0,5).map(function(h){return [fmtHour(h.time),owmIcon(h.icon),Math.round(h.temp)+'°'];}));
    }).catch(function(){});
  }
  function wireWeather(){loadWxScreen();_wxTick=setInterval(function(){if(_cur==='weather')loadWxScreen();},600000);}

  // ---- Day card (today's real calendar) ----
  function wireDay(){
    var ttl=document.getElementById('dayTtl'),host=document.getElementById('dayEvents');
    if(ttl)ttl.textContent=new Date().toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'});
    if(!host)return;
    var d=new Date(),ds=d.getFullYear()+'-'+two(d.getMonth()+1)+'-'+two(d.getDate());
    apiGet('/api/calendar/events?start_date='+ds+'&end_date='+ds).then(function(data){if(_cur!=='day')return;
      var evs=((data&&data.events)||[]).filter(function(e){return !e.deleted;}).sort(function(a,b){return (a.start_time||'').localeCompare(b.start_time||'');});
      if(!evs.length){host.innerHTML='<div class="ev" style="opacity:.6"><div class="t"></div><span class="dot" style="--c:var(--accent)"></span><div><div class="en">Nothing scheduled today</div></div></div>';return;}
      host.innerHTML=evs.map(function(e){var cat=CAT[(e.category||'').toLowerCase()]||'var(--accent)';var when=e.all_day?'All day':fmt12(e.start_time);return '<div class="ev"><div class="t">'+esc(when)+'</div><span class="dot" style="--c:'+cat+'"></span><div><div class="en">'+esc(e.title||'Event')+'</div>'+(e.location?'<div class="es">'+esc(e.location)+'</div>':'')+'</div></div>';}).join('');
    }).catch(function(){host.innerHTML='<div class="ev" style="opacity:.6"><div class="t"></div><span class="dot" style="--c:var(--cat-health)"></span><div><div class="en">Couldn’t load your day</div></div></div>';});
  }

  // ---- Lists card (real shopping list + items) ----
  function wireList(){
    var ttl=document.getElementById('listTtl'),host=document.getElementById('listItems');
    if(!host)return;
    apiGet('/api/lists/shopping').then(function(d){if(_cur!=='list')return;
      var lists=(d&&d.lists)||[];
      if(!lists.length){if(ttl)ttl.textContent='No list';host.innerHTML='<div class="li"><span class="tx" style="opacity:.6">No shopping list yet</span></div>';return;}
      return apiGet('/api/lists/shopping/'+lists[0].id+'/items').then(function(r){if(_cur!=='list')return;
        var items=(r&&r.items)||[],done=items.filter(function(i){return i.completed;}).length;
        if(ttl)ttl.textContent=items.length+' item'+(items.length===1?'':'s')+(done?' · '+done+' done':'');
        host.innerHTML=items.map(function(i){var c=!!i.completed;return '<div class="li'+(c?' done':'')+'"><span class="box">'+(c?CHK:'')+'</span><span class="tx">'+esc(i.text)+'</span></div>';}).join('')||'<div class="li"><span class="tx" style="opacity:.6">List is empty</span></div>';
      });
    }).catch(function(){if(host)host.innerHTML='<div class="li"><span class="tx" style="opacity:.6">Couldn’t load your list</span></div>';});
  }

  var ORDER=[['home','Home'],['rooms','Rooms'],['sleep','Sleep'],['ask','Ask Zoe'],['weather','Weather'],['music','Music'],['timer','Timer'],['SEP'],['day','Day'],['list','List'],['reminder','Reminder'],['person','Person'],['confirm','Confirm'],['settings','Settings'],['pair','Pair']];
  ORDER.forEach(function(o){ if(o[0]==='SEP'){var s=document.createElement('div');s.className='sep';pick.appendChild(s);return;} var b=document.createElement('button');b.dataset.id=o[0];b.textContent=o[1];b.onclick=function(){show(o[0]);};pick.appendChild(b);});
  home.onclick=function(){lclose();show('home');};
  show('home');
})();
</script>
</body>
