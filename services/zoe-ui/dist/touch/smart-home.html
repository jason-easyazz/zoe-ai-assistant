<!DOCTYPE html>
<html lang="en" class="touch-scroll-root">
<head>
  <meta charset="UTF-8">
    <!-- TOUCH: kiosk bypass -->
    <script>
    (function(){
        if(localStorage.getItem('zoe_kiosk')==='1') return;
        var p=new URLSearchParams(location.search);
        if(p.get('kiosk')==='1') localStorage.setItem('zoe_kiosk','1');
    })();
    </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#fafbfc">
  <title>Zoe – Smart Home</title>
  <script>
  (function(){var s=localStorage.getItem('zoe_theme')||'auto';var dark=s==='dark'||(s==='auto'&&(new Date().getHours()<7||new Date().getHours()>=19));if(dark){document.documentElement.classList.add('dark-mode');document.querySelector('meta[name=theme-color]').content='#060610';}})();
  </script>
      <!-- TOUCH: premium widget CSS system (same as desktop) -->
    <link rel="stylesheet" href="/css/widgets-premium.css">
    <link rel="stylesheet" href="/css/widgets-fluid.css">
    <!-- TOUCH: adapter (tap targets, hide desktop chrome, dark mode) -->
    <link rel="stylesheet" href="/touch/css/touch-adapter.css">

  <script src="/js/auth.js"></script>
  <style>
    html.touch-scroll-root,
    body.touch-scroll-page {
      overflow-x: hidden;
      overflow-y: auto;
      height: auto;
      min-height: 100dvh;
    }
    body.touch-scroll-page {
      cursor: auto;
      background: var(--page-bg);
    }

    .touch-main {
      padding-top: var(--nav-height);
      padding-bottom: var(--space-xl);
      position: relative;
      z-index: 1;
    }

    .room-tabs-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: var(--nav-bg);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border-bottom: 1px solid var(--nav-border);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .room-tabs {
      display: flex;
      gap: var(--space-sm);
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .room-tabs::-webkit-scrollbar { display: none; }

    .room-tab {
      padding: var(--space-sm) var(--space-lg);
      border-radius: var(--radius-round);
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      cursor: pointer;
      white-space: nowrap;
      touch-action: manipulation;
      transition: all var(--ease-base);
      min-height: 40px;
      display: flex;
      align-items: center;
    }
    .room-tab.active {
      background: var(--primary-gradient);
      border-color: transparent;
      color: var(--text-on-brand);
      box-shadow: var(--shadow-purple);
    }
    .room-tab:active { transform: scale(0.94); }

    .scenes-section { padding: var(--space-sm) var(--space-md) 0; }
    .scenes-label {
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.3px;
      margin-bottom: var(--space-sm);
    }
    .scenes-row {
      display: flex;
      gap: var(--space-sm);
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .scenes-row::-webkit-scrollbar { display: none; }

    .scene-pill {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-round);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      cursor: pointer;
      white-space: nowrap;
      touch-action: manipulation;
      transition: all 0.22s var(--ease-smooth);
      min-height: var(--touch-target);
    }
    .scene-pill:active { transform: scale(0.92); }
    .scene-pill.activated {
      background: color-mix(in srgb, var(--primary-purple) 22%, var(--glass-bg));
      border-color: var(--primary-purple);
      color: var(--text-primary);
      box-shadow: var(--shadow-purple);
    }

    .devices-section { padding: var(--space-sm) var(--space-md) var(--space-xl); }
    .section-label {
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.3px;
      margin: var(--space-md) var(--space-xs) var(--space-sm);
    }
    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: var(--space-sm);
    }

    .device-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      transition: border-color var(--ease-slow), box-shadow var(--ease-slow);
      min-height: 110px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-small);
    }
    .device-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      background: var(--primary-gradient);
      opacity: 0;
      transition: opacity var(--ease-slow);
      pointer-events: none;
    }
    .device-card.device-on {
      border-color: color-mix(in srgb, var(--primary-purple) 45%, var(--glass-border));
      box-shadow: var(--shadow-purple), inset 0 0 24px color-mix(in srgb, var(--primary-purple) 6%, transparent);
    }
    .device-card.device-on::before { opacity: 0.06; }
    .device-card.device-teal-on {
      border-color: color-mix(in srgb, var(--primary-teal) 45%, var(--glass-border));
      box-shadow: var(--shadow-teal);
    }

    .device-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-sm);
    }
    .device-meta { flex: 1; min-width: 0; }
    .device-icon { font-size: var(--text-xl); margin-bottom: var(--space-xs); line-height: 1; }
    .device-name {
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      color: var(--text-primary);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .device-status {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: 2px;
    }
    .device-status.on { color: var(--primary-purple); }

    .toggle-wrap {
      display: flex;
      align-items: center;
      min-width: 54px;
      min-height: var(--touch-target);
      justify-content: center;
    }
    .toggle-switch {
      position: relative;
      width: 54px;
      height: 30px;
      cursor: pointer;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 15px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      transition: background var(--ease-base), border-color var(--ease-base), box-shadow var(--ease-base);
    }
    .toggle-thumb {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--glass-bg-hover);
      transition: left 0.28s var(--ease-bounce),
                  background var(--ease-base),
                  box-shadow var(--ease-base);
      box-shadow: var(--shadow-small);
    }
    .toggle-switch.on .toggle-track {
      background: var(--primary-purple);
      border-color: var(--primary-purple);
      box-shadow: var(--shadow-purple);
    }
    .toggle-switch.on .toggle-thumb {
      left: calc(100% - 26px);
      background: var(--text-on-brand);
      box-shadow: var(--shadow-purple);
    }

    .brightness-row {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    .brightness-icon { font-size: var(--text-xs); color: var(--text-muted); flex-shrink: 0; }
    .brightness-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 5px;
      border-radius: var(--radius-xs);
      background: var(--glass-bg-light);
      outline: none;
      cursor: pointer;
      touch-action: manipulation;
    }
    .brightness-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary-gradient);
      box-shadow: var(--shadow-purple);
      cursor: pointer;
    }
    .brightness-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: none;
      background: var(--primary-purple);
      box-shadow: var(--shadow-purple);
      cursor: pointer;
    }

    .climate-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-xs);
    }
    .temp-display {
      font-size: var(--text-2xl);
      font-weight: var(--weight-light);
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .temp-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-primary);
      font-size: var(--text-xl);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: all var(--ease-fast);
      flex-shrink: 0;
      line-height: 1;
    }
    .temp-btn:active {
      transform: scale(0.86);
      background: color-mix(in srgb, var(--primary-purple) 18%, var(--glass-bg));
    }

    .sensor-state {
      font-size: var(--text-xl);
      font-weight: var(--weight-light);
      color: var(--primary-teal);
    }
    .sensor-state.alert { color: var(--cat-shopping); }

    .skeleton {
      border-radius: var(--radius-card);
      min-height: 110px;
      background: linear-gradient(90deg,
        var(--glass-bg-light) 0%,
        color-mix(in srgb, var(--glass-border) 70%, var(--glass-bg)) 50%,
        var(--glass-bg-light) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      padding: var(--space-2xl) var(--space-lg);
      text-align: center;
    }
    .error-icon { font-size: 52px; opacity: 0.7; }
    .error-title { font-size: var(--text-lg); font-weight: var(--weight-semibold); color: var(--text-primary); }
    .error-msg { font-size: var(--text-sm); color: var(--text-secondary); max-width: 280px; line-height: var(--leading-relaxed); }
    .reconnect-btn {
      margin-top: var(--space-xs);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.7s linear; }
  </style>
</head>

<script>
window.ZOE_OPEN_FORM = null;

let allEntities = [];
let rooms = [];
let currentRoom = 'all';

document.addEventListener('DOMContentLoaded', () => {
  try {
    const session = JSON.parse(localStorage.getItem('zoe_session') || '{}');
    if (typeof ZoeWebSockets !== 'undefined') {
      ZoeWebSockets.init(session.userId || session.user_id || 'guest');
    }
  } catch(e) {}

  loadStates();
});

async function loadStates() {
  try {
    const res = await fetch('/api/ha/states');
    if (!res.ok) throw new Error('HA offline');
    const data = await res.json();
    allEntities = Array.isArray(data) ? data
                : (data.entities || data.states || []);
    await loadRooms();
    renderDevices();
  } catch (err) {
    showError();
  }
}

async function loadRooms() {
  try {
    const res = await fetch('/api/ha/areas');
    if (res.ok) {
      const data = await res.json();
      rooms = Array.isArray(data)
        ? data.map(a => ({ id: a.area_id || a.id, name: a.name }))
        : [];
    }
  } catch(e) {}

  if (rooms.length === 0) {
    const areaSet = new Set();
    allEntities.forEach(e => {
      if (e.attributes?.area) areaSet.add(e.attributes.area);
    });
    rooms = [...areaSet].map(a => ({ id: a, name: a }));
  }
  renderRoomTabs();
}

function renderRoomTabs() {
  const container = document.getElementById('roomTabs');
  container.innerHTML = '<div class="room-tab active" data-room="all" onclick="selectRoom(\'all\',this)">All</div>';
  rooms.forEach(room => {
    const tab = document.createElement('div');
    tab.className = 'room-tab';
    tab.dataset.room = room.id;
    tab.textContent = room.name;
    tab.onclick = () => selectRoom(room.id, tab);
    container.appendChild(tab);
  });
}

function selectRoom(roomId, el) {
  currentRoom = roomId;
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderDevices();
}

const CONTROLLABLE_DOMAINS = ['light','switch','climate','sensor','binary_sensor','cover','fan'];

function getVisibleEntities() {
  let entities = allEntities;
  if (currentRoom !== 'all') {
    const filtered = entities.filter(e =>
      e.attributes?.area === currentRoom ||
      e.attributes?.room === currentRoom
    );
    if (filtered.length > 0) entities = filtered;
  }
  return entities.filter(e => CONTROLLABLE_DOMAINS.includes(e.entity_id?.split('.')[0]));
}

function renderDevices() {
  const grid = document.getElementById('deviceGrid');
  const entities = getVisibleEntities();
  grid.innerHTML = '';

  const toRender = entities.length > 0 ? entities : getDemoDevices();
  let hasContent = false;

  toRender.forEach(entity => {
    const card = createDeviceCard(entity);
    if (card) { grid.appendChild(card); hasContent = true; }
  });

  if (!hasContent) {
    grid.innerHTML = '<div class="error-state" style="grid-column:1/-1"><div class="error-icon">🏠</div><div class="error-title">No devices found</div><div class="error-msg">No controllable devices in this room</div></div>';
  }
}

function getDemoDevices() {
  return [
    { entity_id:'light.living_room_main',   state:'on',  attributes:{ friendly_name:'Living Room Light', brightness:204 }},
    { entity_id:'light.bedroom_lamp',       state:'off', attributes:{ friendly_name:'Bedroom Lamp',       brightness:128 }},
    { entity_id:'switch.coffee_machine',    state:'on',  attributes:{ friendly_name:'Coffee Machine' }},
    { entity_id:'switch.garden_lights',     state:'off', attributes:{ friendly_name:'Garden Lights' }},
    { entity_id:'climate.living_room',      state:'heat',attributes:{ friendly_name:'Thermostat',   temperature:21.5, current_temperature:20.2 }},
    { entity_id:'light.kitchen_ceiling',    state:'on',  attributes:{ friendly_name:'Kitchen Ceiling', brightness:255 }},
    { entity_id:'binary_sensor.front_door', state:'off', attributes:{ friendly_name:'Front Door',   device_class:'door' }},
    { entity_id:'binary_sensor.motion_hall',state:'on',  attributes:{ friendly_name:'Hallway Motion',device_class:'motion' }},
  ];
}

function createDeviceCard(entity) {
  const domain = entity.entity_id.split('.')[0];
  const name   = entity.attributes?.friendly_name || entity.entity_id.replace(/_/g,' ');
  const isOn   = ['on','heat','cool','auto','fan_only'].includes(entity.state);
  const card   = document.createElement('div');
  card.dataset.entityId = entity.entity_id;

  if (domain === 'light') {
    const bri = entity.attributes?.brightness
      ? Math.round(entity.attributes.brightness / 2.55)
      : 80;
    card.className = `device-card${isOn?' device-on':''}`;
    card.innerHTML = `
      <div class="device-header">
        <div class="device-meta">
          <div class="device-icon">💡</div>
          <div class="device-name">${escHtml(name)}</div>
          <div class="device-status${isOn?' on':''}">${isOn?bri+'%':'Off'}</div>
        </div>
        <div class="toggle-wrap">
          <div class="toggle-switch${isOn?' on':''}"
               onclick="toggleDevice('${entity.entity_id}',this)"
               role="switch" aria-checked="${isOn}">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>
      ${isOn?`<div class="brightness-row">
        <span class="brightness-icon">🔅</span>
        <input type="range" class="brightness-slider" min="1" max="100" value="${bri}"
               oninput="updateBriDisplay('${entity.entity_id}',this.value)"
               onchange="setBrightness('${entity.entity_id}',this.value)">
        <span class="brightness-icon">🔆</span>
      </div>`:''}`;

  } else if (domain === 'switch' || domain === 'fan') {
    const icon = domain === 'fan' ? '🌀' : '🔌';
    card.className = `device-card${isOn?' device-on':''}`;
    card.innerHTML = `
      <div class="device-header">
        <div class="device-meta">
          <div class="device-icon">${icon}</div>
          <div class="device-name">${escHtml(name)}</div>
          <div class="device-status${isOn?' on':''}">${isOn?'On':'Off'}</div>
        </div>
        <div class="toggle-wrap">
          <div class="toggle-switch${isOn?' on':''}"
               onclick="toggleDevice('${entity.entity_id}',this)"
               role="switch" aria-checked="${isOn}">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>`;

  } else if (domain === 'climate') {
    const setTemp  = entity.attributes?.temperature || 21;
    const curTemp  = entity.attributes?.current_temperature || setTemp;
    card.className = `device-card${isOn?' device-teal-on':''}`;
    card.innerHTML = `
      <div class="device-header">
        <div class="device-meta">
          <div class="device-icon">🌡️</div>
          <div class="device-name">${escHtml(name)}</div>
          <div class="device-status">Now: ${curTemp}°C</div>
        </div>
      </div>
      <div class="climate-row">
        <button class="temp-btn" onclick="adjustTemp('${entity.entity_id}',-0.5)">−</button>
        <span class="temp-display" id="temp_${safeId(entity.entity_id)}">${setTemp}°C</span>
        <button class="temp-btn" onclick="adjustTemp('${entity.entity_id}',+0.5)">+</button>
      </div>`;

  } else if (domain === 'binary_sensor') {
    const dc       = entity.attributes?.device_class || 'sensor';
    const iconMap  = { door:'🚪', window:'🪟', motion:'🏃', smoke:'🔥', moisture:'💧', vibration:'📳', presence:'👤' };
    const icon     = iconMap[dc] || '📡';
    const stateOn  = { door:'Open', window:'Open', motion:'Detected', smoke:'Detected',
                       moisture:'Wet', vibration:'Active', presence:'Home' };
    const stateOff = { door:'Closed', window:'Closed', motion:'Clear', smoke:'Clear',
                       moisture:'Dry', vibration:'Idle', presence:'Away' };
    const label    = isOn ? (stateOn[dc]||'Active') : (stateOff[dc]||'Inactive');
    card.className = 'device-card';
    card.innerHTML = `
      <div class="device-header">
        <div class="device-meta">
          <div class="device-icon">${icon}</div>
          <div class="device-name">${escHtml(name)}</div>
        </div>
      </div>
      <div class="sensor-state${isOn?' alert':''}">${label}</div>`;

  } else {
    return null;
  }

  return card;
}

async function toggleDevice(entityId, toggleEl) {
  toggleEl.classList.toggle('on');
  const isNowOn = toggleEl.classList.contains('on');
  const card = document.querySelector(`[data-entity-id="${entityId}"]`);

  if (card) {
    if (isNowOn) card.classList.add('device-on'); else card.classList.remove('device-on');
    const statusEl = card.querySelector('.device-status');
    if (statusEl) {
      statusEl.textContent = isNowOn ? (entityId.startsWith('light.') ? '80%' : 'On') : 'Off';
      if (isNowOn) statusEl.classList.add('on'); else statusEl.classList.remove('on');
    }
    if (entityId.startsWith('light.')) {
      if (isNowOn && !card.querySelector('.brightness-row')) {
        const row = document.createElement('div');
        row.className = 'brightness-row';
        row.innerHTML = `<span class="brightness-icon">🔅</span>
          <input type="range" class="brightness-slider" min="1" max="100" value="80"
                 oninput="updateBriDisplay('${entityId}',this.value)"
                 onchange="setBrightness('${entityId}',this.value)">
          <span class="brightness-icon">🔆</span>`;
        card.appendChild(row);
      } else if (!isNowOn) {
        card.querySelector('.brightness-row')?.remove();
      }
    }
  }

  try {
    await fetch('/api/ha/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entity_id: entityId, action: isNowOn ? 'turn_on' : 'turn_off' })
    });
  } catch(e) { console.warn('HA control failed:', e); }
}

function updateBriDisplay(entityId, value) {
  const card = document.querySelector(`[data-entity-id="${entityId}"]`);
  if (!card) return;
  const s = card.querySelector('.device-status');
  if (s) s.textContent = `${value}%`;
}

async function setBrightness(entityId, value) {
  try {
    await fetch('/api/ha/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entity_id: entityId, action: 'turn_on', value: { brightness_pct: parseInt(value) }})
    });
  } catch(e) {}
}

async function adjustTemp(entityId, delta) {
  const safeKey = safeId(entityId);
  const display = document.getElementById('temp_' + safeKey);
  if (!display) return;
  let temp = parseFloat(display.textContent) + delta;
  temp = Math.round(temp * 2) / 2;
  display.textContent = `${temp}°C`;
  try {
    await fetch('/api/ha/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entity_id: entityId, action: 'set_temperature', value: { temperature: temp }})
    });
  } catch(e) {}
}

async function activateScene(sceneId, el) {
  document.querySelectorAll('.scene-pill').forEach(p => p.classList.remove('activated'));
  el.classList.add('activated');
  try {
    await fetch('/api/ha/scene', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scene_id: sceneId })
    });
  } catch(e) {}
  setTimeout(() => el.classList.remove('activated'), 2500);
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await loadStates();
  setTimeout(() => btn.classList.remove('spinning'), 700);
}

function showError() {
  const grid = document.getElementById('deviceGrid');
  if (!grid) return;
  grid.innerHTML = `
    <div class="error-state" style="grid-column:1/-1">
      <div class="error-icon">📡</div>
      <div class="error-title">Home Assistant not connected</div>
      <div class="error-msg">Check your HA integration and network, then try again.</div>
      <button type="button" class="btn-primary reconnect-btn" onclick="refreshAll()">↻ Reconnect</button>
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function safeId(s) { return s.replace(/[^a-z0-9]/gi,'_'); }

TouchMenu.init({ page: 'smarthome' });
</script>
</body>
</html>
