<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Zoe – Smart Home</title>
  <link rel="stylesheet" href="/touch/css/touch-base.css">
  <meta name="application-name" content="Zoe AI">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#7B61FF">
  <link rel="manifest" href="/manifest.json">
  <script src="/js/auth.js"></script>
  <style>
    :root {
      --bg:           #0f0f1a;
      --bg2:          #13131f;
      --glass:        rgba(255,255,255,0.055);
      --glass-hi:     rgba(255,255,255,0.10);
      --glass-border: rgba(255,255,255,0.11);
      --purple:       #7B61FF;
      --teal:         #5AE0E0;
      --grad:         linear-gradient(135deg,#7B61FF,#5AE0E0);
      --on-color:     #FF9500;
      --on-glow:      rgba(255,149,0,0.45);
      --on-border:    rgba(255,149,0,0.35);
      --text:         #ffffff;
      --text-sec:     rgba(255,255,255,0.65);
      --text-muted:   rgba(255,255,255,0.40);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ── HEADER ─────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(13,13,24,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
      min-height: 58px;
    }
    .header-title {
      font-size: 19px;
      font-weight: 600;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.2px;
    }
    .icon-btn {
      width: 48px; height: 48px;
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      background: var(--glass);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
      transition: background 0.18s, transform 0.12s;
      flex-shrink: 0;
    }
    .icon-btn:active { transform: scale(0.90); background: var(--glass-hi); }

    /* ── CONTENT SCROLL ─────────────────── */
    .content-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* ── ROOM TABS ──────────────────────── */
    .room-tabs {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      overflow-x: auto;
      scrollbar-width: none;
      background: rgba(13,13,24,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--glass-border);
    }
    .room-tabs::-webkit-scrollbar { display: none; }
    .room-tab {
      padding: 9px 18px;
      border-radius: 22px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text-sec);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      touch-action: manipulation;
      transition: all 0.2s ease;
      min-height: 40px;
      display: flex; align-items: center;
    }
    .room-tab.active {
      background: var(--grad);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 0 16px rgba(123,97,255,0.4);
    }
    .room-tab:active { transform: scale(0.94); }

    /* ── SCENES ROW ─────────────────────── */
    .scenes-section { padding: 10px 14px 0; }
    .scenes-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.3px;
      margin-bottom: 8px;
    }
    .scenes-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .scenes-row::-webkit-scrollbar { display: none; }
    .scene-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px;
      border-radius: 26px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-sec);
      font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      touch-action: manipulation;
      transition: all 0.22s ease;
      min-height: 48px;
    }
    .scene-pill:active { transform: scale(0.92); }
    .scene-pill.activated {
      background: linear-gradient(135deg,rgba(123,97,255,0.28),rgba(90,224,224,0.18));
      border-color: var(--purple);
      color: #fff;
      box-shadow: 0 0 18px rgba(123,97,255,0.35);
    }

    /* ── DEVICE SECTION ─────────────────── */
    .devices-section { padding: 10px 12px 80px; }
    .section-label {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.3px;
      margin: 12px 4px 8px;
    }
    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 10px;
    }

    /* ── DEVICE CARD ────────────────────── */
    .device-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: border-color 0.35s ease, box-shadow 0.35s ease;
      min-height: 110px;
      position: relative;
      overflow: hidden;
    }
    .device-card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 18px;
      background: var(--grad);
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .device-card.device-on {
      border-color: var(--on-border);
      box-shadow: 0 0 22px rgba(255,149,0,0.18), inset 0 0 30px rgba(255,149,0,0.03);
    }
    .device-card.device-on::before { opacity: 0.04; }
    .device-card.device-teal-on {
      border-color: rgba(90,224,224,0.35);
      box-shadow: 0 0 20px rgba(90,224,224,0.16);
    }

    .device-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
    }
    .device-meta { flex: 1; min-width: 0; }
    .device-icon { font-size: 20px; margin-bottom: 4px; line-height: 1; }
    .device-name {
      font-size: 13px; font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .device-status {
      font-size: 11px; color: var(--text-muted);
      margin-top: 2px;
    }
    .device-status.on { color: var(--on-color); }

    /* ── TOGGLE SWITCH ──────────────────── */
    .toggle-wrap {
      display: flex; align-items: center;
      min-width: 54px; min-height: 48px;
      justify-content: center;
    }
    .toggle-switch {
      position: relative; width: 54px; height: 30px;
      cursor: pointer; touch-action: manipulation; flex-shrink: 0;
    }
    .toggle-track {
      position: absolute; inset: 0;
      border-radius: 15px;
      background: rgba(255,255,255,0.10);
      border: 1.5px solid rgba(255,255,255,0.14);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .toggle-thumb {
      position: absolute;
      top: 4px; left: 4px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.38);
      transition: left 0.28s cubic-bezier(0.34,1.56,0.64,1),
                  background 0.25s ease,
                  box-shadow 0.25s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }
    .toggle-switch.on .toggle-track {
      background: var(--on-color);
      border-color: var(--on-color);
      box-shadow: 0 0 14px var(--on-glow);
    }
    .toggle-switch.on .toggle-thumb {
      left: calc(100% - 26px);
      background: #fff;
      box-shadow: 0 0 8px rgba(255,149,0,0.6), 0 1px 4px rgba(0,0,0,0.3);
    }

    /* ── BRIGHTNESS SLIDER ──────────────── */
    .brightness-row {
      display: flex; align-items: center; gap: 7px;
    }
    .brightness-icon { font-size: 13px; color: var(--text-muted); flex-shrink: 0; }
    .brightness-slider {
      -webkit-appearance: none; appearance: none;
      flex: 1; height: 5px; border-radius: 3px;
      background: rgba(255,255,255,0.14);
      outline: none; cursor: pointer; touch-action: manipulation;
    }
    .brightness-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--on-color);
      box-shadow: 0 0 10px var(--on-glow), 0 1px 3px rgba(0,0,0,0.4);
      cursor: pointer;
    }
    .brightness-slider::-moz-range-thumb {
      width: 24px; height: 24px; border-radius: 50%; border: none;
      background: var(--on-color);
      box-shadow: 0 0 10px var(--on-glow);
      cursor: pointer;
    }

    /* ── CLIMATE CONTROLS ───────────────── */
    .climate-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 6px;
    }
    .temp-display {
      font-size: 22px; font-weight: 300;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .temp-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: manipulation;
      transition: all 0.14s ease;
      flex-shrink: 0;
      line-height: 1;
    }
    .temp-btn:active { transform: scale(0.86); background: rgba(123,97,255,0.22); }

    /* ── SENSOR CARD ────────────────────── */
    .sensor-state {
      font-size: 20px; font-weight: 300;
      color: var(--teal);
    }
    .sensor-state.alert { color: var(--on-color); }

    /* ── SKELETON ───────────────────────── */
    .skeleton {
      border-radius: 18px; min-height: 110px;
      background: linear-gradient(90deg,
        rgba(255,255,255,0.04) 0%,
        rgba(255,255,255,0.08) 50%,
        rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── ERROR STATE ────────────────────── */
    .error-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 50px 24px; text-align: center;
    }
    .error-icon { font-size: 52px; opacity: 0.7; }
    .error-title { font-size: 18px; font-weight: 600; }
    .error-msg { font-size: 14px; color: var(--text-sec); max-width: 280px; line-height: 1.5; }
    .reconnect-btn {
      padding: 13px 30px; border-radius: 26px;
      background: var(--grad); border: none;
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; touch-action: manipulation;
      min-height: 50px;
      box-shadow: 0 4px 18px rgba(123,97,255,0.4);
      transition: transform 0.15s ease;
    }
    .reconnect-btn:active { transform: scale(0.95); }

    /* ── BOTTOM NAV ─────────────────────── */
    .bottom-nav {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      background: rgba(10,10,20,0.96);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--glass-border);
      padding: 5px 6px;
      gap: 2px;
      flex-shrink: 0;
    }
    .bottom-nav::-webkit-scrollbar { display: none; }
    .nav-item {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      padding: 5px 9px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 10px; font-weight: 500;
      white-space: nowrap;
      min-width: 52px; min-height: 52px;
      touch-action: manipulation;
      transition: all 0.18s ease;
      flex-shrink: 0;
      border: 1px solid transparent;
    }
    .nav-item:active { transform: scale(0.90); }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-item.active {
      background: linear-gradient(135deg,rgba(123,97,255,0.22),rgba(90,224,224,0.12));
      color: var(--teal);
      border-color: rgba(90,224,224,0.28);
    }
    .nav-item.active .nav-icon {
      filter: drop-shadow(0 0 5px var(--teal));
    }

    /* Refresh spin */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.7s linear; }
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <button class="icon-btn" onclick="goBack()" aria-label="Back">‹</button>
    <span class="header-title">🏠 Smart Home</span>
    <button class="icon-btn" id="refreshBtn" onclick="refreshAll()" aria-label="Refresh">↻</button>
  </div>

  <!-- CONTENT -->
  <div class="content-area">

    <!-- ROOM TABS -->
    <div class="room-tabs" id="roomTabs">
      <div class="room-tab active" data-room="all" onclick="selectRoom('all',this)">All</div>
    </div>

    <!-- SCENES -->
    <div class="scenes-section">
      <div class="scenes-label">Scenes</div>
      <div class="scenes-row">
        <div class="scene-pill" onclick="activateScene('morning',this)">🌅 Morning</div>
        <div class="scene-pill" onclick="activateScene('evening',this)">🌆 Evening</div>
        <div class="scene-pill" onclick="activateScene('movie',this)">🎬 Movie</div>
        <div class="scene-pill" onclick="activateScene('sleep',this)">😴 Sleep</div>
        <div class="scene-pill" onclick="activateScene('away',this)">🏃 Away</div>
      </div>
    </div>

    <!-- DEVICES -->
    <div class="devices-section">
      <div class="section-label">Devices</div>
      <div class="device-grid" id="deviceGrid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

  </div><!-- /content-area -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottomNav">
    <a href="/touch/dashboard.html"  class="nav-item"><span class="nav-icon">🏠</span>Dashboard</a>
    <a href="/touch/calendar.html"   class="nav-item"><span class="nav-icon">📅</span>Calendar</a>
    <a href="/touch/lists.html"      class="nav-item"><span class="nav-icon">✅</span>Lists</a>
    <a href="/touch/notes.html"      class="nav-item"><span class="nav-icon">📝</span>Notes</a>
    <a href="/touch/journal.html"    class="nav-item"><span class="nav-icon">📔</span>Journal</a>
    <a href="/touch/music.html"      class="nav-item"><span class="nav-icon">🎵</span>Music</a>
    <a href="/touch/smart-home.html" class="nav-item active"><span class="nav-icon">💡</span>Smart Home</a>
    <a href="/touch/people.html"     class="nav-item"><span class="nav-icon">👥</span>People</a>
    <a href="/touch/memories.html"   class="nav-item"><span class="nav-icon">🖼️</span>Memories</a>
    <a href="/touch/cooking.html"    class="nav-item"><span class="nav-icon">🍳</span>Cooking</a>
    <a href="/touch/weather.html"    class="nav-item"><span class="nav-icon">⛅</span>Weather</a>
    <a href="/touch/settings.html"   class="nav-item"><span class="nav-icon">⚙️</span>Settings</a>
  </nav>

</div><!-- /page -->

<script>
// ─── ZOE HOOK ─────────────────────────────────────────────────────────────────
// Navigate-only page — Zoe uses panel_show_smart_home action type
window.ZOE_OPEN_FORM = null;

// ─── STATE ────────────────────────────────────────────────────────────────────
let allEntities = [];
let rooms = [];
let currentRoom = 'all';

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Connect WebSocket
  try {
    const session = JSON.parse(localStorage.getItem('zoe_session') || '{}');
    if (typeof ZoeWebSockets !== 'undefined') {
      ZoeWebSockets.init(session.userId || session.user_id || 'guest');
    }
  } catch(e) {}

  // Scroll active nav into view
  document.querySelector('.nav-item.active')?.scrollIntoView({ inline: 'center', behavior: 'instant' });

  loadStates();
});

function goBack() { window.location.href = '/touch/dashboard.html'; }

// ─── DATA LOADING ─────────────────────────────────────────────────────────────
async function loadStates() {
  try {
    const res = await fetch('/api/ha/states');
    if (!res.ok) throw new Error('HA offline');
    const data = await res.json();
    allEntities = Array.isArray(data) ? data
                : (data.entities || data.states || []);
    await loadRooms();
    renderDevices();
  } catch (err) {
    showError();
  }
}

async function loadRooms() {
  try {
    const res = await fetch('/api/ha/areas');
    if (res.ok) {
      const data = await res.json();
      rooms = Array.isArray(data)
        ? data.map(a => ({ id: a.area_id || a.id, name: a.name }))
        : [];
    }
  } catch(e) {}

  // Fallback: derive from entity area attributes
  if (rooms.length === 0) {
    const areaSet = new Set();
    allEntities.forEach(e => {
      if (e.attributes?.area) areaSet.add(e.attributes.area);
    });
    rooms = [...areaSet].map(a => ({ id: a, name: a }));
  }
  renderRoomTabs();
}

// ─── ROOM TABS ────────────────────────────────────────────────────────────────
function renderRoomTabs() {
  const container = document.getElementById('roomTabs');
  container.innerHTML = '<div class="room-tab active" data-room="all" onclick="selectRoom(\'all\',this)">All</div>';
  rooms.forEach(room => {
    const tab = document.createElement('div');
    tab.className = 'room-tab';
    tab.dataset.room = room.id;
    tab.textContent = room.name;
    tab.onclick = () => selectRoom(room.id, tab);
    container.appendChild(tab);
  });
}

function selectRoom(roomId, el) {
  currentRoom = roomId;
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderDevices();
}

// ─── DEVICES ──────────────────────────────────────────────────────────────────
const CONTROLLABLE_DOMAINS = ['light','switch','climate','sensor','binary_sensor','cover','fan'];

function getVisibleEntities() {
  let entities = allEntities;
  if (currentRoom !== 'all') {
    const filtered = entities.filter(e =>
      e.attributes?.area === currentRoom ||
      e.attributes?.room === currentRoom
    );
    if (filtered.length > 0) entities = filtered;
  }
  return entities.filter(e => CONTROLLABLE_DOMAINS.includes(e.entity_id?.split('.')[0]));
}

function renderDevices() {
  const grid = document.getElementById('deviceGrid');
  const entities = getVisibleEntities();
  grid.innerHTML = '';

  const toRender = entities.length > 0 ? entities : getDemoDevices();
  let hasContent = false;

  toRender.forEach(entity => {
    const card = createDeviceCard(entity);
    if (card) { grid.appendChild(card); hasContent = true; }
  });

  if (!hasContent) {
    grid.innerHTML = '<div class="error-state" style="grid-column:1/-1"><div class="error-icon">🏠</div><div class="error-title">No devices found</div><div class="error-msg">No controllable devices in this room</div></div>';
  }
}

function getDemoDevices() {
  return [
    { entity_id:'light.living_room_main',   state:'on',  attributes:{ friendly_name:'Living Room Light', brightness:204 }},
    { entity_id:'light.bedroom_lamp',       state:'off', attributes:{ friendly_name:'Bedroom Lamp',       brightness:128 }},
    { entity_id:'switch.coffee_machine',    state:'on',  attributes:{ friendly_name:'Coffee Machine' }},
    { entity_id:'switch.garden_lights',     state:'off', attributes:{ friendly_name:'Garden Lights' }},
    { entity_id:'climate.living_room',      state:'heat',attributes:{ friendly_name:'Thermostat',   temperature:21.5, current_temperature:20.2 }},
    { entity_id:'light.kitchen_ceiling',    state:'on',  attributes:{ friendly_name:'Kitchen Ceiling', brightness:255 }},
    { entity_id:'binary_sensor.front_door', state:'off', attributes:{ friendly_name:'Front Door',   device_class:'door' }},
    { entity_id:'binary_sensor.motion_hall',state:'on',  attributes:{ friendly_name:'Hallway Motion',device_class:'motion' }},
  ];
}

function createDeviceCard(entity) {
  const domain = entity.entity_id.split('.')[0];
  const name   = entity.attributes?.friendly_name || entity.entity_id.replace(/_/g,' ');
  const isOn   = ['on','heat','cool','auto','fan_only'].includes(entity.state);
  const card   = document.createElement('div');
  card.dataset.entityId = entity.entity_id;

  if (domain === 'light') {
    const bri = entity.attributes?.brightness
      ? Math.round(entity.attributes.brightness / 2.55)
      : 80;
    card.className = `device-card${isOn?' device-on':''}`;
    card.innerHTML = `
      <div class="device-header">
        <div class="device-meta">
          <div class="device-icon">💡</div>
          <div class="device-name">${escHtml(name)}</div>
          <div class="device-status${isOn?' on':''}">${isOn?bri+'%':'Off'}</div>
        </div>
        <div class="toggle-wrap">
          <div class="toggle-switch${isOn?' on':''}"
               onclick="toggleDevice('${entity.entity_id}',this)"
               role="switch" aria-checked="${isOn}">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>
      ${isOn?`<div class="brightness-row">
        <span class="brightness-icon">🔅</span>
        <input type="range" class="brightness-slider" min="1" max="100" value="${bri}"
               oninput="updateBriDisplay('${entity.entity_id}',this.value)"
               onchange="setBrightness('${entity.entity_id}',this.value)">
        <span class="brightness-icon">🔆</span>
      </div>`:''}`;

  } else if (domain === 'switch' || domain === 'fan') {
    const icon = domain === 'fan' ? '🌀' : '🔌';
    card.className = `device-card${isOn?' device-on':''}`;
    card.innerHTML = `
      <div class="device-header">
        <div class="device-meta">
          <div class="device-icon">${icon}</div>
          <div class="device-name">${escHtml(name)}</div>
          <div class="device-status${isOn?' on':''}">${isOn?'On':'Off'}</div>
        </div>
        <div class="toggle-wrap">
          <div class="toggle-switch${isOn?' on':''}"
               onclick="toggleDevice('${entity.entity_id}',this)"
               role="switch" aria-checked="${isOn}">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>`;

  } else if (domain === 'climate') {
    const setTemp  = entity.attributes?.temperature || 21;
    const curTemp  = entity.attributes?.current_temperature || setTemp;
    card.className = `device-card${isOn?' device-teal-on':''}`;
    card.innerHTML = `
      <div class="device-header">
        <div class="device-meta">
          <div class="device-icon">🌡️</div>
          <div class="device-name">${escHtml(name)}</div>
          <div class="device-status">Now: ${curTemp}°C</div>
        </div>
      </div>
      <div class="climate-row">
        <button class="temp-btn" onclick="adjustTemp('${entity.entity_id}',-0.5)">−</button>
        <span class="temp-display" id="temp_${safeId(entity.entity_id)}">${setTemp}°C</span>
        <button class="temp-btn" onclick="adjustTemp('${entity.entity_id}',+0.5)">+</button>
      </div>`;

  } else if (domain === 'binary_sensor') {
    const dc       = entity.attributes?.device_class || 'sensor';
    const iconMap  = { door:'🚪', window:'🪟', motion:'🏃', smoke:'🔥', moisture:'💧', vibration:'📳', presence:'👤' };
    const icon     = iconMap[dc] || '📡';
    const stateOn  = { door:'Open', window:'Open', motion:'Detected', smoke:'Detected',
                       moisture:'Wet', vibration:'Active', presence:'Home' };
    const stateOff = { door:'Closed', window:'Closed', motion:'Clear', smoke:'Clear',
                       moisture:'Dry', vibration:'Idle', presence:'Away' };
    const label    = isOn ? (stateOn[dc]||'Active') : (stateOff[dc]||'Inactive');
    card.className = 'device-card';
    card.innerHTML = `
      <div class="device-header">
        <div class="device-meta">
          <div class="device-icon">${icon}</div>
          <div class="device-name">${escHtml(name)}</div>
        </div>
      </div>
      <div class="sensor-state${isOn?' alert':''}">${label}</div>`;

  } else {
    return null;
  }

  return card;
}

// ─── DEVICE ACTIONS ───────────────────────────────────────────────────────────
async function toggleDevice(entityId, toggleEl) {
  toggleEl.classList.toggle('on');
  const isNowOn = toggleEl.classList.contains('on');
  const card = document.querySelector(`[data-entity-id="${entityId}"]`);

  if (card) {
    if (isNowOn) card.classList.add('device-on'); else card.classList.remove('device-on');
    const statusEl = card.querySelector('.device-status');
    if (statusEl) {
      statusEl.textContent = isNowOn ? (entityId.startsWith('light.') ? '80%' : 'On') : 'Off';
      if (isNowOn) statusEl.classList.add('on'); else statusEl.classList.remove('on');
    }
    // Brightness row for lights
    if (entityId.startsWith('light.')) {
      if (isNowOn && !card.querySelector('.brightness-row')) {
        const row = document.createElement('div');
        row.className = 'brightness-row';
        row.innerHTML = `<span class="brightness-icon">🔅</span>
          <input type="range" class="brightness-slider" min="1" max="100" value="80"
                 oninput="updateBriDisplay('${entityId}',this.value)"
                 onchange="setBrightness('${entityId}',this.value)">
          <span class="brightness-icon">🔆</span>`;
        card.appendChild(row);
      } else if (!isNowOn) {
        card.querySelector('.brightness-row')?.remove();
      }
    }
  }

  try {
    await fetch('/api/ha/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entity_id: entityId, action: isNowOn ? 'turn_on' : 'turn_off' })
    });
  } catch(e) { console.warn('HA control failed:', e); }
}

function updateBriDisplay(entityId, value) {
  const card = document.querySelector(`[data-entity-id="${entityId}"]`);
  if (!card) return;
  const s = card.querySelector('.device-status');
  if (s) s.textContent = `${value}%`;
}

async function setBrightness(entityId, value) {
  try {
    await fetch('/api/ha/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entity_id: entityId, action: 'turn_on', value: { brightness_pct: parseInt(value) }})
    });
  } catch(e) {}
}

async function adjustTemp(entityId, delta) {
  const safeKey = safeId(entityId);
  const display = document.getElementById('temp_' + safeKey);
  if (!display) return;
  let temp = parseFloat(display.textContent) + delta;
  temp = Math.round(temp * 2) / 2; // 0.5°C steps
  display.textContent = `${temp}°C`;
  try {
    await fetch('/api/ha/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entity_id: entityId, action: 'set_temperature', value: { temperature: temp }})
    });
  } catch(e) {}
}

async function activateScene(sceneId, el) {
  document.querySelectorAll('.scene-pill').forEach(p => p.classList.remove('activated'));
  el.classList.add('activated');
  try {
    await fetch('/api/ha/scene', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scene_id: sceneId })
    });
  } catch(e) {}
  setTimeout(() => el.classList.remove('activated'), 2500);
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await loadStates();
  setTimeout(() => btn.classList.remove('spinning'), 700);
}

function showError() {
  document.getElementById('deviceGrid').innerHTML = '';
  document.querySelector('.devices-section').innerHTML = `
    <div class="error-state">
      <div class="error-icon">📡</div>
      <div class="error-title">Home Assistant not connected</div>
      <div class="error-msg">Check your HA integration and network, then try again.</div>
      <button class="reconnect-btn" onclick="refreshAll()">↻ Reconnect</button>
    </div>`;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function safeId(s) { return s.replace(/[^a-z0-9]/gi,'_'); }
