<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function(){
        if(localStorage.getItem('zoe_kiosk')==='1') return;
        var p=new URLSearchParams(location.search);
        if(p.get('kiosk')==='1') localStorage.setItem('zoe_kiosk','1');
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a1628">
    <title>Zoe - Timers</title>
    <link rel="stylesheet" href="/touch/css/touch-adapter.css">
    <script src="/js/auth.js"></script>
    <style>
        :root { --glass: rgba(255,255,255,0.08); --line: rgba(255,255,255,0.14); --txt: #ecf0f6; --muted: #b8c2d3; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            color: var(--txt);
            background: radial-gradient(1200px 700px at 0% -10%, rgba(123,97,255,0.32), transparent 55%),
                        radial-gradient(900px 500px at 100% 0%, rgba(90,224,224,0.20), transparent 55%),
                        linear-gradient(165deg, #101427, #1a2242 48%, #1b3152);
            overflow: hidden;
        }
        .page {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: calc(var(--ztm-nav-h, 64px) + 14px) 14px 14px;
            box-sizing: border-box;
            gap: 10px;
        }
        .title { margin: 0 4px 2px; font-size: clamp(24px, 3.2vw, 34px); font-weight: 700; }
        .subtitle { margin: 0 4px 8px; color: var(--muted); font-size: clamp(13px, 1.7vw, 16px); }
        .controls {
            display: flex; gap: 8px; flex-wrap: wrap;
            background: var(--glass); border: 1px solid var(--line); border-radius: 14px;
            padding: 10px; backdrop-filter: blur(14px);
        }
        .btn, .input {
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08); color: #eef4ff;
            font-size: 15px; padding: 10px 12px;
        }
        .btn { cursor: pointer; min-width: 74px; font-weight: 600; }
        .btn.primary { background: linear-gradient(135deg, #7B61FF, #5AE0E0); border: none; color: #041018; }
        .input { width: 120px; }
        .timers {
            flex: 1; min-height: 0; overflow: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px;
            padding-right: 2px;
        }
        .timer-card {
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14);
            border-radius: 14px; padding: 12px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .timer-label { font-size: 12px; color: #b8c2d3; text-transform: uppercase; letter-spacing: .06em; }
        .timer-time { font-size: clamp(26px, 5vw, 44px); font-weight: 700; letter-spacing: -0.02em; }
        .timer-actions { display: flex; gap: 6px; margin-top: auto; }
        .tiny { font-size: 12px; padding: 8px 10px; min-width: 0; flex: 1; }
        .done { border-color: rgba(90,224,224,0.6); box-shadow: 0 0 0 3px rgba(90,224,224,0.20); }
    </style>
</head>
<body>
    <div class="page">
        <h1 class="title">Timers</h1>
        <p class="subtitle">Quick countdown timers for kitchen and household tasks.</p>
        <div class="controls">
            <button class="btn" data-min="1">1 min</button>
            <button class="btn" data-min="5">5 min</button>
            <button class="btn" data-min="10">10 min</button>
            <button class="btn" data-min="20">20 min</button>
            <input id="customMin" class="input" type="number" min="1" max="720" placeholder="minutes">
            <button id="addCustom" class="btn primary">Start</button>
        </div>
        <div id="timers" class="timers"></div>
    </div>

    <script src="/touch/js/touch-menu.js"></script>
    <script>
        (function () {
            const KEY = 'zoe_touch_timers_v1';
            const timersEl = document.getElementById('timers');
            const customMin = document.getElementById('customMin');
            let timers = [];

            function load() {
                try {
                    const raw = localStorage.getItem(KEY);
                    timers = raw ? JSON.parse(raw) : [];
                    if (!Array.isArray(timers)) timers = [];
                } catch (_) { timers = []; }
            }

            function save() {
                localStorage.setItem(KEY, JSON.stringify(timers));
            }

            function fmt(ms) {
                const sec = Math.max(0, Math.ceil(ms / 1000));
                const h = Math.floor(sec / 3600);
                const m = Math.floor((sec % 3600) / 60);
                const s = sec % 60;
                if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }

            function addTimer(minutes) {
                const mins = Math.max(1, Math.min(720, Number(minutes) || 0));
                if (!mins) return;
                timers.push({
                    id: 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                    durationMs: mins * 60000,
                    endAt: Date.now() + mins * 60000,
                    paused: false,
                    remainingMs: mins * 60000,
                    done: false
                });
                save();
                render();
            }

            function removeTimer(id) {
                timers = timers.filter(t => t.id !== id);
                save();
                render();
            }

            function togglePause(id) {
                timers = timers.map(t => {
                    if (t.id !== id || t.done) return t;
                    if (t.paused) {
                        t.paused = false;
                        t.endAt = Date.now() + (t.remainingMs || 0);
                    } else {
                        t.paused = true;
                        t.remainingMs = Math.max(0, t.endAt - Date.now());
                    }
                    return t;
                });
                save();
                render();
            }

            function resetTimer(id) {
                timers = timers.map(t => {
                    if (t.id !== id) return t;
                    t.done = false;
                    t.paused = false;
                    t.remainingMs = t.durationMs;
                    t.endAt = Date.now() + t.durationMs;
                    return t;
                });
                save();
                render();
            }

            function alarm() {
                try { navigator.vibrate && navigator.vibrate([150, 90, 150, 90, 300]); } catch (_) {}
            }

            function tick() {
                let changed = false;
                const now = Date.now();
                timers = timers.map(t => {
                    if (t.done || t.paused) return t;
                    const left = Math.max(0, t.endAt - now);
                    t.remainingMs = left;
                    if (left === 0 && !t.done) {
                        t.done = true;
                        changed = true;
                        alarm();
                    }
                    return t;
                });
                if (changed) save();
                render();
            }

            function render() {
                timersEl.innerHTML = '';
                if (!timers.length) {
                    timersEl.innerHTML = '<div style="opacity:.8; padding:8px 4px;">No timers running. Start one above.</div>';
                    return;
                }
                timers.forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'timer-card' + (t.done ? ' done' : '');
                    const left = t.paused ? (t.remainingMs || 0) : Math.max(0, (t.endAt || 0) - Date.now());
                    const state = t.done ? 'Finished' : (t.paused ? 'Paused' : 'Running');
                    card.innerHTML = `
                        <div class="timer-label">${state}</div>
                        <div class="timer-time">${fmt(left)}</div>
                        <div class="timer-actions">
                            <button class="btn tiny" data-act="pause">${t.paused ? 'Resume' : 'Pause'}</button>
                            <button class="btn tiny" data-act="reset">Reset</button>
                            <button class="btn tiny" data-act="remove">Delete</button>
                        </div>
                    `;
                    card.querySelector('[data-act="pause"]').addEventListener('click', () => togglePause(t.id));
                    card.querySelector('[data-act="reset"]').addEventListener('click', () => resetTimer(t.id));
                    card.querySelector('[data-act="remove"]').addEventListener('click', () => removeTimer(t.id));
                    timersEl.appendChild(card);
                });
            }

            document.querySelectorAll('[data-min]').forEach(b => {
                b.addEventListener('click', () => addTimer(b.getAttribute('data-min')));
            });
            document.getElementById('addCustom').addEventListener('click', () => {
                addTimer(customMin.value);
                customMin.value = '';
            });

            load();
            render();
            setInterval(tick, 1000);
        })();
    </script>
</body>
</html>
