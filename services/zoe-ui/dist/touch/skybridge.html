<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function(){
        if (localStorage.getItem('zoe_kiosk') === '1') return;
        var p = new URLSearchParams(location.search);
        if (p.get('kiosk') === '1') localStorage.setItem('zoe_kiosk', '1');
    })();
    (function(){
        var s = localStorage.getItem('zoe_theme') || 'auto';
        var h = new Date().getHours();
        var dark = s === 'dark' || (s === 'auto' && (h < 7 || h >= 19));
        if (dark) document.documentElement.classList.add('dark-mode');
    })();
    window.prompt = function(msg, def) { return def || ''; };
    window.alert = function() {};
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0d12">
    <title>Zoe Skybridge</title>
    <link rel="stylesheet" href="/touch/css/touch-adapter.css">
    <script src="/lib/livekit/livekit-client.umd.min.js" onerror="console.warn('LiveKit client not loaded')"></script>
    <style>
        :root {
            --sky-bg: #0b0d12;
            --sky-panel: rgba(19, 23, 31, 0.78);
            --sky-panel-strong: rgba(24, 30, 42, 0.94);
            --sky-border: rgba(255, 255, 255, 0.1);
            --sky-text: #f6f8fb;
            --sky-muted: rgba(246, 248, 251, 0.64);
            --sky-soft: rgba(246, 248, 251, 0.1);
            --sky-blue: #5fc6ff;
            --sky-green: #66d19e;
            --sky-amber: #f7bf5f;
            --sky-coral: #ff7b7b;
            --sky-violet: #8c7dff;
            --sky-radius: 8px;
        }

        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background:
                radial-gradient(circle at 14% 12%, rgba(95, 198, 255, 0.16), transparent 30%),
                radial-gradient(circle at 88% 18%, rgba(102, 209, 158, 0.12), transparent 28%),
                linear-gradient(145deg, #0b0d12 0%, #11151d 48%, #080a0e 100%);
            color: var(--sky-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            padding-top: var(--ta-nav-h, 64px);
        }

        body {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100dvh;
        }

        .sky-topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: center;
            padding: 18px 28px 12px;
        }

        .sky-title {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .sky-mark {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 30%, #ffffff 0%, rgba(255,255,255,0.35) 12%, transparent 30%),
                conic-gradient(from 210deg, var(--sky-blue), var(--sky-green), var(--sky-amber), var(--sky-violet), var(--sky-blue));
            box-shadow: 0 0 34px rgba(95, 198, 255, 0.24);
            flex: 0 0 auto;
        }

        .sky-heading {
            min-width: 0;
        }

        .sky-heading h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.05;
            font-weight: 700;
            letter-spacing: 0;
        }

        .sky-heading p {
            margin: 5px 0 0;
            color: var(--sky-muted);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sky-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--sky-border);
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--sky-radius);
            min-height: 44px;
        }

        .sky-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--sky-green);
            box-shadow: 0 0 18px rgba(102, 209, 158, 0.72);
        }

        .sky-status-text {
            font-size: 13px;
            color: var(--sky-muted);
        }

        .sky-orb-button,
        .sky-voice-hint {
            display: none;
        }

        .sky-shell {
            display: grid;
            grid-template-columns: minmax(300px, 34vw) minmax(0, 1fr);
            gap: 22px;
            min-height: 0;
            padding: 8px 28px 18px;
        }

        .sky-orb-panel,
        .sky-stage {
            min-height: 0;
            border: 1px solid var(--sky-border);
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border-radius: var(--sky-radius);
            box-shadow: 0 22px 80px rgba(0, 0, 0, 0.32);
        }

        .sky-orb-panel {
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            overflow: hidden;
            position: relative;
        }

        #skyOrb {
            width: 100%;
            height: 100%;
            min-height: 320px;
            display: block;
        }

        .sky-listening-copy {
            position: absolute;
            left: 22px;
            right: 22px;
            bottom: 112px;
            text-align: center;
            color: var(--sky-muted);
            font-size: 15px;
            line-height: 1.45;
            pointer-events: none;
        }

        .sky-transcript {
            display: grid;
            gap: 8px;
            padding: 16px;
            border-top: 1px solid var(--sky-border);
            background: rgba(0, 0, 0, 0.14);
            max-height: 190px;
            overflow: auto;
        }

        .sky-line {
            font-size: 13px;
            line-height: 1.45;
            color: var(--sky-muted);
        }

        .sky-line strong {
            color: var(--sky-text);
            font-weight: 650;
        }

        .sky-stage {
            display: grid;
            grid-template-rows: auto 1fr;
            overflow: hidden;
        }

        .sky-stage-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 16px;
            align-items: center;
            padding: 16px 18px;
            border-bottom: 1px solid var(--sky-border);
        }

        .sky-context h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .sky-context p {
            margin: 4px 0 0;
            color: var(--sky-muted);
            font-size: 13px;
        }

        .sky-mode-toggle {
            display: flex;
            gap: 6px;
            padding: 4px;
            border: 1px solid var(--sky-border);
            background: rgba(0,0,0,0.16);
            border-radius: var(--sky-radius);
        }

        .sky-mode-toggle button,
        .sky-card button,
        .sky-command button {
            min-height: 44px;
            border: 0;
            border-radius: 7px;
            color: var(--sky-text);
            background: rgba(255,255,255,0.08);
            padding: 0 14px;
            font: inherit;
            cursor: pointer;
        }

        .sky-mode-toggle button.active {
            background: rgba(95, 198, 255, 0.2);
            color: #d9f4ff;
        }

        .sky-card-stack {
            min-height: 0;
            overflow: auto;
            padding: 18px;
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            align-content: start;
            gap: 14px;
        }

        .sky-card {
            grid-column: span 6;
            min-height: 168px;
            border: 1px solid var(--sky-border);
            border-radius: var(--sky-radius);
            background: var(--sky-panel);
            padding: 16px;
            display: grid;
            gap: 12px;
            align-content: start;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        .sky-card.wide { grid-column: span 12; }
        .sky-card.compact { grid-column: span 4; min-height: 132px; }

        .sky-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .sky-card-title {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .sky-card-kicker {
            margin: 0 0 4px;
            color: var(--sky-muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        .sky-badge {
            flex: 0 0 auto;
            border-radius: 999px;
            border: 1px solid var(--sky-border);
            padding: 5px 9px;
            color: var(--sky-muted);
            font-size: 12px;
            background: rgba(255,255,255,0.05);
        }

        .sky-card-body {
            color: rgba(246,248,251,0.78);
            font-size: 14px;
            line-height: 1.45;
        }

        .sky-card-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .sky-field {
            border: 1px solid var(--sky-border);
            background: rgba(0,0,0,0.14);
            border-radius: 7px;
            padding: 10px;
            min-width: 0;
        }

        .sky-field span {
            display: block;
            color: var(--sky-muted);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .sky-field strong {
            display: block;
            font-size: 14px;
            overflow-wrap: anywhere;
        }

        .sky-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-self: start;
        }

        .sky-actions button.primary {
            background: linear-gradient(135deg, rgba(95,198,255,0.88), rgba(102,209,158,0.88));
            color: #071017;
            font-weight: 700;
        }

        .sky-actions button.warn {
            background: rgba(255, 123, 123, 0.18);
            color: #ffd5d5;
        }

        .sky-command {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto auto;
            gap: 10px;
            align-items: center;
            padding: 12px 28px max(18px, env(safe-area-inset-bottom, 18px));
            background: rgba(5, 7, 10, 0.72);
            border-top: 1px solid var(--sky-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .sky-command input {
            width: 100%;
            min-height: 48px;
            border: 1px solid var(--sky-border);
            border-radius: var(--sky-radius);
            background: rgba(255,255,255,0.08);
            color: var(--sky-text);
            padding: 0 14px;
            font: inherit;
            outline: none;
        }

        .sky-command input:focus {
            border-color: rgba(95, 198, 255, 0.7);
            box-shadow: 0 0 0 3px rgba(95, 198, 255, 0.12);
        }

        .sky-command .primary {
            background: var(--sky-green);
            color: #071017;
            font-weight: 700;
        }

        .sky-command .recording {
            background: var(--sky-coral);
            color: #190707;
        }

        @media (max-width: 980px) {
            .sky-shell {
                grid-template-columns: 1fr;
            }
            .sky-orb-panel {
                min-height: 330px;
            }
            #skyOrb {
                min-height: 260px;
            }
            .sky-card { grid-column: span 12; }
            .sky-card.compact { grid-column: span 6; }
        }

        @media (max-width: 640px) {
            body { overflow-y: auto; overflow-x: hidden; height: auto; max-width: 100vw; }
            .sky-topbar,
            .sky-shell,
            .sky-command {
                padding-left: 14px;
                padding-right: 14px;
            }
            .sky-topbar,
            .sky-stage-header,
            .sky-command {
                grid-template-columns: 1fr;
            }
            #ztm-tabs {
                overflow-x: auto;
                scrollbar-width: none;
            }
            #ztm-tabs::-webkit-scrollbar {
                display: none;
            }
            #ztm-right {
                display: none;
            }
            .sky-heading p,
            .sky-listening-copy {
                white-space: normal;
                overflow: visible;
                overflow-wrap: anywhere;
                text-overflow: clip;
            }
            .sky-heading p {
                max-width: 270px;
            }
            .sky-listening-copy {
                left: 38px;
                right: auto;
                transform: none;
                width: 300px;
                font-size: 14px;
            }
            .sky-mode-toggle {
                justify-self: start;
            }
            .sky-card.compact { grid-column: span 12; }
        }

        /* Skybridge presentation layer: voice-first, cinematic, card-native. */
        html, body {
            background:
                radial-gradient(circle at 20% 30%, rgba(95, 198, 255, 0.22), transparent 34%),
                radial-gradient(circle at 78% 18%, rgba(102, 209, 158, 0.18), transparent 28%),
                radial-gradient(circle at 70% 86%, rgba(247, 191, 95, 0.1), transparent 26%),
                linear-gradient(145deg, #080a10 0%, #11151d 42%, #07080c 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 64px 0 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 72px 72px;
            mask-image: radial-gradient(circle at 50% 42%, black 0%, transparent 72%);
            opacity: 0.22;
        }

        .sky-topbar {
            padding: 20px 34px 10px;
        }

        .sky-heading h1 {
            font-size: clamp(30px, 4vw, 54px);
            font-weight: 760;
        }

        .sky-heading p {
            font-size: 15px;
            color: rgba(246,248,251,0.72);
        }

        .sky-status {
            border-color: rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.075);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .sky-shell {
            grid-template-columns: minmax(360px, 40vw) minmax(0, 1fr);
            gap: 26px;
            padding: 12px 34px 20px;
        }

        .sky-orb-panel,
        .sky-stage {
            border-color: rgba(255,255,255,0.12);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.035)),
                rgba(7, 9, 14, 0.62);
            border-radius: 18px;
            box-shadow:
                0 28px 90px rgba(0,0,0,0.44),
                inset 0 1px 0 rgba(255,255,255,0.09);
        }

        .sky-orb-panel {
            min-height: 0;
        }

        #skyOrb {
            min-height: 520px;
            filter: saturate(1.1);
        }

        .sky-listening-copy {
            bottom: 92px;
            max-width: 360px;
            margin: 0 auto;
            font-size: 18px;
            color: rgba(246,248,251,0.72);
        }

        .sky-transcript {
            max-height: 118px;
            background: rgba(0,0,0,0.22);
        }

        .sky-stage-header {
            padding: 22px 24px;
            background: linear-gradient(90deg, rgba(255,255,255,0.075), transparent);
        }

        .sky-context h2 {
            font-size: clamp(28px, 3.2vw, 44px);
            line-height: 1;
        }

        .sky-context p {
            font-size: 15px;
            color: rgba(246,248,251,0.7);
        }

        .sky-mode-toggle {
            border-radius: 12px;
        }

        .sky-mode-toggle button {
            border-radius: 10px;
            font-weight: 700;
        }

        .sky-card-stack {
            position: relative;
            padding: 24px;
            gap: 16px;
            align-content: start;
            scrollbar-width: thin;
        }

        .sky-card-stack::before {
            content: "";
            position: sticky;
            top: -24px;
            grid-column: 1 / -1;
            height: 0;
            z-index: 2;
            box-shadow: 0 0 68px 44px rgba(7,9,14,0.55);
            pointer-events: none;
        }

        .sky-card {
            position: relative;
            overflow: hidden;
            min-height: 0;
            border-radius: 16px;
            border-color: rgba(255,255,255,0.13);
            background:
                linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.045)),
                rgba(17, 21, 29, 0.74);
            box-shadow:
                0 18px 48px rgba(0,0,0,0.28),
                inset 0 1px 0 rgba(255,255,255,0.08);
            opacity: 1;
            transform: none;
        }

        .sky-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 18% 10%, rgba(95,198,255,0.16), transparent 38%);
            pointer-events: none;
            opacity: 0.9;
        }

        .sky-card > * {
            position: relative;
            z-index: 1;
        }

        .sky-card.hero {
            min-height: 230px;
            padding: 24px;
            background:
                radial-gradient(circle at 10% 0%, rgba(95,198,255,0.28), transparent 38%),
                linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.045)),
                rgba(12, 16, 24, 0.86);
        }

        .sky-card.hero .sky-card-title {
            font-size: clamp(28px, 3vw, 42px);
            line-height: 1.03;
        }

        .sky-card.hero .sky-card-body {
            max-width: 58ch;
            font-size: 16px;
        }

        .sky-card.wide {
            grid-column: span 12;
        }

        .sky-card.page-card,
        .sky-card.setting-card {
            grid-column: span 6;
        }

        .sky-card-title {
            font-size: 22px;
            line-height: 1.12;
        }

        .sky-card-kicker {
            letter-spacing: 0.08em;
            color: rgba(246,248,251,0.6);
        }

        .sky-card-body {
            font-size: 15px;
            color: rgba(246,248,251,0.78);
        }

        .sky-card-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .sky-card.page-card .sky-card-grid,
        .sky-card.setting-card .sky-card-grid,
        .sky-card.list-card .sky-card-grid {
            grid-template-columns: 1fr;
        }

        .sky-field {
            border-color: rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.18);
            border-radius: 12px;
        }

        .sky-actions button,
        .sky-command button {
            border-radius: 12px;
            font-weight: 700;
        }

        .sky-actions button.primary,
        .sky-command .primary {
            background: linear-gradient(135deg, #6bd6ff, #73e0aa);
        }

        .sky-command {
            padding: 14px 34px max(20px, env(safe-area-inset-bottom, 20px));
            background: rgba(5, 7, 10, 0.84);
        }

        .sky-command input {
            min-height: 56px;
            border-radius: 16px;
            font-size: 17px;
        }

        body.sky-empty {
            grid-template-rows: auto 1fr auto;
        }

        body.sky-empty .sky-topbar {
            grid-template-columns: 1fr;
            justify-items: center;
            padding-top: clamp(28px, 5vh, 64px);
        }

        body.sky-empty .sky-title {
            flex-direction: column;
            text-align: center;
            gap: 16px;
        }

        body.sky-empty .sky-mark {
            width: 54px;
            height: 54px;
        }

        body.sky-empty .sky-heading h1 {
            font-size: clamp(42px, 7vw, 82px);
        }

        body.sky-empty .sky-heading p {
            max-width: min(620px, 84vw);
            white-space: normal;
            font-size: 17px;
        }

        body.sky-empty .sky-status {
            position: fixed;
            right: 34px;
            top: calc(var(--ta-nav-h, 64px) + 24px);
            z-index: 4;
        }

        body.sky-empty .sky-shell {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 0;
            padding-bottom: 28px;
        }

        body.sky-empty .sky-orb-panel {
            width: min(900px, calc(100vw - 68px));
            min-height: min(58vh, 620px);
            border-color: transparent;
            background: transparent;
            box-shadow: none;
        }

        body.sky-empty #skyOrb {
            min-height: min(58vh, 620px);
        }

        body.sky-empty .sky-listening-copy {
            bottom: 44px;
            font-size: clamp(20px, 3vw, 34px);
            line-height: 1.18;
            max-width: 720px;
            color: rgba(246,248,251,0.82);
            text-shadow: 0 10px 40px rgba(0,0,0,0.45);
        }

        body.sky-empty .sky-transcript,
        body.sky-empty .sky-stage {
            display: none;
        }

        body.sky-empty .sky-command {
            max-width: min(860px, calc(100vw - 48px));
            width: 100%;
            justify-self: center;
            margin: 0 auto max(18px, env(safe-area-inset-bottom, 18px));
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 22px;
            background: rgba(12, 15, 22, 0.82);
            box-shadow: 0 24px 80px rgba(0,0,0,0.42);
        }

        @media (max-width: 980px) {
            .sky-shell {
                grid-template-columns: 1fr;
            }
            #skyOrb {
                min-height: 360px;
            }
            .sky-card.page-card,
            .sky-card.setting-card {
                grid-column: span 12;
            }
        }

        @media (max-width: 640px) {
            .sky-topbar {
                padding-top: 16px;
            }
            .sky-heading h1 {
                font-size: 32px;
            }
            .sky-shell {
                gap: 16px;
            }
            .sky-card-stack {
                padding: 14px;
            }
            .sky-card-grid {
                grid-template-columns: 1fr;
            }
            body.sky-empty .sky-status {
                position: static;
                justify-self: stretch;
            }
            body.sky-empty .sky-shell {
                padding-top: 0;
            }
            body.sky-empty .sky-orb-panel {
                width: calc(100vw - 28px);
                min-height: 440px;
            }
            body.sky-empty #skyOrb {
                min-height: 420px;
            }
            body.sky-empty .sky-command {
                grid-template-columns: 1fr;
                max-width: calc(100vw - 28px);
            }
        }

        /* Login-screen composition reset: Zoe login calm, dynamic card surface. */
        html,
        body {
            padding-top: 0 !important;
            background:
                radial-gradient(circle at 50% 34%, rgba(123, 97, 255, 0.2), transparent 31%),
                radial-gradient(circle at 54% 42%, rgba(90, 224, 224, 0.13), transparent 30%),
                linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            overflow: hidden;
        }

        body {
            position: relative;
            display: block;
            min-height: 100dvh;
        }

        #ztm-nav {
            display: none !important;
        }

        body::before {
            inset: 0;
            background:

                radial-gradient(circle at 52% 44%, rgba(90, 224, 224, 0.16), transparent 34%),
                linear-gradient(135deg, #1a1a2e 0%, #16213e 52%, #0f3460 100%) !important;
        }

        #ztm-nav,
        .sky-topbar,
        .sky-status,
        .sky-transport-toggle,
        .sky-stage-header,
        .sky-transcript,
        .sky-command,
        .sky-voice-hint {
            display: none !important;
        }

        .sky-shell {
            display: block !important;
            height: 100dvh !important;
            min-height: 100dvh !important;
            padding: 0 !important;
            overflow: hidden !important;
        }

        .sky-orb-panel {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            border: 0 !important;
            background: transparent !important;
            box-shadow: none !important;
            pointer-events: none !important;
            z-index: 8;
        }

        #skyOrb {
            display: none !important;
        }

        .sky-orb-panel::before {
            content: "" !important;
            position: fixed !important;
            left: 50% !important;
            top: 42% !important;
            width: clamp(248px, 28vw, 350px) !important;
            height: clamp(248px, 28vw, 350px) !important;
            transform: translate(-50%, -50%) !important;
            border-radius: 50% !important;
            background:
                radial-gradient(circle at 33% 26%, rgba(255,255,255,0.34), transparent 24%),
                linear-gradient(135deg, #7B61FF 0%, #5AE0E0 100%) !important;
            box-shadow:
                0 0 62px rgba(123, 97, 255, 0.44),
                0 0 132px rgba(90, 224, 224, 0.24),
                inset 0 0 64px rgba(255,255,255,0.12) !important;
            animation: sky-login-breathe 4s ease-in-out infinite;
            transition: all 680ms cubic-bezier(0.2, 0.9, 0.18, 1) !important;
            z-index: 10 !important;
        }

        .sky-orb-panel::after {
            content: "" !important;
            position: fixed !important;
            left: 50% !important;
            top: 42% !important;
            width: clamp(320px, 38vw, 500px) !important;
            height: clamp(320px, 38vw, 500px) !important;
            transform: translate(-50%, -50%) !important;
            border-radius: 50% !important;
            border: 1px solid transparent;
            background: radial-gradient(circle, rgba(123, 97, 255, 0.18), rgba(90, 224, 224, 0.09) 35%, transparent 68%) !important;
            animation: sky-login-halo 4s ease-in-out infinite;
            transition: all 680ms cubic-bezier(0.2, 0.9, 0.18, 1) !important;
            z-index: 9 !important;
        }

        .sky-orb-button {
            position: fixed !important;
            left: 50% !important;
            top: 42% !important;
            width: clamp(248px, 28vw, 350px) !important;
            height: clamp(248px, 28vw, 350px) !important;
            transform: translate(-50%, -50%) !important;
            border: 0 !important;
            border-radius: 50% !important;
            background: transparent !important;
            color: transparent !important;
            pointer-events: auto !important;
            cursor: pointer;
            z-index: 12 !important;
            transition: all 680ms cubic-bezier(0.2, 0.9, 0.18, 1) !important;
        }

        .sky-listening-copy {
            position: fixed !important;
            left: 50% !important;
            top: calc(42% + clamp(158px, 17vw, 222px)) !important;
            width: min(620px, calc(100vw - 48px)) !important;
            transform: translateX(-50%) !important;
            color: rgba(255,255,255,0.46) !important;
            font-size: clamp(15px, 1.45vw, 20px) !important;
            line-height: 1.35 !important;
            text-align: center !important;
            z-index: 13 !important;
            transition: all 680ms cubic-bezier(0.2, 0.9, 0.18, 1) !important;
        }

        body:not(.sky-empty) .sky-orb-panel::before,
        body.sky-state-listening .sky-orb-panel::before,
        body.sky-state-thinking .sky-orb-panel::before,
        body.sky-state-responding .sky-orb-panel::before,
        body:not(.sky-empty) .sky-orb-button,
        body.sky-state-listening .sky-orb-button,
        body.sky-state-thinking .sky-orb-button,
        body.sky-state-responding .sky-orb-button {
            top: auto !important;
            bottom: max(34px, env(safe-area-inset-bottom, 24px)) !important;
            left: calc(50% - min(336px, 36vw)) !important;
            width: 58px !important;
            height: 58px !important;
            transform: translate(-50%, 0) !important;
        }

        body:not(.sky-empty) .sky-orb-panel::after,
        body.sky-state-listening .sky-orb-panel::after,
        body.sky-state-thinking .sky-orb-panel::after,
        body.sky-state-responding .sky-orb-panel::after {
            top: auto !important;
            bottom: max(24px, env(safe-area-inset-bottom, 18px)) !important;
            left: 50% !important;
            width: min(760px, calc(100vw - 40px)) !important;
            height: 78px !important;
            transform: translateX(-50%) !important;
            border-radius: 999px !important;
            border-color: rgba(255,255,255,0.14) !important;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.055)),
                rgba(9, 13, 27, 0.66) !important;
            box-shadow: 0 24px 90px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            animation: none !important;
        }

        body:not(.sky-empty) .sky-listening-copy,
        body.sky-state-listening .sky-listening-copy,
        body.sky-state-thinking .sky-listening-copy,
        body.sky-state-responding .sky-listening-copy {
            top: auto !important;
            bottom: max(24px, env(safe-area-inset-bottom, 18px)) !important;
            left: calc(50% - min(270px, 29vw)) !important;
            width: min(600px, calc(100vw - 132px)) !important;
            height: 78px !important;
            transform: none !important;
            color: rgba(255,255,255,0.84) !important;
            font-size: clamp(16px, 1.35vw, 20px) !important;
            line-height: 78px !important;
            text-align: left !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }

        .sky-stage {
            position: fixed !important;
            inset: clamp(28px, 5vh, 56px) 0 132px !important;
            width: min(1120px, calc(100vw - 48px)) !important;
            margin: 0 auto !important;
            transform: none !important;
            border: 0 !important;
            background: transparent !important;
            box-shadow: none !important;
            opacity: 1 !important;
            z-index: 2 !important;
        }

        body.sky-empty .sky-stage {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        .sky-card-stack {
            height: 100% !important;
            max-height: none !important;
            padding: 0 0 18px !important;
            display: grid !important;
            grid-template-columns: repeat(12, minmax(0, 1fr)) !important;
            gap: 16px !important;
            align-content: end !important;
            overflow: auto !important;
            scrollbar-width: none;
        }

        .sky-card-stack::-webkit-scrollbar,
        .sky-card-stack::before {
            display: none !important;
        }

        .sky-card,
        .sky-card.page-card,
        .sky-card.setting-card,
        .sky-card.list-card,
        .sky-card:first-child {
            grid-column: span 6 !important;
            min-height: 172px !important;
            padding: 20px !important;
            border: 1px solid rgba(255,255,255,0.13) !important;
            border-radius: 24px !important;
            background:
                linear-gradient(150deg, rgba(255,255,255,0.16), rgba(255,255,255,0.055)),
                rgba(18, 23, 38, 0.7) !important;
            box-shadow: 0 24px 72px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
        }

        .sky-card:first-child,
        .sky-card.wide,
        .sky-card.calendar-card,
        .sky-card.weather-card {
            grid-column: span 12 !important;
        }

        @media (max-width: 780px) {
            .sky-stage {
                inset: 22px 12px 116px !important;
                width: auto !important;
            }

            .sky-card-stack {
                grid-template-columns: 1fr !important;
                gap: 12px !important;
            }

            .sky-card,
            .sky-card.page-card,
            .sky-card.setting-card,
            .sky-card.list-card,
            .sky-card:first-child {
                grid-column: 1 / -1 !important;
                border-radius: 22px !important;
                padding: 18px !important;
            }

            body:not(.sky-empty) .sky-orb-panel::before,
            body.sky-state-listening .sky-orb-panel::before,
            body.sky-state-thinking .sky-orb-panel::before,
            body.sky-state-responding .sky-orb-panel::before,
            body:not(.sky-empty) .sky-orb-button,
            body.sky-state-listening .sky-orb-button,
            body.sky-state-thinking .sky-orb-button,
            body.sky-state-responding .sky-orb-button {
                left: 52px !important;
                width: 54px !important;
                height: 54px !important;
            }

            body:not(.sky-empty) .sky-orb-panel::after,
            body.sky-state-listening .sky-orb-panel::after,
            body.sky-state-thinking .sky-orb-panel::after,
            body.sky-state-responding .sky-orb-panel::after {
                width: calc(100vw - 24px) !important;
                height: 74px !important;
            }

            body:not(.sky-empty) .sky-listening-copy,
            body.sky-state-listening .sky-listening-copy,
            body.sky-state-thinking .sky-listening-copy,
            body.sky-state-responding .sky-listening-copy {
                left: 86px !important;
                width: calc(100vw - 112px) !important;
                height: 74px !important;
                line-height: 74px !important;
                font-size: 15px !important;
            }
        }
    </style>
</head>
<body>
    <header class="sky-topbar">
        <div class="sky-title">
            <div class="sky-mark" aria-hidden="true"></div>
            <div class="sky-heading">
                <h1>Zoe</h1>
                <p id="skySubtitle">Skybridge is listening.</p>
            </div>
        </div>
        <div class="sky-status" aria-live="polite">
            <span class="sky-status-dot" id="skyStatusDot"></span>
            <span class="sky-status-text" id="skyStatusText">Starting</span>
        </div>
        <div class="sky-transport-toggle" aria-label="Voice transport">
            <button type="button" data-mode="local">Local</button>
            <button type="button" data-mode="livekit">LiveKit</button>
        </div>
    </header>

	    <main class="sky-shell">
	        <section class="sky-orb-panel" aria-label="Voice state">
	            <canvas id="skyOrb"></canvas>
	            <button type="button" class="sky-orb-button" id="skyOrbButton" aria-label="Start voice">
	                <span id="skyOrbButtonText">Tap to talk</span>
	            </button>
	            <div class="sky-listening-copy" id="skyListeningCopy">Say what you need. Skybridge will shape the screen around it.</div>
	            <div class="sky-voice-hint" id="skyVoiceHint" aria-live="polite">
	                <div class="sky-voice-dot" aria-hidden="true"></div>
	                <div>
	                    <strong id="skyVoiceTitle">Touch the orb to speak</strong>
	                    <span id="skyVoiceDetail">The touch screen will ask for microphone access the first time.</span>
	                </div>
	                <button type="button" id="skyVoiceAction">Start mic</button>
	            </div>
	            <div class="sky-transcript" id="skyTranscript" aria-live="polite"></div>
	        </section>

        <section class="sky-stage" aria-label="Skybridge cards">
            <div class="sky-stage-header">
                <div class="sky-context">
                    <h2 id="skyContextTitle">Home surface</h2>
                    <p id="skyContextDetail">Cards appear here as Zoe understands the request.</p>
                </div>
                <div class="sky-mode-toggle" aria-label="Voice transport">
                    <button type="button" data-mode="local">Local</button>
                    <button type="button" data-mode="livekit">LiveKit</button>
                </div>
            </div>
            <div class="sky-card-stack" id="skyCards"></div>
        </section>
    </main>

    <form class="sky-command" id="skyCommandForm">
        <button type="button" id="skyHomeBtn" title="Show home cards">Home</button>
        <input id="skyCommandInput" autocomplete="off" placeholder="Ask Zoe to show or change anything..." aria-label="Ask Zoe">
	        <button type="button" id="skyMicBtn">Mic</button>
        <button type="submit" class="primary">Send</button>
    </form>

    <script src="/js/auth.js"></script>
    <script src="/js/websocket-sync.js"></script>
    <script src="/touch/js/gestures.js"></script>
    <script src="/touch/js/touch-menu.js"></script>
    <script src="/js/touch-ui-executor.js"></script>
    <script src="/touch/js/skybridge-capabilities.js?v=skybridge-minimal-1"></script>
    <script src="/touch/js/skybridge-renderer.js?v=skybridge-minimal-1"></script>
    <script src="/touch/js/skybridge-voice.js?v=skybridge-minimal-1"></script>
    <script src="/touch/js/skybridge.js?v=skybridge-minimal-1"></script>
</body>
</html>
