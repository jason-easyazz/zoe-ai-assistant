<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function(){
        if (localStorage.getItem('zoe_kiosk') === '1') return;
        var p = new URLSearchParams(location.search);
        if (p.get('kiosk') === '1') localStorage.setItem('zoe_kiosk', '1');
    })();
    (function(){
        var s = localStorage.getItem('zoe_theme') || 'auto';
        var h = new Date().getHours();
        var dark = s === 'dark' || (s === 'auto' && (h < 7 || h >= 19));
        if (dark) document.documentElement.classList.add('dark-mode');
    })();
    window.prompt = function(msg, def) { return def || ''; };
    window.alert = function() {};
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0d12">
    <title>Zoe Skybridge</title>
    <link rel="stylesheet" href="/touch/css/touch-adapter.css">
    <link rel="stylesheet" href="/touch/css/skybridge-data-widgets.css?v=skybridge-panel-session-2">
    <script src="/lib/livekit/livekit-client.umd.min.js" onerror="console.warn('LiveKit client not loaded')"></script>
    <style>
        :root {
            --sky-bg: #0b0d12;
            --sky-panel: rgba(19, 23, 31, 0.78);
            --sky-panel-strong: rgba(24, 30, 42, 0.94);
            --sky-border: rgba(255, 255, 255, 0.1);
            --sky-text: #f6f8fb;
            --sky-muted: rgba(246, 248, 251, 0.64);
            --sky-soft: rgba(246, 248, 251, 0.1);
            --sky-blue: #5fc6ff;
            --sky-green: #66d19e;
            --sky-amber: #f7bf5f;
            --sky-coral: #ff7b7b;
            --sky-violet: #8c7dff;
            --sky-radius: 8px;
        }

        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background:
                radial-gradient(circle at 14% 12%, rgba(95, 198, 255, 0.16), transparent 30%),
                radial-gradient(circle at 88% 18%, rgba(102, 209, 158, 0.12), transparent 28%),
                linear-gradient(145deg, #0b0d12 0%, #11151d 48%, #080a0e 100%);
            color: var(--sky-text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            padding-top: var(--ta-nav-h, 64px);
        }

        body {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100dvh;
        }

        .sky-topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: center;
            padding: 18px 28px 12px;
        }

        .sky-title {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .sky-mark {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 30%, #ffffff 0%, rgba(255,255,255,0.35) 12%, transparent 30%),
                conic-gradient(from 210deg, var(--sky-blue), var(--sky-green), var(--sky-amber), var(--sky-violet), var(--sky-blue));
            box-shadow: 0 0 34px rgba(95, 198, 255, 0.24);
            flex: 0 0 auto;
        }

        .sky-heading {
            min-width: 0;
        }

        .sky-heading h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.05;
            font-weight: 700;
            letter-spacing: 0;
        }

        .sky-heading p {
            margin: 5px 0 0;
            color: var(--sky-muted);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sky-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--sky-border);
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--sky-radius);
            min-height: 44px;
        }

        .sky-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--sky-green);
            box-shadow: 0 0 18px rgba(102, 209, 158, 0.72);
        }

        .sky-status-text {
            font-size: 13px;
            color: var(--sky-muted);
        }

        .sky-orb-button,
        .sky-voice-hint {
            display: none;
        }

        .sky-shell {
            display: grid;
            grid-template-columns: minmax(300px, 34vw) minmax(0, 1fr);
            gap: 22px;
            min-height: 0;
            padding: 8px 28px 18px;
        }

        .sky-orb-panel,
        .sky-stage {
            min-height: 0;
            border: 1px solid var(--sky-border);
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border-radius: var(--sky-radius);
            box-shadow: 0 22px 80px rgba(0, 0, 0, 0.32);
        }

        .sky-orb-panel {
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            overflow: hidden;
            position: relative;
        }

        #skyOrb {
            width: 100%;
            height: 100%;
            min-height: 320px;
            display: block;
        }

        .sky-listening-copy {
            position: absolute;
            left: 22px;
            right: 22px;
            bottom: 112px;
            text-align: center;
            color: var(--sky-muted);
            font-size: 15px;
            line-height: 1.45;
            pointer-events: none;
        }

        .sky-transcript {
            display: grid;
            gap: 8px;
            padding: 16px;
            border-top: 1px solid var(--sky-border);
            background: rgba(0, 0, 0, 0.14);
            max-height: 190px;
            overflow: auto;
        }

        .sky-line {
            font-size: 13px;
            line-height: 1.45;
            color: var(--sky-muted);
        }

        .sky-line strong {
            color: var(--sky-text);
            font-weight: 650;
        }

        .sky-stage {
            display: grid;
            grid-template-rows: auto 1fr;
            overflow: hidden;
        }

        /* Home nav — a clear, always-reachable way back to the dashboard hub while a
           card is showing. Hidden at rest (the ambient clock is the home). */
        .sky-nav-home {
            position: fixed;
            top: 22px;
            left: 22px;
            z-index: 60;
            display: none;
            align-items: center;
            gap: 8px;
            height: 50px;
            padding: 0 20px 0 15px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(18, 22, 36, 0.66);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 12px 30px -12px rgba(0, 0, 0, 0.5);
            transition: transform 160ms ease, background 160ms ease;
        }
        .sky-nav-home svg { width: 22px; height: 22px; fill: currentColor; }
        .sky-nav-home:hover { background: rgba(28, 34, 52, 0.78); }
        .sky-nav-home:active { transform: scale(0.96); }
        body:not(.sky-empty) .sky-nav-home { display: inline-flex; }
        html.light-mode .sky-nav-home,
        :root[data-theme="light"] .sky-nav-home {
            background: rgba(255, 255, 255, 0.82);
            color: #16324d;
            border-color: rgba(20, 50, 80, 0.14);
        }

        .sky-stage-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 16px;
            align-items: center;
            padding: 16px 18px;
            border-bottom: 1px solid var(--sky-border);
        }

        .sky-context h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .sky-context p {
            margin: 4px 0 0;
            color: var(--sky-muted);
            font-size: 13px;
        }

        .sky-mode-toggle {
            display: flex;
            gap: 6px;
            padding: 4px;
            border: 1px solid var(--sky-border);
            background: rgba(0,0,0,0.16);
            border-radius: var(--sky-radius);
        }

        .sky-mode-toggle button,
        .sky-card button,
        .sky-command button {
            min-height: 44px;
            border: 0;
            border-radius: 7px;
            color: var(--sky-text);
            background: rgba(255,255,255,0.08);
            padding: 0 14px;
            font: inherit;
            cursor: pointer;
        }

        .sky-mode-toggle button.active {
            background: rgba(95, 198, 255, 0.2);
            color: #d9f4ff;
        }

        .sky-card-stack {
            min-height: 0;
            overflow: auto;
            padding: 18px;
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            align-content: start;
            gap: 14px;
        }

        .sky-card {
            grid-column: span 6;
            min-height: 168px;
            border: 1px solid var(--sky-border);
            border-radius: var(--sky-radius);
            background: var(--sky-panel);
            padding: 16px;
            display: grid;
            gap: 12px;
            align-content: start;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        .sky-card.wide { grid-column: span 12; }
        .sky-card.compact { grid-column: span 4; min-height: 132px; }

        .sky-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .sky-card-title {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .sky-card-kicker {
            margin: 0 0 4px;
            color: var(--sky-muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        .sky-badge {
            flex: 0 0 auto;
            border-radius: 999px;
            border: 1px solid var(--sky-border);
            padding: 5px 9px;
            color: var(--sky-muted);
            font-size: 12px;
            background: rgba(255,255,255,0.05);
        }

        /* ── Clock card ──
           Every clock-card sizing rule lived inside other @media blocks that
           weren't winning, so the "what time is it" card collapsed to a bare
           ~38px bar (scene height 0) — verified on the 1280x720 panel. These base
           rules give the card real height and center the live time; they override
           the stale rules (hence !important) and de-overlap the date. */
        body:not(.sky-empty) .clock-card.sky-premium-card {
            min-height: 320px !important;
            height: auto !important;
            max-height: none !important;
            overflow: visible !important;
        }
        body:not(.sky-empty) .clock-card .sky-clock-scene {
            min-height: 280px !important;
            height: auto !important;
            position: static !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 6px !important;
        }
        body:not(.sky-empty) .clock-card .sky-clock-main {
            position: static !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            gap: 8px !important;
        }
        body:not(.sky-empty) .clock-card .sky-clock-time {
            position: static !important;
            display: flex !important;
            align-items: baseline !important;
            justify-content: center !important;
            gap: 4px !important;
        }
        body:not(.sky-empty) .clock-card .sky-clock-time span {
            position: static !important;
            font-size: 110px !important;
            line-height: 1 !important;
            font-weight: 700 !important;
            color: #fff !important;
        }
        body:not(.sky-empty) .clock-card .sky-clock-time i {
            position: static !important;
            font-size: 96px !important;
            font-style: normal !important;
            color: rgba(255,255,255,0.4) !important;
            transform: translateY(-8px) !important;
        }
        body:not(.sky-empty) .clock-card .sky-clock-time b {
            position: static !important;
            font-size: 34px !important;
            font-weight: 600 !important;
            color: rgba(255,255,255,0.72) !important;
            align-self: flex-end !important;
            margin-bottom: 16px !important;
        }
        body:not(.sky-empty) .clock-card .sky-clock-date {
            position: static !important;
            font-size: 24px !important;
            color: rgba(255,255,255,0.66) !important;
            text-align: center !important;
        }

        /* ── Timer card ──
           Square-ish tile: time centered, label as a small note beneath, and the
           progress is the card's BORDER — a rounded-rect SVG stroke that depletes
           as the time runs out. Several tile side by side (eggs + pasta + oven). */
        body:not(.sky-empty) .sky-card.timer {
            grid-column: span 6 !important;
            justify-self: center !important;
            align-self: start !important;
            width: min(340px, 100%) !important;
            aspect-ratio: 1.12 / 1;
            height: auto !important;
            min-height: 0 !important;
            max-height: none !important;
            position: relative !important;
            overflow: visible !important;
            padding: 0 !important;
            border-color: transparent !important;   /* the SVG ring is the border */
        }
        .sky-timer {
            position: absolute;
            inset: 0;
        }
        .sky-timer-ring {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .sky-timer-ring-track,
        .sky-timer-ring-fill {
            fill: none;
            stroke-width: 4px;
            vector-effect: non-scaling-stroke;
        }
        .sky-timer-ring-track { stroke: rgba(255,255,255,0.12); }
        .sky-timer-ring-fill {
            stroke: #34d399;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.95s linear, stroke 0.4s ease;
        }
        .sky-timer.is-low .sky-timer-ring-fill { stroke: #f59e0b; }
        .sky-timer.is-expired .sky-timer-ring-fill { stroke: #f87171; stroke-dashoffset: 0 !important; }
        .sky-timer-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
            width: 100%;
        }
        .sky-timer-digits {
            font-size: 66px;
            line-height: 1;
            font-weight: 700;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            color: #fff;
        }
        .sky-timer.is-expired .sky-timer-digits {
            font-size: 38px;
            letter-spacing: 1px;
            color: #f87171;
        }
        .sky-timer-label {
            font-size: 13px;
            color: rgba(255,255,255,0.58);
            text-transform: uppercase;
            letter-spacing: 2px;
            max-width: 80%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sky-timer-x {
            position: absolute;
            top: 12px;
            right: 14px;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 1px solid var(--sky-border);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.55);
            font-size: 13px;
            line-height: 1;
            cursor: pointer;
            z-index: 2;
        }
        .sky-timer-x:active { background: rgba(255,255,255,0.16); }
        .sky-card.timer.sky-timer-ringing {
            animation: skyTimerPulse 0.85s ease-in-out infinite;
        }
        @keyframes skyTimerPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.0); }
            50% { box-shadow: 0 0 48px 8px rgba(248,113,113,0.5); }
        }

        .sky-card-body {
            color: rgba(246,248,251,0.78);
            font-size: 14px;
            line-height: 1.45;
        }

        .sky-card-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .sky-field {
            border: 1px solid var(--sky-border);
            background: rgba(0,0,0,0.14);
            border-radius: 7px;
            padding: 10px;
            min-width: 0;
        }

        .sky-field span {
            display: block;
            color: var(--sky-muted);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .sky-field strong {
            display: block;
            font-size: 14px;
            overflow-wrap: anywhere;
        }

        .sky-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-self: start;
        }

        .sky-actions button.primary {
            background: linear-gradient(135deg, rgba(95,198,255,0.88), rgba(102,209,158,0.88));
            color: #071017;
            font-weight: 700;
        }

        .sky-actions button.warn {
            background: rgba(255, 123, 123, 0.18);
            color: #ffd5d5;
        }

        .sky-command {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto auto;
            gap: 10px;
            align-items: center;
            padding: 12px 28px max(18px, env(safe-area-inset-bottom, 18px));
            background: rgba(5, 7, 10, 0.72);
            border-top: 1px solid var(--sky-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .sky-command input {
            width: 100%;
            min-height: 48px;
            border: 1px solid var(--sky-border);
            border-radius: var(--sky-radius);
            background: rgba(255,255,255,0.08);
            color: var(--sky-text);
            padding: 0 14px;
            font: inherit;
            outline: none;
        }

        .sky-command input:focus {
            border-color: rgba(95, 198, 255, 0.7);
            box-shadow: 0 0 0 3px rgba(95, 198, 255, 0.12);
        }

        .sky-command .primary {
            background: var(--sky-green);
            color: #071017;
            font-weight: 700;
        }

        .sky-command .recording {
            background: var(--sky-coral);
            color: #190707;
        }

        @media (max-width: 980px) {
            .sky-shell {
                grid-template-columns: 1fr;
            }
            .sky-orb-panel {
                min-height: 330px;
            }
            #skyOrb {
                min-height: 260px;
            }
            .sky-card { grid-column: span 12; }
            .sky-card.compact { grid-column: span 6; }
        }

        @media (max-width: 640px) {
            body { overflow-y: auto; overflow-x: hidden; height: auto; max-width: 100vw; }
            .sky-topbar,
            .sky-shell,
            .sky-command {
                padding-left: 14px;
                padding-right: 14px;
            }
            .sky-topbar,
            .sky-stage-header,
            .sky-command {
                grid-template-columns: 1fr;
            }
            #ztm-tabs {
                overflow-x: auto;
                scrollbar-width: none;
            }
            #ztm-tabs::-webkit-scrollbar {
                display: none;
            }
            #ztm-right {
                display: none;
            }
            .sky-heading p,
            .sky-listening-copy {
                white-space: normal;
                overflow: visible;
                overflow-wrap: anywhere;
                text-overflow: clip;
            }
            .sky-heading p {
                max-width: 270px;
            }
            .sky-listening-copy {
                left: 38px;
                right: auto;
                transform: none;
                width: 300px;
                font-size: 14px;
            }
            .sky-mode-toggle {
                justify-self: start;
            }
            .sky-card.compact { grid-column: span 12; }
        }

        /* Skybridge presentation layer: voice-first, cinematic, card-native. */
        html, body {
            background:
                radial-gradient(circle at 20% 30%, rgba(95, 198, 255, 0.22), transparent 34%),
                radial-gradient(circle at 78% 18%, rgba(102, 209, 158, 0.18), transparent 28%),
                radial-gradient(circle at 70% 86%, rgba(247, 191, 95, 0.1), transparent 26%),
                linear-gradient(145deg, #080a10 0%, #11151d 42%, #07080c 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 64px 0 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 72px 72px;
            mask-image: radial-gradient(circle at 50% 42%, black 0%, transparent 72%);
            opacity: 0.22;
        }

        .sky-topbar {
            padding: 20px 34px 10px;
        }

        .sky-heading h1 {
            font-size: clamp(30px, 4vw, 54px);
            font-weight: 760;
        }

        .sky-heading p {
            font-size: 15px;
            color: rgba(246,248,251,0.72);
        }

        .sky-status {
            border-color: rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.075);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .sky-shell {
            grid-template-columns: minmax(360px, 40vw) minmax(0, 1fr);
            gap: 26px;
            padding: 12px 34px 20px;
        }

        .sky-orb-panel,
        .sky-stage {
            border-color: rgba(255,255,255,0.12);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.035)),
                rgba(7, 9, 14, 0.62);
            border-radius: 18px;
            box-shadow:
                0 28px 90px rgba(0,0,0,0.44),
                inset 0 1px 0 rgba(255,255,255,0.09);
        }

        .sky-orb-panel {
            min-height: 0;
        }

        #skyOrb {
            min-height: 520px;
            filter: saturate(1.1);
        }

        .sky-listening-copy {
            bottom: 92px;
            max-width: 360px;
            margin: 0 auto;
            font-size: 18px;
            color: rgba(246,248,251,0.72);
        }

        .sky-transcript {
            max-height: 118px;
            background: rgba(0,0,0,0.22);
        }

        .sky-stage-header {
            padding: 22px 24px;
            background: linear-gradient(90deg, rgba(255,255,255,0.075), transparent);
        }

        .sky-context h2 {
            font-size: clamp(28px, 3.2vw, 44px);
            line-height: 1;
        }

        .sky-context p {
            font-size: 15px;
            color: rgba(246,248,251,0.7);
        }

        .sky-mode-toggle {
            border-radius: 12px;
        }

        .sky-mode-toggle button {
            border-radius: 10px;
            font-weight: 700;
        }

        .sky-card-stack {
            position: relative;
            padding: 24px;
            gap: 16px;
            align-content: start;
            scrollbar-width: thin;
        }

        .sky-card-stack::before {
            content: "";
            position: sticky;
            top: -24px;
            grid-column: 1 / -1;
            height: 0;
            z-index: 2;
            box-shadow: 0 0 68px 44px rgba(7,9,14,0.55);
            pointer-events: none;
        }

        .sky-card {
            position: relative;
            overflow: hidden;

        /* Login-screen composition reset: Zoe login calm, dynamic card surface. */
        html,
        body {
            padding-top: 0 !important;
            background:
                radial-gradient(circle at 50% 34%, rgba(123, 97, 255, 0.2), transparent 31%),
                radial-gradient(circle at 54% 42%, rgba(90, 224, 224, 0.13), transparent 30%),
                linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            overflow: hidden;
        }

        body {
            position: relative;
            display: block;
            min-height: 100dvh;
        }

        #ztm-nav {
            display: none !important;
        }

        body::before {
            inset: 0;
            background:
                radial-gradient(circle at 50% 42%, rgba(123, 97, 255, 0.18), transparent 25%),
                radial-gradient(circle at 50% 42%, rgba(90, 224, 224, 0.08), transparent 42%);
            mask-image: none;
            opacity: 1;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.035), transparent 20%, transparent 78%, rgba(0,0,0,0.18)),
                radial-gradient(ellipse at center, transparent 42%, rgba(5, 7, 18, 0.28) 100%);
            z-index: 0;
        }

        .sky-topbar,
        .sky-shell,
        .sky-command {
            position: relative;
            z-index: 1;
        }

        .sky-topbar {
            position: fixed;
            top: max(24px, env(safe-area-inset-top, 24px));
            left: clamp(22px, 4vw, 56px);
            right: clamp(22px, 4vw, 56px);
            padding: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: start;
            gap: 18px;
            z-index: 5;
            pointer-events: none;
        }

        .sky-title {
            justify-self: start;
            align-items: flex-start;
            gap: 10px;
            min-width: 0;
        }

        .sky-mark {
            display: none;
        }

        .sky-heading h1 {
            margin: 0;
            font-size: clamp(28px, 3vw, 44px);
            font-weight: 400;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff, #5AE0E0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sky-heading p {
            margin: 7px 0 0;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            letter-spacing: 0;
            white-space: normal;
        }

        .sky-status {
            display: none;
        }

        .sky-transport-toggle {
            position: fixed;
            top: max(28px, env(safe-area-inset-top, 28px));
            right: clamp(22px, 4vw, 56px);
            display: flex;
            gap: 6px;
            padding: 5px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(9, 13, 27, 0.46);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            z-index: 6;
            pointer-events: auto;
            transition: opacity 280ms ease, transform 280ms ease;
        }

        .sky-transport-toggle button {
            min-height: 34px;
            border: 0;
            border-radius: 999px;
            padding: 0 12px;
            color: rgba(255,255,255,0.62);

            font: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .sky-transport-toggle button.active {
            color: #081016;
            background: linear-gradient(135deg, #7B61FF, #5AE0E0);
        }

        .sky-shell {
            display: block !important;
            height: 100dvh;
            min-height: 100dvh;
            padding: 0 !important;
            overflow: hidden;
        }

        .sky-orb-panel {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            min-height: 0 !important;
            border: 0;
            background: transparent;
            box-shadow: none;
            pointer-events: none;
            overflow: visible;
        }

        #skyOrb {
            display: none !important;
        }

        .sky-orb-panel::before {
            content: "";
            position: fixed;
            left: 50%;
            top: 38%;
            width: clamp(250px, 28vw, 350px);
            height: clamp(250px, 28vw, 350px);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: linear-gradient(135deg, #7B61FF 0%, #5AE0E0 100%);
            box-shadow:
                0 0 60px rgba(123, 97, 255, 0.42),
                0 0 120px rgba(90, 224, 224, 0.22),
                inset 0 0 60px rgba(255, 255, 255, 0.1);
            animation: sky-login-breathe 4s ease-in-out infinite;
            transition:
                top 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                left 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                width 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                height 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                opacity 360ms ease;
            z-index: 4;
        }

        .sky-orb-panel::after {
            content: "";
            position: fixed;
            left: 50%;
            top: 38%;
            width: clamp(330px, 38vw, 500px);
            height: clamp(330px, 38vw, 500px);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123, 97, 255, 0.15), rgba(90, 224, 224, 0.09) 34%, transparent 68%);
            animation: sky-login-halo 4s ease-in-out infinite;
            transition:
                top 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                left 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                width 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                height 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                border-radius 620ms cubic-bezier(0.2, 0.9, 0.2, 1);
            z-index: 3;
        }

        /* Standby = ambient clock, not summoned: the CLOCK owns the screen.
           The orb body + halo appear only when Zoe is summoned (a sky-state-* is
           set), then shrink to the base when showing results. The canvas orb is
           already hidden in this mode; hide the orb glow + halo too so they don't
           sit on top of the clock (they were left visible — the panel was always
           faded to opacity:0 before, so this overlap was never seen). */
        body.sky-empty.sky-ambient-clock:not(.sky-state-listening):not(.sky-state-thinking):not(.sky-state-responding) .sky-orb-panel::before,
        body.sky-empty.sky-ambient-clock:not(.sky-state-listening):not(.sky-state-thinking):not(.sky-state-responding) .sky-orb-panel::after {
            opacity: 0;
        }

        .sky-listening-copy {
            position: fixed;
            left: 50%;
            right: auto !important;
            top: calc(38% + clamp(170px, 19vw, 235px));
            bottom: auto !important;
            width: min(620px, 86vw);
            transform: translateX(-50%) !important;
            margin: 0;
            text-align: center;
            color: rgba(255,255,255,0.28) !important;
            font-size: clamp(16px, 1.45vw, 21px) !important;
            line-height: 1.4;
            pointer-events: none;
            transition:
                top 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                left 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                width 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                height 620ms cubic-bezier(0.2, 0.9, 0.2, 1),
                color 260ms ease;
            z-index: 5;
        }

        .sky-orb-button {
            position: fixed;
            left: 50%;
            top: 38%;
            width: clamp(250px, 28vw, 350px);
            height: clamp(250px, 28vw, 350px);
            transform: translate(-50%, -50%);
            display: grid;
            place-items: center;
            border: 0;
            border-radius: 50%;
            background: transparent;
            color: white;
            cursor: pointer;
            z-index: 6;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .sky-orb-button::before {
            content: "";
            position: absolute;
            inset: 18%;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            background:
                radial-gradient(circle at 34% 26%, rgba(255,255,255,0.42), transparent 20%),
                linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
            display: none !important;
            opacity: 0;
            transition: opacity 200ms ease, transform 260ms ease;
        }

        .sky-orb-button:hover::before,
        .sky-orb-button:focus-visible::before {
            opacity: 0;
            transform: scale(1.04);
        }

        .sky-orb-button span {
            position: relative;
            display: none !important;
            gap: 8px;
            place-items: center;
            padding-top: 46%;
            font-size: 14px;
            font-weight: 750;
            letter-spacing: 0;
            color: rgba(255,255,255,0.78);
            text-shadow: 0 2px 18px rgba(0,0,0,0.36);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 220ms ease, transform 220ms ease;
        }

        body.sky-empty .sky-orb-button span {
            opacity: 0;
            transform: translateY(0);
        }

        body.sky-state-listening .sky-orb-panel::before {
            animation-duration: 1.55s;
            box-shadow:

        /* Scope the clock-element styles to its ID. `sky-ambient-clock` is ALSO
           a <body> state-flag (skybridge.js adds it to body), so a bare
           `.sky-ambient-clock` rule with position:fixed/opacity:0 wrongly matched
           the body and faded the whole UI invisible. Targeting #skyAmbientClock
           keeps these on the element only. */
        /* Resting clock — the idle/standby screen. Deliberately SIMPLE + DARK so
           it never lights up the room (esp. at night). The rich ambient clock
           CARD is a separate on-demand surface. Vertically centred, elegant Inter,
           and dimmed by time of day via a brightness filter (see #skyAmbientClock
           dim rules + skybridge-theme.js data-rest-dim). */
        #skyAmbientClock {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            display: grid;
            justify-items: center;
            gap: clamp(8px, 1.4vh, 18px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 600ms ease, transform 600ms ease, filter 1200ms ease;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 18px 70px rgba(0,0,0,0.55);
            filter: brightness(0.82);   /* default (day) — overridden by data-rest-dim */
        }

        body.sky-empty.sky-ambient-clock #skyAmbientClock {
            opacity: 1;
            transform: translate(-50%, -50%);
        }
        body:not(.sky-empty) #skyAmbientClock {
            opacity: 0;
            transform: translate(-50%, calc(-50% - 10px));
        }

        /* Ambient composed briefing — a MODEST card under the resting clock.
           The clock stays primary; the briefing lives inside #skyAmbientClock so
           the time-of-day brightness dim above applies to it for free (night-dim
           untouched — css inherits). Empty container renders nothing. */

        /* Resting screen background — flatten the body glow toward pure dark so the
           idle screen stays room-safe (returns when a card shows). Deep darker. */
        body.sky-empty.sky-ambient-clock {
            background-color: #05070e !important;
            background-image: none !important;
        }
        :root[data-rest-dim="deep"] body.sky-empty.sky-ambient-clock {
            background-color: #03040a !important;
            background-image: none !important;
        }

        /* Room-safe at night: the soft glow on the resting screen comes from several
           layers — the html backdrop gradient, the body ::before/::after glows, and
           the orb panel's glow. During the dark hours (after sunset / deep sleep)
           suppress ALL of them so the standby screen is genuinely black, not just
           the body bg. (Daytime keeps a faint ambient; active states keep the orb.) */
        :root[data-rest-dim="night"]:has(body.sky-empty.sky-ambient-clock),
        :root[data-rest-dim="deep"]:has(body.sky-empty.sky-ambient-clock) {
            background-image: none !important;
            background-color: #05070e !important;
        }
        :root[data-rest-dim="deep"]:has(body.sky-empty.sky-ambient-clock) { background-color: #03040a !important; }
        :root[data-rest-dim="night"] body.sky-empty.sky-ambient-clock::before,
        :root[data-rest-dim="deep"]  body.sky-empty.sky-ambient-clock::before,
        :root[data-rest-dim="night"] body.sky-empty.sky-ambient-clock::after,
        :root[data-rest-dim="deep"]  body.sky-empty.sky-ambient-clock::after {
            background: none !important;
            opacity: 0 !important;
        }
        :root[data-rest-dim="night"] body.sky-empty.sky-ambient-clock .sky-orb-panel::before,
        :root[data-rest-dim="deep"]  body.sky-empty.sky-ambient-clock .sky-orb-panel::before,
        :root[data-rest-dim="night"] body.sky-empty.sky-ambient-clock .sky-orb-panel::after,
        :root[data-rest-dim="deep"]  body.sky-empty.sky-ambient-clock .sky-orb-panel::after,
        :root[data-rest-dim="night"] body.sky-empty.sky-ambient-clock #skyOrb,
        :root[data-rest-dim="deep"]  body.sky-empty.sky-ambient-clock #skyOrb {
            opacity: 0 !important;
        }

                font-weight: 650 !important;
                line-height: 1.1 !important;
                opacity: 0 !important;
                transform: translateX(-8px) !important;
                transition: opacity 180ms ease, transform 220ms ease !important;
            }

            body:not(.sky-empty) .sky-command input,
            body:not(.sky-empty) .sky-command button,
            body.sky-command-open .sky-command input,
            body.sky-command-open .sky-command button {
                display: none !important;
            }

            body.sky-state-listening:not(.sky-empty) .sky-command,
            body.sky-state-thinking:not(.sky-empty) .sky-command,
            body.sky-state-responding:not(.sky-empty) .sky-command {
                left: 50% !important;
                width: min(860px, calc(100vw - 96px)) !important;
                height: 76px !important;
                min-height: 76px !important;
                transform: translateX(-50%) !important;
                grid-template-columns: 68px minmax(0, 1fr) !important;
                justify-items: stretch !important;
                gap: 16px !important;
                padding: 4px 24px 4px 4px !important;
                background:
                    linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.055)),
                    rgba(8, 13, 28, 0.82) !important;
                box-shadow:
                    0 24px 78px rgba(0,0,0,0.48),
                    0 0 58px rgba(90,224,224,0.16),
                    inset 0 1px 0 rgba(255,255,255,0.16) !important;
                backdrop-filter: blur(26px) saturate(1.15) !important;
                -webkit-backdrop-filter: blur(26px) saturate(1.15) !important;
            }

            body.sky-state-listening:not(.sky-empty) .sky-command-copy,
            body.sky-state-thinking:not(.sky-empty) .sky-command-copy,
            body.sky-state-responding:not(.sky-empty) .sky-command-copy {
                opacity: 1 !important;
                transform: translateX(0) !important;
                align-self: center !important;
            }

            body.sky-typing-fallback .sky-command,
            body.sky-voice-fallback.sky-empty .sky-command {
                left: 50% !important;
                width: min(860px, calc(100vw - 96px)) !important;
                height: 76px !important;
                transform: translateX(-50%) !important;
                grid-template-columns: 58px minmax(0, 1fr) auto !important;
                gap: 12px !important;
                padding: 8px 10px !important;
                background: rgba(9, 13, 27, 0.82) !important;
            }

            body.sky-typing-fallback .sky-command-copy {
                display: none !important;
            }

            body.sky-typing-fallback .sky-command input,
            body.sky-typing-fallback .sky-command .primary,
            body.sky-voice-fallback.sky-empty .sky-command input,
            body.sky-voice-fallback.sky-empty .sky-command .primary {
                display: inline-flex !important;
            }

            body:not(.sky-empty) .sky-orb-panel::before,
            body:not(.sky-empty) .sky-orb-panel::after,
            body:not(.sky-empty) .sky-orb-button,
            body:not(.sky-empty) .sky-listening-copy {
                opacity: 0 !important;
                pointer-events: none !important;
            }
        }
    </style>

    <style id="skybridge-native-panel-fit-final">
        /* Native Zoe touch panel: 1280x720 rotated DSI display. Keep cards above the voice layer. */
        @media (min-width: 900px) and (max-height: 760px) {
            body:not(.sky-empty) .sky-stage,
            body.sky-command-open:not(.sky-empty) .sky-stage {
                inset: 24px 24px 112px !important;
                width: auto !important;
                overflow: visible !important;
            }

            body:not(.sky-empty) .sky-card-stack {
                height: 100% !important;
                max-height: 100% !important;
                align-content: stretch !important;
                padding-bottom: 0 !important;
                overflow: visible !important;
            }

            body:not(.sky-empty) .sky-card-stack > .sky-card:first-child,
            body:not(.sky-empty) .weather-card.sky-premium-card,
            body:not(.sky-empty) .calendar-card.sky-premium-card,
            body:not(.sky-empty) .clock-card.sky-premium-card,
            body:not(.sky-empty) .zoe-list-card.sky-premium-card,
            body:not(.sky-empty) .sky-card.list-card.sky-premium-card,
            body:not(.sky-empty) .people-card.sky-premium-card,
            body:not(.sky-empty) .person-profile-card.sky-premium-card,
            body:not(.sky-empty) .sky-card.auth-challenge {
                height: 100% !important;
                max-height: 100% !important;
                min-height: 0 !important;
                overflow: hidden !important;
            }

            body:not(.sky-empty) .sky-card.auth-challenge {
                width: min(980px, calc(100vw - 96px)) !important;
                margin-inline: auto !important;
            }

            body:not(.sky-empty) .weather-card .sky-weather-scene {
                height: 100% !important;
                grid-template-columns: minmax(0, 0.78fr) minmax(520px, 1fr) !important;
                gap: 18px !important;
                padding: 24px !important;
            }

            body:not(.sky-empty) .weather-card .sky-weather-main {
                gap: 14px !important;
            }

            body:not(.sky-empty) .weather-card .sky-weather-temp {
                font-size: 142px !important;
            }

            body:not(.sky-empty) .weather-card .sky-weather-icon {
                font-size: 82px !important;
            }

            body:not(.sky-empty) .weather-card .sky-weather-forecast {
                gap: 9px !important;
                padding: 14px !important;
            }

            body:not(.sky-empty) .weather-card .sky-weather-hour-tile {
                min-height: 86px !important;
                padding: 8px 7px !important;
            }

            body:not(.sky-empty) .weather-card .sky-weather-day-list {
                gap: 7px !important;
            }

            body:not(.sky-empty) .weather-card .sky-weather-day-row {
                min-height: 52px !important;
                padding: 8px 13px !important;
            }

            body:not(.sky-empty) .weather-card .sky-weather-day-temp strong {
                font-size: 26px !important;
            }

            body:not(.sky-empty) .calendar-card .sky-calendar-scene,
            body:not(.sky-empty) .zoe-list-card .sky-list-scene,
            body:not(.sky-empty) .people-card .sky-people-scene,
            body:not(.sky-empty) .person-profile-card .sky-profile-scene,
            body:not(.sky-empty) .clock-card .sky-clock-scene {
                height: 100% !important;
                min-height: 0 !important;
            }
        }
    </style>

<body>
<!-- Skybridge glyph sprite (design system §5). Cards: <svg><use href="#i-*"/></svg> -->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <radialGradient id="moonG" cx="38%" cy="32%"><stop offset="0" stop-color="#fff7e0"/><stop offset="1" stop-color="#ffce70"/></radialGradient>
  <mask id="moonM"><rect width="32" height="32" fill="#fff"/><circle cx="23.5" cy="10.5" r="10.5" fill="#000"/></mask>
  <radialGradient id="sunG" cx="42%" cy="38%"><stop offset="0" stop-color="#fff1a6"/><stop offset=".6" stop-color="#ffc23d"/><stop offset="1" stop-color="#ff9b2f"/></radialGradient>
  <linearGradient id="cloudG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#cdd8ec"/></linearGradient>
  <linearGradient id="stormG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dbe1f0"/><stop offset="1" stop-color="#9aa6c4"/></linearGradient>
  <linearGradient id="rainG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e9effb"/><stop offset="1" stop-color="#b0c1e6"/></linearGradient>
</defs>
<symbol id="i-moon" viewBox="0 0 32 32"><circle cx="15" cy="16" r="11" fill="url(#moonG)" mask="url(#moonM)"/></symbol>
<symbol id="i-sun" viewBox="0 0 32 32"><g stroke="#ffb22e" stroke-width="2.4" stroke-linecap="round"><line x1="16" y1="1.5" x2="16" y2="5"/><line x1="16" y1="27" x2="16" y2="30.5"/><line x1="1.5" y1="16" x2="5" y2="16"/><line x1="27" y1="16" x2="30.5" y2="16"/><line x1="5.8" y1="5.8" x2="8.3" y2="8.3"/><line x1="23.7" y1="23.7" x2="26.2" y2="26.2"/><line x1="5.8" y1="26.2" x2="8.3" y2="23.7"/><line x1="23.7" y1="8.3" x2="26.2" y2="5.8"/></g><circle cx="16" cy="16" r="7.4" fill="url(#sunG)"/></symbol>
<symbol id="i-cloud" viewBox="0 0 24 22"><path d="M6.5 18.5h11a4 4 0 0 0 .6-7.94A5.6 5.6 0 0 0 6.3 8.1 4.2 4.2 0 0 0 6.5 18.5Z" fill="url(#cloudG)" stroke="rgba(80,110,150,.18)" stroke-width=".5"/></symbol>
<symbol id="i-rain" viewBox="0 0 24 26"><path d="M6.5 14h11a4 4 0 0 0 .6-7.94A5.6 5.6 0 0 0 6.3 3.6 4.2 4.2 0 0 0 6.5 14Z" fill="url(#rainG)"/><g fill="#6fa8ff"><path d="M9 17.5l-1 2.6a.85.85 0 0 0 1.6.5l.8-2.5z"/><path d="M13.5 17.5l-1 2.6a.85.85 0 0 0 1.6.5l.8-2.5z"/></g></symbol>
<symbol id="i-storm" viewBox="0 0 24 26"><path d="M6.5 14h11a4 4 0 0 0 .6-7.94A5.6 5.6 0 0 0 6.3 3.6 4.2 4.2 0 0 0 6.5 14Z" fill="url(#stormG)"/><path d="M13 13l-4.2 6.4h3l-1 5 5-7.4h-3l1.2-4z" fill="#ffd23d"/></symbol>
</svg>
    <header class="sky-topbar">
        <div class="sky-title">
            <div class="sky-mark" aria-hidden="true"></div>
            <div class="sky-heading">
                <h1>Zoe</h1>
                <p id="skySubtitle">Skybridge is listening.</p>
            </div>
        </div>
        <div class="sky-status" aria-live="polite">
            <span class="sky-status-dot" id="skyStatusDot"></span>
            <span class="sky-status-text" id="skyStatusText">Starting</span>
        </div>
        <div class="sky-transport-toggle" aria-label="Voice transport">
            <button type="button" data-mode="local">Local</button>
            <button type="button" data-mode="livekit">LiveKit</button>
        </div>
    </header>

	    <main class="sky-shell">
	        <section class="sky-orb-panel" aria-label="Voice state">
	            <div class="sky-ambient-clock" id="skyAmbientClock" aria-label="Ambient clock">
	                <div class="sky-ambient-time"><span data-clock-hour id="skyAmbientClockHour">--</span><i>:</i><span data-clock-minute id="skyAmbientClockMinute">--</span><b data-clock-meridiem id="skyAmbientClockMeridiem"></b></div>
	                <div class="sky-ambient-date" data-clock-date id="skyAmbientClockDate"></div>
	            </div>
	            <canvas id="skyOrb"></canvas>
	            <button type="button" class="sky-orb-button sky-float-chrome" id="skyOrbButton" aria-label="Start voice">
	                <span id="skyOrbButtonText">Tap to talk</span>
	            </button>
	            <div class="sky-listening-copy" id="skyListeningCopy">Say what you need. Skybridge will shape the screen around it.</div>
	            <div class="sky-voice-hint" id="skyVoiceHint" aria-live="polite">
	                <div class="sky-voice-dot" aria-hidden="true"></div>
	                <div>
	                    <strong id="skyVoiceTitle">Touch the orb to speak</strong>
	                    <span id="skyVoiceDetail">The touch screen will ask for microphone access the first time.</span>
	                </div>
	                <button type="button" id="skyVoiceAction">Start mic</button>
	            </div>
	            <div class="sky-transcript" id="skyTranscript" aria-live="polite"></div>
	        </section>

        <section class="sky-stage" aria-label="Skybridge cards">
            <button type="button" id="skyNavHome" class="sky-nav-home sky-float-chrome" aria-label="Back to home dashboard">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 3 10v10h6v-6h6v6h6V10z"/></svg>
                <span>Home</span>
            </button>
            <div class="sky-stage-header">
                <div class="sky-context">
                    <h2 id="skyContextTitle">Home surface</h2>
                    <p id="skyContextDetail">Cards appear here as Zoe understands the request.</p>
                </div>
                <div class="sky-mode-toggle" aria-label="Voice transport">
                    <button type="button" data-mode="local">Local</button>
                    <button type="button" data-mode="livekit">LiveKit</button>
                </div>
            </div>
            <div class="sky-card-stack" id="skyCards"></div>
        </section>
    </main>

    <form class="sky-command" id="skyCommandForm">
        <div class="sky-command-copy" id="skyCommandCopy" aria-live="polite">Listening</div>
        <button type="button" id="skyHomeBtn" title="Show home cards">Home</button>
        <input id="skyCommandInput" autocomplete="off" placeholder="Ask Zoe to show or change anything..." aria-label="Ask Zoe">
	        <button type="button" id="skyMicBtn">Mic</button>
        <button type="submit" class="primary">Send</button>
    </form>
