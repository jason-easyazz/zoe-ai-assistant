<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zoe</title>
    <script>
    // Skybridge is retired — the estate (home.html) is the panel chrome now.
    // This is a compatibility redirect ONLY: TouchKio panels flashed before the
    // installer was repointed still boot /touch/skybridge.html, so keep the URL
    // alive and forward them to the estate (carrying panel_id / kiosk / hash).
    (function(){
        try {
            var p = new URLSearchParams(location.search);
            if (p.get('kiosk') === '1') localStorage.setItem('zoe_kiosk', '1');
        } catch (e) {}
        location.replace('/touch/home.html' + location.search + location.hash);
    })();
    </script>
</head>
<body></body>
</html>
