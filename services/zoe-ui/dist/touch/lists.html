<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoe - Lists</title>
    <style>
        /* Google Nest Hub Inspired Variables */
        :root {
            /* Zoe Brand Colors */
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            
            /* Theme Colors */
            --background-dark: #1a1a1a;
            --background-light: #f5f5f5;
            --surface: rgba(255, 255, 255, 0.9);
            --surface-dark: rgba(30, 30, 30, 0.95);
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-primary-dark: #ffffff;
            --text-secondary-dark: #b0b0b0;
            
            /* Widget System */
            --widget-radius: 24px;
            --widget-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            --widget-shadow-dark: 0 8px 32px rgba(0, 0, 0, 0.4);
            
            /* Touch Targets */
            --touch-target: 56px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DejaVu Sans', 'Liberation Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background-light);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.3s ease;
        }

        /* Dark mode */
        body.dark-theme {
            background: var(--background-dark);
            color: var(--text-primary-dark);
        }

        /* Header Bar */
        .header-bar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .dark-theme .header-bar {
            background: rgba(30, 30, 30, 0.95);
            border-bottom-color: rgba(255, 255, 255, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark-theme .back-button {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary-dark);
        }

        .back-button:hover {
            background: var(--primary-gradient);
            color: white;
            transform: scale(1.05);
        }

        .page-title {
            font-size: 24px;
            font-weight: 500;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dark-theme .header-button {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary-dark);
        }

        .header-button:hover {
            background: var(--primary-gradient);
            color: white;
            transform: scale(1.05);
        }

        /* Main Content */
        .lists-container {
            padding: 32px;
            min-height: calc(100vh - 100px);
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-gradient) transparent;
        }

        .lists-container::-webkit-scrollbar {
            height: 8px;
        }

        .lists-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .lists-container::-webkit-scrollbar-thumb {
            background: var(--primary-gradient);
            border-radius: 4px;
        }

        .lists-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #5a67d8 0%, #6b46c1 100%);
        }

        .lists-grid {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(300px, 360px);
            grid-template-rows: 1fr;
            gap: 20px;
            align-items: stretch;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 20px;
            scroll-snap-type: x mandatory;
        }

        .lists-grid > .list-card { 
            scroll-snap-align: start; 
        }

        .list-card {
            background: var(--surface);
            border-radius: var(--widget-radius);
            padding: 20px;
            box-shadow: var(--widget-shadow);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .dark-theme .list-card {
            background: var(--surface-dark);
            box-shadow: var(--widget-shadow-dark);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .list-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .dark-theme .list-card:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .list-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .list-count {
            background: var(--primary-gradient);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .list-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(103, 126, 234, 0.3) transparent;
        }

        .list-items::-webkit-scrollbar {
            width: 4px;
        }

        .list-items::-webkit-scrollbar-track {
            background: transparent;
        }

        .list-items::-webkit-scrollbar-thumb {
            background: rgba(103, 126, 234, 0.3);
            border-radius: 2px;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
            min-height: 48px;
        }

        .list-item:hover {
            background: rgba(103, 126, 234, 0.1);
        }

        .item-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-secondary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .item-checkbox:hover {
            border-color: var(--primary-gradient);
            transform: scale(1.1);
        }

        .item-checkbox.checked {
            background: var(--primary-gradient);
            border-color: transparent;
            color: white;
        }

        .item-text {
            flex: 1;
            font-size: 15px;
        }

        .item-text.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .item-priority {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .item-priority.high {
            background: #ff3b30;
        }

        .item-priority.medium {
            background: #ff9500;
        }

        .item-priority.low {
            background: #34c759;
        }

        .add-item-form {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .dark-theme .add-item-form {
            border-top-color: rgba(255, 255, 255, 0.1);
        }

        .add-item-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.02);
            color: var(--text-primary);
            font-size: 14px;
        }

        .dark-theme .add-item-input {
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary-dark);
        }

        .add-item-input:focus {
            outline: none;
            border-color: var(--primary-gradient);
            background: rgba(103, 126, 234, 0.05);
        }

        .add-item-button {
            padding: 12px 20px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-item-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(103, 126, 234, 0.3);
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary-gradient);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .scroll-indicator.show {
            opacity: 1;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .lists-container {
                padding: 16px;
            }
            
            .lists-grid {
                grid-auto-columns: minmax(280px, 80%);
                gap: 16px;
            }
            
            .list-card {
                min-height: 350px;
            }
        }
    </style>
    <link rel="stylesheet" href="/touch/css/touch-base.css">
    <script src="/js/auth.js"></script>
<!-- PWA Meta Tags -->
    <meta name="application-name" content="Zoe AI">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zoe">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#7B61FF">
    <meta name="msapplication-TileColor" content="#7B61FF">
    <meta name="msapplication-tap-highlight" content="no">
    
    <!-- Icons & Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="mask-icon" href="/icons/icon-maskable-512.png" color="#7B61FF">
    
    <!-- iOS Splash Screens -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png">
    
    <!-- Service Worker Registration -->
    <script src="/js/sw-registration.js" defer></script>
</head>
<body>
    <!-- Header Bar -->
    <div class="header-bar">
        <div class="header-left">
            <button class="back-button" onclick="goBack()" title="Back to Dashboard">
                ←
            </button>
            <h1 class="page-title">📝 Lists</h1>
        </div>
        <div class="header-right">
            <button class="header-button" onclick="toggleTheme()" title="Toggle Theme">
                🌙
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="lists-container" id="listsContainer">
        <div class="lists-grid" id="listsGrid">
            <!-- Lists will be loaded by JavaScript -->
        </div>
    </div>

    <!-- Scroll Indicator -->
    <div class="scroll-indicator" id="scrollIndicator">
        ← Scroll to see more lists
    </div>

    <script>
        function getAuthHeaders() {
            try {
                const session = JSON.parse(localStorage.getItem('zoe_session') || '{}');
                const sid = session.session_id;
                return sid ? { 'Content-Type': 'application/json', 'X-Session-ID': sid } : { 'Content-Type': 'application/json' };
            } catch { return { 'Content-Type': 'application/json' }; }
        }

        let isDarkTheme = false;
        // listRegistry: { [listType]: { list_id, name, icon, items: [{id, text, completed, priority}] } }
        const listRegistry = {};

        document.addEventListener('DOMContentLoaded', function() {
            loadLists();
            setupScrollIndicator();
            const hour = new Date().getHours();
            if (hour < 7 || hour > 19) toggleTheme(true);
            // ZoeWebSockets for live sync
            try {
                const session = JSON.parse(localStorage.getItem('zoe_session') || '{}');
                const userId = session.user_id || session.user_info?.user_id;
                if (userId && window.ZoeWebSockets) ZoeWebSockets.init(userId);
            } catch {}
        });

        // ZOE_OPEN_FORM: magic UI hook for voice-triggered item add
        window.ZOE_OPEN_FORM = function(formType, prefill) {
            if (formType === 'new_list_item') {
                const listType = prefill?.list_type || 'shopping';
                const inputs = document.querySelectorAll('.add-item-input');
                // Find the right card's input
                const card = document.querySelector(`[data-list-type="${listType}"]`);
                const input = card ? card.querySelector('.add-item-input') : inputs[0];
                if (input) {
                    if (prefill?.item) input.value = prefill.item;
                    input.focus();
                    if (prefill?.item) input.dispatchEvent(new KeyboardEvent('keypress', { key: 'Enter', bubbles: true }));
                }
            }
        };

        function setupScrollIndicator() {
            const container = document.getElementById('listsContainer');
            const indicator = document.getElementById('scrollIndicator');
            
            function updateScrollIndicator() {
                const isScrollable = container.scrollWidth > container.clientWidth;
                const isAtStart = container.scrollLeft === 0;
                
                if (isScrollable && isAtStart) {
                    indicator.classList.add('show');
                } else {
                    indicator.classList.remove('show');
                }
            }
            
            container.addEventListener('scroll', updateScrollIndicator);
            window.addEventListener('resize', updateScrollIndicator);
            
            // Initial check
            updateScrollIndicator();
        }

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        function toggleTheme(force = null) {
            if (force !== null) {
                isDarkTheme = force;
            } else {
                isDarkTheme = !isDarkTheme;
            }
            
            document.body.classList.toggle('dark-theme', isDarkTheme);
            document.querySelector('.header-button').textContent = isDarkTheme ? '☀️' : '🌙';
        }

        async function loadLists() {
            const listTypes = ['personal_todos', 'work_todos', 'shopping', 'bucket'];
            const headers = getAuthHeaders();

            await Promise.all(listTypes.map(async (type) => {
                try {
                    // Step 1: get list metadata (includes list_id)
                    const metaResp = await fetch(`/api/lists/${type}`, { headers });
                    if (!metaResp.ok) return;
                    const meta = await metaResp.json();
                    // meta.lists is an array; take the first list
                    const listMeta = (meta.lists || [])[0] || meta;
                    const listId = listMeta.id || listMeta.list_id;
                    if (!listId) return;

                    // Step 2: get list items
                    const itemsResp = await fetch(`/api/lists/${type}/${listId}`, { headers });
                    if (!itemsResp.ok) return;
                    const itemsData = await itemsResp.json();
                    const items = itemsData.items || itemsData.list?.items || [];

                    listRegistry[type] = {
                        list_id: listId,
                        name: getListDisplayName(type),
                        icon: getListIcon(type),
                        items: items,
                    };
                } catch (e) {
                    console.warn(`loadLists ${type}:`, e);
                }
            }));

            renderLists();
        }

        function getListDisplayName(type) {
            const names = {
                'personal_todos': 'Personal Tasks',
                'work_todos': 'Work Tasks',
                'shopping': 'Shopping List',
                'bucket': 'Bucket List'
            };
            return names[type] || type;
        }

        function getListIcon(type) {
            const icons = {
                'personal_todos': '🏠',
                'work_todos': '💼',
                'shopping': '🛒',
                'bucket': '🎯'
            };
            return icons[type] || '📝';
        }

        function renderLists() {
            const grid = document.getElementById('listsGrid');
            grid.innerHTML = '';
            const listTypes = ['personal_todos', 'work_todos', 'shopping', 'bucket'];

            listTypes.forEach(type => {
                const list = listRegistry[type];
                const items = list ? list.items : [];
                const name = list ? list.name : getListDisplayName(type);
                const icon = list ? list.icon : getListIcon(type);

                const completedCount = items.filter(i => i.completed).length;
                const totalCount = items.length;

                const listCard = document.createElement('div');
                listCard.className = 'list-card';
                listCard.setAttribute('data-list-type', type);

                listCard.innerHTML = `
                    <div class="list-header">
                        <div class="list-title"><span>${icon}</span><span>${name}</span></div>
                        <div class="list-count">${completedCount}/${totalCount}</div>
                    </div>
                    <div class="list-items" id="items-${type}">
                        ${items.length === 0 ? `<div style="text-align:center;color:var(--text-secondary);padding:20px">No items yet</div>` : ''}
                        ${items.map((item, idx) => `
                            <div class="list-item" data-item-id="${item.id || idx}" style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;cursor:pointer;touch-action:manipulation" onclick="toggleItem('${type}','${item.id || idx}',${!!item.completed})">
                                <div class="item-checkbox ${item.completed ? 'checked' : ''}" style="width:24px;height:24px;border-radius:50%;border:2px solid #7B61FF;display:flex;align-items:center;justify-content:center;flex-shrink:0;${item.completed ? 'background:linear-gradient(135deg,#7B61FF,#5AE0E0);border-color:transparent;' : ''}">${item.completed ? '✓' : ''}</div>
                                <div class="item-text ${item.completed ? 'completed' : ''}" style="${item.completed ? 'text-decoration:line-through;opacity:0.5;' : ''}flex:1;">${item.text || item.title || ''}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="add-item-form" style="margin-top:auto;padding-top:12px;display:flex;gap:8px;">
                        <input type="text" class="add-item-input" placeholder="Add new item..." style="flex:1;padding:10px 14px;border-radius:12px;border:1px solid rgba(123,97,255,0.3);font-size:14px;background:rgba(123,97,255,0.05);touch-action:manipulation"
                               onkeypress="if(event.key==='Enter'){addItem('${type}',this)}" />
                        <button class="add-item-button" onclick="addItem('${type}',this.previousElementSibling)" style="padding:10px 16px;border-radius:12px;border:none;background:linear-gradient(135deg,#7B61FF,#5AE0E0);color:white;cursor:pointer;font-size:14px;touch-action:manipulation">Add</button>
                    </div>
                `;

                grid.appendChild(listCard);
            });
        }

        async function toggleItem(listType, itemId, currentStatus) {
            const entry = listRegistry[listType];
            if (!entry || !entry.list_id) return;
            const headers = getAuthHeaders();
            const newStatus = !currentStatus;

            // Optimistic UI update
            const itemEl = document.querySelector(`[data-list-type="${listType}"] [data-item-id="${itemId}"]`);
            if (itemEl) {
                const cb = itemEl.querySelector('.item-checkbox');
                const txt = itemEl.querySelector('.item-text');
                if (newStatus) {
                    cb.classList.add('checked');
                    cb.textContent = '✓';
                    cb.style.background = 'linear-gradient(135deg,#7B61FF,#5AE0E0)';
                    cb.style.borderColor = 'transparent';
                    txt.style.textDecoration = 'line-through';
                    txt.style.opacity = '0.5';
                } else {
                    cb.classList.remove('checked');
                    cb.textContent = '';
                    cb.style.background = '';
                    cb.style.borderColor = '';
                    txt.style.textDecoration = '';
                    txt.style.opacity = '';
                }
            }

            try {
                await fetch(`/api/lists/${listType}/${entry.list_id}/items/${itemId}`, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({ completed: newStatus }),
                });
                // Update local registry
                const item = entry.items.find(i => String(i.id) === String(itemId));
                if (item) item.completed = newStatus;
            } catch (e) {
                console.warn('toggleItem failed:', e);
                loadLists(); // Revert on error
            }
        }

        async function addItem(listType, input) {
            const text = input.value.trim();
            if (!text) return;
            const entry = listRegistry[listType];
            if (!entry || !entry.list_id) {
                // List not loaded yet — try loading first
                await loadLists();
                return addItem(listType, input);
            }
            const headers = getAuthHeaders();
            try {
                const resp = await fetch(`/api/lists/${listType}/${entry.list_id}/items`, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify({ text, priority: 'low', completed: false }),
                });
                if (resp.ok) {
                    input.value = '';
                    loadLists();
                }
            } catch (e) {
                console.warn('addItem failed:', e);
            }
        }
    </script>
    <script src="/js/websocket-sync.js"></script>
    <script src="/js/touch-ui-executor.js"></script>
    <script src="/js/orb-loader.js"></script>

<script src="/touch/js/gestures.js"></script>
<script src="/touch/js/touch-menu.js"></script>
<script>TouchMenu.init({ page: 'lists' });</script>
</body>
</html>
