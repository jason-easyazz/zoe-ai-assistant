<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Zoe's Work</title>
<style>
  :root {
    --bg:#0e1116; --card:#171b22; --line:#262b34; --ink:#e6e9ef; --dim:#9aa4b2;
    --accent:#5b9dff; --ok:#3fb950; --warn:#e3b341; --block:#f85149;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f5f6f8; --card:#fff; --line:#e3e6ea; --ink:#1a1f28; --dim:#5b6472; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { padding:18px 20px 6px; display:flex; align-items:baseline; gap:12px; }
  header h1 { font-size:20px; margin:0; }
  header .sub { color:var(--dim); font-size:13px; }
  .wrap { padding:12px 16px 40px; max-width:820px; margin:0 auto; }
  .tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; margin:8px 0 18px; }
  .tile { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
  .tile .n { font-size:24px; font-weight:650; }
  .tile .l { color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .tile.attn .n { color:var(--block); }
  section { margin:18px 0; }
  section h2 { font-size:14px; text-transform:uppercase; letter-spacing:.05em; color:var(--dim); margin:0 0 8px; }
  .item { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
  .item .t { font-weight:550; }
  .item .m { color:var(--dim); font-size:13px; margin-top:3px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .num { color:var(--dim); font-variant-numeric:tabular-nums; }
  .pr { color:var(--accent); text-decoration:none; }
  .pr:hover { text-decoration:underline; }
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.prog { background:var(--accent); } .dot.review { background:var(--warn); }
  .dot.block { background:var(--block); } .dot.done { background:var(--ok); }
  .reason { color:var(--block); font-size:13px; margin-top:4px; }
  .empty { color:var(--dim); font-size:13px; padding:6px 2px; }
  .err { color:var(--block); padding:14px; }
  .foot { color:var(--dim); font-size:12px; text-align:center; margin-top:22px; }
</style>
</head>
<body>
<header>
  <h1>Zoe's Work</h1>
  <span class="sub" id="sub">loading…</span>
</header>
<div class="wrap">
  <div class="tiles" id="tiles"></div>
  <div id="sections"></div>
  <div class="foot">Autonomous board · one issue at a time · refreshes every 30s</div>
</div>
<script>
  var API = '/api/board/summary';
  function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
  // Only ever render an https GitHub PR url as a link — never a javascript:/data:
  // value that esc() would pass through unchanged into an href.
  function safeUrl(u){ return (typeof u==='string' && /^https:\/\/github\.com\//.test(u)) ? u : null; }
  function pr(url){ var u=safeUrl(url); return u ? ' · <a class="pr" href="'+esc(u)+'" target="_blank" rel="noopener">review PR ↗</a>' : ''; }
  function item(cls, it, opts){
    opts = opts || {};
    var reason = opts.reason && it.reason ? '<div class="reason">⚠ '+esc(it.reason)+'</div>' : '';
    return '<div class="item"><div class="t"><span class="dot '+cls+'"></span> '+esc(it.title)+'</div>'
      + '<div class="m"><span class="num">#'+esc(it.number)+'</span>'+pr(it.pr_url).replace(/^ · /,'')+'</div>'
      + reason + '</div>';
  }
  function list(title, arr, cls, opts){
    if(!arr || !arr.length) return '';
    return '<section><h2>'+title+' ('+arr.length+')</h2>'
      + arr.map(function(it){ return item(cls, it, opts); }).join('') + '</section>';
  }
  function tile(n, label, attn){
    return '<div class="tile'+(attn?' attn':'')+'"><div class="n">'+(n||0)+'</div><div class="l">'+label+'</div></div>';
  }
  function render(d){
    if(!d || !d.ok){
      document.getElementById('sub').textContent = 'board backend unreachable';
      document.getElementById('sections').innerHTML = '<div class="err">Could not reach the board — the runner or Multica may be down.</div>';
      return;
    }
    var c = d.counts || {};
    document.getElementById('sub').textContent =
      (d.needs_attention ? d.needs_attention + ' need feedback · ' : '') +
      (c.done||0) + ' done · ' + (c.todo||0) + ' queued';
    document.getElementById('tiles').innerHTML =
      tile(c.in_progress, 'In progress') + tile(c.in_review, 'In review')
      + tile(d.needs_attention, 'Needs feedback', d.needs_attention>0)
      + tile(c.done, 'Done') + tile(c.todo, 'Queued');
    var html = '';
    html += list('Needs your feedback', d.blocked, 'block', {reason:true});
    html += list('In progress', d.in_progress, 'prog');
    html += list('In review (gates running)', d.in_review, 'review');
    html += list('Recently shipped', d.recently_done, 'done');
    if(!html) html = '<div class="empty">Nothing on the board yet.</div>';
    document.getElementById('sections').innerHTML = html;
  }
  function load(){
    fetch(API, {credentials:'include'}).then(function(r){ return r.json(); })
      .then(render)
      .catch(function(){ render({ok:false}); });
  }
  load(); setInterval(load, 30000);
</script>
</body>
</html>
