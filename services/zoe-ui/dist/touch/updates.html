<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function(){
        if(localStorage.getItem('zoe_kiosk')==='1') return;
        var p=new URLSearchParams(location.search);
        if(p.get('kiosk')==='1') localStorage.setItem('zoe_kiosk','1');
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a1628">
    <title>Zoe - Updates</title>
    <link rel="stylesheet" href="/touch/css/touch-adapter.css">
    <script src="/js/auth.js"></script>
    <style>
        html, body { height: 100%; margin: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: linear-gradient(135deg, #fafbfc 0%, #f1f3f6 100%);
            color: #1f2937;
            overflow: hidden;
        }
        html.dark-mode body {
            background: linear-gradient(135deg, #060610 0%, #0d0d1a 100%) !important;
            color: rgba(255,255,255,0.93) !important;
        }
        .page {
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 10px;
            padding: 12px;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }
        .title { margin: 0; font-size: clamp(22px, 3vw, 30px); font-weight: 700; letter-spacing: -0.02em; }
        .subtitle { margin: 2px 0 0; color: #6b7280; font-size: clamp(13px, 1.55vw, 15px); }
        html.dark-mode .subtitle { color: rgba(255,255,255,0.6); }
        .header-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }
        .btn {
            min-height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.12);
            background: #fff;
            color: #1f2937;
            padding: 10px 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        .btn.primary {
            border: none;
            background: linear-gradient(135deg, #7B61FF 0%, #5AE0E0 100%);
            color: white;
        }
        .btn:disabled { opacity: .55; cursor: not-allowed; }
        html.dark-mode .btn {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.14);
            color: rgba(255,255,255,0.9);
        }
        .meta {
            color: #6b7280;
            font-size: 12px;
            font-weight: 600;
            text-align: right;
        }
        html.dark-mode .meta { color: rgba(255,255,255,0.58); }
        .tiles {
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 10px;
            padding-right: 2px;
            padding-bottom: 8px;
        }
        .tile {
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(0,0,0,0.09);
            border-radius: 14px;
            padding: 12px;
            display: grid;
            gap: 7px;
        }
        html.dark-mode .tile {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
        }
        .tile.highlight {
            outline: 2px solid rgba(123,97,255,0.65);
            box-shadow: 0 0 0 5px rgba(123,97,255,0.18);
        }
        .name { font-size: 16px; font-weight: 700; }
        .row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            font-size: 13px;
        }
        .label { color: #6b7280; }
        .detail { color: #4b5563; font-size: 12px; line-height: 1.35; min-height: 2.5em; }
        html.dark-mode .label { color: rgba(255,255,255,0.55); }
        html.dark-mode .detail { color: rgba(255,255,255,0.72); }
        .pill {
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 700;
        }
        .ok { background: rgba(22,163,74,0.15); color: #15803d; }
        .warn { background: rgba(217,119,6,0.18); color: #b45309; }
        .err { background: rgba(220,38,38,0.16); color: #b91c1c; }
        .plain { background: rgba(107,114,128,0.14); color: #4b5563; }
        html.dark-mode .ok { color: #86efac; background: rgba(22,163,74,0.2); }
        html.dark-mode .warn { color: #fde68a; background: rgba(217,119,6,0.24); }
        html.dark-mode .err { color: #fecaca; background: rgba(220,38,38,0.22); }
        html.dark-mode .plain { color: #d1d5db; background: rgba(107,114,128,0.25); }
        .empty {
            border-radius: 12px;
            padding: 14px;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(0,0,0,0.08);
            color: #6b7280;
            font-size: 14px;
        }
        html.dark-mode .empty {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.65);
        }
        @media (max-width: 900px) {
            .tiles { grid-template-columns: 1fr; }
            .meta { display: none; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div>
                <h1 class="title">Updates</h1>
                <p class="subtitle">Check versions and install component updates on Zoe.</p>
            </div>
            <div class="header-actions">
                <button id="checkBtn" class="btn primary">Check all</button>
                <div id="meta" class="meta">Loading…</div>
            </div>
        </div>
        <div id="components" class="tiles"></div>
    </div>

    <script src="/touch/js/touch-menu.js"></script>
    <script>
        (function () {
            const $components = document.getElementById('components');
            const $meta = document.getElementById('meta');
            const $check = document.getElementById('checkBtn');
            const highlight = new URLSearchParams(location.search).get('highlight');
            let installing = new Set();

            function esc(s) {
                return String(s == null ? '' : s)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }
            function pillClass(h) {
                h = String(h || '').toLowerCase();
                if (h === 'ok' || h === 'healthy' || h === 'connected') return 'ok';
                if (h === 'warn' || h === 'warning' || h === 'degraded') return 'warn';
                if (h === 'error' || h === 'failed' || h === 'offline') return 'err';
                return 'plain';
            }
            function canInstall(c) {
                return !!c.installable;
            }
            async function api(url, opts) {
                const r = await fetch(url, opts || {});
                let data = null;
                try { data = await r.json(); } catch (_) {}
                if (!r.ok) {
                    const detail = data && data.detail ? data.detail : ('HTTP ' + r.status);
                    throw new Error(typeof detail === 'string' ? detail : JSON.stringify(detail));
                }
                return data;
            }

            function renderComponents(payload) {
                const components = Array.isArray(payload.components) ? payload.components : [];
                $components.innerHTML = '';
                if (!components.length) {
                    $components.innerHTML = '<div class="empty">No components returned from updates API.</div>';
                    return;
                }

                components.forEach(c => {
                    const id = String(c.id || '');
                    const updating = installing.has(id);
                    const updateAvail = !!c.update_available;
                    const tile = document.createElement('div');
                    const isHighlighted = highlight === id || (highlight === 'openclaw' && id === 'openclaw');
                    tile.className = 'tile' + (isHighlighted ? ' highlight' : '');
                    const action = canInstall(c)
                        ? (updateAvail
                            ? `<button class="btn primary" data-install="${esc(id)}" ${updating ? 'disabled' : ''}>${updating ? 'Installing…' : 'Install update'}</button>`
                            : '<button class="btn" disabled>Up to date</button>')
                        : '<button class="btn" disabled>Not installable</button>';
                    tile.innerHTML = `
                        <div class="name">${esc(c.name || id)}</div>
                        <div class="detail">${esc(c.detail || '')}</div>
                        <div class="row"><span class="label">Installed</span><span>${esc(c.version || '—')}</span></div>
                        <div class="row"><span class="label">Latest</span><span>${esc(c.latest || '—')}</span></div>
                        <div class="row"><span class="label">Health</span><span class="pill ${pillClass(c.health)}">${esc(c.health || 'unknown')}</span></div>
                        <div class="row"><span class="label">Update</span><span class="pill ${updateAvail ? 'warn' : 'ok'}">${updateAvail ? 'Available' : 'Up to date'}</span></div>
                        ${action}
                    `;
                    $components.appendChild(tile);
                });

                $components.querySelectorAll('[data-install]').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.getAttribute('data-install');
                        if (!id) return;
                        const yes = confirm('Install update for "' + id + '" now?');
                        if (!yes) return;
                        try {
                            installing.add(id);
                            await loadSnapshot(false);
                            const res = await api('/api/system/updates/install/' + encodeURIComponent(id), {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ confirm: true })
                            });
                            if (typeof showNotification === 'function') showNotification((res && res.ok) ? 'Install complete.' : 'Install finished.', 'success');
                        } catch (e) {
                            if (typeof showNotification === 'function') showNotification(String(e.message || e), 'error');
                        } finally {
                            installing.delete(id);
                            await loadSnapshot(true);
                        }
                    });
                });
            }

            async function loadSnapshot(force) {
                try {
                    $meta.textContent = 'Loading…';
                    const q = force ? '?force=true' : '';
                    const data = await api('/api/system/updates' + q);
                    renderComponents(data);
                    const ts = data.fetched_at ? new Date(data.fetched_at * 1000) : new Date();
                    $meta.textContent = 'Last check: ' + ts.toLocaleTimeString();
                } catch (e) {
                    $components.innerHTML = '<div class="empty">Failed to load updates: ' + esc(String(e.message || e)) + '</div>';
                    $meta.textContent = 'Load failed';
                }
            }

            $check.addEventListener('click', () => loadSnapshot(true));

            loadSnapshot(false);
        })();
    </script>
</body>
</html>
