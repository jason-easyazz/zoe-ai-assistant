<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- TOUCH: kiosk bypass + auto-theme (must run before auth.js) -->
    <script>
    (function(){
        if (localStorage.getItem('zoe_kiosk') === '1') return;
        var p = new URLSearchParams(location.search);
        if (p.get('kiosk') === '1') localStorage.setItem('zoe_kiosk', '1');
    })();
    (function(){
        var s = localStorage.getItem('zoe_theme') || 'auto';
        var h = new Date().getHours();
        var dark = s === 'dark' || (s === 'auto' && (h < 7 || h >= 19));
        if (dark) document.documentElement.classList.add('dark-mode');
        var mc = document.querySelector('meta[name=theme-color]');
        if (mc) mc.content = dark ? '#060610' : '#fafbfc';
    })();
    window.prompt  = function(msg, def) { return def || ''; };
    window.alert   = function() {};
    window.confirm = function() { return true; };
    </script>
    <link rel="stylesheet" href="/touch/css/touch-adapter.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fafbfc">
    <title>Zoe — Journal</title>

    <!-- FilePond for photo uploads -->
    <link href="https://unpkg.com/filepond/dist/filepond.min.css" rel="stylesheet">
    <link href="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.min.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #7B61FF;
            --teal: #5AE0E0;
            --gradient: linear-gradient(135deg, #7B61FF 0%, #5AE0E0 100%);
            --bg: #fafbfc;
            --card: #ffffff;
            --card-soft: #f7f8ff;
            --border: rgba(123, 97, 255, 0.12);
            --text: #1A202C;
            --text-soft: #4A5568;
            --text-mute: #718096;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(123, 97, 255, 0.10);
        }
        html.dark-mode {
            --bg: #060610;
            --card: rgba(28, 28, 44, 0.9);
            --card-soft: rgba(40, 40, 60, 0.6);
            --border: rgba(123, 97, 255, 0.25);
            --text: #f0f0f5;
            --text-soft: #b4b4c8;
            --text-mute: #8a8aa0;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.35);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.45);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            padding-top: var(--ta-nav-h, 64px);
        }

        /* Main layout grid: entries left, calendar right */
        .journal-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 20px;
            padding: 20px 24px 32px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: start;
            min-height: calc(100dvh - var(--ta-nav-h, 64px));
        }
        @media (max-width: 900px) {
            .journal-layout { grid-template-columns: 1fr; }
        }

        /* ── Left pane: entries ─────────────────────────────────────── */
        .entries-pane { min-width: 0; }

        .pane-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .pane-title {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 999px;
            background: var(--gradient);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(123, 97, 255, 0.35);
            min-height: 48px;
            transition: transform 0.15s ease;
        }
        .btn-primary:active { transform: scale(0.96); }

        /* Search + filters */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1 1 220px;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--card);
            color: var(--text);
            font-size: 15px;
            min-height: 48px;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(123, 97, 255, 0.15);
        }
        .mood-filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .mood-chip {
            padding: 8px 14px;
            border: 1.5px solid var(--border);
            border-radius: 999px;
            background: var(--card);
            font-size: 14px;
            cursor: pointer;
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s ease;
            color: var(--text);
        }
        .mood-chip.active {
            background: var(--gradient);
            color: #fff;
            border-color: transparent;
        }

        /* Entry list */
        .entries-list { display: flex; flex-direction: column; gap: 12px; }
        .entry-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .entry-card:active {
            transform: scale(0.99);
            box-shadow: var(--shadow-md);
        }
        .entry-card-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }
        .entry-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }
        .entry-date {
            font-size: 13px;
            color: var(--text-mute);
            white-space: nowrap;
        }
        .entry-preview {
            font-size: 14px;
            color: var(--text-soft);
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .entry-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 13px;
            color: var(--text-mute);
        }
        .entry-meta .mood-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 999px;
            background: var(--card-soft);
            color: var(--text-soft);
            font-weight: 600;
        }
        .entry-photos {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .entry-photos img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-mute);
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
        .empty-state-sub { font-size: 14px; }

        /* ── Right pane: calendar + stats ────────────────────────────── */
        .side-pane {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: sticky;
            top: calc(var(--ta-nav-h, 64px) + 20px);
        }
        .side-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
        }

        /* Calendar */
        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .cal-title { font-size: 16px; font-weight: 700; color: var(--text); }
        .cal-nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-soft);
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .cal-nav-btn:active { transform: scale(0.9); }
        .cal-weekdays, .cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .cal-wd {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-mute);
            text-align: center;
            padding: 4px 0;
            letter-spacing: 0.05em;
        }
        .cal-day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: var(--text-soft);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            user-select: none;
            transition: background 0.12s ease;
        }
        .cal-day:active { background: var(--card-soft); }
        .cal-day.out { color: var(--text-mute); opacity: 0.35; }
        .cal-day.has-entry::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--primary);
        }
        .cal-day.today { font-weight: 800; color: var(--primary); }
        .cal-day.selected {
            background: var(--gradient);
            color: #fff;
        }
        .cal-day.selected.has-entry::after { background: #fff; }

        /* Stats card */
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            padding: 8px 0;
        }
        .stat-row + .stat-row { border-top: 1px dashed var(--border); }
        .stat-label { font-size: 13px; color: var(--text-mute); }
        .stat-value { font-size: 22px; font-weight: 800; color: var(--text); }
        .stat-value.accent {
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── Editor sheet (full-screen modal) ─────────────────────── */
        .editor-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at top, rgba(123,97,255,0.18) 0%, rgba(0,0,0,0.55) 70%);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            z-index: 3000;
            display: none;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .editor-overlay.open {
            display: flex;
            opacity: 1;
        }
        .editor-sheet {
            background: var(--card);
            width: 100%;
            max-width: 820px;
            max-height: 92dvh;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -24px 80px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.25, 1);
        }
        .editor-overlay.open .editor-sheet { transform: translateY(0); }
        @media (min-width: 700px) {
            .editor-overlay { align-items: center; padding: 40px; }
            .editor-sheet {
                border-radius: 24px;
                max-height: 88dvh;
            }
        }

        .editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .editor-title-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }
        .editor-actions { display: flex; gap: 8px; }
        .btn-ghost {
            padding: 10px 18px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: transparent;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
        }
        .btn-ghost:active { background: var(--card-soft); }
        .btn-danger {
            border-color: rgba(255, 77, 106, 0.3);
            color: #FF4D6A;
        }
        .btn-danger:active { background: rgba(255, 77, 106, 0.1); }

        .editor-body {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .field-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-soft);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .field-input, .field-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--card-soft);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .field-textarea {
            min-height: 160px;
            resize: vertical;
            line-height: 1.6;
        }
        .field-input:focus, .field-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(123, 97, 255, 0.15);
        }

        .mood-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .mood-pick {
            flex: 1 1 auto;
            min-width: 110px;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--card-soft);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            min-height: 72px;
            transition: all 0.15s ease;
        }
        .mood-pick:active { transform: scale(0.97); }
        .mood-pick.selected {
            border-color: var(--primary);
            background: rgba(123, 97, 255, 0.08);
            box-shadow: 0 4px 14px rgba(123, 97, 255, 0.18);
        }
        .mood-pick-emoji { font-size: 28px; }
        .mood-pick-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-soft);
        }

        /* Voice dictate button */
        .voice-dictate-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: var(--card-soft);
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            margin-top: 8px;
        }
        .voice-dictate-btn.listening {
            background: linear-gradient(135deg, #FF4D6A, #FFB55E);
            color: #fff;
            border-color: transparent;
            animation: pulseRec 1.1s ease-in-out infinite;
        }
        @keyframes pulseRec {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 77, 106, 0.6); }
            50%      { box-shadow: 0 0 0 10px rgba(255, 77, 106, 0); }
        }

        /* FilePond theming */
        .filepond--root { margin-bottom: 0; }
        .filepond--panel-root {
            border-radius: 14px;
            background: var(--card-soft);
        }

        /* Loading spinner */
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(123, 97, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { text-align: center; color: var(--text-mute); padding: 20px; }
    </style>
</head>
<body class="journal-page">
    <!-- Touch menu injects #ztm-nav -->

    <div class="journal-layout">
        <!-- Left: entries -->
        <section class="entries-pane">
            <div class="pane-header">
                <h1 class="pane-title">Journal</h1>
                <button class="btn-primary" onclick="openEditor()">
                    <span style="font-size:18px;line-height:1">+</span>
                    New Entry
                </button>
            </div>

            <div class="filter-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="Search entries…" />
            </div>
            <div class="filter-bar">
                <div class="mood-filter-row" id="moodFilterRow">
                    <button class="mood-chip active" data-mood="">All</button>
                    <button class="mood-chip" data-mood="happy">😊 Happy</button>
                    <button class="mood-chip" data-mood="grateful">🙏 Grateful</button>
                    <button class="mood-chip" data-mood="calm">😌 Calm</button>
                    <button class="mood-chip" data-mood="excited">🤩 Excited</button>
                    <button class="mood-chip" data-mood="sad">😢 Sad</button>
                    <button class="mood-chip" data-mood="anxious">😰 Anxious</button>
                </div>
            </div>

            <div id="entriesList" class="entries-list">
                <div class="loading-text"><div class="spinner"></div>Loading entries…</div>
            </div>
        </section>

        <!-- Right: calendar + stats -->
        <aside class="side-pane">
            <div class="side-card">
                <div class="cal-header">
                    <button class="cal-nav-btn" id="calPrev">‹</button>
                    <div class="cal-title" id="calTitle">—</div>
                    <button class="cal-nav-btn" id="calNext">›</button>
                </div>
                <div class="cal-weekdays" id="calWeekdays"></div>
                <div class="cal-days" id="calDays"></div>
                <div style="margin-top:12px; font-size:12px; color:var(--text-mute); text-align:center;">
                    Dots mark days with entries · tap to filter
                </div>
            </div>

            <div class="side-card">
                <div class="stat-row">
                    <div class="stat-label">Current streak</div>
                    <div class="stat-value accent" id="streakValue">—</div>
                </div>
                <div class="stat-row">
                    <div class="stat-label">Entries this month</div>
                    <div class="stat-value" id="monthCount">—</div>
                </div>
                <div class="stat-row">
                    <div class="stat-label">Total entries</div>
                    <div class="stat-value" id="totalCount">—</div>
                </div>
            </div>
        </aside>
    </div>

    <!-- ── Editor overlay ─────────────────────────────────────────── -->
    <div class="editor-overlay" id="editorOverlay" onclick="if(event.target===this)closeEditor()">
        <div class="editor-sheet">
            <div class="editor-header">
                <div class="editor-title-text" id="editorTitleText">New Journal Entry</div>
                <div class="editor-actions">
                    <button class="btn-ghost btn-danger" id="editorDeleteBtn" style="display:none" onclick="deleteCurrent()">Delete</button>
                    <button class="btn-ghost" onclick="closeEditor()">Cancel</button>
                    <button class="btn-primary" id="saveEntryBtn" onclick="saveEntry()">Save</button>
                </div>
            </div>
            <div class="editor-body">
                <div>
                    <div class="field-label">Title</div>
                    <input type="text" class="field-input" id="entryTitle" placeholder="What's on your mind?" />
                </div>
                <div>
                    <div class="field-label">Thoughts</div>
                    <textarea class="field-textarea" id="entryContent" placeholder="Write about your day, a moment, a feeling…"></textarea>
                    <button class="voice-dictate-btn" id="voiceDictateBtn" onclick="toggleDictate()">
                        <span id="dictateIcon">🎙️</span>
                        <span id="dictateLabel">Dictate</span>
                    </button>
                </div>
                <div>
                    <div class="field-label">Mood</div>
                    <div class="mood-picker" id="moodPicker">
                        <div class="mood-pick" data-mood="happy"><div class="mood-pick-emoji">😊</div><div class="mood-pick-label">Happy</div></div>
                        <div class="mood-pick" data-mood="grateful"><div class="mood-pick-emoji">🙏</div><div class="mood-pick-label">Grateful</div></div>
                        <div class="mood-pick" data-mood="calm"><div class="mood-pick-emoji">😌</div><div class="mood-pick-label">Calm</div></div>
                        <div class="mood-pick" data-mood="excited"><div class="mood-pick-emoji">🤩</div><div class="mood-pick-label">Excited</div></div>
                        <div class="mood-pick" data-mood="tired"><div class="mood-pick-emoji">😴</div><div class="mood-pick-label">Tired</div></div>
                        <div class="mood-pick" data-mood="sad"><div class="mood-pick-emoji">😢</div><div class="mood-pick-label">Sad</div></div>
                        <div class="mood-pick" data-mood="anxious"><div class="mood-pick-emoji">😰</div><div class="mood-pick-label">Anxious</div></div>
                        <div class="mood-pick" data-mood="angry"><div class="mood-pick-emoji">😠</div><div class="mood-pick-label">Angry</div></div>
                    </div>
                </div>
                <div>
                    <div class="field-label">Tags <span style="font-weight:500;color:var(--text-mute);text-transform:none;letter-spacing:normal">(comma separated)</span></div>
                    <input type="text" class="field-input" id="entryTags" placeholder="gratitude, family, work…" />
                </div>
                <div>
                    <div class="field-label">Photos</div>
                    <input type="file" class="filepond" name="photos" multiple accept="image/*" />
                </div>
            </div>
        </div>
    </div>

    <!-- Stubs for journal-api.js internal hooks (the old page defined these,
         new page handles rendering itself). Must load BEFORE journal-api.js. -->
    <script>
        window.displayTimelineEntries = function() {};
        window.displayOnThisDay = function() {};
        window.displayPrompts = function() {};
        window.showSuccess = function(msg) { console.log('[journal]', msg); };
        window.showError   = function(msg) { console.warn('[journal]', msg); };
    </script>

    <!-- Standard Zoe touch scripts -->
    <script src="/js/common.js"></script>
    <script src="/js/notifications-panel.js"></script>
    <script src="/js/websocket-sync.js"></script>
    <script src="/touch/js/touch-menu.js"></script>
    <script src="/js/journal-api.js"></script>

    <!-- FilePond -->
    <script src="https://unpkg.com/filepond-plugin-image-preview/dist/filepond-plugin-image-preview.min.js"></script>
    <script src="https://unpkg.com/filepond/dist/filepond.min.js"></script>

    <script>
    // ──────────────────────────────────────────────────────────────
    // State
    // ──────────────────────────────────────────────────────────────
    const state = {
        entries: [],
        filteredEntries: [],
        searchQuery: '',
        moodFilter: '',
        dateFilter: null, // 'YYYY-MM-DD' or null
        calMonth: new Date(),
        editingId: null,
        selectedMood: '',
        pendingPhotos: [],
    };

    // FilePond
    FilePond.registerPlugin(FilePondPluginImagePreview);
    const filePondEl = document.querySelector('input.filepond');
    const pond = FilePond.create(filePondEl, {
        allowMultiple: true,
        maxFiles: 6,
        acceptedFileTypes: ['image/*'],
        imagePreviewHeight: 120,
        stylePanelAspectRatio: null,
        labelIdle: 'Drop or <span class="filepond--label-action">tap to add</span> photos',
    });

    // ──────────────────────────────────────────────────────────────
    // Load entries from API
    // ──────────────────────────────────────────────────────────────
    async function loadEntries() {
        try {
            const base = (typeof API_BASE !== 'undefined') ? API_BASE : '/api';
            const res = await fetch(`${base}/journal/entries?limit=200`, {
                headers: { 'Accept': 'application/json' }
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            state.entries = Array.isArray(data) ? data : (data?.entries || data?.items || []);
            applyFilters();
            renderCalendar();
            renderStats();
        } catch (err) {
            console.error('loadEntries failed', err);
            document.getElementById('entriesList').innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Couldn\'t load entries</div><div class="empty-state-sub">' + (err.message || 'Try again in a moment') + '</div></div>';
        }
    }

    function applyFilters() {
        let list = state.entries;
        if (state.searchQuery) {
            const q = state.searchQuery.toLowerCase();
            list = list.filter(e =>
                (e.title || '').toLowerCase().includes(q) ||
                (e.content || '').toLowerCase().includes(q)
            );
        }
        if (state.moodFilter) list = list.filter(e => e.mood === state.moodFilter);
        if (state.dateFilter) list = list.filter(e => (e.created_at || '').slice(0, 10) === state.dateFilter);
        state.filteredEntries = list;
        renderEntries();
    }

    function renderEntries() {
        const container = document.getElementById('entriesList');
        if (state.filteredEntries.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📖</div>
                    <div class="empty-state-title">${state.entries.length === 0 ? 'No entries yet' : 'No matches'}</div>
                    <div class="empty-state-sub">${state.entries.length === 0 ? 'Tap "New Entry" to start journaling.' : 'Try adjusting your filters.'}</div>
                </div>`;
            return;
        }
        container.innerHTML = state.filteredEntries.map(e => {
            const created = e.created_at ? new Date(e.created_at) : new Date();
            const dateStr = created.toLocaleDateString(undefined, {
                month: 'short', day: 'numeric', year: 'numeric'
            });
            const preview = (e.content || '').slice(0, 240).replace(/</g, '&lt;');
            const moodBadge = e.mood
                ? `<span class="mood-badge">${moodEmoji(e.mood)} ${e.mood}</span>`
                : '';
            const photos = (() => {
                try {
                    const p = typeof e.photos === 'string' ? JSON.parse(e.photos) : e.photos;
                    if (Array.isArray(p) && p.length) {
                        return `<div class="entry-photos">${p.slice(0, 4).map(url =>
                            `<img src="${url}" alt="" loading="lazy">`).join('')}</div>`;
                    }
                } catch (_) {}
                return '';
            })();
            return `
                <article class="entry-card" onclick="openEditor('${e.id}')">
                    <div class="entry-card-header">
                        <div class="entry-title">${(e.title || 'Untitled').replace(/</g, '&lt;')}</div>
                        <div class="entry-date">${dateStr}</div>
                    </div>
                    ${preview ? `<div class="entry-preview">${preview}</div>` : ''}
                    ${photos}
                    ${moodBadge ? `<div class="entry-meta">${moodBadge}</div>` : ''}
                </article>`;
        }).join('');
    }

    function moodEmoji(m) {
        return { happy:'😊', grateful:'🙏', calm:'😌', excited:'🤩',
                 tired:'😴', sad:'😢', anxious:'😰', angry:'😠' }[m] || '';
    }

    // ──────────────────────────────────────────────────────────────
    // Calendar
    // ──────────────────────────────────────────────────────────────
    function renderCalendar() {
        const weekdays = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        document.getElementById('calWeekdays').innerHTML =
            weekdays.map(w => `<div class="cal-wd">${w}</div>`).join('');

        const month = state.calMonth;
        document.getElementById('calTitle').textContent =
            month.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

        const year = month.getFullYear();
        const mo = month.getMonth();
        const first = new Date(year, mo, 1);
        const firstWd = first.getDay();
        const daysInMonth = new Date(year, mo + 1, 0).getDate();
        const prevDays = new Date(year, mo, 0).getDate();

        const entryDates = new Set(state.entries
            .map(e => (e.created_at || '').slice(0, 10))
            .filter(Boolean));
        const today = new Date();
        const todayKey = fmtDate(today);

        const cells = [];
        for (let i = firstWd - 1; i >= 0; i--) {
            cells.push({ day: prevDays - i, out: true });
        }
        for (let d = 1; d <= daysInMonth; d++) {
            cells.push({
                day: d,
                key: fmtDate(new Date(year, mo, d)),
            });
        }
        while (cells.length % 7 !== 0 || cells.length < 42) {
            const nextDay = cells.length - firstWd - daysInMonth + 1;
            cells.push({ day: nextDay, out: true });
            if (cells.length >= 42) break;
        }

        document.getElementById('calDays').innerHTML = cells.map(c => {
            const classes = ['cal-day'];
            if (c.out) classes.push('out');
            if (c.key && entryDates.has(c.key)) classes.push('has-entry');
            if (c.key === todayKey) classes.push('today');
            if (c.key && state.dateFilter === c.key) classes.push('selected');
            const attr = c.key ? `data-date="${c.key}"` : '';
            return `<div class="${classes.join(' ')}" ${attr}>${c.day}</div>`;
        }).join('');

        document.querySelectorAll('#calDays .cal-day[data-date]').forEach(el => {
            el.addEventListener('click', () => {
                const d = el.getAttribute('data-date');
                state.dateFilter = state.dateFilter === d ? null : d;
                applyFilters();
                renderCalendar();
            });
        });
    }

    function fmtDate(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    document.getElementById('calPrev').addEventListener('click', () => {
        state.calMonth = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth() - 1, 1);
        renderCalendar();
    });
    document.getElementById('calNext').addEventListener('click', () => {
        state.calMonth = new Date(state.calMonth.getFullYear(), state.calMonth.getMonth() + 1, 1);
        renderCalendar();
    });

    // ──────────────────────────────────────────────────────────────
    // Stats
    // ──────────────────────────────────────────────────────────────
    function renderStats() {
        // Total
        document.getElementById('totalCount').textContent = state.entries.length;
        // This month
        const nowM = new Date().getMonth();
        const nowY = new Date().getFullYear();
        const monthC = state.entries.filter(e => {
            const d = new Date(e.created_at || '');
            return d.getMonth() === nowM && d.getFullYear() === nowY;
        }).length;
        document.getElementById('monthCount').textContent = monthC;
        // Streak
        const dateSet = new Set(state.entries
            .map(e => (e.created_at || '').slice(0, 10)).filter(Boolean));
        let streak = 0;
        let cur = new Date();
        while (dateSet.has(fmtDate(cur))) {
            streak++;
            cur.setDate(cur.getDate() - 1);
        }
        document.getElementById('streakValue').textContent = streak === 1 ? '1 day' : `${streak} days`;
    }

    // ──────────────────────────────────────────────────────────────
    // Search / mood filters
    // ──────────────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', (e) => {
        state.searchQuery = e.target.value;
        applyFilters();
    });
    document.getElementById('moodFilterRow').addEventListener('click', (e) => {
        const chip = e.target.closest('.mood-chip');
        if (!chip) return;
        document.querySelectorAll('#moodFilterRow .mood-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        state.moodFilter = chip.getAttribute('data-mood') || '';
        applyFilters();
    });

    // ──────────────────────────────────────────────────────────────
    // Editor
    // ──────────────────────────────────────────────────────────────
    function openEditor(entryId) {
        const overlay = document.getElementById('editorOverlay');
        document.getElementById('entryTitle').value = '';
        document.getElementById('entryContent').value = '';
        document.getElementById('entryTags').value = '';
        state.selectedMood = '';
        document.querySelectorAll('.mood-pick').forEach(m => m.classList.remove('selected'));
        pond.removeFiles();

        if (entryId) {
            const entry = state.entries.find(e => e.id === entryId);
            if (entry) {
                state.editingId = entryId;
                document.getElementById('editorTitleText').textContent = 'Edit Entry';
                document.getElementById('editorDeleteBtn').style.display = 'inline-block';
                document.getElementById('entryTitle').value = entry.title || '';
                document.getElementById('entryContent').value = entry.content || '';
                const tags = (() => {
                    try { return typeof entry.tags === 'string' ? JSON.parse(entry.tags) : entry.tags; }
                    catch (_) { return []; }
                })();
                document.getElementById('entryTags').value = Array.isArray(tags) ? tags.join(', ') : '';
                if (entry.mood) selectMood(entry.mood);
            }
        } else {
            state.editingId = null;
            document.getElementById('editorTitleText').textContent = 'New Journal Entry';
            document.getElementById('editorDeleteBtn').style.display = 'none';

            // Voice-to-journal: prefill from URL ?action=new_journal&content=…
            const params = new URLSearchParams(location.search);
            if (params.get('action') === 'new_journal') {
                const pre = params.get('content') || params.get('text') || '';
                if (pre) document.getElementById('entryContent').value = pre;
                // Clean URL so refresh doesn't re-trigger
                history.replaceState({}, '', location.pathname);
            }
        }

        overlay.classList.add('open');
        setTimeout(() => {
            document.getElementById('entryTitle').focus();
        }, 350);
    }

    function closeEditor() {
        document.getElementById('editorOverlay').classList.remove('open');
        stopDictate();
    }

    function selectMood(mood) {
        state.selectedMood = mood;
        document.querySelectorAll('.mood-pick').forEach(m =>
            m.classList.toggle('selected', m.getAttribute('data-mood') === mood));
    }
    document.getElementById('moodPicker').addEventListener('click', (e) => {
        const pick = e.target.closest('.mood-pick');
        if (!pick) return;
        const m = pick.getAttribute('data-mood');
        selectMood(state.selectedMood === m ? '' : m);
    });

    async function saveEntry() {
        const title = document.getElementById('entryTitle').value.trim();
        const content = document.getElementById('entryContent').value.trim();
        if (!title && !content) {
            closeEditor();
            return;
        }
        const tags = document.getElementById('entryTags').value
            .split(',').map(t => t.trim()).filter(Boolean);

        // Upload any new photos first
        let photoUrls = [];
        const pending = pond.getFiles().map(f => f.file);
        if (pending.length && typeof uploadPhotos === 'function') {
            try { photoUrls = await uploadPhotos(pending) || []; }
            catch (_) { photoUrls = []; }
        }

        const btn = document.getElementById('saveEntryBtn');
        btn.disabled = true;
        btn.textContent = 'Saving…';

        try {
            const payload = {
                title: title || 'Untitled',
                content,
                mood: state.selectedMood || null,
                tags,
                photos: photoUrls,
                privacy_level: 'private',
            };
            const base = (typeof API_BASE !== 'undefined') ? API_BASE : '/api';
            if (state.editingId) {
                const r = await fetch(`${base}/journal/${state.editingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
            } else {
                const r = await fetch(`${base}/journal/entries`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
            }
            closeEditor();
            await loadEntries();
        } catch (err) {
            console.error('saveEntry failed', err);
            btn.textContent = 'Save';
            btn.disabled = false;
        } finally {
            btn.textContent = 'Save';
            btn.disabled = false;
        }
    }

    async function deleteCurrent() {
        if (!state.editingId) return;
        try {
            const base = (typeof API_BASE !== 'undefined') ? API_BASE : '/api';
            const r = await fetch(`${base}/journal/${state.editingId}`, { method: 'DELETE' });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            closeEditor();
            await loadEntries();
        } catch (err) {
            console.error('delete failed', err);
        }
    }

    // ──────────────────────────────────────────────────────────────
    // Voice dictation (Web Speech API — on-device)
    // ──────────────────────────────────────────────────────────────
    let recognition = null;
    function toggleDictate() {
        if (recognition) return stopDictate();
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            const btn = document.getElementById('voiceDictateBtn');
            btn.textContent = '⚠️ Speech recognition not available';
            return;
        }
        recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        const textarea = document.getElementById('entryContent');
        const base = textarea.value;
        recognition.onresult = (ev) => {
            let interim = '';
            let finalText = '';
            for (let i = ev.resultIndex; i < ev.results.length; i++) {
                const t = ev.results[i][0].transcript;
                if (ev.results[i].isFinal) finalText += t + ' ';
                else interim += t;
            }
            textarea.value = (base + ' ' + finalText + interim).trim();
        };
        recognition.onerror = stopDictate;
        recognition.onend = () => {
            if (recognition) {
                document.getElementById('voiceDictateBtn').classList.add('listening');
                try { recognition.start(); } catch (_) { stopDictate(); }
            }
        };
        recognition.start();
        document.getElementById('voiceDictateBtn').classList.add('listening');
        document.getElementById('dictateIcon').textContent = '⏹️';
        document.getElementById('dictateLabel').textContent = 'Stop';
    }
    function stopDictate() {
        if (recognition) {
            try { recognition.onend = null; recognition.stop(); } catch (_) {}
            recognition = null;
        }
        document.getElementById('voiceDictateBtn').classList.remove('listening');
        document.getElementById('dictateIcon').textContent = '🎙️';
        document.getElementById('dictateLabel').textContent = 'Dictate';
    }

    // ──────────────────────────────────────────────────────────────
    // Boot
    // ──────────────────────────────────────────────────────────────
    (async () => {
        await loadEntries();
        // If launched via voice intent, open editor automatically
        const params = new URLSearchParams(location.search);
        if (params.get('action') === 'new_journal') openEditor();
    })();
    </script>
</body>
</html>
