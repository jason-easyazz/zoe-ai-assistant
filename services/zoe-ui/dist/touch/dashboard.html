<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#060610">
    <title>Zoe — Touch Dashboard</title>

    <!-- Gridstack CSS -->
    <link rel="stylesheet" href="/lib/gridstack/gridstack.min.css">
    <link rel="stylesheet" href="/lib/gridstack/gridstack-extra.min.css">

    <!-- Touch Base CSS -->
    <link rel="stylesheet" href="/touch/css/touch-base.css">

    <!-- Widget CSS (required for widget module content) -->
    <link rel="stylesheet" href="/css/widgets-enhanced.css">
    <link rel="stylesheet" href="/css/widgets-fluid.css">

    <!-- Auth (must be first script) -->
    <script src="/js/auth.js"></script>

    <style>
    /* ================================================================
       ZOE TOUCH DASHBOARD — PREMIUM DARK THEME
       Grid: 4-col × 120px cellHeight  |  touch-first
    ================================================================ */

    /* ── Reset & tokens ─────────────────────────────────────────── */
    :root {
        --purple:           #7B61FF;
        --teal:             #5AE0E0;
        --grad:             linear-gradient(135deg, #7B61FF 0%, #5AE0E0 100%);
        --bg-deep:          #060610;
        --surface:          rgba(255,255,255,0.055);
        --surface-hi:       rgba(255,255,255,0.09);
        --border:           rgba(255,255,255,0.10);
        --border-hi:        rgba(255,255,255,0.18);
        --text-1:           rgba(255,255,255,0.93);
        --text-2:           rgba(255,255,255,0.58);
        --text-3:           rgba(255,255,255,0.32);
        --nav-h:            68px;
        --hdr-h:            52px;
        --glass-blur:       24px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
        width:100%; height:100%;
        overflow:hidden;
        background: var(--bg-deep);
        color: var(--text-1);
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
        /* Allow text selection in inputs */
    }

    /* Subtle ambient gradient behind everything */
    body::before {
        content:'';
        position:fixed; inset:0; pointer-events:none; z-index:0;
        background:
            radial-gradient(ellipse 60% 50% at 15% 20%, rgba(123,97,255,.10) 0%, transparent 65%),
            radial-gradient(ellipse 50% 40% at 85% 80%, rgba(90,224,224,.07) 0%, transparent 65%);
    }

    /* ── App shell ─────────────────────────────────────────────── */
    #app {
        position:fixed; inset:0; z-index:1;
        display:flex; flex-direction:column;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    #hdr {
        height: var(--hdr-h);
        flex-shrink:0;
        display:flex; align-items:center; justify-content:space-between;
        padding: 0 14px;
        background: rgba(6,6,16,.85);
        backdrop-filter: blur(20px) saturate(150%);
        -webkit-backdrop-filter: blur(20px) saturate(150%);
        border-bottom: 1px solid var(--border);
    }

    #hdr-left  { display:flex; align-items:center; gap:10px; }
    #hdr-right { display:flex; align-items:center; gap:8px; }

    .hdr-orb {
        width:34px; height:34px; border-radius:50%;
        background: var(--grad);
        box-shadow: 0 0 18px rgba(123,97,255,.45);
        cursor:pointer; flex-shrink:0;
        animation: breathe 4s ease-in-out infinite;
        transition: transform .15s;
    }
    .hdr-orb:active { transform:scale(.9); }

    @keyframes breathe {
        0%,100% { transform:scale(1); opacity:1; }
        50%      { transform:scale(1.06); opacity:.92; }
    }

    .hdr-title {
        font-size:15px; font-weight:600;
        background: var(--grad);
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        background-clip:text;
        pointer-events:none;
    }

    .hdr-clock {
        font-size:13px; color:var(--text-2); font-weight:400;
        letter-spacing:.3px;
    }

    .hdr-btn {
        width:36px; height:36px;
        border:1px solid var(--border); border-radius:10px;
        background: var(--surface);
        color:var(--text-2); font-size:16px;
        cursor:pointer; display:flex; align-items:center; justify-content:center;
        transition: all .2s; user-select:none;
    }
    .hdr-btn:active { transform:scale(.92); opacity:.8; }
    .hdr-btn.active {
        background: rgba(123,97,255,.18);
        border-color:var(--purple);
        color:var(--purple);
    }

    /* ── Grid scroll wrapper ─────────────────────────────────── */
    #grid-wrapper {
        flex:1; overflow-y:auto; overflow-x:hidden;
        padding:6px;
        -webkit-overflow-scrolling:touch;
        scroll-behavior:smooth;
    }
    #grid-wrapper::-webkit-scrollbar { display:none; }
    #grid-wrapper { scrollbar-width:none; }

    /* ── Gridstack overrides ──────────────────────────────────── */
    #widgetGrid { background:transparent !important; min-height:100%; }

    .grid-stack-item-content {
        inset: 5px !important;
        border-radius: 18px;
        overflow: hidden;
    }

    .grid-stack-item-content input,
    .grid-stack-item-content textarea,
    .grid-stack-item-content [contenteditable] {
        -webkit-user-select:text;
        user-select:text;
    }

    /* Drag placeholder */
    .grid-stack-placeholder > .placeholder-content {
        background: rgba(123,97,255,.10) !important;
        border: 2px dashed rgba(123,97,255,.40) !important;
        border-radius: 18px;
    }

    /* Dragging item */
    .grid-stack-item.ui-draggable-dragging {
        opacity:.72; z-index:999 !important;
    }
    .grid-stack-item.ui-draggable-dragging .grid-stack-item-content {
        box-shadow: 0 24px 64px rgba(0,0,0,.55);
        transform: rotate(1.5deg);
    }

    /* Edit mode border */
    body.edit-mode .grid-stack-item-content {
        outline: 1.5px dashed rgba(123,97,255,.45);
        outline-offset: -1px;
    }

    /* Resize handles — only in edit mode */
    body:not(.edit-mode) .ui-resizable-handle { display:none !important; }

    .grid-stack-item > .ui-resizable-se {
        width:22px !important; height:22px !important;
    }

    /* Widget remove button */
    .gs-rm-btn {
        position:absolute; top:8px; right:8px;
        width:34px; height:34px;
        background: rgba(255,55,55,.88);
        border:none; border-radius:9px;
        color:#fff; font-size:20px; font-weight:700;
        cursor:pointer; z-index:200;
        display:none; align-items:center; justify-content:center;
        transition: background .2s, transform .15s;
        line-height:1;
    }
    body.edit-mode .gs-rm-btn { display:flex; }
    .gs-rm-btn:active { background:rgba(255,30,30,1); transform:scale(.92); }

    /* ── Widget skin — dark ───────────────────────────────────── */
    .widget {
        width:100%; height:100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 14px 16px;
        display: flex; flex-direction: column;
        backdrop-filter: blur(var(--glass-blur)) saturate(130%);
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(130%);
        overflow: hidden;
        position: relative;
        transition: border-color .25s;
    }

    .widget-header {
        display:flex; align-items:center; justify-content:space-between;
        margin-bottom:10px; flex-shrink:0;
    }

    .widget-title {
        font-size:11px; font-weight:700;
        color:var(--text-3); text-transform:uppercase; letter-spacing:1px;
        display:flex; align-items:center; gap:5px;
    }

    .widget-badge {
        background: var(--grad); color:#fff;
        padding:2px 8px; border-radius:10px;
        font-size:10px; font-weight:700;
    }

    .widget-content {
        flex:1; overflow-y:auto; overflow-x:hidden;
        -webkit-overflow-scrolling:touch;
    }
    .widget-content::-webkit-scrollbar { display:none; }

    /* Weather widget accent */
    .widget[data-widget-type="weather"] {
        background: linear-gradient(135deg,
            rgba(123,97,255,.18) 0%,
            rgba(90,224,224,.12) 100%);
        border-color: rgba(123,97,255,.28);
    }

    /* Time widget accent */
    .widget[data-widget-type="time"] {
        background: linear-gradient(135deg,
            rgba(102,126,234,.20) 0%,
            rgba(118,75,162,.18) 100%);
        border-color: rgba(102,126,234,.30);
    }

    /* Loading states */
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner {
        width:20px; height:20px;
        border:2px solid rgba(255,255,255,.10);
        border-top-color: var(--purple);
        border-radius:50%;
        animation: spin .8s linear infinite;
        display:inline-block;
    }

    .widget-loading {
        flex:1; display:flex; align-items:center; justify-content:center;
        gap:10px; color:var(--text-2); font-size:13px;
    }

    /* ── Bottom nav ───────────────────────────────────────────── */
    #bottom-nav {
        height: var(--nav-h); flex-shrink:0;
        background: rgba(6,6,16,.92);
        backdrop-filter: blur(24px) saturate(150%);
        -webkit-backdrop-filter: blur(24px) saturate(150%);
        border-top: 1px solid var(--border);
        display:flex; align-items:stretch;
        overflow-x:auto; overflow-y:hidden;
        -webkit-overflow-scrolling:touch;
        scrollbar-width:none;
        padding:0 4px;
        gap:2px;
    }
    #bottom-nav::-webkit-scrollbar { display:none; }

    .nav-link {
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap:3px;
        min-width:62px; padding:6px 10px;
        text-decoration:none;
        color:var(--text-3);
        font-size:9.5px; font-weight:600;
        letter-spacing:.4px; text-transform:uppercase;
        border-radius:14px;
        transition: color .2s, background .2s;
        white-space:nowrap;
        flex-shrink:0; cursor:pointer;
    }
    .nav-link.active {
        color:var(--purple);
        background: rgba(123,97,255,.12);
    }
    .nav-link:not(.active):active {
        color:var(--text-1);
        background: var(--surface-hi);
    }
    .nav-icon { font-size:21px; line-height:1; }

    /* ── Save toast ───────────────────────────────────────────── */
    #save-toast {
        position:fixed;
        top: calc(var(--hdr-h) + 10px);
        left:50%; transform:translateX(-50%) translateY(-8px);
        background: rgba(123,97,255,.92);
        color:#fff; padding:7px 18px;
        border-radius:20px; font-size:12px; font-weight:600;
        z-index:900; opacity:0; pointer-events:none;
        transition: opacity .3s, transform .3s;
        backdrop-filter:blur(10px);
        white-space:nowrap;
    }
    #save-toast.show {
        opacity:1;
        transform:translateX(-50%) translateY(0);
    }

    /* ── Widget library sheet ─────────────────────────────────── */
    #lib-overlay {
        position:fixed; inset:0;
        background: rgba(0,0,0,.65);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        z-index:700;
        display:none; align-items:flex-end; justify-content:center;
    }
    #lib-overlay.open { display:flex; }

    #lib-sheet {
        width:100%; max-height:62vh;
        background: rgba(10,10,22,.97);
        border: 1px solid var(--border-hi);
        border-radius:24px 24px 0 0;
        padding:12px 14px 20px;
        overflow-y:auto;
        -webkit-overflow-scrolling:touch;
    }

    .sheet-handle {
        width:38px; height:4px;
        background: rgba(255,255,255,.14);
        border-radius:2px;
        margin:0 auto 14px;
    }

    .sheet-title {
        font-size:13px; font-weight:700;
        color:var(--text-2); text-transform:uppercase;
        letter-spacing:.8px; margin-bottom:12px;
        text-align:center;
    }

    #lib-grid {
        display:grid;
        grid-template-columns: repeat(auto-fill, minmax(88px,1fr));
        gap:8px;
    }

    .lib-item {
        background: var(--surface);
        border:1px solid var(--border);
        border-radius:14px;
        padding:12px 6px;
        text-align:center; cursor:pointer;
        transition: all .18s;
        display:flex; flex-direction:column;
        align-items:center; gap:5px;
    }
    .lib-item:active {
        transform:scale(.91);
        background: rgba(123,97,255,.16);
        border-color:var(--purple);
    }
    .lib-icon { font-size:26px; line-height:1; }
    .lib-name {
        font-size:10px; font-weight:600;
        color:var(--text-2); letter-spacing:.3px;
    }

    /* ================================================================
       SCREENSAVER (AMBIENT OVERLAY)
    ================================================================ */
    #ss {
        position:fixed; inset:0; z-index:2500;
        background: #060610;
        display:none; opacity:0;
        transition: opacity .8s ease;
        cursor:pointer; overflow:hidden;
    }
    #ss.visible { display:block; }
    #ss.active  { opacity:1; }

    /* Ambient pulse behind screensaver */
    #ss::before {
        content:'';
        position:absolute; inset:0; pointer-events:none;
        background:
            radial-gradient(ellipse 55% 45% at 30% 38%, rgba(123,97,255,.07) 0%, transparent 60%),
            radial-gradient(ellipse 45% 40% at 70% 65%, rgba(90,224,224,.05) 0%, transparent 55%);
        animation: ambPulse 8s ease-in-out infinite;
    }
    @keyframes ambPulse {
        0%,100% { opacity:.6; }
        50%      { opacity:1; }
    }

    /* ── Clock phase ─────────────── */
    #ss-clock-layer {
        position:absolute; inset:0;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        pointer-events:none;
        transition: opacity .6s ease;
    }

    #ss-clock {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: clamp(72px, 16vw, 148px);
        font-weight:100;
        color:rgba(255,255,255,.38);
        line-height:1;
        letter-spacing:-4px;
        text-align:center;
        user-select:none;
    }

    #ss-date {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: clamp(15px, 2.8vw, 24px);
        font-weight:300;
        color:rgba(255,255,255,.22);
        margin-top:10px;
        letter-spacing:3px;
        text-transform:uppercase;
        text-align:center;
        user-select:none;
    }

    #ss-hint {
        position:absolute;
        bottom: calc(var(--nav-h) + 10px);
        left:50%; transform:translateX(-50%);
        font-size:11px; letter-spacing:1.2px;
        color:rgba(255,255,255,.18);
        white-space:nowrap; pointer-events:none;
        user-select:none;
    }

    /* Glass cards — bottom of screensaver */
    .ss-card {
        position:absolute;
        bottom: calc(var(--nav-h) + 10px);
        background: rgba(255,255,255,.055);
        backdrop-filter: blur(28px) saturate(140%);
        -webkit-backdrop-filter: blur(28px) saturate(140%);
        border:1px solid rgba(255,255,255,.09);
        border-radius:20px;
        padding:14px 18px;
        min-width:160px; max-width:240px;
        pointer-events:none;
        user-select:none;
    }

    #ss-weather-card { left:14px; }

    #ss-event-card {
        left:50%; transform:translateX(-50%);
    }

    .ss-card-label {
        font-size:9px; text-transform:uppercase;
        letter-spacing:1.4px; color:rgba(255,255,255,.32);
        margin-bottom:5px;
    }
    .ss-card-main {
        font-size:20px; font-weight:300;
        color:rgba(255,255,255,.82); line-height:1.2;
        margin-bottom:3px;
    }
    .ss-card-sub {
        font-size:11px; color:rgba(255,255,255,.38);
    }

    /* ── Orb phase ───────────────── */
    #ss-orb-layer {
        position:absolute; inset:0;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap:30px;
        opacity:0; pointer-events:none;
        transition: opacity .5s ease;
    }
    #ss-orb-layer.active { opacity:1; pointer-events:auto; }

    #ss-orb-vis {
        width: clamp(100px, 18vw, 180px);
        height: clamp(100px, 18vw, 180px);
        border-radius:50%;
        background: var(--grad);
        box-shadow:
            0 0 60px rgba(123,97,255,.55),
            0 0 120px rgba(90,224,224,.30);
        animation: orbPulse 2.2s ease-in-out infinite;
    }
    @keyframes orbPulse {
        0%,100% {
            transform:scale(1);
            box-shadow:0 0 60px rgba(123,97,255,.55),0 0 120px rgba(90,224,224,.30);
        }
        50% {
            transform:scale(1.09);
            box-shadow:0 0 80px rgba(123,97,255,.72),0 0 160px rgba(90,224,224,.42);
        }
    }

    #ss-status {
        font-family:'Poppins', -apple-system, sans-serif;
        font-size: clamp(22px, 4.5vw, 48px);
        font-weight:200;
        color:rgba(255,255,255,.82);
        letter-spacing:3px;
        text-align:center;
        user-select:none;
    }
    </style>
</head>

     VOICE CARD OVERLAY (Google Home-style response cards)
════════════════════════════════════════════════════════ -->

<!-- Waveform bar: 60px strip at bottom, shown on wake word / orb tap -->
<div id="zoe-wave-bar" style="
    display:none; position:fixed; bottom:0; left:0; right:0; height:60px;
    background:rgba(6,6,18,0.92); backdrop-filter:blur(18px);
    border-top:1px solid rgba(123,97,255,0.35);
    align-items:center; justify-content:center; gap:12px; z-index:3000;
    transition:opacity .3s;
">
    <div id="zoe-wave-anim" style="display:flex;align-items:center;gap:3px;">
        <span class="wave-bar"></span><span class="wave-bar"></span>
        <span class="wave-bar"></span><span class="wave-bar"></span>
        <span class="wave-bar"></span>
    </div>
    <span id="zoe-wave-status" style="color:rgba(255,255,255,.75);font-size:13px;letter-spacing:.5px;">Listening…</span>
</div>
<style>
.wave-bar{display:inline-block;width:4px;height:16px;border-radius:2px;background:var(--grad,#7B61FF);animation:wave-bounce 1.1s ease-in-out infinite}
.wave-bar:nth-child(1){animation-delay:0s}.wave-bar:nth-child(2){animation-delay:.15s}.wave-bar:nth-child(3){animation-delay:.3s}.wave-bar:nth-child(4){animation-delay:.45s}.wave-bar:nth-child(5){animation-delay:.6s}
@keyframes wave-bounce{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1.1)}}
</style>

<!-- Response card: slides up from the waveform bar -->
<div id="zoe-response-card" style="
    display:none; position:fixed; bottom:60px; left:0; right:0;
    max-height:42vh; background:rgba(12,12,28,0.97);
    backdrop-filter:blur(24px); border-top:1px solid rgba(123,97,255,.4);
    border-radius:24px 24px 0 0; padding:20px 24px 16px;
    z-index:2999; overflow-y:auto;
    transform:translateY(100%); transition:transform .35s cubic-bezier(.22,.68,0,1.2);
">
    <div id="zoe-card-content" style="min-height:40px;font-size:clamp(18px,3.5vw,28px);font-weight:300;color:#fff;line-height:1.4;"></div>

<script>
/* =================================================================
   ZOE VOICE CARD SYSTEM — Google Home-style response overlay
================================================================= */
(function () {
    const _bar  = document.getElementById('zoe-wave-bar');
    const _card = document.getElementById('zoe-response-card');
    const _content = document.getElementById('zoe-card-content');
    const _actions = document.getElementById('zoe-card-actions');
    const _status  = document.getElementById('zoe-wave-status');
    let _dismissTimer = null;

    function _showBar(status) {
        if (!_bar) return;
        _bar.style.display = 'flex';
        if (_status) _status.textContent = status || 'Listening…';
    }
    function _hideBar() {
        if (_bar) _bar.style.display = 'none';
    }
    function _showCard(html, actions) {
        if (!_card || !_content) return;
        _content.innerHTML = html || '';
        _actions.innerHTML = '';
        (actions || []).forEach(function(a) {
            const btn = document.createElement('button');
            btn.textContent = a.label;
            btn.style.cssText = 'padding:10px 18px;border-radius:10px;border:1px solid rgba(123,97,255,.5);background:rgba(123,97,255,.15);color:#fff;font-size:14px;cursor:pointer;';
            btn.onclick = function() { if (a.url) window.location.assign(a.url); };
            _actions.appendChild(btn);
        });
        _card.style.display = 'block';
        requestAnimationFrame(function() { _card.style.transform = 'translateY(0)'; });
        clearTimeout(_dismissTimer);
        _dismissTimer = setTimeout(window._zoeCardDismiss, 15000);
    }
    window._zoeCardDismiss = function() {
        clearTimeout(_dismissTimer);
        if (_card) { _card.style.transform = 'translateY(100%)'; setTimeout(function(){ _card.style.display='none'; }, 380); }
        _hideBar();
    };

    // Build intent-specific card HTML from a show_card WS action.
    function _renderCard(type, data) {
        data = data || {};
        if (type === 'weather') {
            return '<div style="font-size:clamp(14px,2.5vw,20px);color:rgba(255,255,255,.7);margin-bottom:4px;">Weather</div>' +
                '<div style="font-size:clamp(24px,5vw,48px);font-weight:200;">' + (data.condition || '') + ' ' + (data.temp || '') + '</div>' +
                (data.summary ? '<div style="margin-top:6px;font-size:clamp(13px,2vw,16px);color:rgba(255,255,255,.6);">' + data.summary + '</div>' : '');
        }
        if (type === 'calendar') {
            return '<div style="font-size:clamp(14px,2.5vw,20px);color:rgba(255,255,255,.7);">📅 ' + (data.action || 'Calendar') + '</div>' +
                '<div style="font-size:clamp(20px,3.5vw,32px);font-weight:300;margin-top:6px;">' + (data.title || '') + '</div>' +
                (data.date ? '<div style="color:rgba(255,255,255,.6);font-size:clamp(13px,2vw,16px);margin-top:4px;">' + data.date + (data.time ? ' at ' + data.time : '') + '</div>' : '');
        }
        if (type === 'list') {
            return '<div style="font-size:clamp(14px,2.5vw,20px);color:rgba(255,255,255,.7);">✅ ' + (data.list_name || 'List') + '</div>' +
                '<div style="font-size:clamp(20px,3.5vw,32px);font-weight:300;margin-top:6px;">Added: ' + (data.item || '') + '</div>';
        }
        if (type === 'timer') {
            return '<div style="font-size:clamp(14px,2.5vw,20px);color:rgba(255,255,255,.7);">⏱ Timer</div>' +
                '<div style="font-size:clamp(24px,5vw,48px);font-weight:200;">' + (data.minutes || '') + ' min</div>' +
                (data.label ? '<div style="color:rgba(255,255,255,.6);font-size:16px;">' + data.label + '</div>' : '');
        }
        if (type === 'smart_home') {
            var devices = Array.isArray(data.devices) ? data.devices : [];
            var grid = devices.map(function(d) {
                var icon = d.state === 'on' ? '💡' : d.state === 'off' ? '⬛' : '🏠';
                var color = d.state === 'on' ? 'rgba(90,224,224,.9)' : 'rgba(255,255,255,.35)';
                return '<div style="display:flex;flex-direction:column;align-items:center;gap:4px;' +
                    'padding:10px;border-radius:12px;background:rgba(255,255,255,.06);min-width:70px;">' +
                    '<span style="font-size:22px;">' + icon + '</span>' +
                    '<span style="font-size:12px;color:' + color + ';text-align:center;">' + (d.name || '') + '</span>' +
                    '<span style="font-size:11px;color:rgba(255,255,255,.45);">' + (d.state || '') + '</span>' +
                    '</div>';
            }).join('');
            return '<div style="font-size:clamp(14px,2.5vw,20px);color:rgba(255,255,255,.7);margin-bottom:10px;">🏠 ' +
                (data.title || 'Smart Home') + '</div>' +
                '<div style="display:flex;gap:8px;flex-wrap:wrap;">' + grid + '</div>' +
                (data.summary ? '<div style="margin-top:8px;font-size:14px;color:rgba(255,255,255,.5);">' + data.summary + '</div>' : '');
        }
        if (type === 'doorbell') {
            return '<div style="font-size:clamp(14px,2.5vw,20px);color:rgba(255,255,255,.7);">🔔 Doorbell</div>' +
                '<div style="font-size:clamp(18px,3vw,28px);font-weight:300;margin-top:6px;">' +
                (data.location || 'Front door') + '</div>' +
                (data.snapshot_url ? '<img src="' + data.snapshot_url + '" style="max-width:100%;border-radius:10px;margin-top:10px;">' : '');
        }
        // Default: answer card
        return '<div style="font-size:clamp(16px,3vw,24px);font-weight:300;">' + (data.text || '') + '</div>';
    }

    // Listen for voice events from the executor.
    document.addEventListener('zoe:voice:wake', function() {
        _showBar('Listening…');
        _card.style.display = 'none';
        _card.style.transform = 'translateY(100%)';
    });
    document.addEventListener('zoe:voice:thinking', function() { _showBar('Thinking…'); });
    document.addEventListener('zoe:voice:responding', function(e) {
        _showBar('Zoe is speaking');
        const text = e.detail && e.detail.text ? e.detail.text : '';
        if (text) _showCard(_renderCard('answer', { text: text }), [{ label: 'View in Chat', url: '/touch/chat.html' }]);
    });
    document.addEventListener('zoe:voice:done', function() {
        _showBar('');
        setTimeout(function() { if (_card.style.transform !== 'translateY(0px)' && _card.style.transform !== 'translateY(0)') _hideBar(); }, 200);
    });

    // ── Swipe-down-to-dismiss on the response card ────────────────────
    (function() {
        if (!_card) return;
        var _touchStartY = 0;
        var _touchStartX = 0;
        _card.addEventListener('touchstart', function(e) {
            _touchStartY = e.touches[0].clientY;
            _touchStartX = e.touches[0].clientX;
        }, { passive: true });
        _card.addEventListener('touchmove', function(e) {
            var dy = e.touches[0].clientY - _touchStartY;
            var dx = e.touches[0].clientX - _touchStartX;
            // Only handle predominantly vertical swipes.
            if (dy > 30 && Math.abs(dy) > Math.abs(dx)) {
                _card.style.transform = 'translateY(' + Math.min(dy, 200) + 'px)';
            }
        }, { passive: true });
        _card.addEventListener('touchend', function(e) {
            var dy = e.changedTouches[0].clientY - _touchStartY;
            if (dy > 80) {
                window._zoeCardDismiss && window._zoeCardDismiss();
            } else {
                _card.style.transform = 'translateY(0)';
            }
        }, { passive: true });
    })();

    // Expose globally so touch-ui-executor.js VoiceOverlay can dispatch events here.
    window.ZoeVoiceCard = { showBar: _showBar, hideBar: _hideBar, showCard: _showCard, renderCard: _renderCard };
})();

/* =================================================================
   ZOE TOUCH DASHBOARD — Main Controller
   Uses WidgetManager (from widget-system.js) + GridStack 10.x
================================================================= */
'use strict';

/* ── Constants ───────────────────────────────────────── */
const LAYOUT_TYPE   = 'touch_dashboard';
const LAYOUT_LOCAL  = 'zoe.touch.grid.v2';
const INACT_MS      = 5 * 60 * 1000; // 5 min screensaver

const DEFAULT_LAYOUT = [
    { type:'time',      x:0, y:0, w:2, h:2 },
    { type:'weather',   x:2, y:0, w:2, h:2 },
    { type:'events',    x:0, y:2, w:2, h:3 },
    { type:'notes',     x:2, y:2, w:2, h:3 },
    { type:'reminders', x:0, y:5, w:2, h:2 },
    { type:'home',      x:2, y:5, w:2, h:2 },
];

const LIBRARY_DEFS = [
    { type:'time',         icon:'🕐', name:'Clock'      },
    { type:'weather',      icon:'🌤️', name:'Weather'    },
    { type:'events',       icon:'📅', name:'Events'     },
    { type:'notes',        icon:'📝', name:'Notes'      },
    { type:'reminders',    icon:'🔔', name:'Reminders'  },
    { type:'home',         icon:'🏠', name:'Smart Home' },
    { type:'journal',      icon:'📔', name:'Journal'    },
    { type:'tasks',        icon:'✅', name:'Tasks'      },
    { type:'shopping',     icon:'🛒', name:'Shopping'   },
    { type:'week-planner', icon:'🗓️', name:'Week Plan'  },
    { type:'music',        icon:'🎵', name:'Music'      },
    { type:'system',       icon:'💻', name:'System'     },
    { type:'zoe-orb',      icon:'💬', name:'Zoe Chat'   },
    { type:'work',         icon:'💼', name:'Work'       },
    { type:'personal',     icon:'👤', name:'Personal'   },
    { type:'bucket',       icon:'🎯', name:'Bucket'     },
];

/* ── Session helpers ─────────────────────────────────── */
function getSession() {
    try { return JSON.parse(localStorage.getItem('zoe_session')) || {}; }
    catch { return {}; }
}
function getSessionId() { return getSession().session_id || ''; }
function getUserId()    { const s = getSession(); return s.user_id || s.session_id || ''; }

async function apiFetch(url, opts = {}) {
    const sid = getSessionId();
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (sid) headers['X-Session-ID'] = sid;
    const res = await fetch(url, { ...opts, headers });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

/* ── Header clock ────────────────────────────────────── */
function updateHdrClock() {
    const el = document.getElementById('hdr-clock');
    if (el) el.textContent = new Date().toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
}

/* ── Save/load layout ────────────────────────────────── */
async function saveLayoutToServer(layout) {
    const sid = getSessionId();
    const body = JSON.stringify({ layout_type: LAYOUT_TYPE, layout });
    if (sid) {
        try {
            await fetch('/api/user/layout', {
                method:'POST',
                headers:{ 'Content-Type':'application/json', 'X-Session-ID':sid },
                body,
            });
            return;
        } catch { /* fall through */ }
    }
    localStorage.setItem(LAYOUT_LOCAL, body);
}

async function loadLayoutFromServer() {
    const sid = getSessionId();
    if (sid) {
        try {
            const data = await apiFetch(`/api/user/layout?layout_type=${LAYOUT_TYPE}`);
            if (data.layout && Array.isArray(data.layout) && data.layout.length) return data.layout;
        } catch { /* fall through */ }
    }
    try {
        const raw = localStorage.getItem(LAYOUT_LOCAL);
        if (raw) {
            const parsed = JSON.parse(raw);
            const arr = parsed.layout || parsed;
            if (Array.isArray(arr) && arr.length) return arr;
        }
    } catch { /* fall through */ }
    return null;
}

function showSaveToast() {
    const el = document.getElementById('save-toast');
    if (!el) return;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}

/* ── Touch Dashboard controller ─────────────────────── */
const touchDash = (() => {
    let grid    = null;
    let editing = false;
    let saveTid = null;

    /* ─ Build widget HTML ─ */
    function makeWidgetContent(type) {
        // Returns a bare placeholder; TouchWidgets.render() fills it after GridStack places it
        return `<div class="widget" data-widget-type="${type}"></div>`;
    }

    /* ─ Add remove button to grid item ─ */
    function attachRemoveBtn(gsEl) {
        if (gsEl.querySelector('.gs-rm-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'gs-rm-btn';
        btn.innerHTML = '&times;';
        btn.title = 'Remove Widget';
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (grid) { grid.removeWidget(gsEl); debouncedSave(); }
        });
        gsEl.appendChild(btn);
    }

    /* ─ Add a widget to the grid ─ */
    function addWidget(type, opts = {}) {
        if (!grid) return null;
        const content = makeWidgetContent(type);
        const gsEl = grid.addWidget({
            w: opts.w || 2,
            h: opts.h || 2,
            x: opts.x,
            y: opts.y,
            autoPosition: (opts.x === undefined),
            content,
        });
        attachRemoveBtn(gsEl);
        // Self-contained rendering — no WidgetManager dependency
        const widgetEl = gsEl.querySelector('.widget');
        if (widgetEl && typeof TouchWidgets !== 'undefined') {
            TouchWidgets.render(type, widgetEl).catch(e =>
                console.warn(`[widget:${type}] render error`, e)
            );
        }
        return gsEl;
    }

    /* ─ Snapshot current layout ─ */
    function snapshotLayout() {
        if (!grid) return [];
        return grid.engine.nodes.map(node => {
            const w = node.el.querySelector('.widget');
            return {
                type: w ? w.getAttribute('data-widget-type') : '',
                x: node.x, y: node.y, w: node.w, h: node.h,
            };
        }).filter(l => l.type);
    }

    /* ─ Debounced save ─ */
    function debouncedSave() {
        clearTimeout(saveTid);
        saveTid = setTimeout(async () => {
            const layout = snapshotLayout();
            if (!layout.length) return;
            await saveLayoutToServer(layout);
            showSaveToast();
        }, 800);
    }

    /* ─ Toggle edit mode ─ */
    function toggleEdit() {
        editing = !editing;
        document.body.classList.toggle('edit-mode', editing);
        if (grid) grid.setStatic(!editing);
        const btn = document.getElementById('edit-btn');
        if (btn) {
            btn.classList.toggle('active', editing);
            btn.textContent = editing ? '✓' : '✏️';
        }
        if (!editing) debouncedSave();
    }

    /* ─ Widget library ─ */
    function openLibrary() {
        const overlay = document.getElementById('lib-overlay');
        const gridEl  = document.getElementById('lib-grid');
        if (!gridEl || !overlay) return;
        gridEl.innerHTML = LIBRARY_DEFS.map(d => `
            <div class="lib-item"
                 onclick="touchDash.addFromLib('${d.type}'); touchDash.closeLibrary()">
                <div class="lib-icon">${d.icon}</div>
                <div class="lib-name">${d.name}</div>
            </div>`).join('');
        overlay.classList.add('open');
    }

    function closeLibrary() {
        document.getElementById('lib-overlay')?.classList.remove('open');
    }

    function closeLibraryIfOutside(e) {
        if (e.target === document.getElementById('lib-overlay')) closeLibrary();
    }

    function addFromLib(type) {
        addWidget(type, { w:2, h:2 });
        debouncedSave();
    }

    /* ─ Main init ─ */
    async function init() {
        try {
            // Header clock
            updateHdrClock();
            setInterval(updateHdrClock, 15000);

            // Init self-contained widget CSS
            if (typeof TouchWidgets !== 'undefined') TouchWidgets.init();

            // Init GridStack — pass DOM element directly (like desktop version)
            const gridEl = document.getElementById('widgetGrid');
            grid = GridStack.init({
                column:     4,
                cellHeight: 120,
                margin:     8,
                animate:    false,  // disable to avoid transition during initial load
                staticGrid: true,
                float:      true,   // true = absolute positioning (same as desktop)
                resizable:  { handles: 'se' },
                draggable:  {
                    handle:   '.widget-header',
                    scroll:   true,
                },
            }, gridEl);

            // Expose globally so touch-ui-executor can access
            window.touchGrid = grid;

            // Load saved layout or fall back to default
            const saved = await loadLayoutFromServer();
            const layout = saved || DEFAULT_LAYOUT;

            // Add widgets one by one — same pattern as desktop dashboard.js
            layout.forEach(item => addWidget(item.type, item));

            grid.on('change',     () => { if (editing) debouncedSave(); });
            grid.on('resizestop', () => { if (editing) debouncedSave(); });

            initWS();
            screensaver.init();

            console.log('[TouchDash] ✓ Initialized', layout.length, 'widgets');
        } catch(e) {
            console.error('[TouchDash] init failed:', e);
        }
    }

    return { init, toggleEdit, addWidget, addFromLib, openLibrary, closeLibrary, closeLibraryIfOutside };
})();

/* ================================================================
   SCREENSAVER
================================================================ */
const screensaver = (() => {
    const ss         = document.getElementById('ss');
    const clockLayer = document.getElementById('ss-clock-layer');
    const orbLayer   = document.getElementById('ss-orb-layer');
    const clockEl    = document.getElementById('ss-clock');
    const dateEl     = document.getElementById('ss-date');
    const statusEl   = document.getElementById('ss-status');

    let active   = false;
    let orbPhase = false;
    let inactTid = null;
    let clockTid = null;

    /* ─ Clock / date update ─ */
    function tickClock() {
        const now = new Date();
        if (clockEl) {
            clockEl.textContent = now.toLocaleTimeString([], {
                hour:'numeric', minute:'2-digit', hour12:true,
            }).replace(/\s(AM|PM)$/, '');
        }
        if (dateEl) {
            dateEl.textContent = now.toLocaleDateString([], {
                weekday:'long', month:'long', day:'numeric',
            });
        }
    }

    /* ─ Show screensaver ─ */
    function show() {
        if (active) return;
        active   = true;
        orbPhase = false;
        ss.classList.add('visible');
        requestAnimationFrame(() => ss.classList.add('active'));

        // Clock phase by default
        if (clockLayer) clockLayer.style.opacity = '1';
        if (orbLayer)   orbLayer.classList.remove('active');

        tickClock();
        clockTid = setInterval(tickClock, 30000);

        // Pull screensaver data
        fetchSSWeather();
        fetchSSEvent();
    }

    /* ─ Hide screensaver ─ */
    function hide() {
        if (!active) return;
        active   = false;
        orbPhase = false;
        ss.classList.remove('active');
        clearInterval(clockTid);
        setTimeout(() => ss.classList.remove('visible'), 850);
        if (orbLayer) orbLayer.classList.remove('active');
        resetTimer();
    }

    /* ─ Switch to orb phase ─ */
    function showOrb(text) {
        if (!active) show();
        orbPhase = true;
        if (statusEl) statusEl.textContent = text || 'Listening...';
        if (clockLayer) clockLayer.style.opacity = '0';
        if (orbLayer)   orbLayer.classList.add('active');
    }

    /* ─ Switch back to clock ─ */
    function showClock() {
        orbPhase = false;
        if (clockLayer) clockLayer.style.opacity = '1';
        if (orbLayer)   orbLayer.classList.remove('active');
    }

    /* ─ Inactivity timer ─ */
    function resetTimer() {
        clearTimeout(inactTid);
        inactTid = setTimeout(show, INACT_MS);
    }

    /* ─ Screensaver data: weather ─ */
    async function fetchSSWeather() {
        try {
            const data = await apiFetch('/api/weather/current');
            const tmp  = data.temperature !== undefined
                ? Math.round(data.temperature) + (data.unit === 'F' ? '°F' : '°C')
                : '--°';
            const desc = data.description || data.summary || data.condition || '';
            const e1 = document.getElementById('ss-wtmp');
            const e2 = document.getElementById('ss-wdesc');
            if (e1) e1.textContent = tmp;
            if (e2) e2.textContent = desc;
        } catch { /* silent */ }
    }

    /* ─ Screensaver data: next event ─ */
    async function fetchSSEvent() {
        try {
            const sid = getSessionId();
            if (!sid) return;
            const today = new Date().toISOString().split('T')[0];
            const data  = await apiFetch(`/api/events?date=${today}&limit=10`);
            const events = data.events || data || [];
            const now  = Date.now();
            const next = [...events]
                .filter(e => e.start_time && new Date(e.start_time).getTime() >= now)
                .sort((a,b) => new Date(a.start_time) - new Date(b.start_time))[0];
            const e1 = document.getElementById('ss-etitle');
            const e2 = document.getElementById('ss-etime');
            if (next) {
                if (e1) e1.textContent = next.title || next.name || 'Event';
                if (e2) e2.textContent = new Date(next.start_time)
                    .toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
            } else {
                if (e1) e1.textContent = 'No upcoming events';
                if (e2) e2.textContent = '—';
            }
        } catch { /* silent */ }
    }

    /* ─ Wire events ─ */
    function init() {
        // Touch/click screensaver → hide
        ss.addEventListener('click',      hide);
        ss.addEventListener('touchstart', hide, { passive:true });

        // User activity → reset inactivity timer
        const actEvents = ['touchstart','touchmove','click','mousemove','keydown','wheel'];
        actEvents.forEach(ev =>
            document.addEventListener(ev, () => {
                if (!active) resetTimer();
            }, { passive:true })
        );

        // Voice DOM events
        document.addEventListener('zoe:voice:listening', () => showOrb('Listening...'));
        document.addEventListener('zoe:voice:thinking',  () => showOrb('Thinking...'));
        document.addEventListener('zoe:voice:speaking',  () => showOrb('Zoe says...'));
        document.addEventListener('zoe:voice:done', () => { if (active) showClock(); });
        document.addEventListener('zoe:voice:wake', () => { if (active) hide(); });

        resetTimer();
    }

    return { init, show, hide, showOrb, showClock };
})();

/* ================================================================
   WEBSOCKET SYNC
================================================================ */
function initWS() {
    if (typeof ZoeWebSockets === 'undefined') return;
    const uid = getUserId();
    if (!uid) return;
    try {
        ZoeWebSockets.init(uid);
        console.log('[WS] Connected for user:', uid);
    } catch (e) {
        console.warn('[WS] Init failed:', e);
        return;
    }
    // Load notifications badge
    setTimeout(() => {
        if (window.zoeNotifications && typeof window.zoeNotifications.refresh === 'function') {
            window.zoeNotifications.refresh();
        }
        // Patch badge display
        const origUpdate = window.zoeNotifications && window.zoeNotifications.updateBadge;
        if (window.zoeNotifications) {
            const _patchBadge = () => {
                const badge = document.getElementById('notif-badge');
                if (!badge) return;
                const count = (window.zoeNotifications && window.zoeNotifications.getCount) ?
                    window.zoeNotifications.getCount() : 0;
                badge.textContent = count > 9 ? '9+' : String(count);
                badge.style.display = count > 0 ? 'block' : 'none';
            };
            setInterval(_patchBadge, 30000);
            _patchBadge();
        }
    }, 1500);
    // Map WS events → DOM events
    const voiceMap = {
        'voice:listening_started': 'zoe:voice:listening',
        'voice:thinking':          'zoe:voice:thinking',
        'voice:speaking':          'zoe:voice:speaking',
        'voice:done':              'zoe:voice:done',
        'voice:wake':              'zoe:voice:wake',
    };
    if (typeof ZoeWebSockets.on === 'function') {
        Object.entries(voiceMap).forEach(([wsEvt, domEvt]) => {
            ZoeWebSockets.on(wsEvt, (data) => {
                document.dispatchEvent(new CustomEvent(domEvt, { detail: data }));
            });
        });
    }
}

/* ================================================================
   ZOE_OPEN_FORM — magic UI hook for voice/AI commands
================================================================ */
window.ZOE_OPEN_FORM = function(formType, prefill = {}) {
    console.log('[ZOE_OPEN_FORM]', formType, prefill);
    const typeMap = {
        new_event:     'events',
        new_note:      'notes',
        new_journal:   'journal',
        new_list_item: 'tasks',
        new_reminder:  'reminders',
        new_shopping:  'shopping',
        new_task:      'tasks',
    };
    const widgetType = typeMap[formType] || formType;
    // Try to trigger existing widget's add action
    const widgetEl = document.querySelector(`[data-widget-type="${widgetType}"]`);
    if (widgetEl) {
        const trigger = widgetEl.querySelector(
            '[data-action="add"], .add-btn, .widget-add-btn, button[title*="add" i], button[title*="new" i]'
        );
        if (trigger) { trigger.click(); return; }
    }
    // Fallback: open widget library
    touchDash.openLibrary();
};

/* ================================================================
   BOOT
================================================================ */
if (typeof TouchMenu !== 'undefined') TouchMenu.init({ page: 'dashboard' });

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', touchDash.init);
} else {
    touchDash.init();
}
