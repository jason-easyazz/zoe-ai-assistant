<!DOCTYPE html>
<html lang="en" class="touch-scroll-root">
<head>
    <meta charset="UTF-8">
    <!-- TOUCH: kiosk bypass -->
    <script>
    (function(){
        if(localStorage.getItem('zoe_kiosk')==='1') return;
        var p=new URLSearchParams(location.search);
        if(p.get('kiosk')==='1') localStorage.setItem('zoe_kiosk','1');
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#fafbfc">
    <title>Zoe – Weather</title>
    <script>
    (function(){var s=localStorage.getItem('zoe_theme')||'auto';var dark=s==='dark'||(s==='auto'&&(new Date().getHours()<7||new Date().getHours()>=19));if(dark){document.documentElement.classList.add('dark-mode');document.querySelector('meta[name=theme-color]').content='#060610';}})();
    </script>
        <!-- TOUCH: premium widget CSS system (same as desktop) -->
    <link rel="stylesheet" href="/css/widgets-premium.css">
    <link rel="stylesheet" href="/css/widgets-fluid.css">
    <!-- TOUCH: adapter (tap targets, hide desktop chrome, dark mode) -->
    <link rel="stylesheet" href="/touch/css/touch-adapter.css">
    <link rel="stylesheet" href="/touch/css/touch-premium.css">
    <script src="/js/auth.js"></script>
    <style>
        html.touch-scroll-root,
        body.touch-scroll-page {
            overflow-x: hidden;
            overflow-y: auto;
            height: auto;
            min-height: 100dvh;
        }
        body.touch-scroll-page {
            cursor: auto;
            background: var(--page-bg);
        }

        .touch-main {
            padding-top: var(--nav-height);
            padding-bottom: var(--space-xl);
            position: relative;
            z-index: 1;
        }

        .hero {
            padding: var(--space-lg) var(--space-lg) var(--space-md);
            text-align: center;
            position: relative;
            background: linear-gradient(180deg,
                color-mix(in srgb, var(--primary-purple) 14%, transparent) 0%,
                color-mix(in srgb, var(--primary-teal) 8%, transparent) 55%,
                transparent 100%);
        }
        .dark-mode .hero {
            background: linear-gradient(180deg,
                color-mix(in srgb, var(--primary-purple) 18%, transparent) 0%,
                color-mix(in srgb, var(--primary-teal) 10%, transparent) 60%,
                transparent 100%);
        }

        .location-pill {
            display: inline-flex;
            align-items: center;
            gap: var(--space-xs);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-round);
            padding: var(--space-xs) var(--space-md);
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-md);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
        }

        .temp-main {
            font-size: clamp(80px, 18vw, 120px);
            font-weight: var(--weight-light);
            line-height: 1;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -4px;
        }

        .condition-emoji {
            font-size: var(--text-7xl);
            line-height: 1;
            margin: var(--space-sm) 0 var(--space-xs);
        }

        .condition-text {
            font-size: var(--text-2xl);
            font-weight: var(--weight-light);
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
            text-transform: capitalize;
        }

        .meta-pills {
            display: flex;
            justify-content: center;
            gap: var(--space-sm);
            flex-wrap: wrap;
        }

        .meta-pill {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: var(--space-sm) var(--space-md);
            font-size: var(--text-xs);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
        }
        .meta-pill span:first-child {
            color: var(--primary-teal);
            font-size: var(--text-base);
        }

        .sun-section {
            margin: var(--space-md) var(--space-lg);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: var(--space-md) var(--space-lg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            box-shadow: var(--shadow-medium);
        }

        .sun-header {
            display: flex;
            justify-content: space-between;
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-bottom: var(--space-sm);
        }

        .sun-bar-wrap {
            position: relative;
            height: 8px;
            background: var(--glass-bg-light);
            border-radius: var(--radius-xs);
            overflow: visible;
        }

        .sun-bar-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background: linear-gradient(90deg, color-mix(in srgb, var(--cat-shopping) 85%, white), var(--cat-shopping));
            border-radius: var(--radius-xs);
            transition: width 0.8s var(--ease-smooth);
        }

        .sun-orb {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, color-mix(in srgb, #ffd166 70%, var(--primary-teal)), var(--cat-shopping));
            box-shadow: var(--shadow-teal);
        }

        .sun-times {
            display: flex;
            justify-content: space-between;
            margin-top: var(--space-sm);
            font-size: var(--text-sm);
        }

        .sun-time {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            color: var(--text-secondary);
        }

        .section-label {
            padding: 0 var(--space-lg) var(--space-sm);
            font-size: var(--text-xs);
            font-weight: var(--weight-semibold);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .hourly-strip {
            display: flex;
            gap: var(--space-sm);
            padding: 0 var(--space-lg) var(--space-md);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
        }
        .hourly-strip::-webkit-scrollbar { display: none; }

        .hour-card {
            flex-shrink: 0;
            scroll-snap-align: start;
            width: 72px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: var(--space-sm) var(--space-sm);
            text-align: center;
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            box-shadow: var(--shadow-small);
        }

        .hour-time { font-size: var(--text-xs); color: var(--text-muted); margin-bottom: var(--space-xs); }
        .hour-icon { font-size: var(--text-xl); line-height: 1; margin-bottom: var(--space-xs); }
        .hour-temp { font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-primary); }

        .daily-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            padding: 0 var(--space-lg) var(--space-sm);
        }

        .day-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: var(--space-md) var(--space-lg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            box-shadow: var(--shadow-small);
        }

        .day-name { font-size: var(--text-sm); font-weight: var(--weight-medium); min-width: 70px; color: var(--text-primary); }
        .day-icon { font-size: var(--text-2xl); flex: 1; text-align: center; }
        .day-temps { display: flex; gap: var(--space-sm); font-size: var(--text-sm); }
        .day-high { font-weight: var(--weight-semibold); color: var(--text-primary); }
        .day-low { color: var(--text-muted); }

        .update-footer {
            text-align: center;
            font-size: var(--text-xs);
            color: var(--text-muted);
            padding: var(--space-sm) var(--space-lg) var(--space-xs);
        }

        .empty-hint {
            color: var(--text-muted);
            padding: var(--space-sm) var(--space-lg);
            font-size: var(--text-sm);
        }

        @keyframes shimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg,
                var(--glass-bg-light) 25%,
                color-mix(in srgb, var(--glass-border) 80%, var(--glass-bg)) 50%,
                var(--glass-bg-light) 75%);
            background-size: 800px 100%;
            animation: shimmer 1.4s infinite;
            border-radius: var(--radius-sm);
        }
        .skeleton-temp { width: 180px; height: 100px; margin: 0 auto var(--space-sm); border-radius: var(--radius-lg); }
        .skeleton-text { height: 20px; border-radius: var(--radius-round); }
        .skeleton-pill { height: 34px; width: 90px; border-radius: var(--radius-round); }
        .skeleton-card { height: 80px; border-radius: var(--radius-card); }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinning { animation: spin 0.8s linear infinite; }

        .weather-refresh-fab {
            position: fixed;
            right: var(--space-lg);
            bottom: calc(var(--nav-height) + var(--space-lg));
            z-index: 800;
        }

        @media (orientation: landscape) {
            .hero { padding: var(--space-md) var(--space-lg) var(--space-sm); }
            .temp-main { font-size: clamp(60px, 12vw, 100px); }
            .meta-pills { gap: var(--space-sm); }
        }
    </style>
</head>
<body class="touch-scroll-page">

<div class="touch-main">

    <section class="hero" id="heroSection">
        <div id="heroContent">
            <div class="location-pill skeleton skeleton-pill" style="width:120px;height:32px;margin-bottom:16px;"></div>
            <div class="skeleton skeleton-temp"></div>
            <div class="skeleton skeleton-text" style="width:160px;margin:8px auto 20px;"></div>
            <div class="meta-pills">
                <div class="skeleton skeleton-pill"></div>
                <div class="skeleton skeleton-pill"></div>
                <div class="skeleton skeleton-pill"></div>
            </div>
        </div>
    </section>

    <section class="sun-section" id="sunSection" style="opacity:0;transition:opacity 0.4s;">
        <div class="sun-header">
            <span>🌅 Sunrise</span>
            <span>🌇 Sunset</span>
        </div>
        <div class="sun-bar-wrap" id="sunBar">
            <div class="sun-bar-fill" id="sunFill" style="width:0%"></div>
            <div class="sun-orb" id="sunOrb" style="left:0%"></div>
        </div>
        <div class="sun-times">
            <div class="sun-time">🌅 <span id="sunriseTime">--:--</span></div>
            <div class="sun-time">🌇 <span id="sunsetTime">--:--</span></div>
        </div>
    </section>

    <div class="section-label">Hourly</div>
    <div class="hourly-strip" id="hourlyStrip">
        <div class="hour-card skeleton skeleton-card" style="width:72px;"></div>
        <div class="hour-card skeleton skeleton-card" style="width:72px;"></div>
        <div class="hour-card skeleton skeleton-card" style="width:72px;"></div>
        <div class="hour-card skeleton skeleton-card" style="width:72px;"></div>
        <div class="hour-card skeleton skeleton-card" style="width:72px;"></div>
        <div class="hour-card skeleton skeleton-card" style="width:72px;"></div>
    </div>

    <div class="section-label">7-Day Forecast</div>
    <div class="daily-list" id="dailyList">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
    </div>

    <div class="update-footer" id="updateFooter">Fetching weather…</div>

    <button type="button" class="icon-btn weather-refresh-fab" id="refreshBtn" onclick="refreshWeather()" title="Refresh" aria-label="Refresh" touch-action="manipulation">↻</button>

</div>

<script src="/js/websocket-sync.js"></script>
<script src="/js/touch-ui-executor.js"></script>
<script src="/js/orb-loader.js"></script>
<script src="/touch/js/gestures.js"></script>
<script src="/touch/js/touch-menu.js"></script>
<script>
(function() {
    'use strict';

    function getUserId() {
        try {
            const s = localStorage.getItem('zoe_session');
            if (s) {
                const p = JSON.parse(s);
                return p.user_info?.user_id || p.user_id || 'default';
            }
        } catch (_) {}
        return 'default';
    }

    function conditionEmoji(desc) {
        if (!desc) return '🌤';
        const d = desc.toLowerCase();
        if (d.includes('thunder') || d.includes('storm')) return '⛈';
        if (d.includes('snow') || d.includes('blizzard')) return '❄️';
        if (d.includes('sleet') || d.includes('hail')) return '🌨';
        if (d.includes('rain') || d.includes('drizzle') || d.includes('shower')) return '🌧';
        if (d.includes('fog') || d.includes('mist') || d.includes('haze')) return '🌫';
        if (d.includes('overcast') || d.includes('cloudy')) return '☁️';
        if (d.includes('partly') || d.includes('mostly cloudy')) return '⛅';
        if (d.includes('clear') || d.includes('sunny')) return '☀️';
        if (d.includes('wind')) return '💨';
        return '🌤';
    }

    function iconEmoji(iconCode) {
        if (!iconCode) return '🌤';
        const map = {
            '01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️',
            '04d':'☁️','04n':'☁️','09d':'🌦','09n':'🌧','10d':'🌧','10n':'🌧',
            '11d':'⛈','11n':'⛈','13d':'❄️','13n':'❄️','50d':'🌫','50n':'🌫'
        };
        return map[iconCode] || conditionEmoji(iconCode);
    }

    function fmt12(timeStr) {
        if (!timeStr) return '--:--';
        try {
            const d = new Date(timeStr.includes('T') ? timeStr : 'T' + timeStr);
            if (isNaN(d)) return timeStr;
            return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        } catch (_) { return timeStr; }
    }

    function fmtTemp(t) {
        return t !== undefined && t !== null ? Math.round(t) + '°' : '--°';
    }

    function fmtHour(timeStr) {
        try {
            const d = new Date(timeStr);
            const h = d.getHours();
            return h === 0 ? '12 AM' : h < 12 ? h + ' AM' : h === 12 ? '12 PM' : (h - 12) + ' PM';
        } catch (_) { return timeStr; }
    }

    function fmtDay(timeStr) {
        try {
            const d = new Date(timeStr);
            return d.toLocaleDateString([], { weekday: 'short' });
        } catch (_) { return timeStr; }
    }

    function updateSunBar(sunriseISO, sunsetISO) {
        const now = Date.now();
        const rise = new Date(sunriseISO).getTime();
        const set = new Date(sunsetISO).getTime();
        if (!rise || !set) return;

        const total = set - rise;
        const elapsed = Math.max(0, Math.min(total, now - rise));
        const pct = (elapsed / total) * 100;

        document.getElementById('sunFill').style.width = pct + '%';
        document.getElementById('sunOrb').style.left = pct + '%';
        document.getElementById('sunSection').style.opacity = '1';
    }

    function renderCurrent(data) {
        const emoji = data.icon ? iconEmoji(data.icon) : conditionEmoji(data.description);

        document.getElementById('heroContent').innerHTML = `
            <div class="location-pill">📍 ${data.city || 'Unknown Location'}</div>
            <div class="temp-main">${fmtTemp(data.temp)}</div>
            <div class="condition-emoji">${emoji}</div>
            <div class="condition-text">${data.description || ''}</div>
            <div class="meta-pills">
                <div class="meta-pill"><span>🌡</span> Feels ${fmtTemp(data.feels_like)}</div>
                <div class="meta-pill"><span>💧</span> ${data.humidity !== undefined ? data.humidity + '%' : '--'} Humidity</div>
                <div class="meta-pill"><span>💨</span> ${data.wind_speed !== undefined ? Math.round(data.wind_speed) + ' mph' : '--'} Wind</div>
            </div>
        `;

        if (data.sunrise && data.sunset) {
            document.getElementById('sunriseTime').textContent = fmt12(data.sunrise);
            document.getElementById('sunsetTime').textContent = fmt12(data.sunset);
            updateSunBar(data.sunrise, data.sunset);
        }
    }

    function renderForecast(data) {
        const hourly = (data.hourly || []).slice(0, 12);
        const daily = data.daily || [];

        const hourlyStrip = document.getElementById('hourlyStrip');
        if (hourly.length) {
            hourlyStrip.innerHTML = hourly.map(h => `
                <div class="hour-card">
                    <div class="hour-time">${fmtHour(h.time)}</div>
                    <div class="hour-icon">${h.icon ? iconEmoji(h.icon) : conditionEmoji(h.description)}</div>
                    <div class="hour-temp">${fmtTemp(h.temp)}</div>
                </div>
            `).join('');
        } else {
            hourlyStrip.innerHTML = '<div class="empty-hint">No hourly data</div>';
        }

        const dailyList = document.getElementById('dailyList');
        if (daily.length) {
            dailyList.innerHTML = daily.map(d => `
                <div class="day-card">
                    <div class="day-name">${fmtDay(d.day || d.date)}</div>
                    <div class="day-icon">${d.icon ? iconEmoji(d.icon) : conditionEmoji(d.description)}</div>
                    <div class="day-temps">
                        <span class="day-high">${fmtTemp(d.high)}</span>
                        <span class="day-low">${fmtTemp(d.low)}</span>
                    </div>
                </div>
            `).join('');
        } else {
            dailyList.innerHTML = '<div class="empty-hint">No forecast data</div>';
        }
    }

    let lastUpdated = null;

    async function fetchWeather() {
        try {
            const [curRes, fcastRes] = await Promise.all([
                fetch('/api/weather/current'),
                fetch('/api/weather/forecast')
            ]);
            if (curRes.ok) {
                const cur = await curRes.json();
                renderCurrent(cur);
            }
            if (fcastRes.ok) {
                const fcast = await fcastRes.json();
                renderForecast(fcast);
            }
            lastUpdated = new Date();
            updateFooter();
        } catch (err) {
            console.warn('[Weather] fetch failed:', err);
            document.getElementById('updateFooter').textContent = 'Could not load weather data';
        }
    }

    function updateFooter() {
        if (!lastUpdated) return;
        const mins = Math.floor((Date.now() - lastUpdated.getTime()) / 60000);
        const label = mins < 1 ? 'Just updated' : `Updated ${mins} minute${mins !== 1 ? 's' : ''} ago`;
        document.getElementById('updateFooter').textContent = label;
    }

    window.refreshWeather = function() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('spinning');
        btn.style.pointerEvents = 'none';
        fetchWeather().finally(() => {
            btn.classList.remove('spinning');
            btn.style.pointerEvents = '';
        });
    };

    window.ZOE_OPEN_FORM = function() {};

    document.addEventListener('DOMContentLoaded', function () {
        const userId = getUserId();
        if (typeof ZoeWebSockets !== 'undefined') {
            ZoeWebSockets.init(userId);
        }
        fetchWeather();

        setInterval(updateFooter, 60000);
        setInterval(fetchWeather, 600000);
    });
})();

TouchMenu.init({ page: 'weather' });
</script>
</body>
</html>
