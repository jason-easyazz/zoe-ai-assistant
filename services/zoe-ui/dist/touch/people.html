<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function(){
        if (localStorage.getItem('zoe_kiosk') === '1') return;
        var p = new URLSearchParams(location.search);
        if (p.get('kiosk') === '1') localStorage.setItem('zoe_kiosk', '1');
    })();
    (function(){
        var s = localStorage.getItem('zoe_theme') || 'auto';
        var h = new Date().getHours();
        var dark = s === 'dark' || (s === 'auto' && (h < 7 || h >= 19));
        if (dark) document.documentElement.classList.add('dark-mode');
        var mc = document.querySelector('meta[name=theme-color]');
        if (mc) mc.content = dark ? '#060610' : '#fafbfc';
    })();
    window.prompt  = function(msg, def) { return def || ''; };
    window.alert   = function() {};
    window.confirm = function() { return true; };
    </script>
    <link rel="stylesheet" href="/touch/css/touch-adapter.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fafbfc">
    <title>Zoe — People</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #7B61FF;
            --teal: #5AE0E0;
            --gradient: linear-gradient(135deg, #7B61FF 0%, #5AE0E0 100%);
            --bg: #fafbfc;
            --card: #ffffff;
            --card-soft: #f7f8ff;
            --border: rgba(123, 97, 255, 0.12);
            --text: #1A202C;
            --text-soft: #4A5568;
            --text-mute: #718096;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(123, 97, 255, 0.10);
        }
        html.dark-mode {
            --bg: #060610;
            --card: rgba(28, 28, 44, 0.9);
            --card-soft: rgba(40, 40, 60, 0.6);
            --border: rgba(123, 97, 255, 0.25);
            --text: #f0f0f5;
            --text-soft: #b4b4c8;
            --text-mute: #8a8aa0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding-top: var(--ta-nav-h, 64px);
            -webkit-font-smoothing: antialiased;
        }

        .page-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px 80px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .btn-primary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 20px; border: none; border-radius: 999px;
            background: var(--gradient); color: #fff;
            font-size: 15px; font-weight: 700; cursor: pointer;
            box-shadow: 0 6px 18px rgba(123, 97, 255, 0.35);
            min-height: 48px;
            transition: transform 0.15s ease;
        }
        .btn-primary:active { transform: scale(0.96); }

        .search-row {
            display: flex; gap: 10px; margin-bottom: 14px; align-items: center;
        }
        .search-input {
            flex: 1; padding: 12px 16px;
            border: 1.5px solid var(--border); border-radius: 14px;
            background: var(--card); color: var(--text);
            font-size: 15px; min-height: 48px; outline: none;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(123,97,255,0.15); }

        .circle-filter {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
        }
        .circle-chip {
            padding: 10px 16px; border: 1.5px solid var(--border);
            border-radius: 999px; background: var(--card);
            color: var(--text); font-size: 14px; font-weight: 600;
            cursor: pointer; min-height: 42px;
            display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.15s ease;
        }
        .circle-chip.active {
            background: var(--gradient); color: #fff; border-color: transparent;
            box-shadow: 0 4px 14px rgba(123, 97, 255, 0.3);
        }
        .circle-chip .chip-count {
            background: rgba(0,0,0,0.1); border-radius: 999px;
            padding: 1px 8px; font-size: 12px; font-weight: 700;
        }
        .circle-chip.active .chip-count { background: rgba(255,255,255,0.25); }

        .circle-group { margin-bottom: 28px; }
        .group-header {
            display: flex; align-items: baseline; justify-content: space-between;
            margin-bottom: 12px; padding: 0 2px;
        }
        .group-title {
            font-size: 18px; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 8px;
        }
        .group-title-emoji { font-size: 22px; }
        .group-count { font-size: 13px; color: var(--text-mute); }

        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 14px;
        }

        .person-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            min-height: 170px;
        }
        .person-card:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-md);
        }

        .avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
            user-select: none;
        }

        .person-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.25;
            word-break: break-word;
        }
        .person-rel {
            font-size: 12px;
            color: var(--text-mute);
            text-transform: capitalize;
        }
        .person-hints {
            display: flex; gap: 8px; justify-content: center;
            font-size: 14px; margin-top: 2px;
        }
        .person-hint { opacity: 0.7; }

        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-mute);
            grid-column: 1 / -1;
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 10px; }
        .empty-state-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }

        /* ── Editor sheet ──────────────────────────────────────── */
        .editor-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at top, rgba(123,97,255,0.18) 0%, rgba(0,0,0,0.55) 70%);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            z-index: 3000; display: none;
            align-items: flex-end; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .editor-overlay.open { display: flex; opacity: 1; }
        .editor-sheet {
            background: var(--card); width: 100%; max-width: 700px;
            max-height: 92dvh; border-radius: 24px 24px 0 0;
            box-shadow: 0 -24px 80px rgba(0,0,0,0.35);
            display: flex; flex-direction: column; overflow: hidden;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.25, 1);
        }
        .editor-overlay.open .editor-sheet { transform: translateY(0); }
        @media (min-width: 700px) {
            .editor-overlay { align-items: center; padding: 40px; }
            .editor-sheet { border-radius: 24px; max-height: 88dvh; }
        }

        .editor-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px; border-bottom: 1px solid var(--border);
        }
        .editor-title-text { font-size: 20px; font-weight: 700; color: var(--text); }

        .btn-ghost {
            padding: 10px 16px; border: 1.5px solid var(--border);
            border-radius: 12px; background: transparent;
            color: var(--text); font-size: 14px; font-weight: 600;
            cursor: pointer; min-height: 44px;
        }
        .btn-ghost:active { background: var(--card-soft); }
        .btn-danger { border-color: rgba(255, 77, 106, 0.3); color: #FF4D6A; }
        .btn-danger:active { background: rgba(255, 77, 106, 0.1); }
        .editor-actions { display: flex; gap: 8px; }

        .editor-body {
            padding: 18px 22px; overflow-y: auto; flex: 1;
            display: flex; flex-direction: column; gap: 14px;
        }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field-label {
            font-size: 12px; font-weight: 700;
            color: var(--text-soft); text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .field-input, .field-textarea, .field-select {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid var(--border); border-radius: 12px;
            background: var(--card-soft); color: var(--text);
            font-size: 15px; font-family: inherit; outline: none;
        }
        .field-textarea { min-height: 100px; resize: vertical; line-height: 1.5; }
        .field-input:focus, .field-textarea:focus, .field-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(123,97,255,0.15);
        }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 500px) { .two-col { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="people-page">

    <div class="page-wrap">
        <header class="page-header">
            <h1 class="page-title">People</h1>
            <button class="btn-primary" onclick="openEditor()">
                <span style="font-size:18px;line-height:1">+</span>
                New Person
            </button>
        </header>

        <div class="search-row">
            <input id="searchInput" class="search-input" type="text" placeholder="Search by name, relationship, email, phone…" />
        </div>

        <div class="circle-filter" id="circleFilter">
            <!-- Populated by JS -->
        </div>

        <div id="groupsContainer">
            <div class="empty-state"><div class="empty-state-icon">⏳</div><div>Loading…</div></div>
        </div>
    </div>

    <!-- Editor overlay -->
    <div class="editor-overlay" id="editorOverlay" onclick="if(event.target===this)closeEditor()">
        <div class="editor-sheet">
            <div class="editor-header">
                <div class="editor-title-text" id="editorTitleText">New Person</div>
                <div class="editor-actions">
                    <button class="btn-ghost btn-danger" id="editorDeleteBtn" style="display:none" onclick="deleteCurrent()">Delete</button>
                    <button class="btn-ghost" onclick="closeEditor()">Cancel</button>
                    <button class="btn-primary" id="saveBtn" onclick="savePerson()">Save</button>
                </div>
            </div>
            <div class="editor-body">
                <div class="field">
                    <div class="field-label">Name *</div>
                    <input id="fName" class="field-input" type="text" placeholder="Jane Doe" />
                </div>
                <div class="two-col">
                    <div class="field">
                        <div class="field-label">Relationship</div>
                        <input id="fRel" class="field-input" type="text" placeholder="friend, mom, colleague…" list="relSuggestions" />
                        <datalist id="relSuggestions">
                            <option>spouse</option><option>partner</option><option>parent</option>
                            <option>mother</option><option>father</option><option>child</option>
                            <option>son</option><option>daughter</option><option>sibling</option>
                            <option>brother</option><option>sister</option><option>grandparent</option>
                            <option>aunt</option><option>uncle</option><option>cousin</option>
                            <option>niece</option><option>nephew</option><option>friend</option>
                            <option>best friend</option><option>colleague</option><option>coworker</option>
                            <option>boss</option><option>manager</option><option>report</option>
                            <option>client</option><option>neighbor</option><option>doctor</option>
                        </datalist>
                    </div>
                    <div class="field">
                        <div class="field-label">Circle</div>
                        <select id="fCircle" class="field-select">
                            <option value="">Auto (from relationship)</option>
                            <option value="inner">Inner Circle</option>
                            <option value="family">Family</option>
                            <option value="friends">Friends</option>
                            <option value="work">Work</option>
                            <option value="other">Other</option>

                    </div>
                </div>
                <div class="two-col">
                    <div class="field">
                        <div class="field-label">Email</div>
                        <input id="fEmail" class="field-input" type="email" placeholder="jane@example.com" />
                    </div>
                    <div class="field">
                        <div class="field-label">Phone</div>
                        <input id="fPhone" class="field-input" type="tel" placeholder="+1 555-123-4567" />
                    </div>
                </div>
                <div class="field">
                    <div class="field-label">Birthday</div>
                    <input id="fBday" class="field-input" type="date" />
                </div>
                <div class="field">
                    <div class="field-label">Notes</div>
                    <textarea id="fNotes" class="field-textarea" placeholder="How did you meet? Kids' names? Coffee order? Anything worth remembering."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/notifications-panel.js"></script>
    <script src="/js/websocket-sync.js"></script>
    <script src="/touch/js/touch-menu.js"></script>

    <script>
    const CIRCLES = [
        { id: 'inner',   label: 'Inner Circle', emoji: '💜' },
        { id: 'family',  label: 'Family',       emoji: '👨‍👩‍👧' },
        { id: 'friends', label: 'Friends',      emoji: '🤝' },
        { id: 'work',    label: 'Work',         emoji: '💼' },
        { id: 'other',   label: 'Other',        emoji: '🌐' },
    ];

    const REL_TO_CIRCLE = {
        inner:  ['spouse','partner','wife','husband','child','son','daughter','kid',
                 'parent','mother','father','mom','dad','sibling','brother','sister'],
        family: ['grandparent','grandma','grandpa','grandmother','grandfather',
                 'aunt','uncle','cousin','niece','nephew','in-law','stepparent',
                 'stepchild','stepmother','stepfather','stepbrother','stepsister',
                 'mother-in-law','father-in-law','brother-in-law','sister-in-law','family'],
        friends:['friend','best friend','buddy','pal','mate','roommate','housemate','bff'],
        work:   ['colleague','coworker','boss','manager','report','teammate','client',
                 'customer','supplier','mentor','mentee','assistant','employee','coach',
                 'contractor','partner (business)','business partner','investor','advisor'],
    };

    const state = {
        people: [],
        search: '',
        activeCircle: 'all',
        editingId: null,
    };

    // ─────────────────────────────────────────────
    // Circle derivation
    function deriveCircle(person) {
        // 1. Manual override in custom_fields.circle
        const custom = person.custom_fields?.circle;
        if (custom && CIRCLES.find(c => c.id === custom)) return custom;
        // 2. preferences.circle
        const pref = person.preferences?.circle;
        if (pref && CIRCLES.find(c => c.id === pref)) return pref;
        // 3. Derive from relationship
        const rel = (person.relationship || '').toLowerCase().trim();
        if (!rel) return 'other';
        for (const [circle, keys] of Object.entries(REL_TO_CIRCLE)) {
            if (keys.some(k => rel === k || rel.includes(k))) return circle;
        }
        return 'other';
    }

    // ─────────────────────────────────────────────
    // Avatar colour hashing
    function avatarGradient(name) {
        const palettes = [
            ['#7B61FF', '#5AE0E0'],
            ['#FF6B9D', '#FFB55E'],
            ['#5AE0E0', '#7B61FF'],
            ['#FFB55E', '#FF4D6A'],
            ['#4CC9F0', '#4361EE'],
            ['#52C41A', '#5AE0E0'],
            ['#F72585', '#7B61FF'],
            ['#06D6A0', '#118AB2'],
        ];
        let hash = 0;
        for (const c of (name || '?')) hash = (hash * 31 + c.charCodeAt(0)) >>> 0;
        const [a, b] = palettes[hash % palettes.length];
        return `linear-gradient(135deg, ${a} 0%, ${b} 100%)`;
    }
    function initials(name) {
        if (!name) return '?';
        const parts = name.trim().split(/\s+/);
        return (parts[0][0] + (parts.length > 1 ? parts[parts.length-1][0] : '')).toUpperCase();
    }

    // ─────────────────────────────────────────────
    // Load
    const API = (typeof API_BASE !== 'undefined') ? API_BASE : '/api';

    async function loadPeople() {
        try {
            const res = await fetch(`${API}/people/?limit=500`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            state.people = (data.people || []).map(p => ({ ...p, _circle: deriveCircle(p) }));
            render();
        } catch (err) {
            console.error(err);
            document.getElementById('groupsContainer').innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">⚠️</div>' +
                '<div class="empty-state-title">Couldn\'t load people</div>' +
                '<div>' + (err.message || '') + '</div></div>';
        }
    }

    function filteredPeople() {
        const q = state.search.toLowerCase();
        return state.people.filter(p => {
            if (state.activeCircle !== 'all' && p._circle !== state.activeCircle) return false;
            if (!q) return true;
            const hay = [p.name, p.relationship, p.email, p.phone, p.notes]
                .filter(Boolean).join(' ').toLowerCase();
            return hay.includes(q);
        });
    }

    function renderFilter() {
        const counts = { all: state.people.length };
        for (const c of CIRCLES) counts[c.id] = 0;
        for (const p of state.people) counts[p._circle]++;
        const row = document.getElementById('circleFilter');
        const chips = [{ id: 'all', label: 'All', emoji: '✨' }, ...CIRCLES];
        row.innerHTML = chips.map(c => `
            <button class="circle-chip ${state.activeCircle === c.id ? 'active' : ''}" data-id="${c.id}">
                <span>${c.emoji}</span>
                <span>${c.label}</span>
                <span class="chip-count">${counts[c.id] || 0}</span>
            </button>`).join('');
        row.querySelectorAll('.circle-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                state.activeCircle = chip.getAttribute('data-id');
                render();
            });
        });
    }

    function renderGroups() {
        const filtered = filteredPeople();
        const container = document.getElementById('groupsContainer');
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">👥</div>
                    <div class="empty-state-title">${state.people.length === 0 ? 'No people yet' : 'No matches'}</div>
                    <div>${state.people.length === 0 ? 'Tap "New Person" to add your first contact.' : 'Try a different search or filter.'}</div>
                </div>`;
            return;
        }

        // If filtered to a single circle, render flat
        if (state.activeCircle !== 'all') {
            const circle = CIRCLES.find(c => c.id === state.activeCircle);
            container.innerHTML = `
                <div class="circle-group">
                    <div class="group-header">
                        <div class="group-title"><span class="group-title-emoji">${circle.emoji}</span>${circle.label}</div>
                        <div class="group-count">${filtered.length} ${filtered.length === 1 ? 'person' : 'people'}</div>
                    </div>
                    <div class="people-grid">${filtered.map(cardHtml).join('')}</div>
                </div>`;
        } else {
            // Group by circle, in CIRCLES order
            let html = '';
            for (const circle of CIRCLES) {
                const group = filtered.filter(p => p._circle === circle.id);
                if (group.length === 0) continue;
                html += `
                    <div class="circle-group">
                        <div class="group-header">
                            <div class="group-title"><span class="group-title-emoji">${circle.emoji}</span>${circle.label}</div>
                            <div class="group-count">${group.length}</div>
                        </div>
                        <div class="people-grid">${group.map(cardHtml).join('')}</div>
                    </div>`;
            }
            container.innerHTML = html;
        }

        container.querySelectorAll('.person-card').forEach(c => {
            c.addEventListener('click', () => openEditor(c.getAttribute('data-id')));
        });
    }

    function cardHtml(p) {
        const hints = [];
        if (p.phone) hints.push('📞');
        if (p.email) hints.push('✉️');
        if (p.birthday) hints.push('🎂');
        if (p.notes) hints.push('📝');
        const safeName = (p.name || 'Unknown').replace(/</g, '&lt;');
        return `
            <div class="person-card" data-id="${p.id}">
                <div class="avatar" style="background:${avatarGradient(p.name)}">${initials(p.name)}</div>
                <div class="person-name">${safeName}</div>
                ${p.relationship ? `<div class="person-rel">${p.relationship.replace(/</g, '&lt;')}</div>` : ''}
                ${hints.length ? `<div class="person-hints">${hints.map(h => `<span class="person-hint">${h}</span>`).join('')}</div>` : ''}
            </div>`;
    }

    function render() {
        renderFilter();
        renderGroups();
    }

    // ─────────────────────────────────────────────
    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
        state.search = e.target.value;
        renderGroups();
    });

    // ─────────────────────────────────────────────
    // Editor
    function openEditor(personId) {
        state.editingId = personId || null;
        ['fName','fRel','fEmail','fPhone','fBday','fNotes','fCircle'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });

        if (personId) {
            const p = state.people.find(x => x.id === personId);
            if (p) {
                document.getElementById('editorTitleText').textContent = 'Edit Person';
                document.getElementById('editorDeleteBtn').style.display = 'inline-block';
                document.getElementById('fName').value  = p.name || '';
                document.getElementById('fRel').value   = p.relationship || '';
                document.getElementById('fEmail').value = p.email || '';
                document.getElementById('fPhone').value = p.phone || '';
                document.getElementById('fBday').value  = p.birthday || '';
                document.getElementById('fNotes').value = p.notes || '';
                const circleOverride = p.custom_fields?.circle || p.preferences?.circle || '';
                document.getElementById('fCircle').value = circleOverride;
            }
        } else {
            document.getElementById('editorTitleText').textContent = 'New Person';
            document.getElementById('editorDeleteBtn').style.display = 'none';
        }
        document.getElementById('editorOverlay').classList.add('open');
        setTimeout(() => document.getElementById('fName').focus(), 350);
    }

    function closeEditor() {
        document.getElementById('editorOverlay').classList.remove('open');
        state.editingId = null;
    }

    async function savePerson() {
        const name = document.getElementById('fName').value.trim();
        if (!name) { document.getElementById('fName').focus(); return; }
        const payload = {
            name,
            relationship: document.getElementById('fRel').value.trim() || null,
            email: document.getElementById('fEmail').value.trim() || null,
            phone: document.getElementById('fPhone').value.trim() || null,
            birthday: document.getElementById('fBday').value || null,
            notes: document.getElementById('fNotes').value.trim() || null,
            visibility: 'family',
        };
        const circleOverride = document.getElementById('fCircle').value;
        if (circleOverride) {
            payload.preferences = { circle: circleOverride };
        }

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        try {
            if (state.editingId) {
                const r = await fetch(`${API}/people/${state.editingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
            } else {
                const r = await fetch(`${API}/people/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
            }
            closeEditor();
            await loadPeople();
        } catch (err) {
            console.error('savePerson failed', err);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Save';
        }
    }

    async function deleteCurrent() {
        if (!state.editingId) return;
        try {
            const r = await fetch(`${API}/people/${state.editingId}`, { method: 'DELETE' });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            closeEditor();
            await loadPeople();
        } catch (err) {
            console.error('deletePerson failed', err);
        }
    }

    // Boot
    loadPeople();
    </script>
</body>
</html>
