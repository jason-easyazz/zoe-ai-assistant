<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function(){
        if (localStorage.getItem('zoe_kiosk') === '1') return;
        var p = new URLSearchParams(location.search);
        if (p.get('kiosk') === '1') localStorage.setItem('zoe_kiosk', '1');
    })();
    (function(){
        var s = localStorage.getItem('zoe_theme') || 'auto';
        var h = new Date().getHours();
        var dark = s === 'dark' || (s === 'auto' && (h < 7 || h >= 19));
        if (dark) document.documentElement.classList.add('dark-mode');
        var mc = document.querySelector('meta[name=theme-color]');
        if (mc) mc.content = dark ? '#060610' : '#fafbfc';
    })();
    window.prompt  = function(msg, def) { return def || ''; };
    window.alert   = function() {};
    window.confirm = function() { return true; };
    </script>
    <link rel="stylesheet" href="/touch/css/touch-adapter.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fafbfc">
    <title>Zoe — People</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #7B61FF;
            --teal: #5AE0E0;
            --gradient: linear-gradient(135deg, #7B61FF 0%, #5AE0E0 100%);
            --bg: #fafbfc;
            --card: #ffffff;
            --card-soft: #f7f8ff;
            --border: rgba(123, 97, 255, 0.12);
            --text: #1A202C;
            --text-soft: #4A5568;
            --text-mute: #718096;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(123, 97, 255, 0.10);
        }
        html.dark-mode {
            --bg: #060610;
            --card: rgba(28, 28, 44, 0.9);
            --card-soft: rgba(40, 40, 60, 0.6);
            --border: rgba(123, 97, 255, 0.25);
            --text: #f0f0f5;
            --text-soft: #b4b4c8;
            --text-mute: #8a8aa0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding-top: var(--ta-nav-h, 64px);
            -webkit-font-smoothing: antialiased;
        }

        .page-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px 80px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .btn-primary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 20px; border: none; border-radius: 999px;
            background: var(--gradient); color: #fff;
            font-size: 15px; font-weight: 700; cursor: pointer;
            box-shadow: 0 6px 18px rgba(123, 97, 255, 0.35);
            min-height: 48px;
            transition: transform 0.15s ease;
        }
        .btn-primary:active { transform: scale(0.96); }

        .search-row {
            display: flex; gap: 10px; margin-bottom: 14px; align-items: center;
        }
        .search-input {
            flex: 1; padding: 12px 16px;
            border: 1.5px solid var(--border); border-radius: 14px;
            background: var(--card); color: var(--text);
            font-size: 15px; min-height: 48px; outline: none;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(123,97,255,0.15); }

        .circle-filter {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
        }
        .circle-chip {
            padding: 10px 16px; border: 1.5px solid var(--border);
            border-radius: 999px; background: var(--card);
            color: var(--text); font-size: 14px; font-weight: 600;
            cursor: pointer; min-height: 42px;
            display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.15s ease;
        }
        .circle-chip.active {
            background: var(--gradient); color: #fff; border-color: transparent;
            box-shadow: 0 4px 14px rgba(123, 97, 255, 0.3);
        }
        .circle-chip .chip-count {
            background: rgba(0,0,0,0.1); border-radius: 999px;
            padding: 1px 8px; font-size: 12px; font-weight: 700;
        }
        .circle-chip.active .chip-count { background: rgba(255,255,255,0.25); }

        .circle-group { margin-bottom: 28px; }
        .group-header {
            display: flex; align-items: baseline; justify-content: space-between;
            margin-bottom: 12px; padding: 0 2px;
        }
        .group-title {
            font-size: 18px; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 8px;
        }
        .group-title-emoji { font-size: 22px; }
        .group-count { font-size: 13px; color: var(--text-mute); }

        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 14px;
        }

        .person-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            min-height: 170px;
        }
        .person-card:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-md);
        }

        .avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
            user-select: none;
        }

        .person-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.25;
            word-break: break-word;
        }
        .person-rel {
            font-size: 12px;
            color: var(--text-mute);
            text-transform: capitalize;
        }
        .person-hints {
            display: flex; gap: 8px; justify-content: center;
            font-size: 14px; margin-top: 2px;
        }
        .person-hint { opacity: 0.7; }

        /* ── CRM additions ──────────────────────────────────────── */
        /* Health dot */
        .health-dot {
            width: 10px; height: 10px; border-radius: 50%;
            position: absolute; top: 10px; right: 10px;
        }
        .health-good  { background: #48BB78; box-shadow: 0 0 6px rgba(72,187,120,0.6); }
        .health-fair  { background: #ECC94B; box-shadow: 0 0 6px rgba(236,201,75,0.5); }
        .health-low   { background: #FC8181; box-shadow: 0 0 6px rgba(252,129,129,0.6); }

        /* Inner circle gold ring */
        .person-card.inner-circle .avatar {
            box-shadow: 0 0 0 3px #F6E05E, 0 0 12px rgba(246,224,94,0.5);
        }

        /* Notification badge */
        .notif-badge {
            position: absolute; top: 8px; left: 10px;
            background: #FC8181; color: #fff;
            font-size: 10px; font-weight: 700;
            padding: 2px 6px; border-radius: 999px;
            line-height: 1.4;
        }

        /* Last seen label */
        .person-last-seen {
            font-size: 11px; color: var(--text-mute); margin-top: 3px;
        }

        /* Person card must be position:relative for absolute children */
        .person-card { position: relative; }

        /* ── 4-tab Detail panel ──────────────────────────────────── */
        .detail-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at top, rgba(123,97,255,0.18) 0%, rgba(0,0,0,0.6) 70%);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            z-index: 3500; display: none;
            align-items: flex-start; justify-content: center;
            padding: 0;
        }
        .detail-overlay.open { display: flex; }
        .detail-sheet {
            background: var(--bg); width: 100%; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .detail-header {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 18px 10px;
            border-bottom: 1px solid var(--border);
            background: var(--card); flex-shrink: 0;
        }
        .detail-back {
            background: none; border: none; color: var(--primary);
            font-size: 18px; cursor: pointer; padding: 8px; min-width: 40px;
        }
        .detail-avatar {
            width: 52px; height: 52px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800; color: #fff; flex-shrink: 0;
        }
        .detail-header-info { flex: 1; min-width: 0; }
        .detail-name { font-size: 20px; font-weight: 700; color: var(--text); }
        .detail-rel  { font-size: 13px; color: var(--text-mute); }
        .detail-edit-btn {
            background: none; border: 1.5px solid var(--border);
            border-radius: 10px; padding: 8px 14px;
            font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer;
        }
        .detail-intro-btn {
            background: var(--gradient); border: none; border-radius: 10px;
            padding: 8px 14px; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer;
        }

        .tab-bar {
            display: flex; border-bottom: 1px solid var(--border);
            background: var(--card); flex-shrink: 0;
        }
        .tab-btn {
            flex: 1; padding: 12px 4px; border: none; background: none;
            font-size: 13px; font-weight: 600; color: var(--text-mute);
            cursor: pointer; border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 16px; }
        .tab-panel.active { display: block; }

        /* Activity timeline */
        .activity-item {
            display: flex; gap: 12px; padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .activity-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--primary); margin-top: 5px; flex-shrink: 0;
        }
        .activity-desc { font-size: 14px; color: var(--text); }
        .activity-meta { font-size: 12px; color: var(--text-mute); margin-top: 2px; }

        /* Contact action buttons */
        .contact-actions { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .contact-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 16px; border-radius: 12px;
            border: 1.5px solid var(--border); background: var(--card);
            font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer;
            text-decoration: none;
        }
        .contact-btn:hover { background: var(--card-soft); }

        /* Gift / bucket chips */
        .gift-chip {
            display: inline-block; padding: 3px 10px; border-radius: 999px;
            font-size: 12px; font-weight: 700;
        }
        .chip-idea      { background: rgba(123,97,255,0.15); color: var(--primary); }
        .chip-purchased { background: rgba(72,187,120,0.15); color: #38A169; }
        .chip-given     { background: rgba(90,224,224,0.15); color: #2C7A7B; }

        .section-title {
            font-size: 14px; font-weight: 700; color: var(--text-soft);
            text-transform: uppercase; letter-spacing: 0.05em;
            margin: 16px 0 8px;
        }

        .date-row, .gift-row, .bucket-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .bucket-done { text-decoration: line-through; opacity: 0.5; }

        .add-item-row { margin-top: 12px; display: flex; gap: 8px; }
        .add-item-input {
            flex: 1; padding: 10px 14px; border: 1.5px solid var(--border);
            border-radius: 12px; background: var(--card); color: var(--text);
            font-size: 14px; outline: none;
        }
        .add-item-input:focus { border-color: var(--primary); }
        .add-item-btn {
            padding: 10px 16px; border-radius: 12px; border: none;
            background: var(--primary); color: #fff; font-weight: 700; cursor: pointer;
        }

        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-mute);
            grid-column: 1 / -1;
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 10px; }
        .empty-state-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }

        /* ── Editor sheet ──────────────────────────────────────── */
        .editor-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at top, rgba(123,97,255,0.18) 0%, rgba(0,0,0,0.55) 70%);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            z-index: 3000; display: none;
            align-items: flex-end; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .editor-overlay.open { display: flex; opacity: 1; }
        .editor-sheet {
            background: var(--card); width: 100%; max-width: 700px;
            max-height: 92dvh; border-radius: 24px 24px 0 0;
            box-shadow: 0 -24px 80px rgba(0,0,0,0.35);
            display: flex; flex-direction: column; overflow: hidden;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.25, 1);
        }
        .editor-overlay.open .editor-sheet { transform: translateY(0); }
        @media (min-width: 700px) {
            .editor-overlay { align-items: center; padding: 40px; }
            .editor-sheet { border-radius: 24px; max-height: 88dvh; }
        }

        .editor-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px; border-bottom: 1px solid var(--border);
        }
        .editor-title-text { font-size: 20px; font-weight: 700; color: var(--text); }

        .btn-ghost {
            padding: 10px 16px; border: 1.5px solid var(--border);
            border-radius: 12px; background: transparent;
            color: var(--text); font-size: 14px; font-weight: 600;
            cursor: pointer; min-height: 44px;
        }
        .btn-ghost:active { background: var(--card-soft); }
        .btn-danger { border-color: rgba(255, 77, 106, 0.3); color: #FF4D6A; }
        .btn-danger:active { background: rgba(255, 77, 106, 0.1); }
        .editor-actions { display: flex; gap: 8px; }

        .editor-body {
            padding: 18px 22px; overflow-y: auto; flex: 1;
            display: flex; flex-direction: column; gap: 14px;
        }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field-label {
            font-size: 12px; font-weight: 700;
            color: var(--text-soft); text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .field-input, .field-textarea, .field-select {
            width: 100%; padding: 12px 14px;
            border: 1.5px solid var(--border); border-radius: 12px;
            background: var(--card-soft); color: var(--text);
            font-size: 15px; font-family: inherit; outline: none;
        }
        .field-textarea { min-height: 100px; resize: vertical; line-height: 1.5; }
        .field-input:focus, .field-textarea:focus, .field-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(123,97,255,0.15);
        }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 500px) { .two-col { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="people-page">

    <div class="page-wrap">
        <header class="page-header">
            <h1 class="page-title">People</h1>
            <div style="display:flex;gap:8px;align-items:center">
                <button class="btn-primary" style="background:transparent;border:1.5px solid var(--primary);color:var(--primary);box-shadow:none" onclick="introducePrompt()">
                    👋 Introduce
                </button>
                <button class="btn-primary" onclick="openEditor()">
                    <span style="font-size:18px;line-height:1">+</span>
                    New Person
                </button>
            </div>
        </header>

        <div class="search-row">
            <input id="searchInput" class="search-input" type="text" placeholder="Search by name, relationship, email, phone…" />
        </div>

        <!-- Context toggle -->
        <div style="display:flex;gap:8px;margin-bottom:10px">
            <button id="ctxPersonal" class="circle-chip active" onclick="setContext('personal')">👤 Personal</button>
            <button id="ctxWork"     class="circle-chip"        onclick="setContext('work')">💼 Work</button>
            <button id="ctxAll"      class="circle-chip"        onclick="setContext('all')">✨ All</button>
        </div>
        <!-- Tier chips -->
        <div class="circle-filter" id="circleFilter">
            <!-- Populated by JS -->
        </div>

        <div id="groupsContainer">
            <div class="empty-state"><div class="empty-state-icon">⏳</div><div>Loading…</div></div>
        </div>
    </div>

    <!-- 4-tab Detail Panel -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-sheet">
            <div class="detail-header">
                <button class="detail-back" onclick="closeDetail()">&#8592;</button>
                <div class="detail-avatar" id="detailAvatar"></div>
                <div class="detail-header-info">
                    <div class="detail-name" id="detailName"></div>
                    <div class="detail-rel" id="detailRel"></div>
                </div>
                <button class="detail-intro-btn" onclick="introduceFromDetail()">👋</button>
                <button class="detail-edit-btn" onclick="editFromDetail()">Edit</button>
            </div>
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="timeline">Timeline</button>
                <button class="tab-btn" data-tab="about">About</button>
                <button class="tab-btn" data-tab="dates">Dates &amp; Gifts</button>
                <button class="tab-btn" data-tab="together">Together</button>
            </div>
            <div id="tab-timeline" class="tab-panel active">
                <div id="timeline-content"><p style="color:var(--text-mute);text-align:center;padding:40px">Loading…</p></div>
                <div class="add-item-row">
                    <input class="add-item-input" id="logActivityInput" placeholder="Log a meeting, note, event…" />
                    <button class="add-item-btn" onclick="logActivity()">Log</button>
                </div>
            </div>
            <div id="tab-about" class="tab-panel">
                <div id="about-content"></div>
            </div>
            <div id="tab-dates" class="tab-panel">
                <div id="dates-content"></div>
                <div class="add-item-row">
                    <input class="add-item-input" id="addGiftInput" placeholder="Gift idea for this person…" />
                    <button class="add-item-btn" onclick="addGift()">Add</button>
                </div>
            </div>
            <div id="tab-together" class="tab-panel">
                <div id="together-content"></div>
                <div class="add-item-row">
                    <input class="add-item-input" id="addBucketInput" placeholder="Something you want to do together…" />
                    <button class="add-item-btn" onclick="addBucketItem()">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Editor overlay -->
    <div class="editor-overlay" id="editorOverlay" onclick="if(event.target===this)closeEditor()">
        <div class="editor-sheet">
            <div class="editor-header">
                <div class="editor-title-text" id="editorTitleText">New Person</div>
                <div class="editor-actions">
                    <button class="btn-ghost btn-danger" id="editorDeleteBtn" style="display:none" onclick="deleteCurrent()">Delete</button>
                    <button class="btn-ghost" onclick="closeEditor()">Cancel</button>
                    <button class="btn-primary" id="saveBtn" onclick="savePerson()">Save</button>
                </div>
            </div>
            <div class="editor-body">
                <div class="field">
                    <div class="field-label">Name *</div>
                    <input id="fName" class="field-input" type="text" placeholder="Jane Doe" />
                </div>
                <div class="two-col">
                    <div class="field">
                        <div class="field-label">Relationship</div>
                        <input id="fRel" class="field-input" type="text" placeholder="friend, mom, colleague…" list="relSuggestions" />
                        <datalist id="relSuggestions">
                            <option>spouse</option><option>partner</option><option>parent</option>
                            <option>mother</option><option>father</option><option>child</option>
                            <option>son</option><option>daughter</option><option>sibling</option>
                            <option>brother</option><option>sister</option><option>grandparent</option>
                            <option>aunt</option><option>uncle</option><option>cousin</option>
                            <option>niece</option><option>nephew</option><option>friend</option>
                            <option>best friend</option><option>colleague</option><option>coworker</option>
                            <option>boss</option><option>manager</option><option>report</option>
                            <option>client</option><option>neighbor</option><option>doctor</option>
                        </datalist>
                    </div>
                    <div class="field">
                        <div class="field-label">Tier</div>
                        <select id="fCircle" class="field-select">
                            <option value="circle">○ Circle</option>
                            <option value="inner">● Inner Circle</option>
                            <option value="public">□ Public</option>
                        </select>
                    </div>
                </div>
                <div class="field">
                    <div class="field-label">Context</div>
                    <div style="display:flex;gap:12px;margin-top:4px">
                        <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer">
                            <input type="radio" name="fContext" value="personal" id="fCtxPersonal" checked> 👤 Personal
                        </label>
                        <label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer">
                            <input type="radio" name="fContext" value="work" id="fCtxWork"> 💼 Work
                        </label>
                    </div>
                </div>
                <div class="two-col">
                    <div class="field">
                        <div class="field-label">Email</div>
                        <input id="fEmail" class="field-input" type="email" placeholder="jane@example.com" />
                    </div>
                    <div class="field">
                        <div class="field-label">Phone</div>
                        <input id="fPhone" class="field-input" type="tel" placeholder="+1 555-123-4567" />
                    </div>
                </div>
                <div class="field">
                    <div class="field-label">Birthday</div>
                    <input id="fBday" class="field-input" type="date" />
                </div>
                <div class="field">
                    <div class="field-label">How We Met</div>
                    <input id="fHowWeMet" class="field-input" type="text" placeholder="At a conference, through mutual friend…" />
                </div>
                <div class="field">
                    <div class="field-label">Notes</div>
                    <textarea id="fNotes" class="field-textarea" placeholder="Kids' names? Coffee order? Anything worth remembering."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/notifications-panel.js"></script>
    <script src="/js/websocket-sync.js"></script>
    <script src="/touch/js/touch-menu.js"></script>

    <script>
    // 3 tiers × 2 contexts
    const TIERS = [
        { id: 'inner',  label: 'Inner',  symbol: '●' },
        { id: 'circle', label: 'Circle', symbol: '○' },
        { id: 'public', label: 'Public', symbol: '□' },
    ];

    const TIER_SYMBOLS = { inner: '●', circle: '○', public: '□' };
    const TIER_COLORS  = { inner: '#F6E05E', circle: 'var(--primary)', public: 'var(--text-mute)' };

    const state = {
        people: [],
        search: '',
        activeContext: 'personal',  // 'personal' | 'work' | 'all'
        activeTier: 'all',          // 'inner' | 'circle' | 'public' | 'all'
        editingId: null,
    };

    // Normalise tier — map any legacy value to 3 tiers
    function normTier(circle) {
        if (['inner','circle','public'].includes(circle)) return circle;
        if (['family','friends'].includes(circle)) return 'circle';
        if (circle === 'work') return 'circle';
        if (['acquaintance','other'].includes(circle)) return 'public';
        return 'circle';
    }

    // ─────────────────────────────────────────────
    // Avatar colour hashing
    function avatarGradient(name) {
        const palettes = [
            ['#7B61FF', '#5AE0E0'],
            ['#FF6B9D', '#FFB55E'],
            ['#5AE0E0', '#7B61FF'],
            ['#FFB55E', '#FF4D6A'],
            ['#4CC9F0', '#4361EE'],
            ['#52C41A', '#5AE0E0'],
            ['#F72585', '#7B61FF'],
            ['#06D6A0', '#118AB2'],
        ];
        let hash = 0;
        for (const c of (name || '?')) hash = (hash * 31 + c.charCodeAt(0)) >>> 0;
        const [a, b] = palettes[hash % palettes.length];
        return `linear-gradient(135deg, ${a} 0%, ${b} 100%)`;
    }
    function initials(name) {
        if (!name) return '?';
        const parts = name.trim().split(/\s+/);
        return (parts[0][0] + (parts.length > 1 ? parts[parts.length-1][0] : '')).toUpperCase();
    }

    // ─────────────────────────────────────────────
    // Load
    const API = (typeof API_BASE !== 'undefined') ? API_BASE : '/api';

    async function loadPeople() {
        try {
            const res = await fetch(`${API}/people/?limit=500`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            state.people = (data.people || []).map(p => ({
                ...p,
                _tier: normTier(p.circle || 'circle'),
                _context: p.context || 'personal',
            }));
            render();
            window.dispatchEvent(new CustomEvent('people-loaded'));
        } catch (err) {
            console.error(err);
            document.getElementById('groupsContainer').innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">⚠️</div>' +
                '<div class="empty-state-title">Couldn\'t load people</div>' +
                '<div>' + (err.message || '') + '</div></div>';
        }
    }

    function filteredPeople() {
        const q = state.search.toLowerCase();
        return state.people.filter(p => {
            if (state.activeContext !== 'all' && p._context !== state.activeContext) return false;
            if (state.activeTier !== 'all' && p._tier !== state.activeTier) return false;
            if (!q) return true;
            const hay = [p.name, p.relationship, p.email, p.phone, p.notes]
                .filter(Boolean).join(' ').toLowerCase();
            return hay.includes(q);
        });
    }

    function setContext(ctx) {
        state.activeContext = ctx;
        document.querySelectorAll('#ctxPersonal,#ctxWork,#ctxAll').forEach(btn => btn.classList.remove('active'));
        const map = { personal: 'ctxPersonal', work: 'ctxWork', all: 'ctxAll' };
        document.getElementById(map[ctx])?.classList.add('active');
        render();
    }

    function renderFilter() {
        const ctx = state.activeContext;
        const visible = ctx === 'all' ? state.people : state.people.filter(p => p._context === ctx);
        const counts = { all: visible.length };
        for (const t of TIERS) counts[t.id] = visible.filter(p => p._tier === t.id).length;

        const row = document.getElementById('circleFilter');
        const chips = [{ id: 'all', label: 'All', symbol: '✨' }, ...TIERS];
        row.innerHTML = chips.map(c => `
            <button class="circle-chip ${state.activeTier === c.id ? 'active' : ''}" data-id="${c.id}">
                <span>${c.symbol}</span>
                <span>${c.label}</span>
                <span class="chip-count">${counts[c.id] || 0}</span>
            </button>`).join('');
        row.querySelectorAll('.circle-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                state.activeTier = chip.getAttribute('data-id');
                render();
            });
        });
    }

    function renderGroups() {
        const filtered = filteredPeople();
        const container = document.getElementById('groupsContainer');
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">👥</div>
                    <div class="empty-state-title">${state.people.length === 0 ? 'No people yet' : 'No matches'}</div>
                    <div>${state.people.length === 0 ? 'Tap "New Person" to add your first contact.' : 'Try a different search or filter.'}</div>
                </div>`;
            return;
        }

        // If filtered to a single tier, render flat
        if (state.activeTier !== 'all') {
            const tier = TIERS.find(t => t.id === state.activeTier);
            container.innerHTML = `
                <div class="circle-group">
                    <div class="group-header">
                        <div class="group-title"><span class="group-title-emoji">${tier.symbol}</span>${tier.label}</div>
                        <div class="group-count">${filtered.length} ${filtered.length === 1 ? 'person' : 'people'}</div>
                    </div>
                    <div class="people-grid">${filtered.map(cardHtml).join('')}</div>
                </div>`;
        } else {
            // Group by tier in TIERS order
            let html = '';
            for (const tier of TIERS) {
                const group = filtered.filter(p => p._tier === tier.id);
                if (group.length === 0) continue;
                html += `
                    <div class="circle-group">
                        <div class="group-header">
                            <div class="group-title"><span class="group-title-emoji">${tier.symbol}</span>${tier.label}</div>
                            <div class="group-count">${group.length}</div>
                        </div>
                        <div class="people-grid">${group.map(cardHtml).join('')}</div>
                    </div>`;
            }
            container.innerHTML = html;
        }

        container.querySelectorAll('.person-card').forEach(c => {
            c.addEventListener('click', () => openDetail(c.getAttribute('data-id')));
        });
    }

    function healthLevel(score) {
        const s = parseFloat(score) || 0.5;
        if (s >= 0.6) return 'good';
        if (s >= 0.35) return 'fair';
        return 'low';
    }

    function lastSeenLabel(lastContactedAt) {
        if (!lastContactedAt) return '';
        try {
            const dt = new Date(lastContactedAt);
            const days = Math.floor((Date.now() - dt) / 86400000);
            if (days === 0) return 'Seen today';
            if (days === 1) return 'Seen yesterday';
            if (days < 7) return `Seen ${days}d ago`;
            const weeks = Math.floor(days / 7);
            if (weeks < 8) return `Seen ${weeks}w ago`;
            const months = Math.floor(days / 30);
            return `Seen ${months}mo ago`;
        } catch { return ''; }
    }

    function cardHtml(p) {
        const safeName = (p.name || 'Unknown').replace(/</g, '&lt;');
        const tier = p._tier || normTier(p.circle || 'circle');
        const innerClass = tier === 'inner' ? ' inner-circle' : '';
        const hlevel = healthLevel(p.health_score);
        const badge = (p.notification_count > 0)
            ? `<span class="notif-badge">${p.notification_count}</span>` : '';
        const lastSeen = lastSeenLabel(p.last_contacted_at);
        const tierSymbol = TIER_SYMBOLS[tier] || '○';
        const tierColor = TIER_COLORS[tier] || 'var(--primary)';
        const partialBadge = p.is_partial ? `<span style="font-size:10px;color:var(--text-mute);margin-top:2px">stub</span>` : '';
        return `
            <div class="person-card${innerClass}" data-id="${p.id}">
                <span class="health-dot health-${hlevel}"></span>
                ${badge}
                <div class="avatar" style="background:${avatarGradient(p.name)}">${initials(p.name)}</div>
                <div class="person-name">${safeName}</div>
                ${p.relationship ? `<div class="person-rel">${p.relationship.replace(/</g, '&lt;')}</div>` : ''}
                <div style="font-size:16px;color:${tierColor};line-height:1">${tierSymbol}</div>
                ${lastSeen ? `<div class="person-last-seen">${lastSeen}</div>` : ''}
                ${partialBadge}
            </div>`;
    }

    function render() {
        renderFilter();
        renderGroups();
    }

    // ─────────────────────────────────────────────
    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
        state.search = e.target.value;
        renderGroups();
    });

    // ─────────────────────────────────────────────
    // Editor
    function openEditor(personId) {
        state.editingId = personId || null;
        ['fName','fRel','fEmail','fPhone','fBday','fNotes','fCircle','fHowWeMet'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        document.getElementById('fCtxPersonal').checked = true;
        document.getElementById('fCircle').value = 'circle';

        if (personId) {
            const p = state.people.find(x => x.id === personId);
            if (p) {
                document.getElementById('editorTitleText').textContent = 'Edit Person';
                document.getElementById('editorDeleteBtn').style.display = 'inline-block';
                document.getElementById('fName').value    = p.name || '';
                document.getElementById('fRel').value     = p.relationship || '';
                document.getElementById('fEmail').value   = p.email || '';
                document.getElementById('fPhone').value   = p.phone || '';
                document.getElementById('fBday').value    = p.birthday || '';
                document.getElementById('fNotes').value   = p.notes || '';
                document.getElementById('fHowWeMet').value = p.how_we_met || '';
                const tier = normTier(p.circle || 'circle');
                document.getElementById('fCircle').value  = tier;
                const ctx = p.context || 'personal';
                document.querySelector(`input[name=fContext][value="${ctx}"]`).checked = true;
            }
        } else {
            document.getElementById('editorTitleText').textContent = 'New Person';
            document.getElementById('editorDeleteBtn').style.display = 'none';
        }
        document.getElementById('editorOverlay').classList.add('open');
        setTimeout(() => document.getElementById('fName').focus(), 350);
    }

    function closeEditor() {
        document.getElementById('editorOverlay').classList.remove('open');
        state.editingId = null;
    }

    async function savePerson() {
        const name = document.getElementById('fName').value.trim();
        if (!name) { document.getElementById('fName').focus(); return; }
        const payload = {
            name,
            relationship: document.getElementById('fRel').value.trim() || null,
            email:        document.getElementById('fEmail').value.trim() || null,
            phone:        document.getElementById('fPhone').value.trim() || null,
            birthday:     document.getElementById('fBday').value || null,
            notes:        document.getElementById('fNotes').value.trim() || null,
            how_we_met:   document.getElementById('fHowWeMet').value.trim() || null,
            visibility: 'family',
            circle: document.getElementById('fCircle').value || 'circle',
            context: document.querySelector('input[name=fContext]:checked')?.value || 'personal',
        };

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        try {
            if (state.editingId) {
                const r = await fetch(`${API}/people/${state.editingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
            } else {
                const r = await fetch(`${API}/people/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
            }
            closeEditor();
            await loadPeople();
        } catch (err) {
            console.error('savePerson failed', err);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Save';
        }
    }

    async function deleteCurrent() {
        if (!state.editingId) return;
        try {
            const r = await fetch(`${API}/people/${state.editingId}`, { method: 'DELETE' });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            closeEditor();
            await loadPeople();
        } catch (err) {
            console.error('deletePerson failed', err);
        }
    }

    // ─────────────────────────────────────────────
    // Introduce
    function introducePrompt() {
        const name = prompt('Who would you like to introduce to Zoe?', '');
        if (!name) return;
        if (window.zoeChat && typeof window.zoeChat.send === 'function') {
            window.zoeChat.send(`Zoe, meet ${name}`);
        } else {
            // fallback: post via API
            fetch(`${API}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Zoe, meet ${name}` }),
            }).catch(() => {});
        }
    }

    function introduceFromDetail() {
        const person = state.people.find(p => p.id === state.detailId);
        if (!person) return;
        if (window.zoeChat && typeof window.zoeChat.send === 'function') {
            window.zoeChat.send(`Zoe, meet ${person.name}`);
        }
    }

    // ─────────────────────────────────────────────
    // 4-tab Detail Panel
    state.detailId = null;
    state.detailTab = 'timeline';

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.getAttribute('data-tab');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            state.detailTab = tab;
            loadDetailTab(tab);
        });
    });

    async function openDetail(personId) {
        state.detailId = personId;
        const p = state.people.find(x => x.id === personId);
        if (!p) return;

        // Header
        const av = document.getElementById('detailAvatar');
        av.style.background = avatarGradient(p.name);
        av.textContent = initials(p.name);
        document.getElementById('detailName').textContent = p.name || '';
        const tierSym = TIER_SYMBOLS[p._tier] || '○';
        document.getElementById('detailRel').textContent = [p.relationship, `${tierSym} ${p._context||'personal'}`].filter(Boolean).join(' · ');

        // Reset tabs
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(pan => pan.classList.remove('active'));
        document.querySelector('.tab-btn[data-tab="timeline"]').classList.add('active');
        document.getElementById('tab-timeline').classList.add('active');
        state.detailTab = 'timeline';

        document.getElementById('detailOverlay').classList.add('open');

        // Mark notifications read
        if (p.notification_count > 0) {
            fetch(`${API}/people/${personId}/mark-read`, { method: 'PUT' }).catch(() => {});
            p.notification_count = 0;
        }

        loadDetailTab('timeline');
    }

    function closeDetail() {
        document.getElementById('detailOverlay').classList.remove('open');
        state.detailId = null;
    }

    function editFromDetail() {
        closeDetail();
        openEditor(state.detailId);
    }

    async function loadDetailTab(tab) {
        const id = state.detailId;
        if (!id) return;
        if (tab === 'timeline') await loadTimeline(id);
        else if (tab === 'about') renderAbout(id);
        else if (tab === 'dates') await loadDatesGifts(id);
        else if (tab === 'together') await loadBucket(id);
    }

    async function loadTimeline(id) {
        const el = document.getElementById('timeline-content');
        try {
            const res = await fetch(`${API}/people/${id}/activities?limit=50`);
            const data = await res.json();
            const acts = data.activities || [];
            if (!acts.length) {
                el.innerHTML = '<p style="color:var(--text-mute);text-align:center;padding:40px 0">No activity yet.</p>';
                return;
            }
            el.innerHTML = acts.map(a => {
                const d = a.created_at ? new Date(a.created_at).toLocaleDateString(undefined, {month:'short',day:'numeric',year:'numeric'}) : '';
                return `<div class="activity-item">
                    <div class="activity-dot"></div>
                    <div>
                        <div class="activity-desc">${(a.description||'').replace(/</g,'&lt;')}</div>
                        <div class="activity-meta">${d}${a.source ? ' · ' + a.source : ''}</div>
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            el.innerHTML = '<p style="color:#FC8181;text-align:center;padding:20px">Failed to load</p>';
        }
    }

    async function logActivity() {
        const inp = document.getElementById('logActivityInput');
        const desc = inp.value.trim();
        if (!desc || !state.detailId) return;
        try {
            await fetch(`${API}/people/${state.detailId}/activities`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ activity_type: 'note', description: desc, source: 'manual' }),
            });
            inp.value = '';
            await loadTimeline(state.detailId);
            await loadPeople();
        } catch (e) { console.error(e); }
    }

    async function renderAbout(id) {
        const p = state.people.find(x => x.id === id);
        if (!p) return;
        const el = document.getElementById('about-content');
        const phone = p.phone ? `<a class="contact-btn" href="tel:${p.phone}">📞 ${p.phone}</a>` : '';
        const email = p.email ? `<a class="contact-btn" href="mailto:${p.email}">✉️ ${p.email}</a>` : '';
        const bday  = p.birthday ? `<div class="date-row"><span>Birthday</span><span>${p.birthday}</span></div>` : '';
        const hs = parseFloat(p.health_score||0.5);
        const tier = p._tier || normTier(p.circle||'circle');
        const hBar = `<div style="height:6px;border-radius:3px;background:var(--border);margin-top:4px">
            <div style="height:6px;border-radius:3px;width:${Math.round(hs*100)}%;background:${hs>=0.6?'#48BB78':hs>=0.35?'#ECC94B':'#FC8181'}"></div></div>`;

        // Load relationships
        let relHtml = '';
        try {
            const rdata = await fetch(`${API}/people/${id}/relationships`).then(r=>r.json());
            const rels = rdata.relationships || {};
            const all = Object.entries(rels).flatMap(([g, arr]) => arr);
            if (all.length) {
                relHtml = `<div class="section-title">Family &amp; Connections</div>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px">
                    ${all.map(r => {
                        const sym = TIER_SYMBOLS[r.circle] || '○';
                        const stubBadge = r.is_partial ? ' <small style="opacity:0.5">(stub)</small>' : '';
                        return `<span style="display:inline-flex;align-items:center;gap:6px;background:var(--card-soft);border:1px solid var(--border);border-radius:12px;padding:6px 12px;font-size:13px;cursor:pointer"
                                    onclick="openDetail('${r.person_id}')">
                                    <span style="color:var(--primary)">${sym}</span>
                                    <b>${r.name.replace(/</g,'&lt;')}${stubBadge}</b>
                                    <span style="color:var(--text-mute)">${r.label}</span>
                                </span>`;
                    }).join('')}
                    </div>
                    <button class="contact-btn" style="margin-top:4px" onclick="openAddRelSheet('${id}')">+ Add connection</button>`;
            } else {
                relHtml = `<div class="section-title">Family &amp; Connections</div>
                    <button class="contact-btn" onclick="openAddRelSheet('${id}')">+ Add connection</button>`;
            }
        } catch(e) {
            relHtml = '';
        }

        const howMet = p.how_we_met
            ? `<div class="section-title">How We Met</div><p style="font-size:14px;color:var(--text)">${p.how_we_met.replace(/</g,'&lt;')}</p>` : '';

        el.innerHTML = `
            ${(phone||email) ? `<div class="contact-actions">${phone}${email}</div>` : ''}
            ${bday}
            ${howMet}
            ${relHtml}
            <div class="section-title">Relationship Health</div>
            <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-mute)">
                <span>Score: ${Math.round(hs*100)}%</span>
                <span>${TIER_SYMBOLS[tier]||'○'} ${p._context||'personal'}</span>
            </div>${hBar}
            ${p.notes ? `<div class="section-title">Notes</div><p style="font-size:14px;color:var(--text)">${p.notes.replace(/</g,'&lt;')}</p>` : ''}
        `;
    }

    // ─────────────────────────────────────────────
    // Add Relationship sheet (minimal)
    state.relTargetId = null;
    async function openAddRelSheet(personId) {
        state.relTargetId = personId;
        const p = state.people.find(x => x.id === personId);
        const name = p ? p.name : 'this person';

        let typeOpts = '';
        try {
            const td = await fetch(`${API}/people/relationship-types`).then(r=>r.json());
            for (const [group, arr] of Object.entries(td.types||{})) {
                typeOpts += `<optgroup label="${group}">`;
                for (const t of arr) {
                    typeOpts += `<option value="${t.key}">${t.label_a}</option>`;
                }
                typeOpts += `</optgroup>`;
            }
        } catch(e) { typeOpts = '<option value="friend">Friend</option>'; }

        const sheet = document.createElement('div');
        sheet.id = 'relSheet';
        sheet.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);z-index:9000;display:flex;align-items:flex-end;justify-content:center';
        sheet.innerHTML = `
            <div style="background:var(--card);width:100%;max-width:600px;border-radius:20px 20px 0 0;padding:20px;display:flex;flex-direction:column;gap:12px">
                <div style="font-size:18px;font-weight:700">Add connection for ${name.replace(/</g,'&lt;')}</div>
                <div class="field"><div class="field-label">Their name</div>
                    <input id="relOtherName" class="field-input" placeholder="Name or search existing contact" />
                </div>
                <div class="field"><div class="field-label">Relationship type</div>
                    <select id="relType" class="field-select">${typeOpts}</select>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <input type="checkbox" id="relCreatePartial" checked>
                    <label for="relCreatePartial" style="font-size:14px">Create stub if not found</label>
                </div>
                <div style="display:flex;gap:8px">
                    <button class="btn-ghost" style="flex:1" onclick="document.getElementById('relSheet').remove()">Cancel</button>
                    <button class="btn-primary" style="flex:2" onclick="saveRelationship()">Link</button>
                </div>
            </div>`;
        document.body.appendChild(sheet);
    }

    async function saveRelationship() {
        const personId = state.relTargetId;
        const otherName = document.getElementById('relOtherName')?.value?.trim();
        const relType = document.getElementById('relType')?.value;
        const createPartial = document.getElementById('relCreatePartial')?.checked ?? true;
        if (!otherName || !relType || !personId) return;
        try {
            const r = await fetch(`${API}/people/${personId}/relationships`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ other_person_name: otherName, rel_type: relType, create_partial: createPartial }),
            });
            if (!r.ok) {
                const err = await r.json();
                alert(err.detail || 'Failed');
                return;
            }
            document.getElementById('relSheet')?.remove();
            await loadPeople();
            renderAbout(personId);
        } catch(e) { console.error(e); }
    }

    async function loadDatesGifts(id) {
        const el = document.getElementById('dates-content');
        try {
            const [dr, gr] = await Promise.all([
                fetch(`${API}/people/${id}/important-dates`).then(r=>r.json()),
                fetch(`${API}/people/${id}/gift-ideas`).then(r=>r.json()),
            ]);
            const dates = dr.dates || [];
            const gifts = gr.gifts || [];
            let html = '';
            if (dates.length) {
                html += '<div class="section-title">Important Dates</div>';
                html += dates.map(d => `<div class="date-row">
                    <span>${(d.label||'').replace(/</g,'&lt;')}</span>
                    <span style="color:var(--text-mute)">${[d.month,d.day].filter(Boolean).join('/')}</span>
                </div>`).join('');
            }
            if (gifts.length) {
                html += '<div class="section-title">Gift Ideas</div>';
                html += gifts.map(g => {
                    const chip = { idea:'chip-idea', purchased:'chip-purchased', given:'chip-given' }[g.status] || 'chip-idea';
                    return `<div class="gift-row">
                        <span>${(g.description||'').replace(/</g,'&lt;')}</span>
                        <span class="gift-chip ${chip}">${g.status||'idea'}</span>
                    </div>`;
                }).join('');
            }
            if (!html) html = '<p style="color:var(--text-mute);text-align:center;padding:40px 0">No dates or gifts yet.</p>';
            el.innerHTML = html;
        } catch(e) {
            el.innerHTML = '<p style="color:#FC8181;text-align:center;padding:20px">Failed to load</p>';
        }
    }

    async function addGift() {
        const inp = document.getElementById('addGiftInput');
        const desc = inp.value.trim();
        if (!desc || !state.detailId) return;
        try {
            await fetch(`${API}/people/${state.detailId}/gift-ideas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: desc }),
            });
            inp.value = '';
            await loadDatesGifts(state.detailId);
        } catch(e) { console.error(e); }
    }

    async function loadBucket(id) {
        const el = document.getElementById('together-content');
        try {
            const data = await fetch(`${API}/people/${id}/bucket-list`).then(r=>r.json());
            const items = data.items || [];
            if (!items.length) {
                el.innerHTML = '<p style="color:var(--text-mute);text-align:center;padding:40px 0">Nothing yet. What would you like to do together?</p>';
                return;
            }
            el.innerHTML = items.map(it => `<div class="bucket-row">
                <span class="${it.done ? 'bucket-done' : ''}">${(it.description||'').replace(/</g,'&lt;')}</span>
                ${!it.done ? `<button onclick="markBucketDone('${it.id}')" style="background:none;border:none;cursor:pointer;font-size:18px">✓</button>` : '<span style="opacity:0.4;font-size:12px">done</span>'}
            </div>`).join('');
        } catch(e) {
            el.innerHTML = '<p style="color:#FC8181;text-align:center;padding:20px">Failed to load</p>';
        }
    }

    async function addBucketItem() {
        const inp = document.getElementById('addBucketInput');
        const desc = inp.value.trim();
        if (!desc || !state.detailId) return;
        try {
            await fetch(`${API}/people/${state.detailId}/bucket-list`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: desc }),
            });
            inp.value = '';
            await loadBucket(state.detailId);
        } catch(e) { console.error(e); }
    }

    async function markBucketDone(itemId) {
        if (!state.detailId) return;
        try {
            await fetch(`${API}/people/${state.detailId}/bucket-list/${itemId}/done`, { method: 'PUT' });
            await loadBucket(state.detailId);
        } catch(e) { console.error(e); }
    }

    // ─────────────────────────────────────────────
    // WebSocket: reload card on people:updated
    function initPeopleWS() {
        const wsUrl = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + '/ws';
        const ws = new WebSocket(wsUrl);
        ws.onmessage = async (evt) => {
            try {
                const msg = JSON.parse(evt.data);
                const type = msg.type || msg.event;
                if (['people:updated', 'people:created', 'people:deleted'].includes(type)) {
                    await loadPeople();
                    // If detail panel is open for this person, refresh its current tab
                    const pid = (msg.data||msg).person_id || (msg.data||msg).id;
                    if (pid && state.detailId === pid && document.getElementById('detailOverlay').classList.contains('open')) {
                        loadDetailTab(state.detailTab);
                    }
                }
            } catch(e) {}
        };
        ws.onclose = () => setTimeout(initPeopleWS, 5000);
    }
    try { initPeopleWS(); } catch(e) {}

    // Check URL params for intro flow (open detail panel after load)
    (function() {
        const p = new URLSearchParams(location.search);
        const _introPid = p.get('person');
        if (p.get('intro') === '1' && _introPid) {
            window.addEventListener('people-loaded', function handler() {
                window.removeEventListener('people-loaded', handler);
                setTimeout(() => openDetail(_introPid), 100);
            });
        }
    })();

    // Boot
    loadPeople();
    </script>
</body>
</html>
