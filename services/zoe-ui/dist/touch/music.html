<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- TOUCH: kiosk bypass + auto-theme (must run before anything paints) -->
    <script>
    (function(){
        if (localStorage.getItem('zoe_kiosk') === '1') return;
        var p = new URLSearchParams(location.search);
        if (p.get('kiosk') === '1') localStorage.setItem('zoe_kiosk', '1');
    })();
    (function(){
        // Auto theme: light 7am–7pm, dark otherwise; manual override via zoe_theme.
        var s = localStorage.getItem('zoe_theme') || 'auto';
        var h = new Date().getHours();
        var dark = s === 'dark' || (s === 'auto' && (h < 7 || h >= 19));
        if (dark) document.documentElement.classList.add('dark-mode');
    })();
    window.prompt = function(m, d){ return d || ''; };
    window.alert = function(){};
    window.confirm = function(){ return true; };
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0b0f1a">
    <title>Zoe — Music</title>
    <style>
    /* ── ds1 tokens (self-contained; palette matches touch/css/skybridge-ds.css).
       Dark-first; the .dark-mode class (set above for night hours) keeps dark,
       otherwise daytime falls to the light set. Accent alphas use color-mix on
       the hex tokens (ds1 rule: no rgba-on-var). ──────────────────────────── */
    :root {
        --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        --accent-mint:   #5be3b0;
        --accent-cyan:   #37c0e6;
        --accent-blue:   #6aa6ff;
        --accent-violet: #9b8cff;
        --accent-amber:  #f5b13c;
        --accent-red:    #ff6b6b;
        --r-sm: 12px; --r-md: 20px; --r-lg: 28px; --r-pill: 999px;
        --s2: 8px; --s3: 12px; --s4: 16px; --s5: 20px; --s6: 24px; --s8: 32px;
        --ease: cubic-bezier(0.2, 0, 0, 1);
        /* Light surface set (daytime default). */
        --bg-0: #eef2f8;
        --bg-1: #f7f9fc;
        --ink-0: #16324d;
        --ink-1: #3a5e80;
        --ink-2: #6a86a2;
        --card: rgba(255,255,255,0.78);
        --card-2: rgba(255,255,255,0.92);
        --border: rgba(20,50,80,0.12);
        --border-strong: rgba(20,50,80,0.2);
        --shadow: 0 22px 50px -22px rgba(40,70,110,0.35);
        --scrim: rgba(255,255,255,0.6);
    }
    html.dark-mode {
        --bg-0: #0b0f1a;
        --bg-1: #131a2b;
        --ink-0: #ffffff;
        --ink-1: rgba(255,255,255,0.7);
        --ink-2: rgba(255,255,255,0.44);
        --card: rgba(255,255,255,0.055);
        --card-2: rgba(255,255,255,0.09);
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.18);
        --shadow: 0 26px 60px -20px rgba(0,0,0,0.6);
        --scrim: rgba(10,13,22,0.55);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
        margin: 0; width: 100%; min-height: 100%;
        font-family: var(--font); color: var(--ink-0);
        background:
            radial-gradient(120% 90% at 8% -8%, color-mix(in srgb, var(--accent-violet) 22%, transparent), transparent 46%),
            radial-gradient(120% 90% at 100% 0%, color-mix(in srgb, var(--accent-cyan) 18%, transparent), transparent 42%),
            linear-gradient(160deg, var(--bg-0), var(--bg-1));
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        touch-action: manipulation;
    }
    body { display: flex; flex-direction: column; min-height: 100dvh; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* ── Top bar ─────────────────────────────────────────────────────────── */
    .topbar {
        position: sticky; top: 0; z-index: 20;
        display: flex; align-items: center; gap: var(--s4);
        padding: var(--s4) var(--s6);
        background: color-mix(in srgb, var(--bg-0) 82%, transparent);
        backdrop-filter: blur(18px) saturate(1.3); -webkit-backdrop-filter: blur(18px) saturate(1.3);
        border-bottom: 1px solid var(--border);
    }
    .icon-btn {
        display: inline-flex; align-items: center; justify-content: center;
        min-width: 48px; min-height: 48px; border-radius: var(--r-pill);
        background: var(--card); border: 1px solid var(--border);
        transition: transform var(--ease) .18s, background var(--ease) .18s;
    }
    .icon-btn:active { transform: scale(.92); }
    .icon-btn svg { width: 22px; height: 22px; stroke: var(--ink-0); stroke-width: 2.2; fill: none; }
    .title { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; margin-right: auto; }
    .spk {
        display: inline-flex; align-items: center; gap: 10px;
        min-height: 48px; padding: 0 var(--s5); border-radius: var(--r-pill);
        background: var(--card); border: 1px solid var(--border-strong);
        font-size: 16px; font-weight: 500; max-width: 320px;
        transition: transform var(--ease) .18s;
    }
    .spk:active { transform: scale(.97); }
    .spk .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent-mint); flex: none;
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent-mint) 24%, transparent); }
    .spk .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .spk svg { width: 16px; height: 16px; stroke: var(--ink-2); stroke-width: 2.4; fill: none; flex: none; }

    /* ── Scrollable body ─────────────────────────────────────────────────── */
    .scroll { flex: 1; overflow-y: auto; padding: var(--s6); padding-bottom: 140px; }
    @media (min-width: 900px) { .scroll { padding: var(--s6) var(--s8); } }

    /* Sources row */
    .sources { display: flex; flex-wrap: wrap; align-items: center; gap: var(--s3); margin-bottom: var(--s6); }
    .sources .lbl { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
        color: var(--ink-2); margin-right: 4px; }
    .src {
        display: inline-flex; align-items: center; gap: 8px;
        min-height: 40px; padding: 0 14px; border-radius: var(--r-pill);
        font-size: 15px; font-weight: 500; border: 1px solid var(--border);
        background: var(--card);
    }
    .src.on { border-color: color-mix(in srgb, var(--accent-mint) 55%, transparent);
        background: color-mix(in srgb, var(--accent-mint) 14%, var(--card)); color: var(--ink-0); }
    .src.off { opacity: .5; }
    .src .ico { font-size: 16px; }
    .src .chk { width: 18px; height: 18px; }
    .src.on .chk { stroke: var(--accent-mint); stroke-width: 3; fill: none; }

    /* Search field */
    .searchwrap { position: relative; margin-bottom: var(--s5); }
    .searchwrap svg.mag { position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
        width: 24px; height: 24px; stroke: var(--ink-2); stroke-width: 2.2; fill: none; pointer-events: none; }
    #q {
        width: 100%; height: 68px; border-radius: var(--r-lg);
        padding: 0 60px 0 60px; font-size: 21px; color: var(--ink-0);
        background: var(--card-2); border: 1px solid var(--border-strong);
        outline: none; transition: border-color var(--ease) .2s, box-shadow var(--ease) .2s;
    }
    #q::placeholder { color: var(--ink-2); }
    #q::-webkit-search-cancel-button, #q::-webkit-search-decoration { -webkit-appearance: none; appearance: none; }
    #q:focus { border-color: color-mix(in srgb, var(--accent-cyan) 60%, transparent);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent-cyan) 18%, transparent); }
    .clearbtn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
        min-width: 44px; min-height: 44px; border-radius: var(--r-pill); display: none;
        align-items: center; justify-content: center; }
    .clearbtn svg { width: 20px; height: 20px; stroke: var(--ink-1); stroke-width: 2.6; fill: none; }
    .clearbtn.show { display: inline-flex; }

    /* Type filter chips */
    .filters { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; margin-bottom: var(--s6);
        scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .fchip {
        flex: none; min-height: 44px; padding: 0 18px; border-radius: var(--r-pill);
        font-size: 15px; font-weight: 600; white-space: nowrap;
        background: var(--card); border: 1px solid var(--border); color: var(--ink-1);
        transition: transform var(--ease) .15s;
    }
    .fchip:active { transform: scale(.95); }
    .fchip.active { background: var(--ink-0); color: var(--bg-0); border-color: var(--ink-0); }
    html.dark-mode .fchip.active { background: #fff; color: #0b0f1a; }

    /* Result sections */
    .section { margin-bottom: var(--s8); }
    .section h2 { font-size: 15px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
        color: var(--ink-2); margin: 0 0 var(--s4); }
    .grid { display: grid; gap: var(--s4);
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .rowlist { display: grid; gap: 10px; }

    /* Card tile (albums/artists/playlists/radio) */
    .tile {
        display: flex; flex-direction: column;
        text-align: left; border-radius: var(--r-md); padding: 10px; width: 100%;
        background: var(--card); border: 1px solid var(--border);
        transition: transform var(--ease) .16s, background var(--ease) .16s;
    }
    .tile:active { transform: scale(.96); background: var(--card-2); }
    .tile .art { display: block; position: relative; width: 100%; aspect-ratio: 1; border-radius: var(--r-sm);
        overflow: hidden; margin-bottom: 10px;
        background: linear-gradient(150deg, color-mix(in srgb, var(--accent-violet) 40%, var(--bg-1)),
            color-mix(in srgb, var(--accent-cyan) 40%, var(--bg-1))); }
    .tile.artist .art { border-radius: var(--r-pill); }
    .tile .art img { width: 100%; height: 100%; object-fit: cover; }
    .tile .art .ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-size: 34px; opacity: .8; }
    .tile .art .play { position: absolute; right: 8px; bottom: 8px; width: 40px; height: 40px;
        border-radius: 50%; background: var(--accent-mint); display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 20px -6px color-mix(in srgb, var(--accent-mint) 70%, transparent);
        opacity: 0; transform: translateY(6px); transition: all var(--ease) .18s; }
    .tile:active .play, .tile:focus-within .play { opacity: 1; transform: translateY(0); }
    .tile .play svg { width: 18px; height: 18px; fill: #05261b; }
    .tile .nm { font-size: 15px; font-weight: 600; line-height: 1.25; color: var(--ink-0);
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tile .sub { display: block; font-size: 13px; color: var(--ink-2); margin-top: 3px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Track row (songs) */
    .track {
        display: flex; align-items: center; gap: var(--s4);
        min-height: 64px; padding: 8px 12px; border-radius: var(--r-sm);
        background: var(--card); border: 1px solid var(--border); text-align: left;
        transition: transform var(--ease) .14s, background var(--ease) .14s;
    }
    .track:active { transform: scale(.985); background: var(--card-2); }
    .track .art { width: 52px; height: 52px; border-radius: 10px; overflow: hidden; flex: none;
        background: linear-gradient(150deg, color-mix(in srgb, var(--accent-blue) 45%, var(--bg-1)),
            color-mix(in srgb, var(--accent-violet) 45%, var(--bg-1)));
        display: flex; align-items: center; justify-content: center; }
    .track .art img { width: 100%; height: 100%; object-fit: cover; }
    .track .art .ph { font-size: 22px; opacity: .85; }
    .track .meta { display: flex; flex-direction: column; justify-content: center; gap: 2px; min-width: 0; flex: 1; }
    .track .nm { display: block; font-size: 16px; font-weight: 600; color: var(--ink-0);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track .sub { display: block; font-size: 14px; color: var(--ink-2);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track .go { width: 44px; height: 44px; border-radius: 50%; flex: none;
        display: flex; align-items: center; justify-content: center; background: var(--card-2);
        border: 1px solid var(--border); }
    .track .go svg { width: 18px; height: 18px; fill: var(--accent-mint); }

    /* States */
    .state { text-align: center; padding: 64px 20px; color: var(--ink-2); }
    .state .big { font-size: 46px; margin-bottom: 14px; }
    .state h3 { font-size: 20px; color: var(--ink-1); margin: 0 0 8px; font-weight: 600; }
    .state p { font-size: 15px; margin: 0 0 var(--s5); }
    .suggest { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .suggest button { min-height: 44px; padding: 0 18px; border-radius: var(--r-pill);
        background: var(--card); border: 1px solid var(--border-strong); font-size: 15px;
        font-weight: 500; color: var(--ink-0); }
    .spin { width: 34px; height: 34px; border-radius: 50%; margin: 60px auto;
        border: 3px solid var(--border); border-top-color: var(--accent-cyan); animation: sp 0.8s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* Now-playing footer */
    .np {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
        display: flex; align-items: center; gap: var(--s4);
        padding: 12px var(--s6); transform: translateY(120%);
        transition: transform var(--ease) .34s;
        background: color-mix(in srgb, var(--bg-1) 90%, transparent);
        backdrop-filter: blur(22px) saturate(1.4); -webkit-backdrop-filter: blur(22px) saturate(1.4);
        border-top: 1px solid var(--border-strong);
    }
    .np.show { transform: translateY(0); }
    .np .art { width: 52px; height: 52px; border-radius: 10px; overflow: hidden; flex: none;
        background: var(--card-2); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .np .art img { width: 100%; height: 100%; object-fit: cover; }
    .np .meta { min-width: 0; flex: 1; }
    .np .nm { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np .sub { font-size: 13px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np .ctrl { width: 52px; height: 52px; border-radius: 50%; flex: none; display: flex;
        align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); }
    .np .ctrl svg { width: 22px; height: 22px; fill: var(--ink-0); }
    .np .ctrl.primary { background: var(--accent-mint); border-color: transparent; }
    .np .ctrl.primary svg { fill: #05261b; }

    /* Speaker picker sheet */
    .sheet-back { position: fixed; inset: 0; z-index: 50; background: var(--scrim);
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        opacity: 0; pointer-events: none; transition: opacity var(--ease) .24s; }
    .sheet-back.show { opacity: 1; pointer-events: auto; }
    .sheet {
        position: fixed; z-index: 51; left: 50%; top: 50%; transform: translate(-50%, -46%) scale(.97);
        width: min(560px, 92vw); max-height: 78vh; overflow-y: auto;
        background: var(--bg-1); border: 1px solid var(--border-strong); border-radius: var(--r-lg);
        box-shadow: var(--shadow); padding: var(--s6);
        opacity: 0; pointer-events: none; transition: opacity var(--ease) .24s, transform var(--ease) .24s; }
    .sheet.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
    .sheet h3 { font-size: 20px; margin: 0 0 var(--s5); font-weight: 600; }
    .spk-opt {
        display: flex; align-items: center; gap: var(--s4); width: 100%;
        min-height: 60px; padding: 10px 14px; border-radius: var(--r-md); text-align: left;
        border: 1px solid var(--border); background: var(--card); margin-bottom: 10px; }
    .spk-opt.sel { border-color: color-mix(in srgb, var(--accent-mint) 60%, transparent);
        background: color-mix(in srgb, var(--accent-mint) 12%, var(--card)); }
    .spk-opt .ic { width: 40px; height: 40px; border-radius: 12px; flex: none; display: flex;
        align-items: center; justify-content: center; background: var(--card-2); }
    .spk-opt .ic svg { width: 22px; height: 22px; stroke: var(--ink-1); stroke-width: 2; fill: none; }
    .spk-opt .info { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
    .spk-opt .info .n { display: block; font-size: 17px; font-weight: 600;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .spk-opt .info .s { display: block; font-size: 13px; color: var(--ink-2); text-transform: capitalize; }
    .spk-opt .tick { width: 24px; height: 24px; opacity: 0; }
    .spk-opt.sel .tick { opacity: 1; stroke: var(--accent-mint); stroke-width: 3; fill: none; }

    /* Toast */
    .toast { position: fixed; left: 50%; bottom: 108px; transform: translateX(-50%) translateY(20px);
        z-index: 60; background: var(--ink-0); color: var(--bg-0);
        padding: 14px 22px; border-radius: var(--r-pill); font-size: 16px; font-weight: 600;
        box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: all var(--ease) .28s;
        max-width: 88vw; }
    html.dark-mode .toast { background: #fff; color: #0b0f1a; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="topbar">
        <button class="icon-btn" id="back" aria-label="Back">
            <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="title">Music</div>
        <button class="spk" id="spkBtn" aria-label="Choose speaker">
            <span class="dot"></span>
            <span class="nm" id="spkName">Speaker</span>
            <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>
    </div>

    <div class="scroll">
        <div class="sources" id="sources" aria-label="Connected music sources"></div>

        <div class="searchwrap">
            <svg class="mag" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input id="q" type="search" enterkeyhint="search" autocomplete="off" autocapitalize="none"
                   spellcheck="false" placeholder="Search songs, artists, albums…">
            <button class="clearbtn" id="clear" aria-label="Clear search">
                <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="filters" id="filters"></div>

        <div id="results"></div>
    </div>

    <div class="np" id="np" aria-live="polite">
        <div class="art" id="npArt">🎵</div>
        <div class="meta">
            <div class="nm" id="npTitle">Nothing playing</div>
            <div class="sub" id="npSub"></div>
        </div>
        <button class="ctrl primary" id="npPlay" aria-label="Play/Pause">
            <svg viewBox="0 0 24 24" id="npPlayIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl" id="npStop" aria-label="Stop">
            <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
    </div>

    <div class="sheet-back" id="sheetBack"></div>
    <div class="sheet" id="sheet" role="dialog" aria-label="Choose a speaker">
        <h3>Play on…</h3>
        <div id="spkList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function(){
        'use strict';

        // ── tiny helpers ───────────────────────────────────────────────────
        var $ = function(id){ return document.getElementById(id); };
        function esc(s){ var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
        function safeArt(u){
            u = String(u || '');
            return /^https?:\/\/[^"'()\\\s<>]+$/i.test(u) ? u : '';
        }
        async function api(path, opts){
            try {
                var r = await fetch(path, Object.assign({ credentials: 'same-origin' }, opts || {}));
                if (!r.ok) return null;
                return await r.json();
            } catch (e) { return null; }
        }
        var PLAY_SVG = '<path d="M8 5v14l11-7z"/>';
        var PAUSE_SVG = '<path d="M7 5h4v14H7zM13 5h4v14h-4z"/>';
        function playGlyph(){ return '<svg viewBox="0 0 24 24">' + PLAY_SVG + '</svg>'; }

        // ── state ──────────────────────────────────────────────────────────
        var state = { player_id: '', player_name: '', players: [], filter: 'all', q: '', reqSeq: 0 };

        var FILTERS = [
            { k: 'all',      label: 'All' },
            { k: 'track',    label: 'Songs' },
            { k: 'album',    label: 'Albums' },
            { k: 'artist',   label: 'Artists' },
            { k: 'playlist', label: 'Playlists' },
            { k: 'radio',    label: 'Radio' }
        ];
        var SECTIONS = [
            { key: 'tracks',    type: 'track',    label: 'Songs',     tile: false },
            { key: 'artists',   type: 'artist',   label: 'Artists',   tile: true  },
            { key: 'albums',    type: 'album',    label: 'Albums',    tile: true  },
            { key: 'playlists', type: 'playlist', label: 'Playlists', tile: true  },
            { key: 'radio',     type: 'radio',    label: 'Radio',     tile: true  }
        ];
        var PH = { track:'🎵', album:'💿', artist:'🎤', playlist:'📃', radio:'📻' };

        // ── connected sources ──────────────────────────────────────────────
        var SRC_ICON = { spotify:'🟢', ytmusic:'🔴', apple_music:'🎵', deezer:'🎧',
            tidal:'🌊', plex:'🎬', subsonic:'💽', radiobrowser:'📻' };
        async function loadSources(){
            var d = await api('/api/music/available-providers');
            var box = $('sources');
            if (!d || !d.providers){ box.innerHTML = ''; return; }
            var connected = d.providers.filter(function(p){ return p.connected; });
            var others = d.providers.filter(function(p){ return !p.connected; });
            var chk = '<svg class="chk" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>';
            var html = '<span class="lbl">Sources</span>';
            connected.forEach(function(p){
                html += '<span class="src on"><span class="ico">' + (SRC_ICON[p.id]||'🎵') + '</span>' +
                        esc(p.name) + chk + '</span>';
            });
            others.forEach(function(p){
                html += '<span class="src off"><span class="ico">' + (SRC_ICON[p.id]||'🎵') + '</span>' + esc(p.name) + '</span>';
            });
            box.innerHTML = html;
        }

        // ── speakers ───────────────────────────────────────────────────────
        function playerRoom(p){ return p.display_name || p.name || 'Speaker'; }
        function isAvailable(p){ return p && p.available !== false; }
        async function loadPlayers(){
            var d = await api('/api/music/players');
            state.players = (d && d.players ? d.players : []).filter(isAvailable);
            // Default target: whatever is playing now, else first powered, else first.
            var np = await api('/api/music/now-playing');
            var active = np && np.now_playing && np.now_playing.player_id;
            var pick = null;
            if (active) pick = state.players.find(function(p){ return p.player_id === active; });
            if (!pick) pick = state.players.find(function(p){ return p.powered; });
            if (!pick) pick = state.players[0];
            if (pick){ state.player_id = pick.player_id; state.player_name = playerRoom(pick); }
            $('spkName').textContent = state.player_name || 'No speaker';
        }
        function renderSpeakerSheet(){
            var list = $('spkList');
            if (!state.players.length){ list.innerHTML = '<p style="color:var(--ink-2)">No speakers found.</p>'; return; }
            var spk = '<svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="3"/><circle cx="12" cy="14" r="3"/></svg>';
            var tick = '<svg class="tick" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>';
            list.innerHTML = state.players.map(function(p){
                var sel = p.player_id === state.player_id ? ' sel' : '';
                var sub = (p.provider || '') + (p.powered ? '' : ' · off');
                return '<button class="spk-opt' + sel + '" data-pid="' + esc(p.player_id) + '">' +
                    '<span class="ic">' + spk + '</span>' +
                    '<span class="info"><span class="n">' + esc(playerRoom(p)) + '</span>' +
                    '<span class="s">' + esc(sub) + '</span></span>' + tick + '</button>';
            }).join('');
        }
        function openSheet(){ renderSpeakerSheet(); $('sheetBack').classList.add('show'); $('sheet').classList.add('show'); }
        function closeSheet(){ $('sheetBack').classList.remove('show'); $('sheet').classList.remove('show'); }

        // ── filters ────────────────────────────────────────────────────────
        function renderFilters(){
            $('filters').innerHTML = FILTERS.map(function(f){
                return '<button class="fchip' + (f.k === state.filter ? ' active' : '') +
                    '" data-f="' + f.k + '">' + f.label + '</button>';
            }).join('');
        }

        // ── toast ──────────────────────────────────────────────────────────
        var toastTimer = null;
        function toast(msg){
            var t = $('toast'); t.textContent = msg; t.classList.add('show');
            clearTimeout(toastTimer); toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2600);
        }

        // ── play a result ──────────────────────────────────────────────────
        async function play(uri, name){
            if (!uri) return;
            toast('Starting ' + (name || 'that') + '…');
            var r = await api('/api/music/play_media', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uri: uri, player_id: state.player_id })
            });
            if (r && r.ok){
                toast('Playing on ' + (r.player_name || state.player_name || 'speaker'));
                setTimeout(refreshNowPlaying, 1200);
            } else {
                toast("Couldn't play that");
            }
        }

        // ── render results ─────────────────────────────────────────────────
        function tileHtml(it){
            var art = safeArt(it.image);
            var cls = 'tile' + (it.media_type === 'artist' ? ' artist' : '');
            var inner = art ? '<img src="' + esc(art) + '" alt="" loading="lazy">'
                            : '<span class="ph">' + (PH[it.media_type] || '🎵') + '</span>';
            var playBtn = '<span class="play">' + playGlyph() + '</span>';
            return '<button class="' + cls + '" data-uri="' + esc(it.uri) + '" data-name="' + esc(it.name) + '">' +
                '<span class="art">' + inner + playBtn + '</span>' +
                '<span class="nm">' + esc(it.name) + '</span>' +
                (it.artist ? '<span class="sub">' + esc(it.artist) + '</span>' : '') +
                '</button>';
        }
        function trackHtml(it){
            var art = safeArt(it.image);
            var inner = art ? '<img src="' + esc(art) + '" alt="" loading="lazy">' : '<span class="ph">🎵</span>';
            var sub = [it.artist, it.album].filter(Boolean).join(' · ');
            return '<button class="track" data-uri="' + esc(it.uri) + '" data-name="' + esc(it.name) + '">' +
                '<span class="art">' + inner + '</span>' +
                '<span class="meta"><span class="nm">' + esc(it.name) + '</span>' +
                (sub ? '<span class="sub">' + esc(sub) + '</span>' : '') + '</span>' +
                '<span class="go">' + playGlyph() + '</span></button>';
        }
        function renderResults(data){
            var box = $('results');
            if (!data || !data.available){
                box.innerHTML = '<div class="state"><div class="big">🔍</div>' +
                    '<h3>No results for “' + esc(state.q) + '”</h3>' +
                    '<p>Try another song, artist, or station.</p></div>';
                return;
            }
            var out = '';
            SECTIONS.forEach(function(sec){
                if (state.filter !== 'all' && state.filter !== sec.type) return;
                var items = (data.results[sec.key] || []);
                if (!items.length) return;
                out += '<div class="section"><h2>' + sec.label + '</h2>';
                if (sec.tile){
                    out += '<div class="grid">' + items.map(tileHtml).join('') + '</div>';
                } else {
                    out += '<div class="rowlist">' + items.map(trackHtml).join('') + '</div>';
                }
                out += '</div>';
            });
            box.innerHTML = out || '<div class="state"><div class="big">🔍</div><h3>Nothing here</h3>' +
                '<p>Try the “All” filter or a different search.</p></div>';
        }
        function renderIdle(){
            var picks = ['Coldplay', 'Taylor Swift', 'lofi beats', 'jazz', '80s hits', 'the news'];
            $('results').innerHTML = '<div class="state"><div class="big">🎧</div>' +
                '<h3>Find something to play</h3>' +
                '<p>Search your connected music, then tap to play it on any speaker.</p>' +
                '<div class="suggest">' + picks.map(function(p){
                    return '<button data-suggest="' + esc(p) + '">' + esc(p) + '</button>';
                }).join('') + '</div></div>';
        }

        // ── search (debounced) ─────────────────────────────────────────────
        var searchTimer = null;
        function scheduleSearch(){
            clearTimeout(searchTimer);
            var q = state.q.trim();
            if (!q){ renderIdle(); return; }
            searchTimer = setTimeout(runSearch, 260);
        }
        async function runSearch(){
            var q = state.q.trim();
            if (!q){ renderIdle(); return; }
            var seq = ++state.reqSeq;
            $('results').innerHTML = '<div class="spin"></div>';
            var types = state.filter === 'all' ? '' : state.filter;
            var d = await api('/api/music/search?q=' + encodeURIComponent(q) +
                (types ? '&types=' + types : '') + '&limit=8');
            if (seq !== state.reqSeq) return; // a newer query already ran
            renderResults(d);
        }

        // ── now playing footer ─────────────────────────────────────────────
        async function refreshNowPlaying(){
            var d = await api('/api/music/now-playing' + (state.player_id ? '?player_id=' + encodeURIComponent(state.player_id) : ''));
            var np = d && d.now_playing;
            var bar = $('np');
            if (!np || !np.title || np.state === 'idle'){ bar.classList.remove('show'); return; }
            $('npTitle').textContent = np.title;
            $('npSub').textContent = [np.artist, np.player_name].filter(Boolean).join(' · ');
            var art = safeArt(np.image);
            $('npArt').innerHTML = art ? '<img src="' + esc(art) + '" alt="">' : '🎵';
            $('npPlayIcon').outerHTML = '<svg viewBox="0 0 24 24" id="npPlayIcon">' +
                (np.state === 'playing' ? PAUSE_SVG : PLAY_SVG) + '</svg>';
            bar.dataset.state = np.state;
            bar.classList.add('show');
        }
        async function transport(action){
            var r = await api('/api/music/control', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: action, player_id: state.player_id })
            });
            // A stale/unavailable speaker returns ok:false — tell the user instead
            // of silently swallowing the tap.
            if (!r || r.ok === false) toast("Couldn't reach " + (state.player_name || 'the speaker'));
            setTimeout(refreshNowPlaying, 600);
        }

        // ── events ─────────────────────────────────────────────────────────
        $('back').addEventListener('click', function(){
            if (document.referrer && /\/touch\//.test(document.referrer)) history.back();
            else location.href = '/touch/skybridge.html';
        });
        $('q').addEventListener('input', function(e){
            state.q = e.target.value;
            $('clear').classList.toggle('show', !!state.q);
            scheduleSearch();
        });
        $('clear').addEventListener('click', function(){
            state.q = ''; $('q').value = ''; $('clear').classList.remove('show'); $('q').focus(); renderIdle();
        });
        $('filters').addEventListener('click', function(e){
            var b = e.target.closest('.fchip'); if (!b) return;
            state.filter = b.dataset.f; renderFilters();
            if (state.q.trim()) runSearch();
        });
        $('results').addEventListener('click', function(e){
            var el = e.target.closest('[data-uri]');
            if (el){ play(el.dataset.uri, el.dataset.name); return; }
            var sg = e.target.closest('[data-suggest]');
            if (sg){ state.q = sg.dataset.suggest; $('q').value = state.q; $('clear').classList.add('show'); runSearch(); }
        });
        $('spkBtn').addEventListener('click', openSheet);
        $('sheetBack').addEventListener('click', closeSheet);
        $('spkList').addEventListener('click', function(e){
            var b = e.target.closest('.spk-opt'); if (!b) return;
            var pid = b.dataset.pid;
            var p = state.players.find(function(x){ return x.player_id === pid; });
            if (p){ state.player_id = p.player_id; state.player_name = playerRoom(p); $('spkName').textContent = state.player_name; }
            closeSheet(); refreshNowPlaying();
        });
        $('npPlay').addEventListener('click', function(){
            transport($('np').dataset.state === 'playing' ? 'pause' : 'resume');
        });
        $('npStop').addEventListener('click', function(){ transport('stop'); setTimeout(function(){ $('np').classList.remove('show'); }, 800); });

        // ── init ───────────────────────────────────────────────────────────
        renderFilters();
        renderIdle();
        loadSources();
        loadPlayers().then(refreshNowPlaying);
        setInterval(refreshNowPlaying, 15000);
    })();
    </script>
</body>
</html>
