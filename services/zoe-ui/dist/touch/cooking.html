<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- TOUCH: kiosk bypass -->
    <script>
    (function(){
        if(localStorage.getItem('zoe_kiosk')==='1') return;
        var p=new URLSearchParams(location.search);
        if(p.get('kiosk')==='1') localStorage.setItem('zoe_kiosk','1');
    })();
    </script>

    <meta name="theme-color" content="#fafbfc">
    <title>Zoe – Cooking</title>
    <script>
    (function(){var s=localStorage.getItem('zoe_theme')||'auto';var dark=s==='dark'||(s==='auto'&&(new Date().getHours()<7||new Date().getHours()>=19));if(dark){document.documentElement.classList.add('dark-mode');document.querySelector('meta[name=theme-color]').content='#060610';}})();
    </script>
        <!-- TOUCH: premium widget CSS system (same as desktop) -->
    <link rel="stylesheet" href="/css/widgets-premium.css">

    <style>
        /* Aliases for inline HTML built by openRecipe() */
        :root {
            --text-2: var(--text-secondary);
            --text-3: var(--text-muted);
        }

        body { overflow-y: auto; cursor: auto; }

        .cooking-page {
            padding-top: var(--nav-height);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .cooking-page input,
        .cooking-page textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        .split-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            padding-bottom: var(--space-md);
        }

        .timers-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--glass-border);
            overflow: hidden;
            min-height: 0;
        }

        .half-label {
            padding: var(--space-sm) var(--space-lg) var(--space-xs);
            font-size: var(--text-xs);
            font-weight: var(--weight-bold);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .add-timer-row {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: 0 var(--space-md) var(--space-sm);
            flex-shrink: 0;
        }

        .timer-name-input {
            flex: 1;
            min-height: var(--touch-target);
            padding: 0 var(--space-md);
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: var(--text-sm);
            outline: none;
            touch-action: manipulation;
            font-family: var(--font-family);
        }
        .timer-name-input::placeholder { color: var(--text-muted); }
        .timer-name-input:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 2px rgba(123, 97, 255, 0.2);
        }

        .minutes-picker {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: var(--space-xs) var(--space-sm);
        }

        .min-btn {
            width: 36px; height: 36px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--glass-bg-light);
            color: var(--text-primary);
            font-size: var(--text-xl);
            font-weight: var(--weight-light);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            transition: background var(--ease-fast), transform var(--ease-fast);
        }
        .min-btn:active {
            background: color-mix(in srgb, var(--primary-purple) 22%, var(--glass-bg-light));
            transform: scale(0.9);
        }

        .minutes-display {
            font-size: var(--text-xl);
            font-weight: var(--weight-semibold);
            min-width: 40px;
            text-align: center;
            color: var(--text-primary);
        }

        .start-btn {
            min-height: var(--touch-target);
            padding: 0 var(--space-lg);
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-md);
            color: var(--text-on-brand);
            font-size: var(--text-sm);
            font-weight: var(--weight-semibold);
            cursor: pointer;
            touch-action: manipulation;
            transition: opacity var(--ease-base), transform var(--ease-fast);
            white-space: nowrap;
            font-family: var(--font-family);
            box-shadow: var(--shadow-purple);
        }
        .start-btn:active { opacity: 0.85; transform: scale(0.97); }

        .timers-grid {
            display: flex;
            gap: var(--space-md);
            padding: var(--space-xs) var(--space-md) var(--space-md);
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            flex-shrink: 0;
        }
        .timers-grid::-webkit-scrollbar { display: none; }

        .timer-card {
            flex-shrink: 0;
            scroll-snap-align: start;
            width: 160px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-xs);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            position: relative;
            transition: border-color var(--ease-base);
            box-shadow: var(--shadow-small);
        }
        .timer-card.expired {
            border-color: color-mix(in srgb, #FF4D6A 55%, var(--glass-border));
            background: color-mix(in srgb, #FF4D6A 10%, var(--glass-bg));
            animation: flashCard 0.5s ease infinite alternate;
        }
        @keyframes flashCard {
            from { background: color-mix(in srgb, #FF4D6A 6%, var(--glass-bg)); }
            to   { background: color-mix(in srgb, #FF4D6A 18%, var(--glass-bg)); }
        }

        .timer-name {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            font-weight: var(--weight-medium);
            text-align: center;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;

        }

        .ring-wrap {
            position: relative;
            width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;

        .ring-svg {
            position: absolute;

        .timer-countdown {
            font-size: var(--text-xl);
            font-weight: var(--weight-bold);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
            color: var(--text-primary);

        .timer-done-text {
            font-size: var(--text-xl);
            font-weight: var(--weight-bold);
            color: color-mix(in srgb, #FF4D6A 85%, var(--text-primary));

        .timer-controls {

            gap: var(--space-xs);

        .recipes-half {

            padding: 0 var(--space-md);
            background: var(--input-bg);

        .recipe-search-input::placeholder { color: var(--text-muted); }

            border-color: var(--primary-teal);

        }

        .search-btn {

            padding: 0 var(--space-lg);

            font-size: var(--text-sm);

        .recipe-card {
            flex-shrink: 0;
            scroll-snap-align: start;

            background: var(--glass-bg);
            border: 1px solid var(--glass-border);

            gap: var(--space-sm);

        .recipe-section-title {

        .ingredients-list {

        }

        .ingredient-item {
            display: flex;

    </style>

<body>

<div class="cooking-page">

<div class="split-container">

    <div class="timers-half">
        <div class="half-label">⏱ Timers</div>

        <div class="add-timer-row">
            <input type="text" id="timerName" class="timer-name-input"
                   placeholder="Timer name…"
                   maxlength="24"
                   autocomplete="off" autocorrect="off" autocapitalize="words">

            <div class="minutes-picker">
                <button type="button" class="min-btn" onclick="changeMinutes(-1)" aria-label="Decrease minutes" touch-action="manipulation">−</button>
                <span class="minutes-display" id="timerMinutes">5</span>
                <button type="button" class="min-btn" onclick="changeMinutes(1)" aria-label="Increase minutes" touch-action="manipulation">+</button>
            </div>

            <button type="button" class="start-btn" onclick="startTimer()" aria-label="Start timer" touch-action="manipulation">Start</button>
        </div>

        <div class="timers-grid" id="timersGrid">
            <div class="no-timers" id="noTimers">No active timers</div>
        </div>
    </div>

    <div class="recipes-half">
        <div class="half-label">📖 Recipes</div>

        <div class="search-row">
            <input type="text" id="recipeSearch" class="recipe-search-input"
                   placeholder="Search recipes…"
                   autocomplete="off" autocorrect="off"
                   onkeydown="if(event.key==='Enter') searchRecipes()">
            <button type="button" class="search-btn" onclick="searchRecipes()" aria-label="Search" touch-action="manipulation">Search</button>
        </div>

        <div class="recipes-grid" id="recipesGrid">
            <div class="recipe-placeholder">
                <span class="emoji">🍽️</span>
                <span>Search for a recipe or ask Zoe</span>
            </div>
        </div>
    </div>

</div>

</div>

<div class="recipe-overlay" id="recipeOverlay" role="dialog" aria-modal="true" aria-label="Recipe detail">
    <div class="overlay-header">
        <span class="overlay-title" id="overlayTitle">Recipe</span>
        <button type="button" class="close-btn" onclick="closeRecipeOverlay()" aria-label="Close recipe" touch-action="manipulation">✕</button>
    </div>
    <div class="overlay-body" id="overlayBody"></div>
</div>

<script src="/js/websocket-sync.js"></script>
<script src="/js/touch-ui-executor.js"></script>
<script src="/js/orb-loader.js"></script>
<script src="/touch/js/gestures.js"></script>
<script src="/touch/js/touch-menu.js"></script>
<script>
(function () {
    'use strict';

    // ── Utilities ──────────────────────────────────────────────────
    function getUserId() {
        try {
            const s = localStorage.getItem('zoe_session');
            if (s) {
                const p = JSON.parse(s);
                return p.user_info?.user_id || p.user_id || 'default';
            }
        } catch (_) {}
        return 'default';
    }

    // ── Audio beep (Web Audio API – no microphone) ─────────────────
    function beep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const freqs = [880, 1046, 1318];
            freqs.forEach((f, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = f;
                gain.gain.setValueAtTime(0.4, ctx.currentTime + i * 0.22);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.22 + 0.3);
                osc.start(ctx.currentTime + i * 0.22);
                osc.stop(ctx.currentTime + i * 0.22 + 0.35);
            });
        } catch (e) {
            console.warn('[Cooking] Audio beep failed:', e);
        }
    }

    // ── Timer state ────────────────────────────────────────────────
    const STORAGE_KEY = 'zoe_cooking_timers';
    let timers = []; // { id, name, totalSecs, endTime, paused, pauseRemaining, expired }
    let timerRaf = null;

    function loadTimers() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) timers = JSON.parse(raw);
        } catch (_) { timers = []; }
        // Prune expired timers older than 2 minutes
        const now = Date.now();
        timers = timers.filter(t => !t.expired || (now - t.endTime) < 120000);
        saveTimers();
    }

    function saveTimers() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(timers));
        } catch (_) {}
    }

    function genId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }

    // ── Minutes picker ─────────────────────────────────────────────
    let minuteVal = 5;

    window.changeMinutes = function (delta) {
        minuteVal = Math.max(1, Math.min(99, minuteVal + delta));
        document.getElementById('timerMinutes').textContent = minuteVal;
    };

    // ── Start timer ────────────────────────────────────────────────
    window.startTimer = function () {
        const name = document.getElementById('timerName').value.trim() || 'Timer';
        const mins = minuteVal;
        const secs = mins * 60;

        const t = {
            id: genId(),
            name,
            totalSecs: secs,
            endTime: Date.now() + secs * 1000,
            paused: false,
            pauseRemaining: null,
            expired: false
        };
        timers.push(t);
        saveTimers();
        renderTimers();

        // Reset inputs
        document.getElementById('timerName').value = '';
        minuteVal = 5;
        document.getElementById('timerMinutes').textContent = '5';

        if (!timerRaf) tickTimers();
    };

    function pauseTimer(id) {
        const t = timers.find(x => x.id === id);
        if (!t || t.expired) return;
        if (t.paused) {
            // Resume
            t.endTime = Date.now() + t.pauseRemaining;
            t.paused = false;
            t.pauseRemaining = null;
            if (!timerRaf) tickTimers();
        } else {
            t.pauseRemaining = t.endTime - Date.now();
            t.paused = true;
        }
        saveTimers();
        renderTimers();
    }

    function cancelTimer(id) {
        timers = timers.filter(t => t.id !== id);
        saveTimers();
        renderTimers();
    }

    // ── Ring helpers ───────────────────────────────────────────────
    const RING_R = 34;
    const RING_C = RING_R * 2 * Math.PI;

    function ringOffset(pct) {
        return RING_C - pct * RING_C;
    }

    function timerColor(pct) {
        if (pct > 0.5) return '#4DDB9E';      // green
        if (pct > 0.25) return '#FFD700';     // yellow
        return '#FF4D6A';                      // red
    }

    // ── Render timer cards ─────────────────────────────────────────
    function renderTimers() {
        const grid = document.getElementById('timersGrid');
        const noTimers = document.getElementById('noTimers');

        const active = timers.filter(t => !t.expired);
        const expired = timers.filter(t => t.expired);
        const all = [...expired, ...active]; // expired first so they catch eye

        if (all.length === 0) {
            grid.innerHTML = '<div class="no-timers" id="noTimers">No active timers</div>';
            return;
        }
        if (noTimers) noTimers.style.display = 'none';

        all.forEach(t => {
            let card = document.getElementById('timer-' + t.id);
            if (!card) {
                card = document.createElement('div');
                card.id = 'timer-' + t.id;
                card.className = 'timer-card';
                grid.appendChild(card);
            }

            const remaining = t.paused
                ? t.pauseRemaining
                : Math.max(0, t.endTime - Date.now());

            const pct = Math.min(1, remaining / (t.totalSecs * 1000));
            const mm = Math.floor(remaining / 60000);
            const ss = Math.floor((remaining % 60000) / 1000);
            const timeStr = String(mm).padStart(2, '0') + ':' + String(ss).padStart(2, '0');
            const color = timerColor(pct);

            if (t.expired) {
                card.className = 'timer-card expired';
                card.innerHTML = `
                    <div class="timer-name">${escHtml(t.name)}</div>
                    <div class="ring-wrap">
                        <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
                            <circle class="ring-bg" cx="40" cy="40" r="${RING_R}"/>
                            <circle class="ring-fill" cx="40" cy="40" r="${RING_R}"
                                stroke="${color}"
                                stroke-dasharray="${RING_C}"
                                stroke-dashoffset="0"/>
                        </svg>
                        <span class="timer-done-text">DONE!</span>
                    </div>
                    <div class="timer-controls">
                        <button class="ctrl-btn cancel-btn" onclick="cancelTimer('${t.id}')" touch-action="manipulation" aria-label="Dismiss">✕</button>
                    </div>
                `;
            } else {
                card.className = 'timer-card';
                card.innerHTML = `
                    <div class="timer-name">${escHtml(t.name)}</div>
                    <div class="ring-wrap">
                        <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
                            <circle class="ring-bg" cx="40" cy="40" r="${RING_R}"/>
                            <circle class="ring-fill" cx="40" cy="40" r="${RING_R}"
                                stroke="${color}"
                                stroke-dasharray="${RING_C}"
                                stroke-dashoffset="${ringOffset(pct)}"/>
                        </svg>
                        <span class="timer-countdown">${timeStr}</span>
                    </div>
                    <div class="timer-controls">
                        <button class="ctrl-btn pause-btn" onclick="pauseTimer('${t.id}')" touch-action="manipulation" aria-label="${t.paused ? 'Resume' : 'Pause'}">
                            ${t.paused ? '▶' : '⏸'}
                        </button>
                        <button class="ctrl-btn cancel-btn" onclick="cancelTimer('${t.id}')" touch-action="manipulation" aria-label="Cancel">✕</button>
                    </div>
                `;
            }
        });

        // Remove stale cards
        const ids = new Set(all.map(t => 'timer-' + t.id));
        Array.from(grid.querySelectorAll('.timer-card')).forEach(el => {
            if (!ids.has(el.id)) el.remove();
        });
    }

    // ── Tick loop ──────────────────────────────────────────────────
    let beeped = new Set();

    function tickTimers() {
        const now = Date.now();
        let anyActive = false;

        timers.forEach(t => {
            if (t.expired || t.paused) return;
            const rem = t.endTime - now;
            if (rem <= 0 && !t.expired) {
                t.expired = true;
                t.endTime = now;
                if (!beeped.has(t.id)) {
                    beep();
                    beeped.add(t.id);
                }
            }
            if (!t.expired) anyActive = true;
        });

        saveTimers();
        renderTimers();

        if (anyActive) {
            timerRaf = requestAnimationFrame(tickTimers);
        } else {
            timerRaf = null;
        }
    }

    // ── Recipes ────────────────────────────────────────────────────
    let currentRecipes = [];

    window.searchRecipes = async function () {
        const q = document.getElementById('recipeSearch').value.trim();
        if (!q) return;

        const grid = document.getElementById('recipesGrid');
        grid.innerHTML = '<div class="recipe-placeholder"><span class="emoji">🔍</span><span>Searching…</span></div>';

        try {
            const res = await fetch(`/api/recipes?q=${encodeURIComponent(q)}`);
            if (!res.ok) throw new Error('no-api');
            const data = await res.json();
            const recipes = data.recipes || data.results || data || [];
            if (!Array.isArray(recipes) || recipes.length === 0) throw new Error('empty');
            currentRecipes = recipes;
            renderRecipeCards(recipes);
        } catch (err) {
            if (err.message === 'no-api' || err.message === 'empty') {
                grid.innerHTML = `
                    <div class="recipe-placeholder">
                        <span class="emoji">🤷</span>
                        <span>No recipe API connected — try asking Zoe for specific recipe steps</span>
                    </div>`;
            } else {
                grid.innerHTML = `
                    <div class="recipe-placeholder">
                        <span class="emoji">⚠️</span>
                        <span>Search failed. Check your connection.</span>
                    </div>`;
            }
        }
    };

    function renderRecipeCards(recipes) {
        const grid = document.getElementById('recipesGrid');
        grid.innerHTML = recipes.map((r, i) => `
            <div class="recipe-card" onclick="openRecipe(${i})" touch-action="manipulation" role="button" tabindex="0" aria-label="${escHtml(r.name || r.title)}">
                <div class="recipe-name">${escHtml(r.name || r.title || 'Recipe')}</div>
                <div class="recipe-desc">${escHtml((r.description || r.summary || '').slice(0, 100))}</div>
                <div class="recipe-meta">
                    ${r.time || r.readyInMinutes ? `<span>⏱ ${r.time || r.readyInMinutes + ' min'}</span>` : ''}
                    ${r.servings ? `<span>👤 ${r.servings}</span>` : ''}
                </div>
            </div>
        `).join('');
    }

    window.openRecipe = function (idx) {
        const r = currentRecipes[idx];
        if (!r) return;
        document.getElementById('overlayTitle').textContent = r.name || r.title || 'Recipe';

        const ingredients = r.ingredients || r.extendedIngredients || [];
        const steps = r.steps || r.instructions || (r.analyzedInstructions?.[0]?.steps) || [];

        let html = '';

        if (r.description || r.summary) {
            html += `<p style="color:var(--text-2);font-size:14px;line-height:1.5;margin-bottom:8px;">${escHtml(r.description || r.summary)}</p>`;
        }

        if (ingredients.length) {
            html += `<div class="recipe-section-title">Ingredients</div>
                     <div class="ingredients-list">
                       ${ingredients.map(ing => {
                           const text = typeof ing === 'string' ? ing
                               : ing.original || (ing.amount + ' ' + ing.unit + ' ' + ing.name) || ing.name || '';
                           return `<div class="ingredient-item">${escHtml(text)}</div>`;
                       }).join('')}
                     </div>`;
        }

        if (steps.length) {
            html += `<div class="recipe-section-title">Steps</div>
                     <div class="steps-list">
                       ${steps.map((s, i) => {
                           const text = typeof s === 'string' ? s : s.step || s.text || '';
                           return `<div class="step-item">
                               <div class="step-num">${i + 1}</div>
                               <div class="step-text">${escHtml(text)}</div>
                           </div>`;
                       }).join('')}
                     </div>`;
        }

        if (!ingredients.length && !steps.length) {
            html = '<p style="color:var(--text-3);font-size:14px;text-align:center;padding:40px 0;">No detailed info available.</p>';
        }

        document.getElementById('overlayBody').innerHTML = html;
        document.getElementById('overlayBody').scrollTop = 0;
        document.getElementById('recipeOverlay').classList.add('open');
    };

    window.closeRecipeOverlay = function () {
        document.getElementById('recipeOverlay').classList.remove('open');
    };

    // ── HTML escape ────────────────────────────────────────────────
    function escHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ── ZOE_OPEN_FORM ──────────────────────────────────────────────
    window.ZOE_OPEN_FORM = function (formType, prefill) {
        prefill = prefill || {};
        if (formType === 'new_timer') {
            document.getElementById('timerName').value = prefill.label || '';
            if (prefill.minutes) {
                minuteVal = parseInt(prefill.minutes, 10) || 5;
                document.getElementById('timerMinutes').textContent = minuteVal;
            }
            document.getElementById('timerName').focus();
            if (prefill.label && prefill.minutes) {
                setTimeout(() => startTimer(), 500);
            }
        }
        if (formType === 'recipe_search') {
            document.getElementById('recipeSearch').value = prefill.query || '';
            document.getElementById('recipeSearch').focus();
            if (prefill.query) {
                setTimeout(() => searchRecipes(), 500);
            }
        }
    };

    // ── Init ───────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
        const userId = getUserId();
        if (typeof ZoeWebSockets !== 'undefined') {
            ZoeWebSockets.init(userId);
        }

        loadTimers();
        renderTimers();

        // Start tick if any active timers
        const hasActive = timers.some(t => !t.expired && !t.paused);
        if (hasActive && !timerRaf) tickTimers();
    });

    // Also expose cancelTimer / pauseTimer globally (called from innerHTML onclick)
    window.pauseTimer = pauseTimer;
    window.cancelTimer = cancelTimer;
    window.changeMinutes = window.changeMinutes;

})();

TouchMenu.init({ page: 'cooking' });
</script>
</body>
</html>
