<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
(function(){ if(localStorage.getItem('zoe_kiosk')==='1') return; var p=new URLSearchParams(location.search); if(p.get('kiosk')==='1') localStorage.setItem('zoe_kiosk','1'); })();
(function(){ var s=localStorage.getItem('zoe_theme')||'auto'; var h=new Date().getHours(); var dark=s==='dark'||(s==='auto'&&(h<7||h>=19)); if(dark) document.documentElement.classList.add('dark-mode'); })();
window.prompt=function(m,d){return d||'';}; window.alert=function(){}; window.confirm=function(){return true;};
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fafbfc">
<title>Zoe — Recipes</title>
<link rel="stylesheet" href="/touch/css/touch-adapter.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  background:linear-gradient(135deg,#fafbfc 0%,#f1f3f6 100%);
  min-height:100vh; color:#1e293b; padding-top:64px;
}
html.dark-mode body{ background:linear-gradient(135deg,#060610 0%,#0f0f1a 100%); color:#f1f5f9; }

.page-wrap{ max-width:1080px; margin:0 auto; padding:16px 22px 120px; }
.page-header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; flex-wrap:wrap;}
.page-title{
  font-size:32px; font-weight:800; letter-spacing:-0.02em;
  background:linear-gradient(135deg,#F59E0B 0%,#EF4444 50%,#EC4899 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.header-actions{ display:flex; gap:10px; flex-wrap:wrap; }
.btn{
  padding:12px 18px; border-radius:14px; font-weight:700; font-size:15px;
  cursor:pointer; border:none; transition:all .2s;
  display:inline-flex; align-items:center; gap:8px;
}
.btn:active{ transform:scale(0.97); }
.btn.primary{
  background:linear-gradient(135deg,#F59E0B,#EF4444); color:#fff;
  box-shadow:0 4px 14px rgba(239,68,68,0.3);
}
.btn.secondary{
  background:rgba(255,255,255,0.9); color:#1e293b; border:1.5px solid rgba(15,23,42,0.1);
}
html.dark-mode .btn.secondary{ background:rgba(255,255,255,0.06); color:#f1f5f9; border-color:rgba(255,255,255,0.1); }

.search-row{
  display:flex; gap:10px; margin-bottom:18px; align-items:center;
}
.search-row input{
  flex:1; min-height:48px; padding:12px 18px; border-radius:16px;
  border:1.5px solid rgba(15,23,42,0.08); background:rgba(255,255,255,0.95);
  font-size:15px; color:#1e293b;
}
html.dark-mode .search-row input{ background:rgba(255,255,255,0.04); color:#f1f5f9; border-color:rgba(255,255,255,0.1); }

.recipes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
  gap:16px;
}
.recipe-card{
  position:relative; border-radius:20px; overflow:hidden;
  background:rgba(255,255,255,0.95); border:1px solid rgba(15,23,42,0.05);
  box-shadow:0 4px 16px rgba(15,23,42,0.05);
  cursor:pointer; transition:transform .2s, box-shadow .2s;
}
.recipe-card:hover{ transform:translateY(-3px); box-shadow:0 10px 32px rgba(239,68,68,0.18); }
.recipe-card:active{ transform:scale(0.98); }
html.dark-mode .recipe-card{ background:rgba(17,19,30,0.92); border-color:rgba(255,255,255,0.06); }

.recipe-img{
  width:100%; aspect-ratio:16/10; background:linear-gradient(135deg,#fde68a,#fca5a5);
  display:flex; align-items:center; justify-content:center; font-size:56px;
  position:relative; overflow:hidden;
}
.recipe-img img{ width:100%; height:100%; object-fit:cover; }
.recipe-img .srcbadge{
  position:absolute; top:10px; right:10px;
  padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700;
  background:rgba(0,0,0,0.55); color:#fff; text-transform:uppercase; letter-spacing:0.05em;
}
.recipe-body{ padding:14px 16px 16px; }
.recipe-name{ font-size:16px; font-weight:700; letter-spacing:-0.01em; margin-bottom:6px; line-height:1.25; }
.recipe-meta{ display:flex; gap:12px; flex-wrap:wrap; font-size:12.5px; color:#64748b; font-weight:600; }
html.dark-mode .recipe-meta{ color:rgba(255,255,255,0.6); }
.meta-chip{ display:inline-flex; align-items:center; gap:4px; }

.empty-state{ text-align:center; padding:60px 20px; color:#64748b; }
.empty-state .icon{ font-size:72px; opacity:0.4; margin-bottom:12px; }
.empty-state h3{ font-size:20px; font-weight:700; color:#1e293b; margin-bottom:6px; }
html.dark-mode .empty-state h3{ color:#f1f5f9; }
html.dark-mode .empty-state{ color:rgba(255,255,255,0.55); }

/* Detail overlay */
.overlay{
  position:fixed; inset:0; background:rgba(8,12,20,0.55);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  z-index:99990; display:none; align-items:flex-end; justify-content:center;
  animation:fadein .25s;
}
.overlay.active{ display:flex; }
@keyframes fadein{ from{opacity:0} to{opacity:1} }
.sheet{
  width:min(960px,calc(100vw - 24px)); max-height:90vh;
  background:#fff; border-radius:26px 26px 0 0;
  overflow:hidden; display:flex; flex-direction:column;
  box-shadow:0 -12px 60px rgba(15,23,42,0.22);
  animation:slideup .35s cubic-bezier(.2,.8,.2,1);
}
@keyframes slideup{ from{transform:translateY(100%)} to{transform:translateY(0)} }
html.dark-mode .sheet{ background:#14141e; color:#f1f5f9; }
.sheet-grip{ width:48px; height:5px; background:rgba(15,23,42,0.15); border-radius:999px; margin:12px auto 0; }
html.dark-mode .sheet-grip{ background:rgba(255,255,255,0.15); }

.sheet-header{ display:flex; align-items:center; padding:14px 22px 6px; gap:12px; }
.sheet-header h2{ flex:1; font-size:22px; font-weight:800; letter-spacing:-0.01em; }
.sheet-close{
  width:40px;height:40px;border:none;border-radius:50%;background:rgba(15,23,42,0.06);color:#1e293b;
  font-size:22px;cursor:pointer;line-height:1;
}
html.dark-mode .sheet-close{ background:rgba(255,255,255,0.08); color:#f1f5f9; }

.sheet-body{ flex:1; overflow-y:auto; padding:6px 22px 20px; }

/* Recipe detail */
.detail-hero{
  display:grid; grid-template-columns:1.2fr 1fr; gap:20px; margin-bottom:18px;
}
@media(max-width:720px){ .detail-hero{ grid-template-columns:1fr; } }
.detail-photo{
  aspect-ratio:16/10; border-radius:20px; overflow:hidden;
  background:linear-gradient(135deg,#fde68a,#fca5a5);
  display:flex;align-items:center;justify-content:center; font-size:72px;
}
.detail-photo img{ width:100%; height:100%; object-fit:cover; }
.detail-info h3{ font-size:26px; font-weight:800; letter-spacing:-0.02em; margin-bottom:8px; line-height:1.2; }
.detail-meta{
  display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px;
}
.detail-meta .chip{
  background:rgba(239,68,68,0.1); color:#ef4444;
  padding:7px 14px; border-radius:999px; font-size:13px; font-weight:700;
  display:inline-flex; align-items:center; gap:6px;
}
html.dark-mode .detail-meta .chip{ background:rgba(239,68,68,0.18); color:#fca5a5; }
.detail-desc{ font-size:14.5px; color:#64748b; line-height:1.5; margin-bottom:12px; }
html.dark-mode .detail-desc{ color:rgba(255,255,255,0.65); }
.detail-actions{ display:flex; gap:10px; flex-wrap:wrap; }

.section-h{
  display:flex; align-items:center; gap:10px;
  font-size:17px; font-weight:800; margin:20px 0 12px;
}
.section-h .count{ font-size:13px; font-weight:600; color:#64748b; }
html.dark-mode .section-h .count{ color:rgba(255,255,255,0.55); }

.ingredients{ list-style:none; display:flex; flex-direction:column; gap:6px; }
.ingredients li{
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; border-radius:12px; background:rgba(15,23,42,0.03);
  font-size:15px; font-weight:500;
  transition:all .15s; cursor:pointer;
}
html.dark-mode .ingredients li{ background:rgba(255,255,255,0.03); }
.ingredients li::before{
  content:''; width:22px; height:22px; border-radius:50%;
  border:2px solid rgba(15,23,42,0.2); flex-shrink:0; transition:all .2s;
}
.ingredients li.checked::before{
  background:linear-gradient(135deg,#10b981,#14b8a6);
  border-color:transparent;
  background-image:linear-gradient(135deg,#10b981,#14b8a6);
}
.ingredients li.checked{ opacity:0.55; text-decoration:line-through; }

.steps{ display:flex; flex-direction:column; gap:10px; }
.step{
  display:flex; gap:14px; padding:14px 16px; border-radius:14px;
  background:rgba(15,23,42,0.03);
}
html.dark-mode .step{ background:rgba(255,255,255,0.03); }
.step .num{
  width:34px; height:34px; flex-shrink:0;
  border-radius:50%; background:linear-gradient(135deg,#F59E0B,#EF4444); color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:800; font-size:15px;
}
.step .txt{ font-size:15px; font-weight:500; line-height:1.5; }

/* ─── COOK MODE (full-screen, big instruction) ────────────── */
.cook-mode{
  position:fixed; inset:0; background:linear-gradient(160deg,#0a0e1a 0%, #1a1033 60%, #1a0e0a 100%);
  color:#fff; z-index:99992; display:none;
  flex-direction:column;
  padding:22px;
}
.cook-mode.active{ display:flex; }
.cook-top{
  display:flex; align-items:center; gap:12px;
  padding-bottom:18px; border-bottom:1px solid rgba(255,255,255,0.08);
}
.cook-top h3{ flex:1; font-size:20px; font-weight:800; letter-spacing:-0.01em; }
.cook-close{
  background:rgba(255,255,255,0.08); border:none; color:#fff;
  width:40px; height:40px; border-radius:50%; font-size:22px; cursor:pointer;
}
.cook-progress{
  height:6px; background:rgba(255,255,255,0.08); border-radius:999px; margin-top:18px;
  overflow:hidden;
}
.cook-progress-fill{
  height:100%; background:linear-gradient(90deg,#F59E0B,#EF4444,#EC4899);
  border-radius:999px; transition:width .35s ease;
}
.cook-stage{
  flex:1; display:flex; flex-direction:column; justify-content:center;
  padding:20px 4px; text-align:center; gap:22px;
}
.cook-step-num{
  font-size:16px; font-weight:800; letter-spacing:0.2em; text-transform:uppercase;
  color:#F59E0B; opacity:0.95;
}
.cook-step-title{
  font-size:clamp(32px, 6vw, 64px); font-weight:800; letter-spacing:-0.02em; line-height:1.1;
  max-width:880px; margin:0 auto;
}
.cook-actions{
  display:flex; justify-content:center; gap:12px; flex-wrap:wrap; padding-top:10px;
}
.cook-btn{
  padding:16px 26px; border-radius:16px; border:none;
  font-size:17px; font-weight:800; cursor:pointer; transition:transform .15s;
  min-width:140px;
}
.cook-btn:active{ transform:scale(0.96); }
.cook-btn.prev{ background:rgba(255,255,255,0.1); color:#fff; }
.cook-btn.next{ background:linear-gradient(135deg,#F59E0B,#EF4444); color:#fff; box-shadow:0 6px 20px rgba(239,68,68,0.35); }
.cook-btn.mic{ background:linear-gradient(135deg,#7B61FF,#5AE0E0); color:#fff; }
.cook-btn.mic.listening{ background:linear-gradient(135deg,#EF4444,#F87171); animation:micpulse 1.2s infinite; }
@keyframes micpulse{ 50%{ box-shadow:0 0 0 16px rgba(239,68,68,0); } 0%,100%{ box-shadow:0 0 0 0 rgba(239,68,68,0.4); } }

/* Add form */
.addform label{ display:block; font-size:13px; font-weight:700; color:#64748b; margin:12px 0 6px; }
.addform input, .addform textarea{
  width:100%; padding:12px 14px; border-radius:12px; border:1.5px solid rgba(15,23,42,0.08);
  background:#fff; color:#1e293b; font-size:15px; font-family:inherit;
}
html.dark-mode .addform input, html.dark-mode .addform textarea{ background:rgba(255,255,255,0.04); color:#f1f5f9; border-color:rgba(255,255,255,0.1); }
.addform textarea{ min-height:120px; resize:vertical; }

.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg,#10b981,#14b8a6); color:#fff; padding:14px 22px; border-radius:999px;
  font-weight:700; box-shadow:0 8px 24px rgba(20,184,166,0.35); z-index:99995;
  opacity:0; pointer-events:none; transition:opacity .3s, transform .3s;
}
.toast.show{ opacity:1; pointer-events:auto; transform:translate(-50%, -4px); }
</style>
</head>
<body>

<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">Recipes</div>
    <div class="header-actions">
      <button class="btn secondary" id="askZoeBtn">🎙 Ask Zoe</button>
      <button class="btn primary" id="addBtn">+ Add Recipe</button>
    </div>
  </div>

  <div class="search-row">
    <input type="search" id="searchInput" placeholder="Search recipes by name or tag…" />
  </div>

  <div class="recipes-grid" id="grid"></div>
  <div class="empty-state" id="empty" style="display:none">
    <div class="icon">🍳</div>
    <h3>No recipes yet</h3>
    <p>Add one manually, or ask Zoe to find one for you.</p>
  </div>
</div>

<!-- Recipe detail sheet -->
<div class="overlay" id="detailOverlay">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-header">
      <h2 id="detailTitle">Recipe</h2>
      <button class="sheet-close" id="detailClose">×</button>
    </div>
    <div class="sheet-body" id="detailBody"></div>
  </div>
</div>

<!-- Add recipe sheet -->
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-header">
      <h2>New Recipe</h2>
      <button class="sheet-close" id="addClose">×</button>
    </div>
    <div class="sheet-body">
      <div class="addform">
        <label>Name</label>
        <input type="text" id="f_name" placeholder="Pasta Carbonara"/>
        <label>Photo URL (optional)</label>
        <input type="url" id="f_photo" placeholder="https://…"/>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
          <div>
            <label>Time (min)</label>
            <input type="number" id="f_time" min="1" placeholder="30"/>
          </div>
          <div>
            <label>Servings</label>
            <input type="number" id="f_servings" min="1" placeholder="4"/>
          </div>
          <div>
            <label>Emoji</label>
            <input type="text" id="f_emoji" maxlength="4" placeholder="🍝"/>
          </div>
        </div>
        <label>Tags (comma-separated)</label>
        <input type="text" id="f_tags" placeholder="italian, quick, dinner"/>
        <label>Description (optional)</label>
        <input type="text" id="f_desc" placeholder="Creamy Roman pasta classic."/>
        <label>Ingredients (one per line)</label>
        <textarea id="f_ings" placeholder="200g spaghetti&#10;2 eggs&#10;100g pancetta"></textarea>
        <label>Steps (one per line)</label>
        <textarea id="f_steps" placeholder="Bring a pot of salted water to a boil.&#10;Cook pasta until al dente."></textarea>
        <div style="display:flex; gap:10px; margin-top:16px;">
          <button class="btn secondary" id="cancelAdd" style="flex:1">Cancel</button>
          <button class="btn primary" id="saveAdd" style="flex:1">Save Recipe</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Cook mode (full screen) -->
<div class="cook-mode" id="cookMode">
  <div class="cook-top">
    <h3 id="cookTitle">Recipe</h3>
    <button class="cook-close" id="cookClose">×</button>
  </div>
  <div class="cook-progress"><div class="cook-progress-fill" id="cookFill" style="width:0%"></div></div>
  <div class="cook-stage">
    <div class="cook-step-num" id="cookNum">Step 1 of —</div>
    <div class="cook-step-title" id="cookText">—</div>
    <div class="cook-actions">
      <button class="cook-btn prev"  id="cookPrev">← Back</button>
      <button class="cook-btn mic"   id="cookMic">🎙 Voice</button>
      <button class="cook-btn next"  id="cookNext">Next →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/touch/js/touch-menu.js"></script>
<script>
(function(){
  const STORE_KEY = 'zoe_recipes_v1';

  const SEEDS = [
    {
      id: 'seed1',
      name: 'Classic Pasta Carbonara',
      emoji: '🍝',
      time: 25, servings: 4,
      tags: ['italian','quick','dinner'],
      desc: 'Creamy Roman pasta with eggs, pancetta, and pecorino.',
      ingredients: ['200g spaghetti','2 large eggs','100g pancetta','50g pecorino, grated','Black pepper','Salt'],
      steps: [
        'Bring a large pot of salted water to a rolling boil.',
        'While the water heats, crisp the pancetta in a dry pan over medium heat.',
        'Whisk eggs with the grated pecorino and plenty of black pepper.',
        'Cook pasta until al dente, reserving a cup of pasta water.',
        'Off heat, toss hot pasta with the pancetta, then swiftly mix in the egg mixture, loosening with pasta water.',
        'Serve immediately with more pecorino and pepper.'
      ],
      source: 'Built-in'
    }
  ];

  function loadAll(){
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || 'null') || SEEDS.slice(); }
    catch(_) { return SEEDS.slice(); }
  }
  function saveAll(list){ localStorage.setItem(STORE_KEY, JSON.stringify(list)); }

  const state = {
    recipes: loadAll(),
    query: '',
    activeId: null,
    cookStep: 0,
    cookRecog: null
  };

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const search = document.getElementById('searchInput');
  const toastEl = document.getElementById('toast');

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'), 2000);
  }

  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function filtered(){
    const q = state.query.trim().toLowerCase();
    if (!q) return state.recipes.slice();
    return state.recipes.filter(r => {
      return r.name.toLowerCase().includes(q)
          || (r.tags||[]).some(t => t.toLowerCase().includes(q))
          || (r.desc||'').toLowerCase().includes(q);
    });
  }

  function cardHtml(r){
    const photo = r.photo
      ? `<img src="${esc(r.photo)}" alt=""/>`
      : (r.emoji || '🍳');
    const tags = (r.tags||[]).slice(0,3).map(t=>`#${esc(t)}`).join(' ');
    return `<div class="recipe-card" data-id="${esc(r.id)}">
      <div class="recipe-img">${photo}${r.source && r.source !== 'Built-in' ? `<div class="srcbadge">${esc(r.source)}</div>`:''}</div>
      <div class="recipe-body">
        <div class="recipe-name">${esc(r.name)}</div>
        <div class="recipe-meta">
          <span class="meta-chip">⏱ ${r.time||'—'} min</span>
          <span class="meta-chip">🍽 ${r.servings||'—'}</span>
          ${tags?`<span class="meta-chip" style="opacity:0.8">${tags}</span>`:''}
        </div>
      </div>
    </div>`;
  }

  function render(){
    const list = filtered();
    if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    grid.innerHTML = list.map(cardHtml).join('');
  }

  // ── Detail view ────────────────────────────────────────
  const detailOverlay = document.getElementById('detailOverlay');
  const detailBody    = document.getElementById('detailBody');
  const detailTitle   = document.getElementById('detailTitle');

  function openDetail(id){
    const r = state.recipes.find(x => x.id === id);
    if (!r) return;
    state.activeId = id;
    detailTitle.textContent = r.name;
    const photo = r.photo ? `<img src="${esc(r.photo)}" alt=""/>` : (r.emoji || '🍳');
    detailBody.innerHTML = `
      <div class="detail-hero">
        <div class="detail-photo">${photo}</div>
        <div class="detail-info">
          <h3>${esc(r.name)}</h3>
          <div class="detail-meta">
            <span class="chip">⏱ ${r.time||'—'} min</span>
            <span class="chip">🍽 ${r.servings||'—'} servings</span>
            ${(r.tags||[]).map(t=>`<span class="chip" style="background:rgba(15,23,42,0.06); color:inherit;">#${esc(t)}</span>`).join('')}
          </div>
          ${r.desc ? `<div class="detail-desc">${esc(r.desc)}</div>`:''}
          <div class="detail-actions">
            <button class="btn primary" id="startCookBtn">▶ Start Cook Mode</button>
            <button class="btn secondary" id="delRecipeBtn" style="color:#ef4444">🗑 Remove</button>
          </div>
        </div>
      </div>
      <div class="section-h">Ingredients <span class="count">${(r.ingredients||[]).length}</span></div>
      <ul class="ingredients" id="ingList">
        ${(r.ingredients||[]).map((i,idx)=>`<li data-idx="${idx}">${esc(i)}</li>`).join('')}
      </ul>
      <div class="section-h">Steps <span class="count">${(r.steps||[]).length}</span></div>
      <div class="steps">
        ${(r.steps||[]).map((s,idx)=>`<div class="step"><div class="num">${idx+1}</div><div class="txt">${esc(s)}</div></div>`).join('')}
      </div>
    `;
    detailOverlay.classList.add('active');

    document.getElementById('ingList').addEventListener('click', (e)=>{
      const li = e.target.closest('li'); if(li) li.classList.toggle('checked');
    });
    document.getElementById('startCookBtn').addEventListener('click', ()=> startCook(r));
    document.getElementById('delRecipeBtn').addEventListener('click', ()=>{
      if(!confirm('Remove this recipe?')) return;
      state.recipes = state.recipes.filter(x => x.id !== id);
      saveAll(state.recipes);
      closeDetail();
      render();
      toast('Recipe removed');
    });
  }
  function closeDetail(){ detailOverlay.classList.remove('active'); state.activeId = null; }
  document.getElementById('detailClose').addEventListener('click', closeDetail);
  detailOverlay.addEventListener('click', (e)=>{ if(e.target===detailOverlay) closeDetail(); });

  grid.addEventListener('click', (e)=>{
    const card = e.target.closest('.recipe-card');
    if (card) openDetail(card.dataset.id);
  });
  search.addEventListener('input', ()=>{ state.query = search.value; render(); });

  // ── Add form ───────────────────────────────────────────
  const addOverlay = document.getElementById('addOverlay');
  function openAdd(prefill){
    prefill = prefill || {};
    document.getElementById('f_name').value     = prefill.name || '';
    document.getElementById('f_photo').value    = prefill.photo || '';
    document.getElementById('f_time').value     = prefill.time || '';
    document.getElementById('f_servings').value = prefill.servings || '';
    document.getElementById('f_emoji').value    = prefill.emoji || '';
    document.getElementById('f_tags').value     = (prefill.tags||[]).join(', ');
    document.getElementById('f_desc').value     = prefill.desc || '';
    document.getElementById('f_ings').value     = (prefill.ingredients||[]).join('\n');
    document.getElementById('f_steps').value    = (prefill.steps||[]).join('\n');
    addOverlay.classList.add('active');
  }
  function closeAdd(){ addOverlay.classList.remove('active'); }
  document.getElementById('addBtn').addEventListener('click', ()=>openAdd());
  document.getElementById('addClose').addEventListener('click', closeAdd);
  document.getElementById('cancelAdd').addEventListener('click', closeAdd);
  addOverlay.addEventListener('click', (e)=>{ if(e.target===addOverlay) closeAdd(); });

  document.getElementById('saveAdd').addEventListener('click', ()=>{
    const name = document.getElementById('f_name').value.trim();
    if (!name) { toast('Give the recipe a name first'); return; }
    const rec = {
      id: 'r_' + Math.random().toString(36).slice(2,10),
      name,
      photo: document.getElementById('f_photo').value.trim(),
      emoji: document.getElementById('f_emoji').value.trim() || '🍳',
      time: parseInt(document.getElementById('f_time').value,10) || null,
      servings: parseInt(document.getElementById('f_servings').value,10) || null,
      tags: document.getElementById('f_tags').value.split(',').map(s=>s.trim()).filter(Boolean),
      desc: document.getElementById('f_desc').value.trim(),
      ingredients: document.getElementById('f_ings').value.split('\n').map(s=>s.trim()).filter(Boolean),
      steps: document.getElementById('f_steps').value.split('\n').map(s=>s.trim()).filter(Boolean),
      source: 'You',
      added: Date.now()
    };
    state.recipes.unshift(rec);
    saveAll(state.recipes);
    closeAdd();
    render();
    toast('Recipe saved');
  });

  // ── Ask Zoe (hand off to chat with recipe prompt) ──────
  document.getElementById('askZoeBtn').addEventListener('click', ()=>{
    const q = prompt('What recipe should Zoe find for you?', '') || '';
    if (!q) return;
    // Pass the query to the chat page with a special flag so OpenClaw can recognize the intent
    location.href = `/touch/chat.html?action=find_recipe&q=${encodeURIComponent(q)}`;
  });

  // ── URL-driven recipe import from OpenClaw ─────────────
  // Supported:
  //   ?action=import_recipe&data=<base64-encoded JSON>
  //   ?action=import_recipe&url=<scheme>://...   (link-only recipe, minimal card)
  (function handleUrlImport(){
    const p = new URLSearchParams(location.search);
    if (p.get('action') !== 'import_recipe') return;
    try {
      const raw = p.get('data');
      if (raw) {
        const json = JSON.parse(atob(raw));
        json.id = 'r_' + Math.random().toString(36).slice(2,10);
        json.source = json.source || 'OpenClaw';
        json.added = Date.now();
        state.recipes.unshift(json);
        saveAll(state.recipes);
        render();
        setTimeout(()=>openDetail(json.id), 300);
        toast('Recipe imported');
      } else if (p.get('url')) {
        openAdd({ name: p.get('title') || 'Imported Recipe', desc: 'Source: ' + p.get('url') });
      }
    } catch(e){ console.error('import_recipe failed', e); toast('Import failed'); }
    if (history.replaceState) history.replaceState({}, '', location.pathname);
  })();

  // ── Cook mode ──────────────────────────────────────────
  const cookEl     = document.getElementById('cookMode');
  const cookTitle  = document.getElementById('cookTitle');
  const cookNum    = document.getElementById('cookNum');
  const cookText   = document.getElementById('cookText');
  const cookFill   = document.getElementById('cookFill');
  const cookPrev   = document.getElementById('cookPrev');
  const cookNext   = document.getElementById('cookNext');
  const cookMic    = document.getElementById('cookMic');
  const cookClose  = document.getElementById('cookClose');

  function startCook(recipe){
    if (!(recipe.steps||[]).length) { toast('This recipe has no steps yet'); return; }
    state.activeCook = recipe;
    state.cookStep  = 0;
    cookTitle.textContent = recipe.name;
    cookEl.classList.add('active');
    renderCook();
    try { if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{}); } catch(_){}
  }
  function renderCook(){
    const r = state.activeCook; if (!r) return;
    const total = r.steps.length;
    const i = Math.min(state.cookStep, total-1);
    cookNum.textContent  = `Step ${i+1} of ${total}`;
    cookText.textContent = r.steps[i];
    cookFill.style.width = `${((i+1)/total)*100}%`;
    cookPrev.disabled = i === 0;
    cookPrev.style.opacity = i === 0 ? 0.4 : 1;
    cookNext.textContent = (i === total - 1) ? '✓ Finish' : 'Next →';
    if (window.speechSynthesis) {
      try {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(r.steps[i]);
        u.rate = 1.0; u.pitch = 1.0;
        window.speechSynthesis.speak(u);
      } catch(_){}
    }
  }
  cookPrev.addEventListener('click', ()=>{
    if (state.cookStep > 0){ state.cookStep--; renderCook(); }
  });
  cookNext.addEventListener('click', ()=>{
    const total = state.activeCook.steps.length;
    if (state.cookStep >= total - 1){ endCook(true); return; }
    state.cookStep++; renderCook();
  });
  cookClose.addEventListener('click', ()=>endCook(false));

  function endCook(done){
    cookEl.classList.remove('active');
    if (state.cookRecog) { try { state.cookRecog.stop(); } catch(_){} state.cookRecog = null; cookMic.classList.remove('listening'); }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (done) toast('Bon appétit! 🍽');
  }

  // Voice control: "next", "back", "repeat", "stop"
  function toggleMic(){
    if (state.cookRecog){
      try { state.cookRecog.stop(); } catch(_){}
      state.cookRecog = null;
      cookMic.classList.remove('listening');
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR){ toast('Voice not available on this device'); return; }
    const recog = new SR();
    recog.continuous = true; recog.interimResults = false; recog.lang = 'en-US';
    recog.onresult = (e)=>{
      const transcript = Array.from(e.results).slice(-1)[0][0].transcript.toLowerCase();
      if (/\b(next|continue|forward|done)\b/.test(transcript))  cookNext.click();
      else if (/\b(back|previous|prev)\b/.test(transcript))     cookPrev.click();
      else if (/\b(repeat|again)\b/.test(transcript))           renderCook();
      else if (/\b(stop|exit|quit|end)\b/.test(transcript))     endCook(false);
    };
    recog.onerror = ()=>{ state.cookRecog = null; cookMic.classList.remove('listening'); };
    recog.onend   = ()=>{ if (state.cookRecog === recog){ try{recog.start();}catch(_){} } };
    recog.start();
    state.cookRecog = recog;
    cookMic.classList.add('listening');
  }
  cookMic.addEventListener('click', toggleMic);

  // ── Boot ───────────────────────────────────────────────
  render();
})();
</script>

</body>
</html>
