<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- TOUCH: kiosk bypass -->
    <script>
    (function(){
        if(localStorage.getItem('zoe_kiosk')==='1') return;
        var p=new URLSearchParams(location.search);
        if(p.get('kiosk')==='1') localStorage.setItem('zoe_kiosk','1');
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#fafbfc">
    <title>Zoe – Notes</title>
    <script>
    (function(){var s=localStorage.getItem('zoe_theme')||'auto';var dark=s==='dark'||(s==='auto'&&(new Date().getHours()<7||new Date().getHours()>=19));if(dark){document.documentElement.classList.add('dark-mode');document.querySelector('meta[name=theme-color]').content='#060610';}})();
    </script>
        <!-- TOUCH: premium widget CSS system (same as desktop) -->
    <link rel="stylesheet" href="/css/widgets-premium.css">
    <link rel="stylesheet" href="/css/widgets-fluid.css">
    <!-- TOUCH: adapter (tap targets, hide desktop chrome, dark mode) -->
    <link rel="stylesheet" href="/touch/css/touch-adapter.css">
    <link rel="stylesheet" href="/touch/css/touch-premium.css">
    <script src="/js/auth.js"></script>
    <style>
        body { overflow-y: auto; cursor: auto; }

        .notes-page {
            padding-top: var(--nav-height);
            min-height: 100dvh;
            padding-bottom: calc(var(--nav-height) + var(--space-2xl));
        }

        .search-bar {
            padding: var(--space-sm) var(--space-lg);
            border-bottom: 1px solid var(--glass-border);
            background: var(--nav-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
        }

        .search-input-wrap {
            display: flex; align-items: center; gap: var(--space-sm);
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-md);
            padding: 0 var(--space-md);
            min-height: var(--touch-target);
        }
        .search-icon { font-size: var(--text-sm); color: var(--text-muted); flex-shrink: 0; }
        #searchInput {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-primary); font-size: var(--text-sm); font-family: var(--font-family);
            -webkit-user-select: text; user-select: text;
        }
        #searchInput::placeholder { color: var(--text-muted); }

        .notes-scroll {
            padding: var(--space-md) var(--space-lg);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
            align-items: start;
        }

        .note-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            padding: var(--space-md) var(--space-md) var(--space-md) calc(var(--space-md) + 4px);
            cursor: pointer;
            touch-action: manipulation;
            transition: background var(--ease-base), transform var(--ease-fast), box-shadow var(--ease-base);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            box-shadow: var(--shadow-small);
        }
        .note-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            border-radius: var(--radius-xs) 0 0 var(--radius-xs);
            background: var(--card-color, var(--primary-purple));
        }
        .note-card:active {
            background: var(--glass-bg-hover);
            transform: scale(0.98);
        }

        .note-card-title {
            font-size: var(--text-sm);
            font-weight: var(--weight-semibold);
            color: var(--text-primary);
            margin-bottom: var(--space-xs);
            line-height: var(--leading-tight);
        }
        .note-card-preview {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            line-height: var(--leading-relaxed);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            margin-bottom: var(--space-sm);
        }
        .note-card-footer {
            display: flex; align-items: center; gap: var(--space-xs); flex-wrap: wrap;
        }
        .note-date-chip {
            font-size: var(--text-xs);
            color: var(--text-muted);
            background: var(--glass-bg-light);
            border-radius: var(--radius-sm);
            padding: 2px var(--space-sm);
        }
        .note-tag-chip {
            font-size: var(--text-xs);
            border-radius: var(--radius-sm);
            padding: 2px var(--space-sm);
            background: color-mix(in srgb, var(--primary-purple) 14%, transparent);
            color: var(--primary-purple);
            border: 1px solid color-mix(in srgb, var(--primary-purple) 22%, transparent);
        }

        .empty-state {
            grid-column: 1 / -1;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: var(--space-md);
            padding: var(--space-2xl) var(--space-lg);
            color: var(--text-muted);
            text-align: center;
        }
        .empty-icon { font-size: var(--text-5xl); }
        .empty-title { font-size: var(--text-lg); font-weight: var(--weight-medium); color: var(--text-secondary); }
        .empty-body { font-size: var(--text-sm); line-height: var(--leading-relaxed); max-width: 260px; }

        .editor-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.48);
            backdrop-filter: blur(var(--blur-heavy));
            -webkit-backdrop-filter: blur(var(--blur-heavy));
            z-index: 1900;
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s var(--ease-smooth);
        }
        .dark-mode .editor-overlay {
            background: rgba(0, 0, 0, 0.62);
        }
        .editor-overlay.open { transform: translateY(0); }

        .editor-header {
            display: flex; align-items: center; gap: var(--space-md);
            padding: var(--space-md) var(--space-lg);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            background: var(--nav-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
        }

        .editor-close {
            width: var(--touch-target); height: var(--touch-target);
            border-radius: var(--radius-round);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: var(--text-xl);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; touch-action: manipulation;
            transition: background var(--ease-base);
        }
        .editor-close:active { background: var(--glass-bg-hover); }

        .editor-header-title {
            font-size: var(--text-base); font-weight: var(--weight-medium); color: var(--text-secondary); flex: 1;
        }

        .editor-actions { display: flex; gap: var(--space-sm); }

        .editor-delete-btn {
            min-height: var(--touch-target); padding: 0 var(--space-md);
            border-radius: var(--radius-round);
            background: color-mix(in srgb, #ff6b6b 12%, var(--glass-bg));
            border: 1px solid color-mix(in srgb, #ff6b6b 28%, var(--glass-border));
            color: #ff6b6b;
            font-size: var(--text-sm); font-weight: var(--weight-medium);
            cursor: pointer; touch-action: manipulation;
            transition: background var(--ease-base);
            display: flex; align-items: center; gap: var(--space-xs);
            font-family: var(--font-family);
        }
        .editor-delete-btn:active { background: color-mix(in srgb, #ff6b6b 22%, var(--glass-bg)); }

        .editor-save-btn {
            min-height: var(--touch-target); padding: 0 var(--space-lg);
            border-radius: var(--radius-round);
            background: var(--primary-gradient);
            border: none;
            color: var(--text-on-brand);
            font-size: var(--text-sm); font-weight: var(--weight-semibold);
            cursor: pointer; touch-action: manipulation;
            box-shadow: var(--shadow-purple);
            transition: opacity var(--ease-base), transform var(--ease-fast);
            font-family: var(--font-family);
        }
        .editor-save-btn:active { transform: scale(0.95); }

        .editor-body {
            flex: 1; overflow-y: auto; padding: var(--space-lg);
            display: flex; flex-direction: column; gap: var(--space-md);
            -webkit-overflow-scrolling: touch;
            background: var(--glass-bg);
        }
        .dark-mode .editor-body {
            background: color-mix(in srgb, var(--glass-bg) 92%, transparent);
        }

        #noteTitleInput {
            width: 100%; background: none; border: none; outline: none;
            color: var(--text-primary); font-size: var(--text-2xl); font-weight: var(--weight-semibold);
            font-family: var(--font-family); line-height: var(--leading-tight);
            -webkit-user-select: text; user-select: text;
        }
        #noteTitleInput::placeholder { color: var(--text-muted); }

        .editor-divider { height: 1px; background: var(--glass-border); }

        #noteEditor {
            flex: 1; width: 100%;
            background: none; border: none; outline: none;
            color: var(--text-secondary); font-size: var(--text-base); font-family: var(--font-family);
            font-weight: var(--weight-light); line-height: var(--leading-relaxed);
            resize: none;
            min-height: 200px;
            -webkit-user-select: text; user-select: text;
        }
        #noteEditor::placeholder { color: var(--text-muted); }

        .tag-color-row {
            display: flex; align-items: center; gap: var(--space-sm);
            flex-wrap: wrap;
        }

        #tagInput {
            flex: 1; min-width: 120px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-md);
            padding: var(--space-sm) var(--space-md);
            color: var(--text-primary);
            font-size: var(--text-sm); font-family: var(--font-family);
            outline: none;
            min-height: 40px;
            -webkit-user-select: text; user-select: text;
        }
        #tagInput::placeholder { color: var(--text-muted); }

        .tag-add-btn {
            min-height: 40px; padding: 0 var(--space-md);
            border-radius: var(--radius-md);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: var(--text-sm);
            cursor: pointer; touch-action: manipulation;
            font-family: var(--font-family);
        }

        .color-picker-row { display: flex; gap: var(--space-sm); }
        .color-swatch {
            width: 28px; height: 28px;
            border-radius: var(--radius-round);
            border: 2px solid transparent;
            cursor: pointer;
            touch-action: manipulation;
            transition: transform var(--ease-fast);
        }
        .color-swatch:active { transform: scale(0.88); }
        .color-swatch.selected { border-color: var(--text-secondary); }

        .tags-chips { display: flex; gap: var(--space-xs); flex-wrap: wrap; }
        .tag-chip-item {
            font-size: var(--text-xs); border-radius: var(--radius-md); padding: var(--space-xs) var(--space-sm);
            background: color-mix(in srgb, var(--primary-purple) 14%, transparent);
            color: var(--primary-purple);
            border: 1px solid color-mix(in srgb, var(--primary-purple) 22%, transparent);
            display: flex; align-items: center; gap: var(--space-xs);
            cursor: pointer; touch-action: manipulation;
        }
        .tag-chip-remove { font-size: var(--text-sm); line-height: 1; opacity: 0.7; }

        .field-label {
            font-size: var(--text-xs);
            font-weight: var(--weight-semibold);
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: var(--space-sm);
        }

        .toast {
            position: fixed;
            bottom: calc(var(--nav-height) + var(--space-xl));
            left: 50%;
            transform: translateX(-50%) translateY(14px);
            background: color-mix(in srgb, var(--primary-teal) 14%, var(--glass-bg));
            border: 1px solid color-mix(in srgb, var(--primary-teal) 35%, var(--glass-border));
            color: var(--primary-teal);
            border-radius: var(--radius-round);
            padding: var(--space-sm) var(--space-lg);
            font-size: var(--text-sm); font-weight: var(--weight-medium);
            opacity: 0; transition: opacity var(--ease-base), transform var(--ease-base);
            pointer-events: none; z-index: 1950; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .fab-notes {
            bottom: calc(var(--nav-height) + var(--space-md));
        }
    </style>
</head>
<body>

<div class="notes-page">
    <div class="search-bar">
        <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input type="search" id="searchInput" placeholder="Search notes…" autocomplete="off" autocorrect="off">
        </div>
    </div>

    <div class="notes-scroll">
        <div class="notes-grid" id="notesGrid">
            <div class="empty-state">
                <div class="empty-icon">📝</div>
                <div class="empty-title">No notes yet</div>
                <div class="empty-body">Say "Hey Zoe, make a note about…" or tap + to create one.</div>
            </div>
        </div>
    </div>
</div>

<button type="button" class="fab fab-notes" onclick="openEditor(null)" aria-label="New note">+</button>

<div class="editor-overlay" id="editorOverlay" role="dialog" aria-modal="true" aria-label="Note editor">
    <div class="editor-header">
        <button type="button" class="editor-close" onclick="closeEditor()" aria-label="Close">×</button>
        <span class="editor-header-title" id="editorHeaderTitle">New Note</span>
        <div class="editor-actions">
            <button type="button" class="editor-delete-btn" id="deleteBtn" onclick="deleteNote()" style="display:none">
                🗑 Delete
            </button>
            <button type="button" class="editor-save-btn" onclick="saveNote()">Save</button>
        </div>
    </div>

    <div class="editor-body">
        <input type="text" id="noteTitleInput" placeholder="Title" autocomplete="off" autocorrect="on">
        <div class="editor-divider"></div>
        <textarea id="noteEditor" placeholder="Start writing…" autocorrect="on" spellcheck="true"></textarea>
        <div class="editor-divider"></div>

        <div>
            <div class="field-label">Tags</div>
            <div class="tag-color-row">
                <input type="text" id="tagInput" placeholder="Add tag, press Enter…">
                <button type="button" class="tag-add-btn" onclick="addTagFromInput()">Add</button>
            </div>
            <div class="tags-chips" id="tagsChips" style="margin-top:var(--space-sm);"></div>
        </div>

        <div>
            <div class="field-label">Color</div>
            <div class="color-picker-row" id="colorPicker">
                <div class="color-swatch selected" data-color="#7B61FF" style="background:#7B61FF" onclick="selectColor(this)"></div>
                <div class="color-swatch" data-color="#5AE0E0" style="background:#5AE0E0" onclick="selectColor(this)"></div>
                <div class="color-swatch" data-color="#FF6B9D" style="background:#FF6B9D" onclick="selectColor(this)"></div>
                <div class="color-swatch" data-color="#FFB347" style="background:#FFB347" onclick="selectColor(this)"></div>
                <div class="color-swatch" data-color="#6BCB77" style="background:#6BCB77" onclick="selectColor(this)"></div>
                <div class="color-swatch" data-color="#FF6B6B" style="background:#FF6B6B" onclick="selectColor(this)"></div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/websocket-sync.js"></script>
<script src="/js/touch-ui-executor.js"></script>
<script src="/js/orb-loader.js"></script>
<script src="/touch/js/gestures.js"></script>
<script src="/touch/js/touch-menu.js"></script>
<script>
const NOTE_COLORS = ['#7B61FF','#5AE0E0','#FF6B9D','#FFB347','#6BCB77','#FF6B6B'];

let notes = [];
let filteredNotes = [];
let currentNoteId = null;
let currentColor = '#7B61FF';
let currentTags = [];
let searchQuery = '';

/* ── Init ── */
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const session = JSON.parse(localStorage.getItem('zoe_session') || '{}');
        const userId = session.user_id || session.userId || 'anonymous';
        if (typeof ZoeWebSockets !== 'undefined') {
            ZoeWebSockets.init(userId);
            ZoeWebSockets.on('note_created', loadNotes);
            ZoeWebSockets.on('note_updated', loadNotes);
            ZoeWebSockets.on('note_deleted', loadNotes);
        }
    } catch(e) { console.warn('WS init:', e); }

    document.getElementById('searchInput').addEventListener('input', e => {
        searchQuery = e.target.value.toLowerCase();
        applyFilter();
    });

    document.getElementById('tagInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); addTagFromInput(); }
    });

    await loadNotes();
});

/* ── Load notes ── */
async function loadNotes() {
    try {
        const r = await fetch('/api/notes');
        if (!r.ok) throw new Error();
        const data = await r.json();
        notes = Array.isArray(data) ? data : (data.notes || []);
        applyFilter();
    } catch {
        notes = [];
        renderNotes([]);
    }
}

function applyFilter() {
    if (!searchQuery) {
        filteredNotes = [...notes];
    } else {
        filteredNotes = notes.filter(n =>
            (n.title || '').toLowerCase().includes(searchQuery) ||
            (n.content || '').toLowerCase().includes(searchQuery) ||
            (n.tags || []).some(t => t.toLowerCase().includes(searchQuery))
        );
    }
    renderNotes(filteredNotes);
}

/* ── Render ── */
function renderNotes(list) {
    const grid = document.getElementById('notesGrid');
    if (!list.length) {
        const msg = searchQuery
            ? `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No results</div><div class="empty-body">No notes match "${escHtml(searchQuery)}"</div></div>`
            : `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">No notes yet</div><div class="empty-body">Say "Hey Zoe, make a note about…" or tap + to create one.</div></div>`;
        grid.innerHTML = msg;
        return;
    }

    grid.innerHTML = list.map(note => {
        const color = note.color || NOTE_COLORS[Math.abs(hashStr(note.id || note.title || '')) % NOTE_COLORS.length];
        const date = note.updated_at || note.created_at
            ? new Date(note.updated_at || note.created_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
            : '';
        const tags = (note.tags || []).slice(0, 2).map(t => `<span class="note-tag-chip">${escHtml(t)}</span>`).join('');
        return `
        <div class="note-card" style="--card-color:${color}" onclick='openEditor(${JSON.stringify(note)})'>
            <div class="note-card-title">${escHtml(note.title || 'Untitled')}</div>
            <div class="note-card-preview">${escHtml(note.content || '')}</div>
            <div class="note-card-footer">
                ${date ? `<span class="note-date-chip">${date}</span>` : ''}
                ${tags}
            </div>
        </div>`;
    }).join('');
}

/* ── Editor ── */
function openEditor(note) {
    currentNoteId = note?.id || null;
    currentColor = note?.color || '#7B61FF';
    currentTags = Array.isArray(note?.tags) ? [...note.tags] : [];

    document.getElementById('noteTitleInput').value = note?.title || '';
    document.getElementById('noteEditor').value = note?.content || '';
    document.getElementById('editorHeaderTitle').textContent = note ? 'Edit Note' : 'New Note';
    document.getElementById('deleteBtn').style.display = note ? 'flex' : 'none';

    updateTagsChips();
    updateColorPicker();

    document.getElementById('editorOverlay').classList.add('open');
    setTimeout(() => document.getElementById('noteEditor').focus(), 350);
}

function closeEditor() {
    document.getElementById('editorOverlay').classList.remove('open');
    currentNoteId = null;
    currentTags = [];
}

/* Tags */
function addTagFromInput() {
    const inp = document.getElementById('tagInput');
    const val = inp.value.trim();
    if (val && !currentTags.includes(val)) {
        currentTags.push(val);
        updateTagsChips();
    }
    inp.value = '';
}

function removeTag(tag) {
    currentTags = currentTags.filter(t => t !== tag);
    updateTagsChips();
}

function updateTagsChips() {
    document.getElementById('tagsChips').innerHTML = currentTags.map(t =>
        `<span class="tag-chip-item" onclick="removeTag('${escHtml(t)}')">${escHtml(t)}<span class="tag-chip-remove">×</span></span>`
    ).join('');
}

/* Color */
function selectColor(el) {
    currentColor = el.dataset.color;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s === el));
}

function updateColorPicker() {
    document.querySelectorAll('.color-swatch').forEach(s => {
        s.classList.toggle('selected', s.dataset.color === currentColor);
    });
}

/* ── Save ── */
async function saveNote() {
    const title = document.getElementById('noteTitleInput').value.trim();
    const content = document.getElementById('noteEditor').value.trim();
    if (!title && !content) { showToast('⚠ Nothing to save'); return; }

    const payload = { title: title || 'Untitled', content, tags: currentTags, color: currentColor };

    try {
        let r;
        if (currentNoteId) {
            r = await fetch(`/api/notes/${currentNoteId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } else {
            r = await fetch('/api/notes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }
        if (!r.ok) throw new Error();
        closeEditor();
        showToast(currentNoteId ? '✓ Note updated' : '✓ Note created');
        await loadNotes();
    } catch {
        showToast('⚠ Could not save');
    }
}

/* ── Delete ── */
async function deleteNote() {
    if (!currentNoteId) return;
    if (!confirm('Delete this note?')) return;
    try {
        const r = await fetch(`/api/notes/${currentNoteId}`, { method: 'DELETE' });
        if (!r.ok) throw new Error();
        closeEditor();
        showToast('Note deleted');
        await loadNotes();
    } catch {
        showToast('⚠ Could not delete');
    }
}

/* ── Helpers ── */
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
}

function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
    return Math.abs(h);
}

/* ── ZOE_OPEN_FORM hook ── */
window.ZOE_OPEN_FORM = function(formType, prefill) {
    if (formType === 'new_note') {
        openEditor(null);
        if (prefill) {
            if (prefill.title) document.getElementById('noteTitleInput').value = prefill.title;
            if (prefill.content) document.getElementById('noteEditor').value = prefill.content;
            if (prefill.tags) {
                currentTags = Array.isArray(prefill.tags) ? prefill.tags : [prefill.tags];
                updateTagsChips();
            }
        }
        setTimeout(() => document.getElementById('noteEditor').focus(), 360);
    }
};

TouchMenu.init({ page: 'notes' });
</script>
