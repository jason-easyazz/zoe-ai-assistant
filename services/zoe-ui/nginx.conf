# Zoe UI — default server for zoe-ui container (mounted as /etc/nginx/conf.d/default.conf)
# Sends zoe-auth routes to zoe-auth container; all other /api/* to zoe-data on the host.
# /modules/qd/* and /modules/jag-board/* proxy to module containers (not the main SPA, which requires auth).
# Match zoe-ui dist: auth.js + sw.js treat these paths as public (same as QD).

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /developer/ {
        alias /usr/share/nginx/html/developer/;
        try_files $uri $uri/ /developer/index.html;
    }

    location /api/auth/ {
        proxy_pass http://zoe-auth:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/ {
        proxy_pass http://zoe-auth:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/touch-panel/ {
        proxy_pass http://zoe-auth:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/sso/ {
        proxy_pass http://zoe-auth:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://host.docker.internal:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_connect_timeout 60s;
    }

    location /health {
        proxy_pass http://host.docker.internal:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # Hermes Agent OpenAI-compatible API — for Open WebUI, voice clients, and external callers.
    # This endpoint lets any OpenAI-compatible tool connect to the Hermes agent → OpenClaw.
    location /hermes/ {
        proxy_pass http://host.docker.internal:8642/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }
    location /ws/ {
        proxy_pass http://host.docker.internal:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # LiveKit WebRTC signalling proxy (port 7880)
    location /livekit/ {
        proxy_pass http://host.docker.internal:7880/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # Questionable Decisions — prefix without trailing slash so /modules/qd alone also proxies
    location ^~ /modules/qd {
        resolver 127.0.0.11 valid=30s;
        set $qd_upstream http://zoe-qd-game:8200;
        rewrite ^/modules/qd/?(.*)$ /$1 break;
        proxy_pass $qd_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /modules/jag-board {
        resolver 127.0.0.11 valid=30s;
        set $jag_upstream http://zoe-jag-board:8201;
        rewrite ^/modules/jag-board/?(.*)$ /$1 break;
        proxy_pass $jag_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /modules/orbit {
        resolver 127.0.0.11 valid=30s;
        set $orbit_upstream http://zoe-orbit:8202;
        rewrite ^/modules/orbit/?(.*)$ /$1 break;
        proxy_pass $orbit_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Home Assistant proxy — serves HA over HTTPS so the kiosk can embed dashboards in iframes without mixed-content errors
    # NOTE: Requires HA to trust the nginx container IP (e.g. 172.18.0.0/16) in configuration.yaml:
    #   http:
    #     use_x_forwarded_for: true
    #     trusted_proxies: ["172.18.0.0/16", "172.17.0.0/16"]
    # OpenClaw will apply this config automatically during HA setup.
    location ^~ /ha/ {
        rewrite ^/ha/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:8123;
        proxy_http_version 1.1;
        proxy_set_header Host localhost:8123;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Authentik UI and OIDC endpoints — user-facing
    location /auth/ {
        proxy_pass          http://authentik-server:9000/;
        proxy_redirect      / /auth/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $http_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
    }

    # Authentik OIDC discovery / application endpoints (URLs without /auth/ prefix)
    location /application/ {
        proxy_pass http://authentik-server:9000/application/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
    }

    # Authentik outpost — internal auth_request sub-requests only
    location /outpost.goauthentik.io {
        proxy_pass              http://authentik-server:9000;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length    "";
        proxy_set_header        X-Original-URL    $scheme://$http_host$request_uri;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        Host              $http_host;
    }

    # Forward-auth protected apps
    location /modules/music-assistant/ {
        auth_request      /outpost.goauthentik.io/outpost/auth/nginx;
        error_page 401  = @authentik_login;
        auth_request_set  $auth_cookie $upstream_http_set_cookie;
        add_header        Set-Cookie $auth_cookie;
        proxy_pass        http://host.docker.internal:8095/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /modules/agent-zero/ {
        auth_request      /outpost.goauthentik.io/outpost/auth/nginx;
        error_page 401  = @authentik_login;
        auth_request_set  $auth_cookie $upstream_http_set_cookie;
        add_header        Set-Cookie $auth_cookie;
        proxy_pass        http://host.docker.internal:50001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /multica/ {
        auth_request      /outpost.goauthentik.io/outpost/auth/nginx;
        error_page 401  = @authentik_login;
        auth_request_set  $auth_cookie $upstream_http_set_cookie;
        add_header        Set-Cookie $auth_cookie;
        proxy_pass        http://multica-web:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  $connection_upgrade;
        proxy_set_header   Host        $host;
    }

    location @authentik_login {
        return 302 /auth/if/flow/default-authentication-flow/?next=$request_uri;
    }

}

