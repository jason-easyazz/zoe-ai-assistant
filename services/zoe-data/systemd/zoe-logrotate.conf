# Logrotate config for Zoe Pi 5 host-native services
# Install: sudo cp this /etc/logrotate.d/zoe-pi
# Or run manually: logrotate -f /etc/logrotate.d/zoe-pi

/home/pi/.local/share/systemd/coredump/*.journal {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
}

# Note: journald logs for bitnet-server, gemma-server, mempalace, zoe-data
# are managed via journald.conf (set SystemMaxUse=200M in /etc/systemd/journald.conf).
# Run: sudo systemctl restart systemd-journald after changing journald.conf.
