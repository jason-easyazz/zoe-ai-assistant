# agents_registry.yml — Zoe's known peer agents
# Loaded at startup; hot-reloadable via POST /api/agent/registry/reload
#
# ── Multica agent registration (manual UI step) ───────────────────────────────
# Multica's /api/runtimes is read-only (GET only). Runtimes and agents must be
# created via the Multica web UI at http://localhost:3000.
#
# To register OpenClaw in Multica:
#   1. Open http://localhost:3000 → Settings → Runtimes → New Runtime
#   2. Type: openclaw_gateway  URL: http://localhost:18789
#   3. Save — note the runtime ID
#   4. Settings → Agents → New Agent → select the runtime above
#   5. Record the agent ID below as multica_agent_id
#
# To register Hermes in Multica:
#   1. Open http://localhost:3000 → Settings → Runtimes → New Runtime
#   2. Type: hermes  URL: http://localhost:8642
#   3. Save — note the runtime ID
#   4. Settings → Agents → New Agent → select the runtime above
#   5. Record the agent ID below as multica_agent_id
#
# Once registered, set multica_agent_id values below and run:
#   POST /api/agent/registry/reload
# ─────────────────────────────────────────────────────────────────────────────

agents:
  hermes:
    base_url: "http://localhost:8642"
    a2a_token: ""          # empty = Hermes uses its own auth; zoe-data calls via MCP bridge
    description: "Hermes — default Zoe engineering and reasoning agent"
    model: "GPT-5.4/Codex"
    skills:
      - reasoning
      - planning
      - implementation_strategy
      - code_review
      - development_repair
      - greptile_pr_loop
      - graphify_codebase_navigation
      - multica_board_repair
      - zoe_status_refresh
      - long_form
      - research
    # Prose for the A2A agent card. Kept as a parallel map (not inlined into
    # `skills:`) because four readers treat that list as bare strings —
    # zoe_agent_registry.py:49 does ", ".join(...) on it.
    skill_descriptions:
      reasoning: "Multi-step reasoning over ambiguous or under-specified problems"
      planning: "Break a goal into an ordered, dependency-aware implementation plan"
      implementation_strategy: "Choose an approach and sequence the work before code is written"
      code_review: "Review a diff for correctness, risk, and repo-convention fit"
      development_repair: "Diagnose and fix failing builds, tests, and broken integrations"
      greptile_pr_loop: "Drive a PR to merge: address findings, resolve threads, re-review"
      graphify_codebase_navigation: "DEPRECATED — graphify is retired; navigation is codebase-memory + Serena"
      multica_board_repair: "Unstick a stalled Multica ticket chain or phase"
      zoe_status_refresh: "Regenerate the operator-facing status and knowledge snapshot"
      long_form: "Produce extended prose: design docs, analyses, write-ups"
      research: "Investigate a question across sources and synthesize a cited answer"
    skills_dir: "~/.hermes/skills"
    health_port: 8642
    multica_agent_id: "019ae0a7-62f1-47fe-9d46-75fd0ae5d570"
    multica_runtime_id: "8d7f863d-0550-4741-8078-150e965268a9"

  openclaw:
    base_url: "http://localhost:18789"
    a2a_token: ""          # OpenClaw uses ACP; A2A is a secondary path
    description: "OpenClaw — available fallback, not the default route"
    model: "Gemma 4 E4B-QAT"
    skills:
      - browser_automation
      - persistent_login_sessions
      - home_assistant_ui_flows
      - workflows_hermes_cannot_execute
    skill_descriptions:
      browser_automation: "Drive a real browser through the CloakBrowser broker"
      persistent_login_sessions: "Hold authenticated browser sessions across runs"
      home_assistant_ui_flows: "Operate Home Assistant through its UI where no API path exists"
      workflows_hermes_cannot_execute: "Fallback lane for work outside the Hermes toolset"
    skills_dir: "~/.openclaw/workspace/skills"
    health_port: 18789
    multica_agent_id: "e2a566ab-613c-4a80-a299-965b7effaca8"
    multica_runtime_id: "cb4305d1-381a-4e91-9a66-46c4c0197ab9"

squads:
  zoe:
    description: "Zoe's personal assistant squad"
    leader: zoe-agent
    members:
      - hermes
      - openclaw
    routing: "leader delegates to Hermes for agentic work and self-evolution by default; OpenClaw remains available only when explicitly requested"
