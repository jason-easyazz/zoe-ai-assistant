version: '3.8'

# Omnigent meta-harness module.
# Public access is via zoe-cloudflared over the internal network (http://zoe-omnigent:6767)
# gated by a Cloudflare Access policy — see README.md. Port 6767 is bound to localhost
# only for local debugging; it is NOT published to the LAN or the public internet.

services:
  omnigent:
    build: .
    image: zoe-omnigent:latest
    container_name: zoe-omnigent
    restart: unless-stopped
    # CMD is the image entrypoint (entrypoint.sh): runs the foreground OIDC server AND
    # attaches the host/runner, so a single container serves the UI and runs agents.
    ports:
      - "127.0.0.1:6767:6767"  # localhost-only (host-local debugging). In header mode the server
                      # has NO auth of its own, so the port is NOT published to the LAN — otherwise
                      # any LAN device would be treated as the `local` user with the mounted
                      # workspace + agent credentials. cloudflared reaches it over the internal
                      # zoe-network (http://zoe-omnigent:6767), so the Cloudflare-Access-gated
                      # tunnel is unaffected by the localhost bind.
    # AUTH = OAuth subscriptions (Claude / ChatGPT / Cursor logins), NOT API keys.
    # DO NOT set ANTHROPIC_API_KEY or OPENAI_API_KEY here: if present, the CLIs bill the
    # metered API and silently ignore your subscription. Subscription tokens live in the
    # credential volumes below, created by a one-time login (see README → Auth).
    environment:
      - NODE_NO_WARNINGS=1
      # Omnigent launches agents with --dangerously-skip-permissions (autonomous, no prompts).
      # Claude Code blocks that flag under root; IS_SANDBOX=1 is the documented container
      # escape hatch — the container IS the isolation boundary. (User-approved 2026-06-17.)
      - IS_SANDBOX=1
      # Runner working directory = the mounted Zoe repo, so agents build Zoe. The host
      # creates git worktrees under it (the repo at ../../ is bind-mounted to /workspace).
      - OMNIGENT_RUNNER_WORKSPACE=/workspace
      # The repo is owned by host uid 1000 but the container runs as root; tell git to
      # trust it (otherwise "dubious ownership" breaks worktree/agent git ops).
      - GIT_CONFIG_COUNT=1
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=*
      # Put the host code-intel binaries (mounted read-only below at their REAL host paths)
      # on PATH so `opensrc`/`serena`/`codebase-memory-mcp` resolve as bare commands inside
      # the container, matching the host. The mounts use identical host paths so the existing
      # root .mcp.json (and .codex/config.toml), which reference /home/zoe/.local/bin/...,
      # resolve unchanged inside the container.
      - PATH=/home/zoe/.local/bin:/root/.local/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
      - OPENSRC_HOME=/home/zoe/.opensrc
      # Auth: header-mode + single-user, gated externally by Cloudflare Access on the tunnel
      # (https://buildzoe.the411.life → zoe-cloudflared → zoe-omnigent:6767). Access is the
      # gate; Omnigent itself trusts every request and resolves it to the reserved "local"
      # user (server/auth.py: header provider + OMNIGENT_LOCAL_SINGLE_USER → "local").
      #
      # Why NOT OIDC here: Omnigent's OIDC issuer/redirect are pinned to the LAN origin
      # http://zoe.local:6767. Reached through Cloudflare (buildzoe.the411.life, HTTPS) the
      # login round-trip crosses origins — the __Host-ap_auth_state cookie is set on the
      # Cloudflare host but the callback returns to http://zoe.local, so the cookie never
      # comes back → "Missing auth state cookie" (server/routes/auth.py). One OIDC client
      # can't straddle both origins, so the tunnel path uses Cloudflare Access instead.
      - OMNIGENT_AUTH_ENABLED=1
      - OMNIGENT_AUTH_PROVIDER=header
      - OMNIGENT_LOCAL_SINGLE_USER=1
      # The in-container host runner (entrypoint: `omnigent host $OMNIGENT_SELF_URL`) attaches to
      # the co-located server over LOOPBACK, NOT via zoe.local. With the published port bound to
      # 127.0.0.1 (above), the old default http://zoe.local:6767 (= host-gateway → host's published
      # port) is unreachable from inside the container, so the host showed "offline". Loopback is
      # correct anyway — server + host share this container. (Default in entrypoint.sh is zoe.local.)
      - OMNIGENT_SELF_URL=http://127.0.0.1:6767
      # To revert to LAN-only OIDC (only if the Cloudflare path is retired): flip provider
      # back to `oidc` and uncomment the block below. OIDC works only via http://zoe.local:6767.
      # - OMNIGENT_OIDC_ISSUER=http://zoe.local
      # - OMNIGENT_OIDC_CLIENT_ID=${OMNIGENT_OIDC_CLIENT_ID:-omnigent}
      # - OMNIGENT_OIDC_CLIENT_SECRET=${OMNIGENT_OIDC_CLIENT_SECRET}
      # - OMNIGENT_OIDC_REDIRECT_URI=http://zoe.local:6767/auth/callback
      # - OMNIGENT_OIDC_COOKIE_SECRET=${OMNIGENT_OIDC_COOKIE_SECRET}
    # Resolve zoe.local to the host so the container reaches zoe-auth's published :8002 with
    # a Host header of "zoe.local:8002" — keeps the OIDC issuer identical to the browser's.
    extra_hosts:
      - "zoe.local:host-gateway"
    volumes:
      # The agents' workspace IS the Zoe repo, so they can build Zoe.
      - ../../:/workspace
      # Activate the container-relative MCP config: Claude Code (--project /workspace)
      # auto-loads /workspace/.mcp.json. The committed repo-root .mcp.json uses the HOST
      # path (--project /home/zoe/assistant), which is NOT where the repo is mounted here,
      # so serena would point at a missing path. Shadow it with this container config
      # (serena --project /workspace) so the MCP servers actually resolve in-container.
      - ./.mcp.json:/workspace/.mcp.json:ro
      # OAuth/subscription credentials — persisted so logins + token refresh survive restarts.
      # (Subdir mounts only — never mount over /root or you shadow the installed CLIs.)
      - omnigent-claude:/root/.claude
      - omnigent-codex:/root/.codex
      - omnigent-cursor:/root/.cursor
      # Cursor harness: mount the host's proven arm64 cursor-agent install (avoids the
      # cursor.com remote installer). The entrypoint symlinks the real versioned binary
      # (which has its bundled node beside it) onto PATH. Login creds → omnigent-cursor volume.
      - /home/zoe/.local/share/cursor-agent:/root/.local/share/cursor-agent:ro
      # ── Code-intel tooling (audit fix #4) ──────────────────────────────────────
      # Serena, codebase-memory, and opensrc live on the HOST only; the repo is mounted
      # but the tools were entirely absent from this container, so the MCP servers wired
      # in the root .mcp.json (host paths /home/zoe/.local/bin/...) could never resolve.
      # Mount them READ-ONLY at their IDENTICAL host paths so those absolute paths resolve
      # verbatim — no .mcp.json rewriting needed. (Low-risk mount approach, not an image
      # rebuild.) Read-only: the container must not mutate the host's tool installs.
      #
      #   - /home/zoe/.local/bin            : launchers (serena, codebase-memory-mcp, opensrc).
      #                                       codebase-memory-mcp is a static aarch64 ELF; serena
      #                                       and opensrc are symlinks resolved by the mounts below.
      #   - /home/zoe/.local/share/uv       : serena's venv (tools/serena-agent) + its uv-managed
      #                                       CPython (python/cpython-3.13-...), both reached via
      #                                       serena's shebang/symlink chain.
      #   - /home/zoe/.cursor-server/.../opensrc : the real opensrc aarch64 binary the
      #                                       /home/zoe/.local/bin/opensrc symlink points to.
      #   - /home/zoe/.opensrc              : opensrc's third-party source cache (repos/, sources.json).
      - /home/zoe/.local/bin:/home/zoe/.local/bin:ro
      - /home/zoe/.local/share/uv:/home/zoe/.local/share/uv:ro
      - /home/zoe/.cursor-server/bin/linux-arm64/lib/node_modules/opensrc:/home/zoe/.cursor-server/bin/linux-arm64/lib/node_modules/opensrc:ro
      - /home/zoe/.opensrc:/home/zoe/.opensrc:ro
      # Persist omnigent's own state (mount path to confirm at first run).
      - omnigent-data:/root/.omnigent
    networks:
      - zoe-network

networks:
  zoe-network:
    name: zoe-network
    external: true

volumes:
  omnigent-claude:
  omnigent-codex:
  omnigent-cursor:
  omnigent-data:
