[pytest]
pythonpath =
    services/zoe-data
markers =
    performance: Performance and latency tests
    integration: Integration tests
    unit: Unit tests
    e2e: End-to-end tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
