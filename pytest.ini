[pytest]
pythonpath =
    services/zoe-data
markers =
    performance: Performance and latency tests
    integration: Integration tests
    unit: Unit tests
    e2e: End-to-end tests
    ci_safe: Slim-dep-green zoe-data test — opt-in selection for validate.yml's `-m ci_safe` GitHub lane (co-located marker replaces the hand-enumerated file list; see tests/AGENTS.md)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = services/zoe-data/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
